  }, [data, form, onUpdate, addToast]);

  // Сохранить поле D8
  const saveD8 = useCallback(async (recId, field, value) => {
    const d = { ...data, reclamations: (data.reclamations || []).map(r => r.id === recId ? { ...r, d8: { ...(r.d8 || {}), [field]: value } } : r) };
    await DB.save(d); onUpdate(d);
  }, [data, onUpdate]);

  // Перейти на следующий шаг D8
  const advanceD8 = useCallback(async (recId) => {
    const rec = (data.reclamations || []).find(r => r.id === recId);
    if (!rec) return;
    const step = (rec.d8?.currentStep || 0) + 1;
    const newStatus = step >= 1 && rec.status === 'open' ? 'in_work' : rec.status;
    const d = { ...data, reclamations: data.reclamations.map(r => r.id === recId ? { ...r, status: newStatus, d8: { ...(r.d8 || {}), currentStep: step } } : r) };
    await DB.save(d); onUpdate(d);
    setD8Steps(p => ({ ...p, [recId]: step }));
  }, [data, onUpdate]);

  // Закрыть рекламацию через D8
  const closeD8 = useCallback(async (recId) => {
    const rec = (data.reclamations || []).find(r => r.id === recId);
    if (!rec) return;
    const d8 = rec.d8 || {};
    const team = d8.team || [];
    if (team.length === 0) { addToast('Сначала добавьте команду расследования (D1)', 'error'); return; }
    if (!d8.rootCause && !d8.corrective) { addToast('Заполните хотя бы D4 (причина) и D5 (действия) перед закрытием', 'error'); return; }
    const d = { ...data, reclamations: data.reclamations.map(r => r.id === recId ? { ...r, status: 'closed', resolvedAt: now(), resolution: d8.closedNote || d8.corrective || '', d8: { ...d8, currentStep: 8 } } : r) };
    // Благодарность всем рабочим из команды (исключаем только 'master' строку, не реальных рабочих)
    const realWorkerIds = team.filter(wid => wid !== 'master').filter(wid => data.workers.some(w => w.id === wid));
    const thankEvents = realWorkerIds.map(wid => ({ id: uid(), type: 'thanks', toWorkerId: wid, fromWorkerId: 'master', ts: now(), note: '8D расследование' }));
    if (thankEvents.length) d.events = [...d.events, ...thankEvents];
    let final = d;
    realWorkerIds.forEach(wid => { const checked = checkAchievements(wid, final); if (checked !== final) final = checked; });
    await DB.save(final); onUpdate(final);
    addToast(`Рекламация закрыта. Благодарность отправлена: ${realWorkerIds.length} сотр.${realWorkerIds.length === 0 ? ' (в команде только мастер)' : ''}`, 'success');

  const delRec = useCallback(async (id) => {

  const allRecs = useMemo(() => (data.reclamations || [])
.sort((a, b) => b.createdAt - a.createdAt), [data.reclamations]);
  const isExternal = (r) => r.defectSource === 'external';
  const isInternal = (r) => r.defectSource !== 'external';

    let list = allRecs;
    if (filterType === 'external') list = list.filter(isExternal);
    if (filterType === 'internal') list = list.filter(isInternal);
    if (filterStatus !== 'all') list = list.filter(r => r.status === filterStatus);
    return list;
  }, [allRecs, filterStatus, filterType]);
  const openCount = allRecs.filter(r => r.status !== 'closed').length;
  const externalCount = allRecs.filter(isExternal).length;

  // 8D step renderer

      // Группа 1: непосредственные исполнители операции
      const executors = notInTeam.filter(w => linkedWorkerIds.includes(w.id));
      // Группа 2: имеют допуск к этому типу операции
      const competent = opName ? notInTeam.filter(w => !linkedWorkerIds.includes(w.id) && w.competences?.length && w.competences.includes(opName)) : [];
      // Группа 3: остальные — только в раскрывающемся списке
      const others = notInTeam.filter(w => !executors.includes(w) && !competent.includes(w));
      return h('div', null,

          (d8.team || []).map(wid => {

            return h('span', { key: wid, style: { display: 'inline-flex', alignItems: 'center', gap: 4, padding: '4px 10px', background: AM3, borderRadius: 6, fontSize: 11, color: AM2 } },

// ==================== AnalyticsDashboard (Волна 1: Lead Time, Такт, Нормы, Парето, Тренды) ====================
const AnalyticsDashboard = memo(({ data }) => {
  const [period, setPeriod] = useState(30);
  const periodStart = useMemo(() => now() - period * 86400000, [period]);
  const chartRef1 = useRef(null); const canvasRef1 = useRef(null);
  const chartRef2 = useRef(null); const canvasRef2 = useRef(null);

  // ===== 1. Lead Time по заказам =====
  const leadTimeData = useMemo(() => {
    return data.orders.filter(o => !o.archived).map(order => {
      const ops = data.ops.filter(op => op.orderId === order.id);
      const doneOps = ops.filter(op => op.status === 'done' && op.startedAt && op.finishedAt);
      if (doneOps.length === 0) return null;
      const firstStart = Math.min(...doneOps.map(op => op.startedAt));
      const lastFinish = Math.max(...doneOps.map(op => op.finishedAt));
      const totalElapsed = lastFinish - firstStart; // общее время от начала до конца
      const workingTime = doneOps.reduce((s, op) => s + (op.finishedAt - op.startedAt), 0); // время в работе
      const waitingTime = totalElapsed - workingTime; // время ожидания между этапами
      const allDone = ops.every(op => op.status === 'done' || op.status === 'defect');
      return { id: order.id, number: order.number, product: order.product, totalElapsed, workingTime, waitingTime, waitingPct: totalElapsed > 0 ? Math.round(waitingTime / totalElapsed * 100) : 0, opsDone: doneOps.length, opsTotal: ops.length, completed: allDone, firstStart, lastFinish };
    }).filter(Boolean).sort((a, b) => b.lastFinish - a.lastFinish);
  }, [data.orders, data.ops]);

  const avgLeadTime = leadTimeData.length > 0 ? leadTimeData.reduce((s, d) => s + d.totalElapsed, 0) / leadTimeData.length : 0;
  const avgWaitingPct = leadTimeData.length > 0 ? Math.round(leadTimeData.reduce((s, d) => s + d.waitingPct, 0) / leadTimeData.length) : 0;

  // ===== 2. Автонормирование =====
  const normSuggestions = useMemo(() => {
    const byName = {};
    data.ops.filter(op => op.status === 'done' && op.startedAt && op.finishedAt && op.finishedAt >= periodStart).forEach(op => {
      if (!byName[op.name]) byName[op.name] = { times: [], currentNorm: null };
      byName[op.name].times.push((op.finishedAt - op.startedAt) / 3600000);
      if (op.plannedHours) byName[op.name].currentNorm = op.plannedHours;
    });
    return Object.entries(byName).map(([name, stats]) => {
      const sorted = stats.times.sort((a, b) => a - b);
      const median = sorted[Math.floor(sorted.length / 2)];
      const avg = stats.times.reduce((s, t) => s + t, 0) / stats.times.length;
      const suggested = Math.round(median * 10) / 10;
      const current = stats.currentNorm;
      const deviation = current ? Math.round((avg / current - 1) * 100) : null;
      return { name, count: stats.times.length, avg: Math.round(avg * 10) / 10, median: suggested, min: Math.round(Math.min(...stats.times) * 10) / 10, max: Math.round(Math.max(...stats.times) * 10) / 10, current, suggested, deviation };
    }).filter(s => s.count >= 3).sort((a, b) => Math.abs(b.deviation || 0) - Math.abs(a.deviation || 0));
  }, [data.ops, periodStart]);

  // ===== 3. Расчёт такта =====
  const taktData = useMemo(() => {
    const completedOrders = data.orders.filter(o => {
      const ops = data.ops.filter(op => op.orderId === o.id);
      return ops.length > 0 && ops.every(op => op.status === 'done' || op.status === 'defect');
    });
    const completedInPeriod = completedOrders.filter(o => {
      const lastOp = data.ops.filter(op => op.orderId === o.id && op.finishedAt).sort((a, b) => b.finishedAt - a.finishedAt)[0];
      return lastOp && lastOp.finishedAt >= periodStart;
    });
    const pendingOrders = data.orders.filter(o => !o.archived && data.ops.some(op => op.orderId === o.id && op.status !== 'done' && op.status !== 'defect'));
    const daysInPeriod = period;
    const actualRate = completedInPeriod.length / daysInPeriod; // заказов в день
    // Требуемый такт: незавершённые заказы / оставшееся время до ближайшего дедлайна
    const withDeadline = pendingOrders.filter(o => o.deadline);
    const avgDaysToDeadline = withDeadline.length > 0 ? withDeadline.reduce((s, o) => s + Math.max(1, (new Date(o.deadline).getTime() - now()) / 86400000), 0) / withDeadline.length : 30;
    const requiredRate = pendingOrders.length > 0 ? pendingOrders.length / avgDaysToDeadline : 0;
    const taktOk = actualRate >= requiredRate || requiredRate === 0;
    return { completedInPeriod: completedInPeriod.length, pendingOrders: pendingOrders.length, actualRate: Math.round(actualRate * 100) / 100, requiredRate: Math.round(requiredRate * 100) / 100, taktOk, avgDaysToDeadline: Math.round(avgDaysToDeadline) };
  }, [data.orders, data.ops, period, periodStart]);

  // ===== 4. Парето-анализ простоев =====
  const paretoData = useMemo(() => {
    const downtimes = data.events.filter(e => e.type === 'downtime' && e.ts >= periodStart);
    const byReason = {};
    downtimes.forEach(e => {
      const reason = data.downtimeTypes.find(dt => dt.id === e.downtimeTypeId)?.name || 'Неизвестно';
      if (!byReason[reason]) byReason[reason] = { count: 0, totalMs: 0 };
      byReason[reason].count++;
      byReason[reason].totalMs += (e.duration || 0);
    });
    const sorted = Object.entries(byReason).sort((a, b) => b[1].totalMs - a[1].totalMs);
    const totalMs = sorted.reduce((s, [, v]) => s + v.totalMs, 0);
    let cumulative = 0;
    return sorted.map(([reason, stat]) => {
      cumulative += stat.totalMs;
      return { reason, count: stat.count, totalHrs: Math.round(stat.totalMs / 3600000 * 10) / 10, pct: totalMs > 0 ? Math.round(stat.totalMs / totalMs * 100) : 0, cumPct: totalMs > 0 ? Math.round(cumulative / totalMs * 100) : 0 };
    });
  }, [data.events, data.downtimeTypes, periodStart]);

  // ===== 5. Тренды качества =====
  const qualityTrends = useMemo(() => {
    const weeks = [];
    for (let i = 0; i < Math.min(period / 7, 12); i++) {
      const weekEnd = now() - i * 7 * 86400000;
      const weekStart = weekEnd - 7 * 86400000;
      const done = data.ops.filter(op => op.status === 'done' && op.finishedAt >= weekStart && op.finishedAt < weekEnd).length;
      const defect = data.ops.filter(op => op.status === 'defect' && op.finishedAt >= weekStart && op.finishedAt < weekEnd).length;
      const total = done + defect;
      const rate = total > 0 ? Math.round(defect / total * 1000) / 10 : 0;
      weeks.push({ weekNum: i, label: i === 0 ? 'Тек.' : `-${i}нед`, done, defect, total, rate });
    }
    weeks.reverse();
    // Тренд: растёт ли брак последние 3 недели
    const recent = weeks.slice(-3);
    const trending = recent.length >= 3 && recent[2].rate > recent[1].rate && recent[1].rate > recent[0].rate && recent[2].rate > 2;
    return { weeks, trending };
  }, [data.ops, period]);

  // Chart.js для Парето
  useEffect(() => {
    if (!canvasRef1.current || !window.Chart || paretoData.length === 0) return;
    if (chartRef1.current) chartRef1.current.destroy();
    chartRef1.current = new Chart(canvasRef1.current, {
      type: 'bar',
      data: { labels: paretoData.map(d => d.reason.length > 15 ? d.reason.slice(0, 15) + '…' : d.reason), datasets: [
        { label: 'Часы простоя', data: paretoData.map(d => d.totalHrs), backgroundColor: RD, borderRadius: 4, yAxisID: 'y' },
        { label: 'Накопительный %', data: paretoData.map(d => d.cumPct), type: 'line', borderColor: AM, pointBackgroundColor: AM, yAxisID: 'y1', tension: 0.3 }
      ]},
      options: { responsive: true, plugins: { legend: { display: true, position: 'bottom', labels: { font: { size: 10 } } } }, scales: { y: { beginAtZero: true, title: { display: true, text: 'Часы' } }, y1: { position: 'right', min: 0, max: 100, title: { display: true, text: '%' }, grid: { display: false } } } }
    });
    return () => { if (chartRef1.current) chartRef1.current.destroy(); };
  }, [paretoData]);

  // Chart.js для трендов качества
  useEffect(() => {
    if (!canvasRef2.current || !window.Chart || qualityTrends.weeks.length === 0) return;
    if (chartRef2.current) chartRef2.current.destroy();
    chartRef2.current = new Chart(canvasRef2.current, {
      type: 'bar',
      data: { labels: qualityTrends.weeks.map(w => w.label), datasets: [
        { label: 'Выполнено', data: qualityTrends.weeks.map(w => w.done), backgroundColor: GN, borderRadius: 4, stack: 'a' },
        { label: 'Брак', data: qualityTrends.weeks.map(w => w.defect), backgroundColor: RD, borderRadius: 4, stack: 'a' },
        { label: 'Брак %', data: qualityTrends.weeks.map(w => w.rate), type: 'line', borderColor: AM, pointBackgroundColor: AM, yAxisID: 'y1', tension: 0.3 }
      ]},
      options: { responsive: true, plugins: { legend: { display: true, position: 'bottom', labels: { font: { size: 10 } } } }, scales: { y: { beginAtZero: true, stacked: true, title: { display: true, text: 'Операций' } }, y1: { position: 'right', min: 0, title: { display: true, text: 'Брак %' }, grid: { display: false } } } }
    });
    return () => { if (chartRef2.current) chartRef2.current.destroy(); };
  }, [qualityTrends]);

  return h('div', null,
    // Период
    h('div', { style: { display: 'flex', gap: 6, marginBottom: 16, flexWrap: 'wrap' } },
      [7, 14, 30, 60, 90].map(d => h('button', { key: d, style: period === d ? abtn({ fontSize: 11 }) : gbtn({ fontSize: 11 }), onClick: () => setPeriod(d) }, `${d} дней`))
    ),

    // Алерт: тренд качества
    qualityTrends.trending && h('div', { role: 'alert', style: { ...S.card, background: RD3, border: `0.5px solid ${RD}`, marginBottom: 12, padding: 12 } },
      h('div', { style: { fontSize: 12, color: RD, fontWeight: 500 } }, '⚠ Брак растёт 3 недели подряд! Возможна системная проблема — проверьте оборудование и материалы.')
    ),

    // Такт производства
    h('div', { style: { ...S.card, marginBottom: 12 } },
      h('div', { style: S.sec }, 'Такт производства'),
      h('div', { className: 'metrics-grid', style: { display: 'grid', gap: 10, marginBottom: 8 } },
        h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 28, fontWeight: 500, color: GN } }, taktData.completedInPeriod), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, `Завершено за ${period}д`)),
        h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 28, fontWeight: 500, color: AM } }, taktData.pendingOrders), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'В очереди')),
        h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 28, fontWeight: 500, color: taktData.taktOk ? GN : RD } }, `${taktData.actualRate}`), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Факт (заказов/день)')),
        h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 28, fontWeight: 500, color: taktData.taktOk ? GN : RD } }, `${taktData.requiredRate}`), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Нужно (заказов/день)'))
      ),
      !taktData.taktOk && taktData.requiredRate > 0 && h('div', { style: { fontSize: 11, color: RD, fontWeight: 500, marginTop: 4 } }, `⚠ Производство не успевает: нужно ${taktData.requiredRate} заказов/день, факт ${taktData.actualRate}. Среднее время до дедлайна: ${taktData.avgDaysToDeadline} дней.`)
    ),

    // Lead Time
    h('div', { style: { ...S.card, marginBottom: 12 } },
      h('div', { style: S.sec }, 'Lead Time — время прохождения заказа'),
      leadTimeData.length === 0 ? h('div', { style: { padding: 12, color: '#888', textAlign: 'center' } }, 'Нет завершённых операций') : h('div', null,
        h('div', { style: { display: 'flex', gap: 16, marginBottom: 12 } },
          h('div', null, h('div', { style: { fontSize: 24, fontWeight: 500, color: AM } }, fmtDur(avgLeadTime)), h('div', { style: { fontSize: 10, color: '#888' } }, 'Средний Lead Time')),
          h('div', null, h('div', { style: { fontSize: 24, fontWeight: 500, color: avgWaitingPct > 50 ? RD : AM } }, `${avgWaitingPct}%`), h('div', { style: { fontSize: 10, color: '#888' } }, 'Среднее ожидание'))
        ),
        h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', null, h('tr', null, ['Заказ', 'Изделие', 'Lead Time', 'В работе', 'Ожидание', '% ожид.', 'Операций'].map((t, i) => h('th', { key: i, style: S.th }, t)))),
          h('tbody', null, leadTimeData.slice(0, 15).map(d => h('tr', { key: d.id },
            h('td', { style: { ...S.td, color: AM, fontWeight: 500 } }, d.number),
            h('td', { style: S.td }, d.product),
            h('td', { style: { ...S.td, fontFamily: 'monospace' } }, fmtDur(d.totalElapsed)),
            h('td', { style: { ...S.td, fontFamily: 'monospace', color: GN } }, fmtDur(d.workingTime)),
            h('td', { style: { ...S.td, fontFamily: 'monospace', color: d.waitingPct > 50 ? RD : '#888' } }, fmtDur(d.waitingTime)),
            h('td', { style: { ...S.td, color: d.waitingPct > 50 ? RD : d.waitingPct > 30 ? AM : GN, fontWeight: 500 } }, `${d.waitingPct}%`),
            h('td', { style: S.td }, `${d.opsDone}/${d.opsTotal}`)
          )))
        ))
      )
    ),

    // Тренды качества (график)
    h('div', { style: { ...S.card, marginBottom: 12 } },
      h('div', { style: S.sec }, 'Тренды качества (по неделям)'),
      qualityTrends.weeks.length === 0 ? h('div', { style: { padding: 12, color: '#888', textAlign: 'center' } }, 'Нет данных') : h('canvas', { ref: canvasRef2 })
    ),

    // Парето-анализ простоев (график + таблица)
    h('div', { style: { ...S.card, marginBottom: 12 } },
      h('div', { style: S.sec }, 'Парето-анализ простоев'),
      paretoData.length === 0 ? h('div', { style: { padding: 12, color: '#888', textAlign: 'center' } }, 'Нет простоев за период') : h('div', null,
        h('canvas', { ref: canvasRef1, style: { marginBottom: 12 } }),
        h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', null, h('tr', null, ['Причина', 'Кол-во', 'Потеряно (ч)', 'Доля', 'Накопит.'].map((t, i) => h('th', { key: i, style: S.th }, t)))),
          h('tbody', null, paretoData.map((d, i) => h('tr', { key: i, style: { background: d.cumPct <= 80 ? '#FFF8E1' : 'transparent' } },
            h('td', { style: { ...S.td, fontWeight: d.cumPct <= 80 ? 500 : 400 } }, d.reason),
            h('td', { style: { ...S.td, textAlign: 'center' } }, d.count),
            h('td', { style: { ...S.td, fontFamily: 'monospace', color: RD } }, `${d.totalHrs}`),
            h('td', { style: { ...S.td, textAlign: 'center' } }, `${d.pct}%`),
            h('td', { style: { ...S.td, textAlign: 'center', fontWeight: 500, color: d.cumPct <= 80 ? RD : '#888' } }, `${d.cumPct}%`)
          )))
        )),
        h('div', { style: { fontSize: 10, color: '#888', marginTop: 6 } }, 'Жёлтым выделены причины, дающие 80% потерь (правило Парето)')
      )
    ),

    // Автонормирование
    h('div', { style: { ...S.card, marginBottom: 12 } },
      h('div', { style: S.sec }, 'Нормирование операций (факт vs план)'),
      normSuggestions.length === 0 ? h('div', { style: { padding: 12, color: '#888', textAlign: 'center' } }, 'Недостаточно данных (нужно ≥3 завершённых операций каждого типа)') :
        h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', null, h('tr', null, ['Операция', 'Замеров', 'Текущая норма', 'Медиана факт', 'Мин', 'Макс', 'Отклонение', 'Рекомендация'].map((t, i) => h('th', { key: i, style: S.th }, t)))),
          h('tbody', null, normSuggestions.map((s, i) => h('tr', { key: i, style: { background: s.deviation && Math.abs(s.deviation) > 30 ? '#FFF8E1' : 'transparent' } },
            h('td', { style: S.td }, s.name),
            h('td', { style: { ...S.td, textAlign: 'center' } }, s.count),
            h('td', { style: { ...S.td, fontFamily: 'monospace', textAlign: 'center' } }, s.current ? `${s.current}ч` : '—'),
            h('td', { style: { ...S.td, fontFamily: 'monospace', textAlign: 'center', fontWeight: 500 } }, `${s.median}ч`),
            h('td', { style: { ...S.td, fontFamily: 'monospace', textAlign: 'center', color: '#888' } }, `${s.min}ч`),
            h('td', { style: { ...S.td, fontFamily: 'monospace', textAlign: 'center', color: '#888' } }, `${s.max}ч`),
            h('td', { style: { ...S.td, textAlign: 'center', color: s.deviation === null ? '#888' : Math.abs(s.deviation) > 30 ? RD : GN, fontWeight: 500 } }, s.deviation !== null ? `${s.deviation > 0 ? '+' : ''}${s.deviation}%` : '—'),
            h('td', { style: { ...S.td, fontSize: 11 } }, s.deviation !== null && Math.abs(s.deviation) > 20 ? `Обновить до ${s.suggested}ч` : '✓ Норма актуальна')
          )))
        ))
    )
  );
});

// ==================== ReportsBuilder (расширенный) ====================
const ReportsBuilder = memo(({ data, onUpdate, addToast }) => {
  const [reportType, setReportType] = useState('defects');
  const [period, setPeriod] = useState(30);
  const periodStart = useMemo(() => now() - period * 86400000, [period]);

  const reportData = useMemo(() => {
    if (reportType === 'defects') {
      return data.ops.filter(op => op.status === 'defect' && op.finishedAt >= periodStart).map(op => {
        const order = data.orders.find(o => o.id === op.orderId);
        const reason = data.defectReasons?.find(r => r.id === op.defectReasonId);
        const workerNames = (op.workerIds || []).map(wid => data.workers.find(w => w.id === wid)?.name).filter(Boolean).join(', ');
        return { op: op.name, order: order?.number || '—', reason: reason?.name || op.defectNote || '—', source: op.defectSource === 'current' ? 'Текущий этап' : op.defectSource === 'previous_stage' ? 'Пред. участок' : '—', worker: workerNames || '—', date: op.finishedAt ? new Date(op.finishedAt).toLocaleString() : '—' };
      });
    }
    if (reportType === 'downtimes') {
      return data.events.filter(e => e.type === 'downtime' && e.ts >= periodStart).map(e => {
        const worker = data.workers.find(w => w.id === e.workerId);
        const reason = data.downtimeTypes?.find(d => d.id === e.downtimeTypeId);
        const eq = e.equipmentId ? data.equipment?.find(eq => eq.id === e.equipmentId) : null;
        const op = e.opId ? data.ops.find(o => o.id === e.opId) : null;
        const order = op ? data.orders.find(o => o.id === op.orderId) : null;
        return { worker: worker?.name || '—', reason: reason?.name || '—', duration: fmtDur(e.duration || 0), equipment: eq?.name || '—', order: order?.number || '—', operation: op?.name || '—', shift: e.shift || '—', date: new Date(e.ts).toLocaleString() };
      });
    }
    if (reportType === 'orders') {
      return data.orders.filter(o => !o.archived && o.createdAt >= periodStart).map(order => {
        const ops = data.ops.filter(op => op.orderId === order.id);
        const done = ops.filter(op => op.status === 'done').length;
        const defect = ops.filter(op => op.status === 'defect').length;
        const startedAt = ops.filter(op => op.startedAt).reduce((min, op) => (!min || op.startedAt < min) ? op.startedAt : min, null);
        const finishedAt = ops.every(op => op.status === 'done' || op.status === 'defect') && ops.some(op => op.finishedAt) ? ops.reduce((max, op) => op.finishedAt > max ? op.finishedAt : max, 0) : null;
        const pct = ops.length > 0 ? Math.round(done / ops.length * 100) : 0;
        return { number: order.number, product: order.product, qty: order.qty, priority: PRIORITY[order.priority]?.label || '—', progress: `${done}/${ops.length} (${pct}%)`, defects: defect, deadline: order.deadline || '—', leadTime: startedAt && finishedAt ? fmtDur(finishedAt - startedAt) : '—' };
      });
    }
    if (reportType === 'workers') {
      return data.workers.filter(w => !w.archived).map(w => {
        const ops = data.ops.filter(op => op.workerIds?.includes(w.id) && op.finishedAt >= periodStart);
        const done = ops.filter(op => op.status === 'done');
        const defect = ops.filter(op => op.status === 'defect');
        const totalTime = done.reduce((s, op) => s + (op.finishedAt && op.startedAt ? op.finishedAt - op.startedAt : 0), 0);
        const avgTime = done.length > 0 ? totalTime / done.length : 0;
        const total = done.length + defect.length;
        const defectRate = total > 0 ? (defect.length / total * 100).toFixed(1) : '0.0';
        const downtimes = data.events.filter(e => e.workerId === w.id && e.type === 'downtime' && e.ts >= periodStart).length;
        return { name: w.name, position: w.position || '—', section: data.sections.find(s => s.id === w.sectionId)?.name || '—', done: done.length, defects: defect.length, defectRate: `${defectRate}%`, avgTime: avgTime ? fmtDur(avgTime) : '—', downtimes };
      }).sort((a, b) => b.done - a.done);
    }
    if (reportType === 'materials') {
      return (data.materialConsumptions || []).filter(mc => mc.ts >= periodStart).map(mc => {
        const mat = data.materials.find(m => m.id === mc.materialId);
        const op = data.ops.find(o => o.id === mc.opId);
        const order = op ? data.orders.find(o => o.id === op.orderId) : null;
        return { material: mat?.name || '—', unit: mat?.unit || '—', qty: mc.qty, cost: mat?.unitCost ? `${(mc.qty * mat.unitCost).toLocaleString()}₽` : '—', order: order?.number || '—', operation: op?.name || '—', date: new Date(mc.ts).toLocaleString() };
      });
    }
    if (reportType === 'shifts') {
      const shifts = data.settings?.shifts || [{ id: 1, name: 'Смена 1' }, { id: 2, name: 'Смена 2' }];
      const shiftMap = {};
      data.events.filter(e => (e.type === 'done' || e.type === 'defect' || e.type === 'downtime') && e.ts >= periodStart).forEach(e => {
        const key = e.shift || 'unknown';
        if (!shiftMap[key]) shiftMap[key] = { shift: key, done: 0, defects: 0, downtimes: 0, workers: new Set() };
        if (e.type === 'done') shiftMap[key].done++;
        if (e.type === 'defect') shiftMap[key].defects++;
        if (e.type === 'downtime') shiftMap[key].downtimes++;
        if (e.workerId) shiftMap[key].workers.add(e.workerId);
      });
      return Object.values(shiftMap).map(s => ({ shift: s.shift, done: s.done, defects: s.defects, defectRate: s.done + s.defects > 0 ? `${(s.defects / (s.done + s.defects) * 100).toFixed(1)}%` : '0%', downtimes: s.downtimes, workers: s.workers.size })).sort((a, b) => b.done - a.done);
    }
    return [];
  }, [reportType, periodStart, data]);

  const reportConfig = {
    defects:   { label: 'Брак',                headers: ['Операция','Заказ','Причина','Источник','Исполнитель','Дата'],      keys: ['op','order','reason','source','worker','date'] },
    downtimes: { label: 'Простои',             headers: ['Сотрудник','Причина','Длительность','Заказ','Операция','Оборудование','Смена','Дата'], keys: ['worker','reason','duration','order','operation','equipment','shift','date'] },
    orders:    { label: 'Выполнение заказов',  headers: ['Заказ','Изделие','Кол-во','Приоритет','Прогресс','Брак','Дедлайн','Lead Time'], keys: ['number','product','qty','priority','progress','defects','deadline','leadTime'] },
    workers:   { label: 'Эффективность',       headers: ['Сотрудник','Должность','Участок','Выполнено','Брак','Брак %','Ср. время','Простои'], keys: ['name','position','section','done','defects','defectRate','avgTime','downtimes'] },
    materials: { label: 'Расход материалов',   headers: ['Материал','Ед.','Кол-во','Стоимость','Заказ','Операция','Дата'],   keys: ['material','unit','qty','cost','order','operation','date'] },
    shifts:    { label: 'Отчёт по сменам',     headers: ['Смена','Выполнено','Брак','Брак %','Простои','Рабочих'],           keys: ['shift','done','defects','defectRate','downtimes','workers'] },
  };
  const cfg = reportConfig[reportType];

  const exportXlsx = () => {
    if (reportData.length === 0) return;
    const ws = XLSX.utils.json_to_sheet(reportData.map(row => { const out = {}; cfg.headers.forEach((h, i) => { out[h] = row[cfg.keys[i]]; }); return out; }));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, cfg.label);
    XLSX.writeFile(wb, `report_${reportType}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  return h('div', { style: S.card },
    h('div', { style: S.sec }, 'Конструктор отчётов'),
    h('div', { style: { display:'flex', gap:8, marginBottom:12, flexWrap:'wrap', alignItems:'center' } },
      h('select', { style: { ...S.inp, minWidth:200 }, value: reportType, onChange: e => setReportType(e.target.value) },
        Object.entries(reportConfig).map(([k, v]) => h('option', { key: k, value: k }, v.label))
      ),
      [7,14,30,90].map(d => h('button', { key: d, style: period === d ? abtn({ fontSize:11 }) : gbtn({ fontSize:11 }), onClick: () => setPeriod(d) }, `${d} дней`)),
      reportData.length > 0 && h('button', { style: gbtn({ fontSize:11, marginLeft:'auto' }), onClick: exportXlsx }, '📥 Excel')
    ),
    h('div', { style: { fontSize:11, color:'#888', marginBottom:12 } }, `Записей: ${reportData.length}`),
    reportData.length === 0
      ? h('div', { style: { padding:16, textAlign:'center', color:'#888' } }, 'Нет данных за выбранный период')

const QRScreen = memo(({ data, opId, onUpdate, addToast }) => {

  const workerNames = op ? op.workerIds?.map(id => data.workers.find(w => w.id === id)?.name).filter(Boolean).join(', ') : '';
  const [defNote, setDefNote] = useState('');
  const [defectReasonId, setDefectReasonId] = useState('');
  const [showDefForm, setShowDefForm] = useState(false);

  const [downtimeStartedAt, setDowntimeStartedAt] = useState(null);
  const [downtimeEquipmentId, setDowntimeEquipmentId] = useState('');

  useEffect(() => {
    if (!op || op.status !== 'in_progress') return;
    const t = setInterval(() => setTick(n => n+1), 1000);
    return () => clearInterval(t);
  }, [op?.status]);

  // ── Все useCallback ДО раннего return (Rules of Hooks) ──
  const handleStart = useCallback(async () => {
    if (!op || op.status !== 'pending') return;
    const workerId = op.workerIds?.[0];
    const worker = data.workers.find(w => w.id === workerId);
    if (worker && worker.competences && worker.competences.length > 0 && !worker.competences.includes(op.name)) { addToast('У сотрудника нет компетенции', 'error'); return; }
    const result = buildStartUpdate(data, op, workerId);
    const updated = { ...data, ops: result.ops, events: result.events };
    await DB.save(updated); onUpdate(updated); addToast('Операция начата', 'success');
  }, [data, op, onUpdate, addToast]);

  const handleFinish = useCallback(async (isDefect=false, isRework=false, source='current') => {
    if (!op || op.status !== 'in_progress') return;
    const workerId = op.workerIds?.[0];
    const result = buildFinishUpdate(data, op, workerId, { isDefect, isRework, source, defNote, defectReasonId, weldParams });
    const updated = { ...data, ops: result.ops, events: result.events, reclamations: result.reclamations };
    const allAchUpdated = (op.workerIds || []).reduce((acc, wid) => { const r = checkAchievements(wid, acc); return r; }, updated);
    const final = allAchUpdated !== updated ? allAchUpdated : updated;
    await DB.save(final); onUpdate(final);
    setShowDefForm(false); setDefNote(''); setDefectReasonId(''); setWeldParams({ seamNumber:'', electrode:'', result:'ok' });
    addToast('Операция завершена', 'info');
  }, [data, op, onUpdate, defNote, defectReasonId, weldParams, addToast]);

  const recordDowntime = useCallback(async () => {
    if (!op || !selectedDowntimeType) return addToast('Выберите причину', 'error');
    const shift = getCurrentShift(data.settings?.shifts);
    const duration = downtimeStartedAt ? now() - downtimeStartedAt : 0;
    const newEvent = { id: uid(), type:'downtime', workerId: op.workerIds?.[0], opId: op.id, ts: now(), downtimeTypeId: selectedDowntimeType, shift, startedAt: downtimeStartedAt || now(), duration, equipmentId: downtimeEquipmentId || undefined };

      ),
      h('select', { style: { ...S.inp, width:'100%', marginBottom:8 }, value: defectReasonId, onChange: e => setDefectReasonId(e.target.value) }, h('option', { value:'' }, '— выберите причину —'), (data.defectReasons || []).map(r => h('option', { key: r.id, value: r.id }, r.name))),
      h('textarea', { style: { ...S.inp, width:'100%', marginBottom:8 }, rows:2, placeholder:'Опишите дефект...', value: defNote, onChange: e => setDefNote(e.target.value) }),

        h('button', { style: { ...gbtn({ flex:1 }), color:AM2, borderColor:AM4 }, onClick: () => handleFinish(false, true, defectFromPrev ? 'previous_stage' : 'current') }, 'Переделка'),

      h('div', { style: { display:'flex', gap:8, marginBottom:8 } },
        h('label', { style: { display:'flex', alignItems:'center', gap:4 } }, h('input', { type:'radio', name:`weldResult_qr_${op.id}`, value:'ok', checked: weldParams.result === 'ok', onChange: e => setWeldParams(p => ({ ...p, result: e.target.value })) }), 'Принято'),
        h('label', { style: { display:'flex', alignItems:'center', gap:4 } }, h('input', { type:'radio', name:`weldResult_qr_${op.id}`, value:'fail', checked: weldParams.result === 'fail', onChange: e => setWeldParams(p => ({ ...p, result: e.target.value })) }), 'Брак')
      ),

        op.status === 'in_progress' && h('button', { style: { ...abtn({ flex:1 }), background:GN, color:GN2 }, onClick: () => handleFinish() }, '✓ Завершить'),
        op.status === 'in_progress' && h('button', { style: rbtn({ flex:1 }), onClick: () => { setShowDefForm(true); setDefectFromPrev(true); } }, '⚠ Брак с пред.'),
        op.status === 'in_progress' && h('button', { style: { ...rbtn({ flex:1 }), background:'#FFF0F0', borderColor:'#F09595' }, onClick: () => { setShowDefForm(true); setDefectFromPrev(false); } }, '⚠ Мой брак'),
        (op.status === 'pending' || op.status === 'in_progress') && h('button', { style: gbtn({ flex:1 }), onClick: () => { setShowDowntimeModal(true); setDowntimeStartedAt(now()); } }, '⏸ Простой')
      )
    );
    return h('div', { className: 'action-btns', style: { display:'flex', gap:8, flexWrap:'wrap' } },
      op.status === 'pending' && workerNames && h('button', { style: abtn({ flex:1, padding:'12px' }), onClick: handleStart }, '▶ Старт'),
      op.status === 'in_progress' && h('button', { style: { ...abtn({ flex:1 }), background:GN, color:GN2 }, onClick: () => handleFinish() }, '✓ Завершить'),
      op.status === 'in_progress' && h('button', { style: rbtn({ flex:1 }), onClick: () => { setShowDefForm(true); setDefectFromPrev(true); } }, '⚠ Брак с пред.'),
      op.status === 'in_progress' && h('button', { style: { ...rbtn({ flex:1 }), background:'#FFF0F0', borderColor:'#F09595' }, onClick: () => { setShowDefForm(true); setDefectFromPrev(false); } }, '⚠ Мой брак'),

const ChatScreen = memo(({ data, onUpdate, addToast, currentUser, onBack }) => {
  const [newMessage, setNewMessage] = useState('');
  const [showQuickActions, setShowQuickActions] = useState(false);
  const [showThanks, setShowThanks] = useState(false);
  const [showDuelCreate, setShowDuelCreate] = useState(false);

  const [duelOps, setDuelOps] = useState(3);
  const [contextOp, setContextOp] = useState('');
  const [isAnnouncement, setIsAnnouncement] = useState(false);
  const [viewProfileId, setViewProfileId] = useState(null);
  const [showPeople, setShowPeople] = useState(false);
  const messagesEndRef = useRef(null);

  const scrollToBottom = () => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); };
  useEffect(scrollToBottom, [data.messages]);

  // П.4: Счётчик непрочитанных
  const lastReadKey = `chat_lastRead_${currentUser.id || 'anon'}`;
  useEffect(() => { localStorage.setItem(lastReadKey, String(now())); }, [data.messages?.length, lastReadKey]);

  const myId = currentUser.id || 'system';
  const isMaster = currentUser.role === 'master';
  const isWarehouse = currentUser.role === 'warehouse';

  // Текущая операция рабочего (для контекста)
  const activeOp = useMemo(() => {
    if (!currentUser.id || currentUser.role !== 'worker') return null;
    return data.ops.find(op => op.status === 'in_progress' && op.workerIds?.includes(currentUser.id));
  }, [data.ops, currentUser]);

  const sendMessage = useCallback(async (text, type = 'text', extra = {}) => {
    if (!text?.trim()) return;
    const opData = contextOp ? data.ops.find(o => o.id === contextOp) : activeOp;
    const orderData = opData ? data.orders.find(o => o.id === opData.orderId) : null;
    const message = {
      id: uid(), senderId: myId,
      senderName: currentUser.name || 'Система',
      senderRole: currentUser.role,
      text: text.trim(), type,
      timestamp: now(),
      pinned: isAnnouncement && (isMaster || isWarehouse),
      opId: opData?.id || undefined,
      opName: opData?.name || undefined,
      orderNumber: orderData?.number || undefined,
      ...extra
    };
    const updatedMessages = [...(data.messages || []), message].slice(-200);
    let updated = { ...data, messages: updatedMessages };
    // Уведомления для мастера и склада при быстрых действиях
    const notifyTypes = ['need_material', 'equipment_issue', 'need_help', 'drawing_question'];
    if (notifyTypes.includes(type)) {
      const notifTargets = type === 'need_material' ? ['master', 'warehouse'] : ['master'];
      const notif = { id: uid(), type: 'chat_alert', alertType: type, senderId: myId, senderName: currentUser.name, text: text.trim(), opName: opData?.name, orderNumber: orderData?.number, targets: notifTargets, ts: now(), read: false };
      updated = { ...updated, events: [...updated.events, notif] };
    }
    await DB.save(updated); onUpdate(updated);
    setNewMessage(''); setContextOp(''); setIsAnnouncement(false); setShowQuickActions(false);
  }, [data, myId, currentUser, contextOp, activeOp, isAnnouncement, isMaster, isWarehouse, onUpdate]);

  // Быстрые действия
  const quickActions = [
    { icon: '🔧', label: 'Нужен материал', type: 'need_material' },
    { icon: '⚠️', label: 'Проблема с оборудованием', type: 'equipment_issue' },
    { icon: '📋', label: 'Вопрос по чертежу', type: 'drawing_question' },
    { icon: '🆘', label: 'Нужна помощь', type: 'need_help' },
    { icon: '✅', label: 'Задача выполнена', type: 'task_done' },

// ==================== MaterialImportModal ====================
// Нормализация строки для нечёткого поиска
const normStr = (s) => s.toString().toLowerCase().trim()
  .replace(/\s+/g, ' ').replace(/[-–—_]/g, ' ')
  .replace(/ё/g, 'е').replace(/[().,;]/g, '');

// Нечёткое совпадение: 0..1
const fuzzyScore = (a, b) => {
  const na = normStr(a), nb = normStr(b);
  if (na === nb) return 1;
  if (na.includes(nb) || nb.includes(na)) return 0.85;
  const ta = na.split(' ').filter(Boolean);
  const tb = nb.split(' ').filter(Boolean);
  const common = ta.filter(t => tb.some(s => s.includes(t) || t.includes(s)));
  return common.length / Math.max(ta.length, tb.length, 1);
};

// Автоопределить колонку по заголовку
const detectCol = (headers, patterns) => {
  for (const h of headers) {
    const hn = normStr(h.toString());
    if (patterns.some(p => hn.includes(p))) return h;
  }
  return '';
};

// ── Детектор формата 1С ──────────────────────────────────────────
// Сканирует сырой массив строк, ищет строку с заголовками столбцов,
// возвращает нормализованные строки и реквизиты накладной (или null).
const detect1C = (arr) => {
  let headerRowIdx = -1;
  let nameCol = -1, qtyCol = -1, priceCol = -1, codeCol = -1;

  // Ищем строку-заголовок с «Товары»/«Наименование» + «Количество»
  for (let i = 0; i < Math.min(arr.length, 25); i++) {
    const row = arr[i];
    let hasGoods = false, hasQty = false;
    row.forEach((cell, j) => {
      const ct = normStr((cell || '').toString());
      if (ct.includes('товар') || ct.includes('наименов') || ct.includes('номенклат')) { nameCol = j; hasGoods = true; }
      if (ct === 'количество' || (ct.startsWith('кол') && ct.length < 14))             { qtyCol  = j; hasQty  = true; }
      if (ct === 'цена' || ct.includes('цена без'))                                     { if (priceCol < 0) priceCol = j; }
      if (ct === 'код' || ct.includes('артикул'))                                       { codeCol = j; }
    });
    if (hasGoods && hasQty) { headerRowIdx = i; break; }
  }
  if (headerRowIdx < 0) return null;

  // Ищем колонку единицы измерения: строковое значение между qty и price в первой строке данных
  let unitCol = -1;
  for (let i = headerRowIdx + 1; i < arr.length; i++) {
    const row = arr[i];
    const nm = (row[nameCol] || '').toString().trim();
    if (!nm || nm.toLowerCase().includes('итого') || nm.toLowerCase().includes('всего')) continue;
    const lo = Math.min(qtyCol, priceCol >= 0 ? priceCol : qtyCol + 10);
    const hi = Math.max(qtyCol, priceCol >= 0 ? priceCol : qtyCol + 10);
    for (let j = lo; j <= hi; j++) {
      if (j !== qtyCol && j !== priceCol && j !== nameCol && j !== codeCol) {
        const v = (row[j] || '').toString().trim();
        if (v && isNaN(Number(v)) && v.length <= 5) { unitCol = j; break; }
      }
    }
    break;
  }

  // Извлекаем реквизиты из шапки (строки до headerRowIdx)
  let invoiceNumber = '', supplier = '', date = new Date().toISOString().slice(0, 10);
  const ruMonths = { января:1,февраля:2,марта:3,апреля:4,мая:5,июня:6,июля:7,августа:8,сентября:9,октября:10,ноября:11,декабря:12 };
  for (let i = 0; i < headerRowIdx; i++) {
    const rowText = arr[i].map(c => (c || '').toString()).join(' ');
    const numM = rowText.match(/№\s*(\S+)/);
    if (numM && !invoiceNumber) invoiceNumber = numM[1].replace(/\s/g, '');
    const dateM = rowText.match(/от\s+(\d{1,2})\s+([а-яё]+)\s+(\d{4})/i);
    if (dateM) {
      const m = ruMonths[dateM[2].toLowerCase()];
      if (m) date = `${dateM[3]}-${String(m).padStart(2,'0')}-${dateM[1].padStart(2,'0')}`;
    }
    if (rowText.toLowerCase().includes('поставщик')) {
      const orgM = rowText.match(/(ООО|ИП|АО|ПАО|ЗАО)\s*["«]?([^",\n]{2,40})["»]?/i);
      if (orgM && !supplier) supplier = orgM[0].trim();
    }
  }

  // Парсим строки данных
  const rows = [];
  for (let i = headerRowIdx + 1; i < arr.length; i++) {
    const row = arr[i];
    const name = (row[nameCol] || '').toString().trim();
    if (!name) continue;
    const nl = name.toLowerCase();
    if (nl.includes('итого') || nl.includes('всего') || nl.includes('сумма ндс') || nl.includes('в т.ч.')) continue;
    // Проверяем что строка содержит числовые данные (не подзаголовок)
    const qty = parseFloat((row[qtyCol] || '').toString().replace(',', '.')) || 0;
    if (qty === 0 && !name) continue;
    const price = priceCol >= 0 ? (parseFloat((row[priceCol] || '').toString().replace(',', '.')) || 0) : 0;
    const unit  = unitCol  >= 0 ? (row[unitCol]  || '').toString().trim() : 'шт';
    const code  = codeCol  >= 0 ? (row[codeCol]  || '').toString().trim() : '';
    rows.push({ 'Наименование': name, 'Количество': qty, 'Единица': unit, 'Цена': price, 'Код': code });
  }

  if (rows.length === 0) return null;
  return { rows, invoiceNumber, supplier, date };
};

const MaterialImportModal = memo(({ data, onClose, onUpdate, addToast, defaultMode = 'receipt' }) => {
  const [step, setStep]         = useState('upload');
  const [inputMethod, setInputMethod] = useState('file'); // file | paste | grid
  const [rawRows, setRawRows]   = useState([]);
  const [headers, setHeaders]   = useState([]);
  const [colMap, setColMap]     = useState({ name: '', qty: '', unit: '', price: '' });
  const [mode, setMode]         = useState(defaultMode);
  const [invoice, setInvoice]   = useState({ number: '', date: new Date().toISOString().slice(0, 10), supplier: '' });
  const [preview, setPreview]   = useState([]);
  const [invoiceError, setInvoiceError] = useState('');
  const [is1C, setIs1C]         = useState(false);
  const [dragOver, setDragOver] = useState(false);
  // Для grid-редактора
  const [gridRows, setGridRows] = useState([
    { name: '', qty: '', unit: 'шт', price: '' },
    { name: '', qty: '', unit: 'шт', price: '' },
    { name: '', qty: '', unit: 'шт', price: '' },
  ]);

  // ── Общий парсер массива строк (после получения данных любым методом) ──
  const processArr = useCallback((arr) => {
    if (arr.length < 1) { addToast('Нет данных', 'error'); return; }
    const c1 = detect1C(arr);
    if (c1) {
      setHeaders(['Наименование', 'Количество', 'Единица', 'Цена', 'Код']);
      setRawRows(c1.rows);
      setColMap({ name: 'Наименование', qty: 'Количество', unit: 'Единица', price: 'Цена' });
      setInvoice({ number: c1.invoiceNumber || '', date: c1.date || new Date().toISOString().slice(0, 10), supplier: c1.supplier || '' });
      setIs1C(true); setStep('map'); return;
    }
    // Стандартный формат
    const hdrs = arr[0].map(h => h.toString().trim()).filter(Boolean);
    const rows = arr.slice(1).filter(r => r.some(c => c !== '')).map(r => {
      const obj = {}; hdrs.forEach((h, i) => { obj[h] = r[i] ?? ''; }); return obj;
    });
    setHeaders(hdrs); setRawRows(rows);
    setColMap({
      name:  detectCol(hdrs, ['наим','назв','матер','name','товар','номенкл']),
      qty:   detectCol(hdrs, ['кол','qty','количес','остат','приход']),
      unit:  detectCol(hdrs, ['ед','unit','мера','измер']),
      price: detectCol(hdrs, ['цен','price','стоим']),
    });
    setIs1C(false); setStep('map');
  }, [addToast]);

  // ── Метод 1: файл (+ drag & drop) ──
  const processFile = useCallback((file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        processArr(XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' }));
      } catch(ex) { addToast('Ошибка чтения: ' + ex.message, 'error'); }
    };
    reader.readAsArrayBuffer(file);
  }, [processArr, addToast]);

  const handleFile = useCallback((e) => { processFile(e.target.files[0]); e.target.value = ''; }, [processFile]);

  const handleDrop = useCallback((e) => {
    e.preventDefault(); setDragOver(false);
    const file = e.dataTransfer.files[0];
    if (!file) return;
    if (!file.name.match(/\.(xlsx|xls|csv)$/i)) { addToast('Поддерживаются только .xlsx, .xls, .csv', 'error'); return; }
    processFile(file);
  }, [processFile, addToast]);

  // ── Метод 2: вставка из буфера (Ctrl+V / Cmd+V) ──
  // Excel копирует ячейки как TSV (tab-separated)
  const handlePaste = useCallback((e) => {
    e.preventDefault();
    const text = e.clipboardData?.getData('text') || '';
    if (!text.trim()) { addToast('Буфер обмена пуст', 'error'); return; }
    const arr = text.trim().split('\n').map(line =>
      line.split('\t').map(cell => cell.trim().replace(/^"|"$/g, ''))
    ).filter(row => row.some(c => c));
    if (arr.length < 1) { addToast('Не удалось распознать данные', 'error'); return; }
    // Если первая строка похожа на заголовки (содержит нечисловые значения)
    const firstRowHasText = arr[0].some(c => c && isNaN(Number(c.replace(',', '.'))));
    if (!firstRowHasText && arr.length >= 1) {
      // Нет заголовков — добавляем автоматические
      arr.unshift(['Наименование', 'Количество', 'Единица', 'Цена']);
    }
    processArr(arr);
  }, [processArr, addToast]);

  // ── Метод 3: grid-редактор ──
  const updateGridRow = useCallback((i, field, val) => {
    setGridRows(prev => prev.map((r, idx) => idx === i ? { ...r, [field]: val } : r));
  }, []);

    setGridRows(prev => [...prev, { name: '', qty: '', unit: 'шт', price: '' }]);
  }, []);
  const removeGridRow = useCallback((i) => {
    setGridRows(prev => prev.filter((_, idx) => idx !== i));
  }, []);
  const submitGrid = useCallback(() => {
    const valid = gridRows.filter(r => r.name.trim() && r.qty);

    const hdrs = ['Наименование', 'Количество', 'Единица', 'Цена'];
    const arr = [hdrs, ...valid.map(r => [r.name.trim(), r.qty, r.unit || 'шт', r.price || ''])];
    processArr(arr);
  }, [gridRows, processArr, addToast]);

  // ── buildPreview ──
  const buildPreview = useCallback(() => {
    if (!colMap.name) { addToast('Укажите колонку с названием', 'error'); return; }

      const name = (r[colMap.name] || '').toString().trim(); if (!name) return null;
      const qty   = parseFloat((r[colMap.qty]   || '').toString().replace(',', '.')) || 0;
      const unit  = colMap.unit  ? ((r[colMap.unit]  || '').toString().trim() || 'шт') : 'шт';
      const price = colMap.price ? (parseFloat((r[colMap.price] || '').toString().replace(',', '.')) || 0) : 0;
      let match = data.materials.find(m => normStr(m.name) === normStr(name));
      let matchType = 'exact';
      if (!match) {
        let best = 0;
        data.materials.forEach(m => { const sc = fuzzyScore(name, m.name); if (sc > best && sc >= 0.7) { best = sc; match = m; } });
        matchType = match ? 'fuzzy' : 'new';
      }
      return { name, qty, unit, price, match, matchType };

    setPreview(rows); setStep('preview');

    setInvoiceError('');
    const ts = now(), batchId = uid();
    let materials = [...data.materials];
    const newEvents = [...data.events];
    preview.forEach(row => {
      const qty = row.qty;
      if (mode === 'receipt') {
        const existing = row.match && row.matchType !== 'new' ? row.match : null;
        if (existing) {
          materials = materials.map(m => m.id === existing.id ? { ...m, quantity: m.quantity + qty, ...(row.price ? { unitCost: row.price } : {}) } : m);
          newEvents.push({ id: uid(), type: 'material_receive', materialId: existing.id, qty, ts, invoiceNumber: invoice.number.trim(), invoiceDate: invoice.date, supplier: invoice.supplier.trim(), batchId, unit: existing.unit });
        } else {
          const nm = { id: uid(), name: row.name, unit: row.unit, quantity: qty, unitCost: row.price || 0, minStock: 0, batch: '' };
          materials.push(nm);
          newEvents.push({ id: uid(), type: 'material_receive', materialId: nm.id, qty, ts, invoiceNumber: invoice.number.trim(), invoiceDate: invoice.date, supplier: invoice.supplier.trim(), batchId, unit: row.unit });
        }
      } else {
        const existing = row.match && row.matchType !== 'new' ? row.match : null;
        if (existing) {
          materials = materials.map(m => m.id === existing.id ? { ...m, quantity: qty, ...(row.price ? { unitCost: row.price } : {}) } : m);
        } else {
          materials.push({ id: uid(), name: row.name, unit: row.unit, quantity: qty, unitCost: row.price || 0, minStock: 0, batch: '' });
        }
      }
    });
    const d = { ...data, materials, events: newEvents };
    await DB.save(d); onUpdate(d);
    const nc = preview.filter(r => r.matchType === 'new').length;
    const uc = preview.filter(r => r.matchType !== 'new').length;
    addToast(`${mode === 'receipt' ? 'Приход' : 'Обновление'}: ${uc} обновлено, ${nc} новых`, 'success');
    onClose();
  }, [data, preview, mode, invoice, onUpdate, addToast, onClose]);

  const rowStyle = (t) => ({ exact: { bg: GN3, color: GN2, label: '✓ Точно' }, fuzzy: { bg: AM3, color: AM2, label: '~ Похоже' }, new: { bg: '#EEF2FF', color: '#3730A3', label: '+ Новое' } }[t] || {});

  // ── Рендер ──
  return h('div', { style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.55)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', zIndex: 300, overflowY: 'auto', padding: '16px 8px' }, onClick: e => e.target === e.currentTarget && onClose() },
    h('div', { style: { background: '#fff', borderRadius: 14, width: 'min(700px,100%)', boxShadow: '0 8px 40px rgba(0,0,0,0.2)' } },

      // Шапка
      h('div', { style: { padding: '18px 20px 14px', borderBottom: '0.5px solid rgba(0,0,0,0.08)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
        h('div', null,
          h('div', { style: { fontSize: 16, fontWeight: 600 } }, '📤 Импорт материалов'),
          h('div', { style: { fontSize: 11, color: '#888', marginTop: 2 } },
            step === 'upload' ? 'Шаг 1 из 3 — Выберите способ ввода' :
            step === 'map'    ? 'Шаг 2 из 3 — Настройте колонки' :
                                'Шаг 3 из 3 — Проверьте данные и подтвердите'
          )
        ),
        h('button', { onClick: onClose, style: { background: 'none', border: 'none', fontSize: 22, color: '#aaa', cursor: 'pointer' } }, '×')
      ),

      h('div', { style: { padding: '16px 20px 20px' } },

        // ── Шаг 1: выбор метода ──
        step === 'upload' && h('div', null,

          // Переключатель методов
          h('div', { style: { display: 'flex', gap: 6, marginBottom: 16 } },
            [
              { id: 'file',  icon: '📂', label: 'Файл Excel / 1С' },
              { id: 'paste', icon: '📋', label: 'Вставить Ctrl+V' },
              { id: 'grid',  icon: '✏️', label: 'Ввести вручную' },
            ].map(m => h('button', { key: m.id,
              style: inputMethod === m.id
                ? { ...abtn({ flex: 1, padding: '10px 8px', fontSize: 12 }), textAlign: 'center' }
                : { ...gbtn({ flex: 1, padding: '10px 8px', fontSize: 12 }), textAlign: 'center' },
              onClick: () => setInputMethod(m.id)
            },
              h('div', { style: { fontSize: 18, marginBottom: 3 } }, m.icon),
              m.label

          ),

          // ── Метод: Файл ──
          inputMethod === 'file' && h('div', null,
            h('label', {

              onDragOver: e => { e.preventDefault(); setDragOver(true); },
              onDragLeave: () => setDragOver(false),
              onDrop: handleDrop
            },
              h('div', { style: { fontSize: 32 } }, dragOver ? '⬇️' : '📂'),

              h('div', { style: { fontSize: 11, color: '#888', textAlign: 'center' } }, '.xlsx, .xls, .csv · Накладные из 1С определяются автоматически'),

            h('div', { style: { fontSize: 12, color: '#666', marginBottom: 10, padding: '10px 12px', background: '#f0f9ff', borderRadius: 8, borderLeft: `3px solid ${BL}`, lineHeight: 1.6 } },
              h('div', { style: { fontWeight: 500, marginBottom: 3 } }, '1. Выделите ячейки в Excel или Google Sheets'),
              h('div', null, '2. Скопируйте (Ctrl+C / Cmd+C)'),
              h('div', null, '3. Кликните в поле ниже и нажмите Ctrl+V')

            h('div', {

              h('div', { style: { fontWeight: 500, color: '#555' } }, 'Кликните сюда и нажмите Ctrl+V'),

          // ── Метод: Grid-редактор ──
          inputMethod === 'grid' && h('div', null,
            h('div', { style: { fontSize: 12, color: '#666', marginBottom: 10 } }, 'Введите данные вручную. Поля «Ед.» и «Цена» — необязательны.'),
            h('div', { className: 'table-responsive' },
              h('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: 13 } },
                h('thead', null, h('tr', null,
                  ['Наименование *', 'Кол-во *', 'Ед.', 'Цена ₽', ''].map((t, i) =>
                    h('th', { key: i, style: { ...S.th, background: '#f8f8f5' } }, t)
                  )
                )),
                h('tbody', null,
                  gridRows.map((row, i) => h('tr', { key: i },
                    h('td', { style: { padding: '4px 4px' } },
                      h('input', { style: { ...S.inp, fontSize: 12 }, placeholder: 'Название материала', value: row.name, onChange: e => updateGridRow(i, 'name', e.target.value) })
                    ),
                    h('td', { style: { padding: '4px 4px', width: 80 } },
                      h('input', { type: 'number', step: '0.001', style: { ...S.inp, fontSize: 12 }, placeholder: '0', value: row.qty, onChange: e => updateGridRow(i, 'qty', e.target.value) })
                    ),
                    h('td', { style: { padding: '4px 4px', width: 70 } },
                      h('input', { style: { ...S.inp, fontSize: 12 }, placeholder: 'шт', value: row.unit, onChange: e => updateGridRow(i, 'unit', e.target.value) })
                    ),
                    h('td', { style: { padding: '4px 4px', width: 90 } },
                      h('input', { type: 'number', style: { ...S.inp, fontSize: 12 }, placeholder: '0', value: row.price, onChange: e => updateGridRow(i, 'price', e.target.value) })
                    ),
                    h('td', { style: { padding: '4px 4px', width: 32, textAlign: 'center' } },

                    )
                  ))
                )
              )
            ),
            h('div', { style: { display: 'flex', gap: 8, marginTop: 8 } },
              h('button', { style: gbtn({ fontSize: 11 }), onClick: addGridRow }, '+ Добавить строку'),

            )

        ),

        step === 'map' && h('div', null,

            h('span', { style: { fontSize: 18 } }, '✅'),
            h('div', null,
              h('div', { style: { fontSize: 13, fontWeight: 600, color: GN2 } }, 'Формат 1С определён автоматически'),
              h('div', { style: { fontSize: 11, color: GN2, opacity: 0.8 } }, `Найдено ${rawRows.length} позиций. Реквизиты накладной заполнены из файла.`)
            )
          ),
          !is1C && h('div', { style: { fontSize: 12, color: '#666', marginBottom: 14, padding: '10px 12px', background: '#f0f9ff', borderRadius: 8, borderLeft: `3px solid ${BL}` } },
            `Найдено ${rawRows.length} строк, ${headers.length} колонок. Проверьте автоопределение.`
          ),
          h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 } },
            [
              { key: 'name',  label: '* Название материала', required: true },
              { key: 'qty',   label: '* Количество',          required: true },
              { key: 'unit',  label: 'Единица измерения',     required: false },
              { key: 'price', label: 'Цена за единицу (₽)',   required: false },
            ].map(f => h('div', { key: f.key },
              h('label', { style: S.lbl }, f.label),
              h('select', { style: { ...S.inp, borderColor: f.required && !colMap[f.key] ? AM : undefined }, value: colMap[f.key], onChange: e => setColMap(p => ({ ...p, [f.key]: e.target.value })) },
                h('option', { value: '' }, f.required ? '— выберите —' : '— не использовать —'),
                headers.map(h2 => h('option', { key: h2, value: h2 }, h2))
              )
            ))
          ),
          rawRows.length > 0 && h('div', null,
            h('div', { style: S.sec }, `Первые строки (${Math.min(rawRows.length, 4)} из ${rawRows.length})`),
            h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: 11 } },

              h('tbody', null, rawRows.slice(0, 4).map((r, i) => h('tr', { key: i },
                headers.slice(0, 5).map(h2 => h('td', { key: h2, style: { ...S.td, background: colMap.name === h2 ? '#fffbf0' : colMap.qty === h2 ? '#f0fff8' : 'transparent' } },
                  (r[h2] ?? '').toString()))
              )))

            h('button', { style: abtn({ flex: 2 }), onClick: buildPreview }, 'Далее: проверить данные →')

const WarehouseScreen = memo(({ data, onUpdate, addToast }) => {
  const [tab, setTab] = useState('stock');

  const [showImport, setShowImport] = useState(false);
  const [importMode, setImportMode] = useState('receipt');

  const openImport = useCallback((mode = 'receipt') => {
    setImportMode(mode);
    setShowImport(true);
  }, []);

  // Заявки на материалы (из чата)
  const materialRequests = useMemo(() => {
    return data.events.filter(e => e.type === 'chat_alert' && e.alertType === 'need_material' && !e.fulfilled)
      .sort((a, b) => b.ts - a.ts);
  }, [data.events]);

  // Критические остатки
  const criticalMaterials = useMemo(() => data.materials.filter(m => m.minStock && m.quantity <= m.minStock), [data.materials]);

  // История движения
  const movements = useMemo(() => {
    const list = [];
    // Списания
    (data.materialConsumptions || []).forEach(mc => {
      const mat = data.materials.find(m => m.id === mc.materialId);
      const op = data.ops.find(o => o.id === mc.opId);
      const order = op ? data.orders.find(o => o.id === op.orderId) : null;
      list.push({ ts: mc.ts, type: 'out', materialName: mat?.name || '?', qty: mc.qty, unit: mat?.unit || '', context: order ? `${order.number} → ${op?.name}` : '—' });
    });
    // Поступления
    data.events.filter(e => e.type === 'material_receive').forEach(e => {
      const mat = data.materials.find(m => m.id === e.materialId);
      const ctx = [e.invoiceNumber ? `Накл. ${e.invoiceNumber}` : null, e.supplier || null, e.invoiceDate || null, e.batch ? `Партия: ${e.batch}` : null].filter(Boolean).join(' · ') || '—';
      list.push({ ts: e.ts, type: 'in', materialName: mat?.name || '?', qty: e.qty, unit: mat?.unit || e.unit || '', context: ctx });

    const updatedMaterials = data.materials.map(m => m.id === receiveForm.materialId ? { ...m, quantity: m.quantity + qty, batch: receiveForm.batch || m.batch } : m);
    const event = { id: uid(), type: 'material_receive', materialId: receiveForm.materialId, qty, batch: receiveForm.batch, ts: now() };
    const d = { ...data, materials: updatedMaterials, events: [...data.events, event] };
    await DB.save(d); onUpdate(d);
    const mat = data.materials.find(m => m.id === receiveForm.materialId);
    setReceiveForm({ materialId: '', qty: '', batch: '' });
    addToast(`Принято: ${mat?.name} +${qty} ${mat?.unit}`, 'success');

  // Выдача по заявке
  const fulfillRequest = useCallback(async (eventId) => {
    const d = { ...data, events: data.events.map(e => e.id === eventId ? { ...e, fulfilled: true, fulfilledAt: now() } : e) };

        h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 24, fontWeight: 500, color: criticalMaterials.length > 0 ? RD : GN } }, criticalMaterials.length), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Критич.')),
        h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 20, fontWeight: 500, color: AM } }, `${totalValue.toLocaleString()}₽`), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Стоимость'))
      ),
      // Критические
      criticalMaterials.length > 0 && h('div', { role: 'alert', style: { ...S.card, background: RD3, border: `0.5px solid ${RD}`, marginBottom: 12, padding: 10 } },

          const ws = XLSX.utils.json_to_sheet(data.materials.map(m => ({ 'Название': m.name, 'Ед.': m.unit, 'Остаток': m.quantity, 'Мин.': m.minStock || '', 'Цена': m.unitCost || '', 'Стоимость': m.quantity * (m.unitCost || 0) })));

      ),
      // Таблица
      data.materials.length === 0 ? h('div', { style: { ...S.card, textAlign: 'center', color: '#888' } }, 'Нет материалов') :
        h('div', { style: { ...S.card, padding: 0 } }, h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', null, h('tr', null, ['Материал', 'Остаток', 'Зарезерв.', 'Свободно', 'Мин.', 'Цена', 'Стоимость'].map((t, i) => h('th', { key: i, style: S.th }, t)))),

            const free = Math.max(0, m.quantity - reserved);
            const crit = m.minStock && free <= m.minStock;
            return h('tr', { key: m.id, style: { background: crit ? RD3 : 'transparent' } },
              h('td', { style: { ...S.td, fontWeight: crit ? 500 : 400 } }, `${m.name} (${m.unit})`),
              h('td', { style: { ...S.td, textAlign: 'center' } }, m.quantity),
              h('td', { style: { ...S.td, textAlign: 'center', color: reserved > 0 ? AM2 : '#888' } }, reserved > 0 ? reserved : '—'),

// ==================== Dashboard (Цеховое табло) ====================
const Dashboard = memo(({ data, addToast, onOrderClick }) => {
  const [, setTick] = useState(0);
  useEffect(() => { const t = setInterval(() => setTick(n => n + 1), 15000); return () => clearInterval(t); }, []);

  // Реальные данные
  const activeOps = useMemo(() => data.ops.filter(o => o.status === 'in_progress' && !o.archived), [data.ops]);
  const pendingOps = useMemo(() => data.ops.filter(o => o.status === 'pending' && !o.archived), [data.ops]);
  const onCheckOps = useMemo(() => data.ops.filter(o => o.status === 'on_check' && !o.archived), [data.ops]);
  const defectOps = useMemo(() => data.ops.filter(o => (o.status === 'defect' || o.status === 'rework') && !o.archived), [data.ops]);
  const doneToday = useMemo(() => { const t = new Date().setHours(0,0,0,0); return data.ops.filter(o => o.status === 'done' && o.finishedAt >= t); }, [data.ops]);
  const defectsToday = useMemo(() => { const t = new Date().setHours(0,0,0,0); return data.ops.filter(o => o.status === 'defect' && o.finishedAt >= t); }, [data.ops]);
  const downtimesToday = useMemo(() => { const t = new Date().setHours(0,0,0,0); return data.events.filter(e => e.type === 'downtime' && e.ts >= t); }, [data.events]);
  const totalDowntimeMin = useMemo(() => Math.round(downtimesToday.reduce((s, e) => s + (e.duration || 0), 0) / 60000), [downtimesToday]);
  const activeWorkers = useMemo(() => data.workers.filter(w => !w.archived && (w.status || 'working') === 'working'), [data.workers]);
  const busyWorkers = useMemo(() => new Set(activeOps.flatMap(op => op.workerIds || [])), [activeOps]);
  const freeWorkers = useMemo(() => activeWorkers.filter(w => !busyWorkers.has(w.id)), [activeWorkers, busyWorkers]);
  const criticalMaterials = useMemo(() => data.materials.filter(m => m.minStock && m.quantity <= m.minStock), [data.materials]);
  const activeOrders = useMemo(() => data.orders.filter(o => !o.archived), [data.orders]);
  const activeDuels = useMemo(() => (data.duels || []).filter(d => d.status === 'active'), [data.duels]);

  // Заказы с прогрессом
  const ordersProgress = useMemo(() => activeOrders.map(order => {
    const ops = data.ops.filter(op => op.orderId === order.id && !op.archived);
    const done = ops.filter(op => op.status === 'done').length;
    const total = ops.length;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    const hasDefect = ops.some(op => op.status === 'defect' || op.status === 'rework');
    const daysLeft = order.deadline ? Math.ceil((new Date(order.deadline).getTime() - Date.now()) / 86400000) : null;
    return { ...order, ops, done, total, pct, hasDefect, daysLeft };
  }).sort((a, b) => (a.daysLeft ?? 999) - (b.daysLeft ?? 999)), [activeOrders, data.ops]);

  // Лидеры дня
  const todayLeaders = useMemo(() => {
    const t = new Date().setHours(0,0,0,0);
    const counts = {};
    data.ops.filter(op => op.status === 'done' && op.finishedAt >= t).forEach(op => {
      (op.workerIds || []).forEach(wid => { counts[wid] = (counts[wid] || 0) + 1; });
    });

// ==================== Error Boundary ====================
// Перехватывает ошибки React-дерева и показывает читаемое сообщение
// вместо белого экрана
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error('App error:', error, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {
        style: { minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 32, textAlign: 'center', gap: 16 }
      },
        React.createElement('div', { style: { fontSize: 48 } }, '⚠️'),
        React.createElement('div', { style: { fontSize: 20, fontWeight: 500, color: '#1a1a18' } }, 'Что-то пошло не так'),
        React.createElement('div', { style: { fontSize: 14, color: '#888', maxWidth: 400 } }, 'Произошла ошибка в приложении. Данные в Firebase не затронуты — обновите страницу для восстановления работы.'),
        React.createElement('div', { style: { fontFamily: 'monospace', fontSize: 11, color: '#E24B4A', background: '#FCEBEB', border: '0.5px solid #E24B4A', borderRadius: 8, padding: '8px 16px', maxWidth: 500, wordBreak: 'break-all' } },
          this.state.error?.message || 'Неизвестная ошибка'
        ),
        React.createElement('button', {
          style: { padding: '10px 28px', background: '#EF9F27', color: '#412402', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 14, fontWeight: 500 },
          onClick: () => { this.setState({ hasError: false, error: null }); window.location.reload(); }
        }, '🔄 Перезагрузить страницу'),
        React.createElement('button', {
          style: { padding: '8px 20px', background: 'transparent', color: '#888', border: '0.5px solid rgba(0,0,0,0.2)', borderRadius: 8, cursor: 'pointer', fontSize: 13 },
          onClick: () => this.setState({ hasError: false, error: null })
        }, 'Попробовать продолжить без перезагрузки')
      );
    }
    return this.props.children;
  }
}
