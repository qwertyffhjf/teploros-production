// ==================== ControllerScreen ====================
const ControllerScreen = memo(({ data, onUpdate, addToast, onOrderClick }) => {
  const pendingQC = useMemo(() => data.ops.filter(o => o.status === 'on_check' && !o.archived), [data.ops]);
  const [rejectModal, setRejectModal] = useState(null); // { op } | null
  const [rejectNote, setRejectNote] = useState('');

  const acceptOp = useCallback(async (op) => {
    const updated = { ...data, ops: data.ops.map(o => o.id === op.id ? { ...o, status: 'done' } : o), events: [...data.events, { id: uid(), type: 'qc_pass', opId: op.id, ts: now() }] };
    await DB.save(updated); onUpdate(updated); addToast('Операция принята', 'success');
  }, [data, onUpdate, addToast]);

  const confirmReject = useCallback(async () => {
    if (!rejectModal) return;
    const note = rejectNote.trim();
    const updated = { ...data, ops: data.ops.map(o => o.id === rejectModal.op.id ? { ...o, status: 'defect', defectNote: note || 'Не прошло контроль качества' } : o), events: [...data.events, { id: uid(), type: 'qc_reject', opId: rejectModal.op.id, ts: now(), note }] };
    await DB.save(updated); onUpdate(updated);
    addToast('Операция забракована', 'info');
    setRejectModal(null); setRejectNote('');
  }, [data, onUpdate, addToast, rejectModal, rejectNote]);

  return h('div', null,
    // Модалка отклонения — вместо prompt()
    rejectModal && h('div', { role: 'dialog', 'aria-modal': 'true', style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200, padding: 16 } },
      h('div', { style: { background: '#fff', borderRadius: 12, padding: 20, width: 'min(380px,100%)' } },
        h('div', { style: { fontSize: 14, fontWeight: 500, marginBottom: 4 } }, '⚠ Брак: ' + rejectModal.op.name),
        h('div', { style: { fontSize: 11, color: '#888', marginBottom: 12 } }, 'Укажите причину — это поможет при анализе'),
        h('textarea', { style: { ...S.inp, width: '100%', marginBottom: 12 }, rows: 3, placeholder: 'Опишите дефект или причину отклонения...', value: rejectNote, onChange: e => setRejectNote(e.target.value), autoFocus: true }),
        h('div', { style: { display: 'flex', gap: 8, justifyContent: 'flex-end' } },
          h('button', { style: gbtn(), onClick: () => { setRejectModal(null); setRejectNote(''); } }, 'Отмена'),
          h('button', { style: rbtn({ padding: '8px 20px' }), onClick: confirmReject }, 'Забраковать')
        )
      )
    ),
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Операции, ожидающие контроля'),
      pendingQC.length === 0
        ? h('div', { style: { padding: 16, textAlign: 'center' } }, 'Нет операций на контроле')
        : h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
            h('thead', null, h('tr', null,
              ['Заказ','Операция','Сотрудник','Параметры','Действия'].map((t,i) => h('th', { key: i, style: S.th, scope: 'col' }, t))
            )),
            h('tbody', null, pendingQC.map(op => {
              const order = data.orders.find(o => o.id === op.orderId);
              const workerNames = op.workerIds?.map(id => data.workers.find(w => w.id === id)?.name).filter(Boolean).join(', ') || '—';
              return h('tr', { key: op.id },
                h('td', { style: S.td },
                  onOrderClick && order
                    ? h('span', { style: { color: AM, fontWeight: 500, cursor: 'pointer', textDecoration: 'underline', textDecorationStyle: 'dotted' }, onClick: () => onOrderClick(order.id), title: 'Открыть карточку' }, order.number)
                    : order?.number || '—'
                ),
                h('td', { style: S.td }, op.name),
                h('td', { style: S.td }, workerNames),
                h('td', { style: S.td }, op.weldParams ? `Шов: ${op.weldParams.seamNumber}, Электрод: ${op.weldParams.electrode}` : '—'),
                h('td', { style: S.td }, h('div', { style: { display: 'flex', gap: 4 } },
                  h('button', { style: abtn({ fontSize: 11, padding: '4px 8px' }), 'aria-label': 'Принять операцию', onClick: () => acceptOp(op) }, 'Принять'),
                  h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px' }), 'aria-label': 'Забраковать операцию', onClick: () => { setRejectModal({ op }); setRejectNote(''); } }, 'Брак')
                ))
              );
            }))
          ))
    )
  );
});

// ==================== MasterTimeTracking ====================
const MasterTimeTracking = memo(({ data, onUpdate, addToast }) => {
  const recordEvent = useCallback((workerId, type) => {
    const shift = getCurrentShift(data?.settings?.shifts);
    const newEvent = { id: uid(), type, workerId, ts: now(), source: 'master', shift };
    const updated = { ...data, events: [...data.events, newEvent] };
    DB.save(updated).then(() => {
      onUpdate(updated);
      addToast(`Событие ${type === 'checkin_manual' ? 'прихода' : 'ухода'} зафиксировано`, 'success');
    });
  }, [data, onUpdate, addToast]);

  const workersWithStatus = useMemo(() => {
    const today = new Date();
    const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
    const todayEnd = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 23, 59, 59, 999).getTime();
    return data.workers.map(w => {
      const todayEvents = data.events.filter(e => e.workerId === w.id && e.ts >= todayStart && e.ts <= todayEnd && (e.type === 'checkin_manual' || e.type === 'checkout_manual'));
      const lastEvent = todayEvents.sort((a,b) => b.ts - a.ts)[0];
      const lastEventType = lastEvent?.type === 'checkin_manual' ? 'Пришёл' : (lastEvent?.type === 'checkout_manual' ? 'Ушёл' : 'Нет');
      const lastEventTime = lastEvent ? new Date(lastEvent.ts).toLocaleTimeString() : '';
      return { ...w, lastEventType, lastEventTime, eventsCount: todayEvents.length };
    }).sort((a,b) => a.name.localeCompare(b.name));
  }, [data.workers, data.events]);

  return h('div', null,
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Учёт рабочего времени (сегодня)'),
      workersWithStatus.length === 0
        ? h('div', { style: { textAlign: 'center', padding: 32 } }, 'Нет сотрудников')
        : h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
            h('thead', null, h('tr', null, ['Сотрудник','Последнее событие','Время','Всего событий','Действия'].map((t,i) => h('th', { key: i, style: S.th, scope: 'col' }, t)))),
            h('tbody', null, workersWithStatus.map(w =>
              h('tr', { key: w.id },
                h('td', { style: S.td }, w.name),
                h('td', { style: S.td }, w.lastEventType),
                h('td', { style: S.td }, w.lastEventTime),
                h('td', { style: { ...S.td, textAlign: 'center' } }, w.eventsCount),
                h('td', { style: S.td }, h('div', { style: { display: 'flex', gap: 4 } },
                  h('button', { style: abtn({ fontSize: 11, padding: '4px 8px' }), 'aria-label': `Отметить приход ${w.name}`, onClick: () => recordEvent(w.id, 'checkin_manual') }, 'Пришёл'),
                  h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px' }), 'aria-label': `Отметить уход ${w.name}`, onClick: () => recordEvent(w.id, 'checkout_manual') }, 'Ушёл')
                ))
              )
            ))
          ))
    )
  );
});

// ==================== MasterSections ====================
const MasterSections = memo(({ data, onUpdate, addToast }) => {
  const [newName, setNewName] = useState('');
  const { ask: askConfirm, confirmEl } = useConfirm();
  const add = useCallback(async () => {
    if (!newName.trim()) return;
    const newSection = { id: uid(), name: newName.trim() };
    const d = { ...data, sections: [...data.sections, newSection] };
    await DB.save(d); onUpdate(d); setNewName(''); addToast('Участок добавлен', 'success');
  }, [data, newName, onUpdate, addToast]);
  const del = useCallback(async (id) => {
    if (!(await askConfirm({ message: 'Удалить участок?' }))) return;
    const d = { ...data, sections: data.sections.filter(s => s.id !== id), workers: data.workers.map(w => w.sectionId === id ? { ...w, sectionId: null } : w), ops: data.ops.map(o => o.sectionId === id ? { ...o, sectionId: null } : o) };
    await DB.save(d); onUpdate(d); addToast('Участок удалён', 'info');
  }, [data, askConfirm, onUpdate, addToast]);
  return h('div', null,
    confirmEl,
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Добавить участок'),
      h('div', { style: { display: 'flex', gap: 8 } },
        h('input', { style: { ...S.inp, flex: 1 }, placeholder: 'Заготовительный цех', value: newName, onChange: e => setNewName(e.target.value), onKeyDown: e => e.key === 'Enter' && add() }),
        h('button', { type: 'button', style: abtn(), onClick: add }, '+ Добавить')
      )
    ),
    data.sections.length === 0
      ? h('div', { style: { ...S.card, textAlign: 'center' } }, 'Нет участков')
      : h('div', { style: { ...S.card } }, data.sections.map(s =>
          h('div', { key: s.id, style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: '0.5px solid rgba(0,0,0,0.05)' } },
            h('span', { style: { fontSize: 13 } }, s.name),
            h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px' }), 'aria-label': `Удалить участок ${s.name}`, onClick: () => del(s.id) }, 'Удалить')
          )
        ))
  );
});

const MasterEquipment = memo(({ data, onUpdate, addToast }) => {
  const EQ_STATUS = { active: { label: 'Работает', bg: GN3, cl: GN2 }, maintenance: { label: 'На ТО', bg: AM3, cl: AM2 }, repair: { label: 'Ремонт', bg: RD3, cl: RD2 }, decommissioned: { label: 'Списано', bg: '#f0f0f0', cl: '#888' } };
  const [form, setForm] = useState({ name: '', type: '', inventoryNo: '', status: 'active' });
  const { ask: askConfirm, confirmEl } = useConfirm();
  const [editingId, setEditingId] = useState(null);
  const add = useCallback(async () => {
    if (!form.name.trim()) return;
    const eq = { id: uid(), name: form.name.trim(), type: form.type.trim() || 'станок', inventoryNo: form.inventoryNo.trim(), status: form.status, totalHours: 0 };
    if (editingId) {
      const d = { ...data, equipment: data.equipment.map(e => e.id === editingId ? { ...e, name: form.name.trim(), type: form.type.trim(), inventoryNo: form.inventoryNo.trim(), status: form.status } : e) };
      await DB.save(d); onUpdate(d); setEditingId(null); addToast('Оборудование обновлено', 'success');
    } else {
      const d = { ...data, equipment: [...data.equipment, eq] };
      await DB.save(d); onUpdate(d); addToast('Оборудование добавлено', 'success');
    }
    setForm({ name: '', type: '', inventoryNo: '', status: 'active' });
  }, [data, form, editingId, onUpdate, addToast]);
  const del = useCallback(async (id) => { if (!(await askConfirm({ message: 'Удалить?' }))) return; const d = { ...data, equipment: data.equipment.filter(e => e.id !== id) }; await DB.save(d); onUpdate(d); addToast('Удалено', 'info'); }, [data, onUpdate, addToast]);
  const edit = useCallback((eq) => { setForm({ name: eq.name, type: eq.type || '', inventoryNo: eq.inventoryNo || '', status: eq.status || 'active' }); setEditingId(eq.id); }, []);

  // Подсчёт наработки
  const eqHours = useMemo(() => {
    const hours = {};
    data.ops.filter(op => op.equipmentId && op.status === 'done' && op.startedAt && op.finishedAt).forEach(op => {
      hours[op.equipmentId] = (hours[op.equipmentId] || 0) + (op.finishedAt - op.startedAt) / 3600000;
    });
    return hours;
  }, [data.ops]);

  return h('div', null,
    confirmEl,
    h('div', { style: S.card },
      h('div', { style: S.sec }, editingId ? 'Редактировать' : 'Добавить оборудование'),
      h('div', { className: 'form-row', style: { display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'flex-start' } },
        h('input', { style: { ...S.inp, flex: 2, minWidth: 150 }, placeholder: 'Наименование', value: form.name, onChange: e => setForm(p => ({ ...p, name: e.target.value })) }),
        h('input', { style: { ...S.inp, flex: 1, minWidth: 80 }, placeholder: 'Тип', value: form.type, onChange: e => setForm(p => ({ ...p, type: e.target.value })) }),
        h('input', { style: { ...S.inp, flex: 1, minWidth: 100 }, placeholder: 'Инв. №', value: form.inventoryNo, onChange: e => setForm(p => ({ ...p, inventoryNo: e.target.value })) }),
        h('select', { style: { ...S.inp, minWidth: 110 }, value: form.status, onChange: e => setForm(p => ({ ...p, status: e.target.value })) },
          Object.entries(EQ_STATUS).map(([k, v]) => h('option', { key: k, value: k }, v.label))
        ),
        h('button', { style: abtn(), onClick: add }, editingId ? '✓' : '+'),
        editingId && h('button', { style: gbtn(), onClick: () => { setEditingId(null); setForm({ name: '', type: '', inventoryNo: '', status: 'active' }); } }, '✕')
      )
    ),
    data.equipment.length === 0
      ? h('div', { style: { ...S.card, textAlign: 'center' } }, 'Нет оборудования')
      : h('div', { style: { ...S.card, padding: 0 } }, h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', null, h('tr', null, ['Наименование', 'Тип', 'Инв. №', 'Статус', 'Наработка', ''].map((t, i) => h('th', { key: i, style: S.th }, t)))),
          h('tbody', null, data.equipment.map(eq => {
            const st = EQ_STATUS[eq.status] || EQ_STATUS.active;
            const hrs = eqHours[eq.id] || 0;
            return h('tr', { key: eq.id },
              h('td', { style: S.td }, eq.name),
              h('td', { style: S.td }, eq.type),
              h('td', { style: { ...S.td, fontFamily: 'monospace' } }, eq.inventoryNo || '—'),
              h('td', { style: S.td }, h('span', { style: { padding: '2px 8px', fontSize: 10, borderRadius: 6, background: st.bg, color: st.cl } }, st.label)),
              h('td', { style: { ...S.td, fontFamily: 'monospace' } }, `${hrs.toFixed(1)} ч`),
              h('td', { style: S.td }, h('div', { style: { display: 'flex', gap: 4 } },
                h('button', { style: gbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => edit(eq) }, '✎'),
                h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => del(eq.id) }, '✕')
              ))
            );
          }))
        )))
  );
});

// ==================== MasterMaterials ====================
const MasterMaterials = memo(({ data, onUpdate, addToast }) => {
  const [form, setForm] = useState({ name: '', unit: '', quantity: '', batch: '', unitCost: '', minStock: '' });
  const [editingId, setEditingId] = useState(null);
  const [fieldErrors, setFieldErrors] = useState({});
  const [search, setSearch] = useState('');
  const { ask: askConfirm, confirmEl } = useConfirm();

  const validate = () => {
    const errors = {};
    if (!form.name.trim()) errors.name = 'Введите название';
    if (!form.unit.trim()) errors.unit = 'Ед. изм.';
    const qty = Number(form.quantity);
    if (form.quantity === '' || isNaN(qty) || qty < 0) errors.quantity = 'Кол-во ≥ 0';
    setFieldErrors(errors);
    return Object.keys(errors).length === 0;
  };
  const resetForm = () => { setForm({ name: '', unit: '', quantity: '', batch: '', unitCost: '', minStock: '' }); setFieldErrors({}); setEditingId(null); };
  const addOrUpdate = useCallback(async () => {
    if (!validate()) return;
    const mat = { name: form.name.trim(), unit: form.unit.trim(), quantity: Number(form.quantity), batch: form.batch.trim(), unitCost: form.unitCost ? Number(form.unitCost) : 0, minStock: form.minStock ? Number(form.minStock) : 0 };
    if (editingId) {
      const d = { ...data, materials: data.materials.map(m => m.id === editingId ? { ...m, ...mat } : m) };
      await DB.save(d); onUpdate(d); resetForm(); addToast('Материал обновлён', 'success');
    } else {
      const d = { ...data, materials: [...data.materials, { id: uid(), ...mat }] };
      await DB.save(d); onUpdate(d); resetForm(); addToast('Материал добавлен', 'success');
    }
  }, [form, editingId, data, onUpdate, addToast]);
  const del = useCallback(async (id) => { if (!(await askConfirm({ message: 'Удалить материал?' }))) return; const d = { ...data, materials: data.materials.filter(m => m.id !== id) }; await DB.save(d); onUpdate(d); addToast('Удалён', 'info'); }, [data, onUpdate, addToast]);
  const edit = useCallback((m) => { setForm({ name: m.name, unit: m.unit, quantity: String(m.quantity), batch: m.batch || '', unitCost: m.unitCost ? String(m.unitCost) : '', minStock: m.minStock ? String(m.minStock) : '' }); setEditingId(m.id); }, []);

  // Импорт из Excel
  const importExcel = useCallback((event) => {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws);
        if (rows.length === 0) { addToast('Файл пустой', 'error'); return; }
        const imported = rows.map(r => {
          const name = r['Название'] || r['Наименование'] || r['name'] || r['Name'] || Object.values(r)[0] || '';
          const unit = r['Ед. изм.'] || r['Единица'] || r['unit'] || r['Unit'] || 'шт';
          const qty = Number(r['Количество'] || r['Кол-во'] || r['Остаток'] || r['quantity'] || r['Qty'] || 0);
          const cost = Number(r['Цена'] || r['Цена/ед.'] || r['unitCost'] || r['Price'] || 0);
          const batch = r['Партия'] || r['batch'] || r['Batch'] || '';
          const minStock = Number(r['Мин. остаток'] || r['minStock'] || 0);
          if (!name.toString().trim()) return null;
          // Обновляем существующий материал по имени, или создаём новый
          const existing = data.materials.find(m => m.name.toLowerCase() === name.toString().trim().toLowerCase());
          if (existing) return { ...existing, quantity: qty || existing.quantity, unitCost: cost || existing.unitCost, batch: batch || existing.batch, minStock: minStock || existing.minStock };
          return { id: uid(), name: name.toString().trim(), unit: unit.toString(), quantity: qty, unitCost: cost, batch: batch.toString(), minStock };
        }).filter(Boolean);
        const existingIds = imported.filter(m => data.materials.some(dm => dm.id === m.id)).map(m => m.id);
        const newMats = imported.filter(m => !existingIds.includes(m.id));
        const updatedMats = data.materials.map(m => { const upd = imported.find(im => im.id === m.id); return upd || m; });
        const d = { ...data, materials: [...updatedMats, ...newMats] };
        DB.save(d).then(() => { onUpdate(d); addToast(`Импортировано: ${imported.length} позиций`, 'success'); });
      } catch(ex) { addToast('Ошибка чтения Excel: ' + ex.message, 'error'); }
    };
    reader.readAsArrayBuffer(file);
    event.target.value = '';
  }, [data, onUpdate, addToast]);

  // Экспорт в Excel
  const exportExcel = useCallback(() => {
    const rows = data.materials.map(m => ({ 'Название': m.name, 'Ед. изм.': m.unit, 'Количество': m.quantity, 'Цена/ед.': m.unitCost || '', 'Партия': m.batch || '', 'Мин. остаток': m.minStock || '', 'Стоимость': (m.quantity * (m.unitCost || 0)) }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Материалы');
    XLSX.writeFile(wb, `materials_${new Date().toISOString().slice(0,10)}.xlsx`);
    addToast('Экспорт завершён', 'success');
  }, [data.materials, addToast]);

  const lowStock = data.materials.filter(m => m.minStock > 0 && m.quantity <= m.minStock);
  const filtered = search ? data.materials.filter(m => m.name.toLowerCase().includes(search.toLowerCase())) : data.materials;
  const totalValue = data.materials.reduce((s, m) => s + m.quantity * (m.unitCost || 0), 0);

  return h('div', null,
    confirmEl,
    // Предупреждение о критических остатках
    lowStock.length > 0 && h('div', { role: 'alert', style: { ...S.card, background: RD3, border: `0.5px solid ${RD}`, marginBottom: 12 } },
      h('div', { style: { fontSize: 10, color: RD, textTransform: 'uppercase', fontWeight: 500, marginBottom: 6 } }, `⚠ Критические остатки (${lowStock.length})`),
      lowStock.map(m => h('div', { key: m.id, style: { fontSize: 12, color: RD2 } }, `${m.name}: ${m.quantity} ${m.unit} (мин. ${m.minStock})`))
    ),
    // Сводка
    h('div', { className: 'metrics-grid', style: { display: 'grid', gap: 8, marginBottom: 12 } },
      h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 22, fontWeight: 500 } }, data.materials.length), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Позиций')),
      h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 22, fontWeight: 500, color: RD } }, lowStock.length), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Критично')),
      h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 18, fontWeight: 500, color: AM } }, `${Math.round(totalValue).toLocaleString()}₽`), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Стоимость склада'))
    ),
    // Импорт / Экспорт
    h('div', { style: { display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap' } },
      h('button', { style: abtn(), onClick: () => document.getElementById('mat-import-xlsx').click() }, '📤 Импорт Excel'),
      h('input', { type: 'file', id: 'mat-import-xlsx', style: { display: 'none' }, accept: '.xlsx,.xls,.csv', onChange: importExcel }),
      h('button', { style: gbtn(), onClick: exportExcel }, '📥 Экспорт Excel'),
      h('input', { style: { ...S.inp, flex: 1, minWidth: 150 }, placeholder: 'Поиск материала...', value: search, onChange: e => setSearch(e.target.value) })
    ),
    // Форма
    h('div', { style: S.card },
      h('div', { style: S.sec }, editingId ? 'Редактировать' : 'Добавить материал'),
      h('div', { className: 'form-row', style: { display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'flex-start' } },
        h('div', { style: { flex: 2, minWidth: 150 } }, h('input', { style: { ...S.inp }, placeholder: 'Название', value: form.name, onChange: e => setForm(p => ({ ...p, name: e.target.value })) }), fieldErrors.name && h('div', { className: 'error-message' }, fieldErrors.name)),
        h('div', { style: { flex: 1, minWidth: 60 } }, h('input', { style: { ...S.inp }, placeholder: 'Ед.', value: form.unit, onChange: e => setForm(p => ({ ...p, unit: e.target.value })) }), fieldErrors.unit && h('div', { className: 'error-message' }, fieldErrors.unit)),
        h('div', { style: { flex: 1, minWidth: 70 } }, h('input', { type: 'number', step: '0.01', style: { ...S.inp }, placeholder: 'Кол-во', value: form.quantity, onChange: e => setForm(p => ({ ...p, quantity: e.target.value })) }), fieldErrors.quantity && h('div', { className: 'error-message' }, fieldErrors.quantity)),
        h('div', { style: { flex: 1, minWidth: 70 } }, h('input', { type: 'number', style: { ...S.inp }, placeholder: 'Цена₽', value: form.unitCost, onChange: e => setForm(p => ({ ...p, unitCost: e.target.value })) })),
        h('div', { style: { flex: 1, minWidth: 70 } }, h('input', { type: 'number', style: { ...S.inp }, placeholder: 'Мин.ост.', value: form.minStock, onChange: e => setForm(p => ({ ...p, minStock: e.target.value })) })),
        h('div', { style: { flex: 1, minWidth: 80 } }, h('input', { style: { ...S.inp }, placeholder: 'Партия', value: form.batch, onChange: e => setForm(p => ({ ...p, batch: e.target.value })) })),
        h('button', { style: abtn(), onClick: addOrUpdate }, editingId ? '✓' : '+'),
        editingId && h('button', { style: gbtn(), onClick: resetForm }, '✕')
      ),
      h('div', { style: { fontSize: 10, color: '#888', marginTop: 6 } }, 'Excel: колонки «Название», «Ед. изм.», «Количество», «Цена/ед.», «Партия», «Мин. остаток». При совпадении названия — обновляет остаток.')
    ),
    // Таблица
    filtered.length === 0 ? h('div', { style: { ...S.card, textAlign: 'center' } }, 'Нет материалов') :
      h('div', { style: { ...S.card, padding: 0 } }, h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
        h('thead', null, h('tr', null, ['Название','Ед.','Остаток','Мин.','Цена','Стоимость','Партия',''].map((t,i) => h('th', { key: i, style: S.th }, t)))),
        h('tbody', null, filtered.map(m => {
          const isLow = m.minStock > 0 && m.quantity <= m.minStock;
          return h('tr', { key: m.id, style: { background: isLow ? RD3 : 'transparent' } },
            h('td', { style: S.td }, m.name),
            h('td', { style: S.td }, m.unit),
            h('td', { style: { ...S.td, fontWeight: 500, color: isLow ? RD : 'inherit' } }, m.quantity),
            h('td', { style: { ...S.td, color: '#888' } }, m.minStock || '—'),
            h('td', { style: S.td }, m.unitCost ? `${m.unitCost}₽` : '—'),
            h('td', { style: { ...S.td, color: AM } }, m.unitCost ? `${Math.round(m.quantity * m.unitCost).toLocaleString()}₽` : '—'),
            h('td', { style: S.td }, m.batch || '—'),
            h('td', { style: S.td }, h('div', { style: { display: 'flex', gap: 4 } },
              h('button', { style: gbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => edit(m) }, '✎'),
              h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => del(m.id) }, '✕')
            ))
          );
        }))
      )))
  );
});

// ==================== MasterBOM ====================
const MasterBOM = memo(({ data, onUpdate, addToast }) => {
  const [form, setForm] = useState({ productName: '' });
  const { ask: askConfirm, confirmEl } = useConfirm();
  const [editingId, setEditingId] = useState(null);
  const [matForm, setMatForm] = useState({ bomId: '', materialId: '', qty: '' });

  const add = useCallback(async () => {
    if (!form.productName.trim()) { addToast('Введите название изделия', 'error'); return; }
    const bom = { id: uid(), productName: form.productName.trim(), materials: [] };
    const d = { ...data, bomTemplates: [...data.bomTemplates, bom] };
    await DB.save(d); onUpdate(d); setForm({ productName: '' }); addToast('Спецификация создана', 'success');
  }, [data, form, onUpdate, addToast]);

  const del = useCallback(async (id) => {
    if (!(await askConfirm({ message: 'Удалить спецификацию?' }))) return;
    const d = { ...data, bomTemplates: data.bomTemplates.filter(b => b.id !== id) };
    await DB.save(d); onUpdate(d); addToast('Удалена', 'info');
  }, [data, onUpdate, addToast]);

  const addMaterial = useCallback(async (bomId) => {
    const bid = bomId || matForm.bomId;
    if (!bid || !matForm.materialId || !matForm.qty || Number(matForm.qty) <= 0) { addToast('Заполните все поля', 'error'); return; }
    const d = { ...data, bomTemplates: data.bomTemplates.map(b => b.id === bid ? { ...b, materials: [...(b.materials || []), { materialId: matForm.materialId, qty: Number(matForm.qty) }] } : b) };
    await DB.save(d); onUpdate(d); setMatForm(p => ({ ...p, materialId: '', qty: '' })); addToast('Материал добавлен в спецификацию', 'success');
  }, [data, matForm, onUpdate, addToast]);

  const removeMaterial = useCallback(async (bomId, idx) => {
    const d = { ...data, bomTemplates: data.bomTemplates.map(b => b.id === bomId ? { ...b, materials: b.materials.filter((_, i) => i !== idx) } : b) };
    await DB.save(d); onUpdate(d);
  }, [data, onUpdate]);

  // Импорт BOM из Excel
  const importBOM = useCallback((event) => {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws);
        if (rows.length === 0) { addToast('Файл пустой', 'error'); return; }
        // Группируем по изделию
        const grouped = {};
        rows.forEach(r => {
          const product = (r['Изделие'] || r['Продукт'] || r['Product'] || '').toString().trim();
          const matName = (r['Материал'] || r['Название'] || r['Material'] || '').toString().trim();
          const qty = Number(r['Количество'] || r['Кол-во'] || r['Qty'] || 0);
          if (!product || !matName) return;
          if (!grouped[product]) grouped[product] = [];
          // Найти materialId по имени
          const mat = data.materials.find(m => m.name.toLowerCase() === matName.toLowerCase());
          grouped[product].push({ materialId: mat?.id || null, materialName: matName, qty });
        });
        const newBoms = Object.entries(grouped).map(([productName, materials]) => {
          const existing = data.bomTemplates.find(b => b.productName.toLowerCase() === productName.toLowerCase());
          if (existing) return { ...existing, materials: materials.map(m => ({ materialId: m.materialId, qty: m.qty, _name: m.materialName })) };
          return { id: uid(), productName, materials: materials.map(m => ({ materialId: m.materialId, qty: m.qty, _name: m.materialName })) };
        });
        const existingIds = newBoms.filter(b => data.bomTemplates.some(db => db.id === b.id)).map(b => b.id);
        const updated = data.bomTemplates.map(b => { const upd = newBoms.find(nb => nb.id === b.id); return upd || b; });
        const brandNew = newBoms.filter(b => !existingIds.includes(b.id));
        const d = { ...data, bomTemplates: [...updated, ...brandNew] };
        DB.save(d).then(() => { onUpdate(d); addToast(`Импортировано: ${newBoms.length} спецификаций`, 'success'); });
      } catch(ex) { addToast('Ошибка чтения: ' + ex.message, 'error'); }
    };
    reader.readAsArrayBuffer(file); event.target.value = '';
  }, [data, onUpdate, addToast]);

  // Проверка остатков по BOM
  const checkStock = useCallback((bom, qty = 1) => {
    return (bom.materials || []).map(m => {
      const mat = data.materials.find(dm => dm.id === m.materialId);
      const need = m.qty * qty;
      const have = mat?.quantity || 0;
      return { name: mat?.name || m._name || '?', unit: mat?.unit || '', need, have, deficit: Math.max(0, need - have), ok: have >= need };
    });
  }, [data.materials]);

  return h('div', null,
    confirmEl,
    // Импорт
    h('div', { style: { display: 'flex', gap: 8, marginBottom: 12 } },
      h('button', { style: abtn(), onClick: () => document.getElementById('bom-import-xlsx').click() }, '📤 Импорт BOM из Excel'),
      h('input', { type: 'file', id: 'bom-import-xlsx', style: { display: 'none' }, accept: '.xlsx,.xls,.csv', onChange: importBOM }),
      h('div', { style: { fontSize: 10, color: '#888', alignSelf: 'center' } }, 'Excel: колонки «Изделие», «Материал», «Количество»')
    ),
    // Создать
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Создать спецификацию'),
      h('div', { style: { display: 'flex', gap: 8 } },
        h('input', { style: { ...S.inp, flex: 1 }, placeholder: 'Название изделия (Котёл КВ-100...)', value: form.productName, onChange: e => setForm(p => ({ ...p, productName: e.target.value })), onKeyDown: e => e.key === 'Enter' && add() }),
        h('button', { style: abtn(), onClick: add }, '+ Создать')
      )

// ==================== MasterTodayPlan (с автопересчётом и каскадными алертами) ====================
const MasterTodayPlan = memo(({ data }) => {
  const { plannedToday, nowTime, cascadeAlerts, delayedOrders } = useMemo(() => {
    const todayStart = new Date().setHours(0,0,0,0);
    const todayEnd = new Date().setHours(23,59,59,999);
    const nowTime = now();
    const plannedToday = data.ops
      .filter(op => op.plannedStartDate && op.plannedStartDate >= todayStart && op.plannedStartDate <= todayEnd && !op.archived)
      .sort((a,b) => a.plannedStartDate - b.plannedStartDate);

    // Каскадный анализ задержек
    const cascadeAlerts = [];
    const delayedOrders = new Set();
    // Для каждого заказа: если текущая операция задерживается → пересчитать последующие
    data.orders.filter(o => !o.archived).forEach(order => {
      const ops = data.ops.filter(op => op.orderId === order.id && !op.archived).sort((a, b) => (a.plannedStartDate || 0) - (b.plannedStartDate || 0));
      let accumulatedDelay = 0;
      ops.forEach((op, idx) => {
        if (op.status === 'in_progress' && op.plannedHours && op.startedAt) {
          const expectedEnd = op.startedAt + op.plannedHours * 3600000;
          if (nowTime > expectedEnd) {
            const delay = nowTime - expectedEnd;
            accumulatedDelay += delay;
          }
        }
        if (op.status === 'done' && op.finishedAt && op.plannedHours && op.startedAt) {
          const expectedEnd = op.startedAt + op.plannedHours * 3600000;
          if (op.finishedAt > expectedEnd) accumulatedDelay += (op.finishedAt - expectedEnd);
        }
      });
      if (accumulatedDelay > 1800000) { // > 30 минут
        delayedOrders.add(order.id);
        // Проверить дедлайн
        if (order.deadline) {
          const deadlineMs = new Date(order.deadline).getTime();
          const remainingOps = ops.filter(op => op.status !== 'done' && op.status !== 'defect');
          const remainingHours = remainingOps.reduce((s, op) => s + (op.plannedHours || 2), 0);
          const newExpectedEnd = nowTime + remainingHours * 3600000;
          if (newExpectedEnd > deadlineMs) {
            cascadeAlerts.push({
              orderId: order.id, orderNumber: order.number, delay: accumulatedDelay,
              deadline: order.deadline, expectedEnd: newExpectedEnd,
              overshoot: newExpectedEnd - deadlineMs,
              remainingOps: remainingOps.length
            });
          }
        }
      }
    });
    cascadeAlerts.sort((a, b) => a.overshoot - b.overshoot);
    return { plannedToday, nowTime, cascadeAlerts, delayedOrders };
  }, [data.ops, data.orders]);

  return h('div', null,
    // Каскадные алерты
    cascadeAlerts.length > 0 && h('div', { role: 'alert', style: { ...S.card, background: RD3, border: `0.5px solid ${RD}`, marginBottom: 12 } },
      h('div', { style: { fontSize: 10, color: RD, textTransform: 'uppercase', fontWeight: 500, marginBottom: 8 } }, `⚠ Прогноз срыва дедлайна (${cascadeAlerts.length} заказов)`),
      cascadeAlerts.map(a => h('div', { key: a.orderId, style: { padding: '6px 0', borderBottom: '0.5px solid rgba(0,0,0,0.05)', fontSize: 12 } },
        h('div', { style: { fontWeight: 500, color: RD2 } }, `Заказ ${a.orderNumber}`),
        h('div', { style: { color: '#666', fontSize: 11 } },
          `Накопленная задержка: ${fmtDur(a.delay)} · Дедлайн: ${a.deadline} · `,
          h('span', { style: { fontWeight: 500, color: RD } }, `Опоздание: ~${fmtDur(a.overshoot)}`),
          ` · Осталось операций: ${a.remainingOps}`
        )
      ))
    ),

    // План на сегодня
    h('div', { style: { ...S.card, overflowX: 'auto' } },
      h('div', { style: S.sec }, `План на сегодня (${plannedToday.length})`),
      plannedToday.length === 0
        ? h('div', { style: { padding: 16, textAlign: 'center', color: '#888' } }, 'Нет запланированных операций на сегодня')
        : h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
            h('thead', null, h('tr', null, ['Заказ','Операция','Исполнитель','Плановое начало','Статус','Задержка'].map((t,i) => h('th', { key: i, style: S.th, scope: 'col' }, t)))),
            h('tbody', null, plannedToday.map(op => {
              const order = data.orders.find(o => o.id === op.orderId);
              const workerNames = op.workerIds?.map(id => data.workers.find(w => w.id === id)?.name).filter(Boolean).join(', ') || '—';
              const overdue = !op.startedAt && op.plannedStartDate < nowTime;
              const delay = overdue ? nowTime - op.plannedStartDate : 0;
              const isDelayedOrder = delayedOrders.has(op.orderId);
              return h('tr', { key: op.id, style: { background: overdue ? RD3 : isDelayedOrder ? '#FFF8E1' : 'transparent' } },
                h('td', { style: { ...S.td, color: AM, fontWeight: 500 } }, order?.number || '—'),
                h('td', { style: S.td }, op.name),
                h('td', { style: S.td }, workerNames),
                h('td', { style: S.td }, new Date(op.plannedStartDate).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })),
                h('td', { style: S.td }, h(Badge, { st: op.status })),
                h('td', { style: { ...S.td, color: delay > 0 ? RD : GN, fontWeight: delay > 0 ? 500 : 400 } }, delay > 0 ? `+${fmtDur(delay)}` : '✓')
              );
            }))
          ))
    )
  );
});

// ==================== MasterNotifications ====================
const MasterNotifications = memo(({ data }) => {
  const notifications = useMemo(() => {
    const list = [];
    const nowTime = now();
    data.ops.forEach(op => {
      if (op.status === 'pending' && op.plannedStartDate && op.plannedStartDate < nowTime - 3600000) {
        const order = data.orders.find(o => o.id === op.orderId);
        list.push({ id: `overdue-${op.id}`, type: 'overdue', message: `Операция "${op.name}" (заказ ${order?.number}) не начата более часа` });
      }
    });
    const recentDowntimes = data.events.filter(e => e.type === 'downtime' && e.ts > nowTime - 1800000);
    recentDowntimes.forEach(e => {
      const worker = data.workers.find(w => w.id === e.workerId);
      const reason = data.downtimeTypes.find(d => d.id === e.downtimeTypeId)?.name;
      list.push({ id: `downtime-${e.id}`, type: 'downtime', message: `Простой: ${worker?.name} — ${reason}` });
    });
    data.orders.forEach(order => {
      if (isShipmentNear(order.deadline) && !order.archived) list.push({ id: `deadline-${order.id}`, type: 'deadline', message: `Заказ ${order.number} близок к дате отгрузки` });
    });
    return list.slice(0, 10);
  }, [data]);
  return h('div', { style: { ...S.card, marginBottom: 12 } },
    h('div', { style: { ...S.sec, display: 'flex', alignItems: 'center' } },
      'Уведомления',
      notifications.length > 0 && h('span', { className: 'notification-badge', 'aria-label': `${notifications.length} уведомлений` }, notifications.length)
    ),
    notifications.length === 0
      ? h('div', { style: { padding: 8, color: '#888' } }, 'Нет новых уведомлений')
      : notifications.map(n => h('div', { key: n.id, style: { padding: '6px 0', borderBottom: '0.5px solid #eee', fontSize: 12, color: n.type === 'overdue' ? RD : (n.type === 'deadline' ? AM : '#333') } }, n.message))
  );
});

// ==================== MasterProductionStages ====================
const MasterProductionStages = memo(({ data, onUpdate, addToast }) => {
  const [newName, setNewName] = useState('');
  const [editingChecklist, setEditingChecklist] = useState(null);
  const [newCheckItem, setNewCheckItem] = useState('');
  const { ask: askConfirm, confirmEl } = useConfirm();
  const addStage = async () => {
    if (!newName.trim()) return;
    const newStage = { id: uid(), name: newName.trim(), checklist: [] };
    const d = { ...data, productionStages: [...(data.productionStages || []), newStage] };
    await DB.save(d); onUpdate(d); setNewName(''); addToast('Этап добавлен', 'success');
  };
  const deleteStage = async (id) => {
    if (!(await askConfirm({ message: 'Удалить этап?' }))) return;
    const d = { ...data, productionStages: (data.productionStages || []).filter(s => s.id !== id) };
    await DB.save(d); onUpdate(d); addToast('Этап удалён', 'info');
  };
  const moveUp = (index) => {
    if (index === 0) return;
    const n = [...(data.productionStages || [])];
    [n[index-1], n[index]] = [n[index], n[index-1]];
    const d = { ...data, productionStages: n }; DB.save(d).then(() => onUpdate(d));
  };
  const moveDown = (index) => {
    const stages = data.productionStages || [];
    if (index === stages.length-1) return;
    const n = [...stages]; [n[index], n[index+1]] = [n[index+1], n[index]];
    const d = { ...data, productionStages: n }; DB.save(d).then(() => onUpdate(d));
  };
  const addCheckItem = async (stageId) => {
    if (!newCheckItem.trim()) return;
    const d = { ...data, productionStages: (data.productionStages || []).map(s => s.id === stageId ? { ...s, checklist: [...(s.checklist || []), newCheckItem.trim()] } : s) };
    await DB.save(d); onUpdate(d); setNewCheckItem('');
  };
  const removeCheckItem = async (stageId, idx) => {
    const d = { ...data, productionStages: (data.productionStages || []).map(s => s.id === stageId ? { ...s, checklist: (s.checklist || []).filter((_, i) => i !== idx) } : s) };
    await DB.save(d); onUpdate(d);
  };
  return h('div', null,
    confirmEl,
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Добавить этап производства'),
      h('div', { style: { display: 'flex', gap: 8 } },
        h('input', { style: { ...S.inp, flex: 1 }, placeholder: 'Название этапа', value: newName, onChange: e => setNewName(e.target.value), onKeyDown: e => e.key === 'Enter' && addStage() }),
        h('button', { style: abtn(), onClick: addStage }, '+ Добавить')
      )
    ),
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Список этапов'),
      (data.productionStages || []).length === 0
        ? h('div', { style: { padding: 16, textAlign: 'center' } }, 'Нет этапов.')
        : (data.productionStages || []).map((stage, index) =>
            h('div', { key: stage.id, style: { padding: '8px 0', borderBottom: '0.5px solid #eee' } },
              h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between' } },
                h('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },
                  h('span', { style: { fontSize: 13, fontWeight: 500 } }, stage.name),
                  (stage.checklist?.length > 0) && h('span', { style: { fontSize: 10, color: AM, background: AM3, padding: '1px 6px', borderRadius: 6 } }, `${stage.checklist.length} пунктов`)
                ),
                h('div', { style: { display: 'flex', gap: 4 } },
                  h('button', { style: gbtn({ fontSize: 10, padding: '4px 6px' }), onClick: () => setEditingChecklist(editingChecklist === stage.id ? null : stage.id) }, editingChecklist === stage.id ? '▾ Чек-лист' : '▸ Чек-лист'),
                  h('button', { style: gbtn({ fontSize: 11, padding: '4px 6px' }), onClick: () => moveUp(index), disabled: index === 0 }, '↑'),
                  h('button', { style: gbtn({ fontSize: 11, padding: '4px 6px' }), onClick: () => moveDown(index), disabled: index === (data.productionStages || []).length-1 }, '↓'),
                  h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => deleteStage(stage.id) }, '✕')
                )
              ),
              // Редактор чек-листа
              editingChecklist === stage.id && h('div', { style: { marginTop: 8, padding: '10px 12px', background: '#f8f8f5', borderRadius: 8 } },
                h('div', { style: { fontSize: 10, color: AM4, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 } }, 'Чек-лист (при запуске операции копируется рабочему)'),
                (stage.checklist || []).map((item, idx) =>
                  h('div', { key: idx, style: { display: 'flex', alignItems: 'center', gap: 6, padding: '4px 0', fontSize: 12 } },
                    h('span', { style: { color: '#888', fontSize: 10, width: 16 } }, `${idx + 1}.`),
                    h('span', { style: { flex: 1 } }, item),
                    h('span', { style: { cursor: 'pointer', color: RD, fontSize: 14 }, onClick: () => removeCheckItem(stage.id, idx) }, '×')
                  )
                ),
                h('div', { style: { display: 'flex', gap: 6, marginTop: 6 } },
                  h('input', { style: { ...S.inp, flex: 1, fontSize: 12 }, placeholder: 'Новый пункт проверки...', value: newCheckItem, onChange: e => setNewCheckItem(e.target.value), onKeyDown: e => e.key === 'Enter' && addCheckItem(stage.id) }),
                  h('button', { style: abtn({ fontSize: 11, padding: '4px 10px' }), onClick: () => addCheckItem(stage.id) }, '+')
                ),
                (stage.checklist || []).length === 0 && h('div', { style: { fontSize: 11, color: '#888', padding: 4 } }, 'Нет пунктов. Добавьте пункты проверки для этого этапа.')
              )
            )
          )
    )
  );
});

// ==================== MasterOps ====================
const MasterOps = memo(({ data, onUpdate, onShowQR, addToast, onOrderClick }) => {
  const stagesList = useMemo(() => (data.productionStages || []).map(s => s.name)
, [data.productionStages]);
  const { ask: askConfirm, confirmEl } = useConfirm();
  const [form, setForm] = useState({ orderId: '', name: '', workerIds: [], plannedHours: '', sectionId: '', equipmentId: '', plannedStartDate: '', drawingUrl: '' });
  const [filt, setFilt] = useState('all');
  const [editingId, setEditingId] = useState(null);
  const [showArchived, setShowArchived] = useState(false);
  const [page, setPage] = useState(1);
  const pageSize = 20;
  const [fieldErrors, setFieldErrors] = useState({});

  const autoAssign = useCallback(() => {
    if (!form.name) { addToast('Сначала выберите операцию', 'error'); return; }
    const workerId = autoAssignWorker(data, form.name);
    if (!workerId) { addToast('Не найден подходящий свободный сотрудник', 'error'); return; }
    setForm(p => ({ ...p, workerIds: [...new Set([...p.workerIds, workerId])] }));
    addToast(`Назначен сотрудник ${data.workers.find(w => w.id === workerId)?.name}`, 'success');
  }, [data, form.name, addToast]);

  const validate = () => {
    const errors = {};
    if (!form.orderId) errors.orderId = 'Выберите заказ';
    if (!form.name.trim()) errors.name = 'Введите название операции';
    if (form.plannedHours && (isNaN(form.plannedHours) || Number(form.plannedHours) <= 0)) errors.plannedHours = 'Плановое время должно быть положительным числом';
    setFieldErrors(errors);
    return Object.keys(errors).length === 0;
  };

  const resetForm = () => { setForm({ orderId: '', name: '', workerIds: [], plannedHours: '', sectionId: '', equipmentId: '', plannedStartDate: '', drawingUrl: '' }); setFieldErrors({}); setEditingId(null); };

  const addOrUpdate = useCallback(async () => {
    if (!validate()) return;
    // Проверка компетенций назначенных рабочих
    if (form.workerIds.length > 0 && form.name) {
      const invalid = data.workers.filter(w => form.workerIds.includes(w.id) && w.competences && w.competences.length > 0 && !w.competences.includes(form.name));
      if (invalid.length > 0) { addToast(`У ${invalid.map(w => w.name).join(', ')} нет допуска к «${form.name}»`, 'error'); return; }
    }
    if (editingId) {
      const updatedOps = data.ops.map(o => o.id === editingId ? { ...o, orderId: form.orderId, name: form.name.trim(), workerIds: form.workerIds, plannedHours: form.plannedHours ? Number(form.plannedHours) : undefined, sectionId: form.sectionId || null, equipmentId: form.equipmentId || null, plannedStartDate: form.plannedStartDate ? new Date(form.plannedStartDate).getTime() : undefined, drawingUrl: form.drawingUrl.trim() || undefined } : o);
      const d = { ...data, ops: updatedOps };
      await DB.save(d); onUpdate(d); resetForm(); addToast('Операция обновлена', 'success');
    } else {
      const op = { id: uid(), orderId: form.orderId, name: form.name.trim(), workerIds: form.workerIds, status: 'pending', createdAt: now(), plannedHours: form.plannedHours ? Number(form.plannedHours) : undefined, archived: false, sectionId: form.sectionId || null, equipmentId: form.equipmentId || null, plannedStartDate: form.plannedStartDate ? new Date(form.plannedStartDate).getTime() : undefined, drawingUrl: form.drawingUrl.trim() || undefined, requiresQC: form.name.includes('свар') || form.name.includes('Опресовка') };
      const d = { ...data, ops: [...data.ops, op] };
      await DB.save(d); onUpdate(d); resetForm(); addToast('Операция добавлена', 'success');
    }
  }, [form, editingId, data, onUpdate, addToast]);

  const del = useCallback(async (id) => {
    if (!(await askConfirm({ message: 'Переместить операцию в архив?', danger: false }))) return;
    let d = { ...data, ops: data.ops.map(o => o.id === id ? { ...o, archived: true } : o) };

    await DB.save(d); onUpdate(d); addToast('Операция архивирована', 'info');

const DependencyEditor = memo(({ data, orderId, onUpdate, addToast, onClose }) => {
  const order = data.orders.find(o => o.id === orderId);
  const ops = useMemo(() => data.ops.filter(op => op.orderId === orderId && !op.archived), [data.ops, orderId]);

  const toggleDep = useCallback(async (opId, depId) => {
    const op = ops.find(o => o.id === opId);
    if (!op) return;
    const deps = op.dependsOn || [];
    const newDeps = deps.includes(depId) ? deps.filter(d => d !== depId) : [...deps, depId];
    // Проверка циклов
    const checkCycle = (target, visited = new Set()) => {
      if (visited.has(target)) return true;
      visited.add(target);
      const t = ops.find(o => o.id === target);
      return (t?.dependsOn || []).some(d => d === opId || checkCycle(d, visited));
    };
    if (!deps.includes(depId) && checkCycle(depId)) {
      addToast('Нельзя: циклическая зависимость', 'error'); return;
    }
    const d = { ...data, ops: data.ops.map(o => o.id === opId ? { ...o, dependsOn: newDeps.length > 0 ? newDeps : undefined } : o) };
    await DB.save(d); onUpdate(d);
  }, [data, ops, onUpdate, addToast, orderId]);

  // Автоустановка: все последовательно
  const setAllSequential = useCallback(async () => {
    const sorted = [...ops];
    const updated = data.ops.map(o => {
      const idx = sorted.findIndex(s => s.id === o.id);
      if (idx <= 0 || o.orderId !== orderId) return { ...o, dependsOn: o.orderId === orderId ? undefined : o.dependsOn };
      return { ...o, dependsOn: [sorted[idx - 1].id] };
    });
    const d = { ...data, ops: updated };
    await DB.save(d); onUpdate(d); addToast('Все операции последовательно', 'success');
  }, [data, ops, orderId, onUpdate, addToast]);

  // Автоустановка: все параллельно (без зависимостей)
  const setAllParallel = useCallback(async () => {
    const d = { ...data, ops: data.ops.map(o => o.orderId === orderId ? { ...o, dependsOn: undefined } : o) };
    await DB.save(d); onUpdate(d); addToast('Все операции параллельно', 'success');
  }, [data, orderId, onUpdate, addToast]);

  // Визуальная карта: какие операции от каких зависят
  const depMap = useMemo(() => {
    const map = {};
    ops.forEach(op => { map[op.id] = { op, deps: op.dependsOn || [], dependents: [] }; });
    ops.forEach(op => { (op.dependsOn || []).forEach(depId => { if (map[depId]) map[depId].dependents.push(op.id); }); });
    return map;
  }, [ops]);

  return h('div', { style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 } },
    h('div', { className: 'modal-content', style: { background: '#fff', borderRadius: 12, padding: 20, width: 'min(700px, calc(100vw - 24px))', maxHeight: '90vh', overflowY: 'auto' } },
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 } },
        h('div', null,
          h('div', { style: { fontSize: 16, fontWeight: 500 } }, `Зависимости: ${order?.number || '—'}`),
          h('div', { style: { fontSize: 11, color: '#888' } }, `${ops.length} операций · нажмите на ячейку для переключения`)
        ),
        h('button', { style: gbtn({ fontSize: 14, padding: '4px 12px' }), onClick: onClose }, '×')
      ),
      // Быстрые действия
      h('div', { style: { display: 'flex', gap: 8, marginBottom: 12 } },
        h('button', { style: gbtn({ fontSize: 11 }), onClick: setAllSequential }, '↓ Все последовательно'),
        h('button', { style: gbtn({ fontSize: 11 }), onClick: setAllParallel }, '⇉ Все параллельно')
      ),
      // Матрица зависимостей
      h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: 11 } },
        h('thead', null, h('tr', null,
          h('th', { style: { ...S.th, position: 'sticky', left: 0, background: '#f8f8f5', zIndex: 1 } }, 'Операция ↓ зависит от →'),
          ops.map(op => h('th', { key: op.id, style: { ...S.th, writingMode: 'vertical-lr', textOrientation: 'mixed', minWidth: 30, maxWidth: 40, height: 80, padding: '4px 2px' } }, op.name.length > 10 ? op.name.slice(0, 10) + '…' : op.name))
        )),
        h('tbody', null, ops.map(op => h('tr', { key: op.id },
          h('td', { style: { ...S.td, fontWeight: 500, position: 'sticky', left: 0, background: '#fff', zIndex: 1, minWidth: 120 } },
            h('div', { style: { display: 'flex', alignItems: 'center', gap: 4 } },
              h(Badge, { st: op.status }),
              h('span', { style: { fontSize: 11 } }, op.name.length > 14 ? op.name.slice(0, 14) + '…' : op.name)
            )
          ),
          ops.map(depOp => {
            const isSelf = op.id === depOp.id;
            const isDep = (op.dependsOn || []).includes(depOp.id);
            return h('td', { key: depOp.id, style: { ...S.td, textAlign: 'center', padding: 2, cursor: isSelf ? 'default' : 'pointer', background: isSelf ? '#f0f0f0' : isDep ? GN3 : 'transparent' },
              onClick: isSelf ? undefined : () => toggleDep(op.id, depOp.id)
            }, isSelf ? '—' : isDep ? h('span', { style: { color: GN, fontWeight: 500, fontSize: 14 } }, '✓') : '');
          })
        )))
      )),
      // Визуальная последовательность
      h('div', { style: { marginTop: 16 } },
        h('div', { style: S.sec }, 'Последовательность выполнения'),
        h('div', { style: { display: 'flex', flexDirection: 'column', gap: 4 } },
          ops.map(op => {
            const deps = (op.dependsOn || []).map(depId => ops.find(o => o.id === depId)?.name).filter(Boolean);
            const isParallel = deps.length === 0;
            return h('div', { key: op.id, style: { display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px', borderRadius: 8, background: isParallel ? '#E3F2FD' : '#f8f8f5', fontSize: 12 } },
              h('span', { style: { fontSize: 14 } }, isParallel ? '⇉' : '↓'),
              h('span', { style: { fontWeight: 500 } }, op.name),
              h(Badge, { st: op.status }),
              deps.length > 0 && h('span', { style: { color: '#888', fontSize: 10 } }, `после: ${deps.join(', ')}`)
            );
          })
        )
      )
    )
  );
});

const MasterOrders = memo(({ data, onUpdate, addToast, onOrderClick }) => {
  const [form, setForm] = useState({ number: '', product: '',
 qty: '', deadline: '', priority: 'medium', bomId: '' });
  const { ask: askConfirm, confirmEl } = useConfirm();
  const [editingId, setEditingId] = useState(null);
  const [showArchived, setShowArchived] = useState(false);
  const [page, setPage] = useState(1);
  const pageSize = 20;
  const [fieldErrors, setFieldErrors] = useState({});
  const [depEditorOrderId, setDepEditorOrderId] = useState(null);

  const validate = () => {
    const errors = {};
    if (!form.number.trim()) errors.number = 'Введите номер заказа';
    else { const exists = data.orders.some(o => o.number === form.number && o.id !== editingId && !o.archived); if (exists) errors.number = 'Такой номер уже существует'; }
    if (!form.product.trim()) errors.product = 'Введите название изделия';
    const qtyNum = Number(form.qty);
    if (!form.qty || isNaN(qtyNum) || qtyNum <= 0) errors.qty = 'Количество должно быть положительным числом';
    if (form.deadline) { const today = new Date(); today.setHours(0,0,0,0); if (new Date(form.deadline) < today) errors.deadline = 'Дата отгрузки не может быть раньше сегодняшнего дня'; }
    setFieldErrors(errors);
    return Object.keys(errors).length === 0;
  };

  const createDefaultOps = useCallback((orderId) => {
    const stages = data.productionStages || [];
    return stages.map(stage => ({ id: uid(), orderId, name: stage.name, workerIds: [], status: 'pending', createdAt: now(), plannedHours: undefined, archived: false, sectionId: null, equipmentId: null, plannedStartDate: undefined, requiresQC: stage.name.includes('свар') || stage.name.includes('Опресовка') }));
  }, [data.productionStages]);

  const addOrUpdate = useCallback(async () => {
    if (!validate()) return;
    if (editingId) {
      const updatedOrders = data.orders.map(o => o.id === editingId ? { ...o, ...form, qty: Number(form.qty), priority: form.priority } : o);
      const d = { ...data, orders: updatedOrders };
      await DB.save(d); onUpdate(d); setEditingId(null); setForm({ number: '', product: '', qty: '', deadline: '', priority: 'medium', bomId: '' }); setFieldErrors({}); addToast('Заказ обновлён', 'success');
    } else {
      const newOrder = { id: uid(), ...form, qty: Number(form.qty), createdAt: now(), archived: false };
      const newOps = createDefaultOps(newOrder.id);
      // BOM: предупреждение о дефиците (не блокирует создание)
      if (form.bomId) {

// ==================== MasterDowntimes ====================
const MasterDowntimes = memo(({ data, onUpdate, addToast }) => {
  const [newName, setNewName] = useState('');
  const { ask: askConfirm, confirmEl } = useConfirm();
  const add = useCallback(async () => {
    if (!newName.trim()) return;
    if (data.downtimeTypes.some(d => d.name.toLowerCase() === newName.trim().toLowerCase())) { addToast('Такая причина уже существует', 'error'); return; }
    const newType = { id: uid(), name: newName.trim() };
    const d = { ...data, downtimeTypes: [...data.downtimeTypes, newType] };
    await DB.save(d); onUpdate(d); setNewName(''); addToast('Причина простоя добавлена', 'success');
  }, [data, newName, onUpdate, addToast]);
  const del = useCallback(async (id) => {
    if (!(await askConfirm({ message: 'Удалить причину простоя?' }))) return;
    if (data.events.some(e => e.downtimeTypeId === id)) { addToast('Нельзя удалить причину, уже использованную', 'error'); return; }
    const d = { ...data, downtimeTypes: data.downtimeTypes.filter(dt => dt.id !== id) };
    await DB.save(d); onUpdate(d); addToast('Причина удалена', 'info');
  }, [data, onUpdate, addToast]);
  return h('div', null,
    confirmEl,
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Добавить причину простоя'),
      h('div', { style: { display:'flex', gap:8 } },
        h('input', { style: { ...S.inp, flex:1 }, placeholder: 'Нет материала, поломка...', value: newName, onChange: e => setNewName(e.target.value), onKeyDown: e => e.key === 'Enter' && add() }),
        h('button', { type:'button', style: abtn(), onClick: add }, '+ Добавить')
      )
    ),
    data.downtimeTypes.length === 0
      ? h('div', { style: { ...S.card, textAlign:'center', padding:32 } }, 'Нет причин простоев')
      : h('div', { style: { ...S.card } }, data.downtimeTypes.map(dt =>
          h('div', { key: dt.id, style: { display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 0', borderBottom:'0.5px solid rgba(0,0,0,0.05)' } },
            h('span', { style: { fontSize:13 } }, dt.name),
            h('button', { style: rbtn({ fontSize:11, padding:'4px 8px' }), 'aria-label': `Удалить ${dt.name}`, onClick: () => del(dt.id) }, 'Удалить')
          )
        ))
  );
});

const MasterAdmin = memo(({ data, onUpdate, addToast }) => {
  const settings = data.settings || EMPTY_DATA.settings;
  const [masterPin, setMasterPin] = useState(settings.masterPin || '0000');
  const [controllerPin, setControllerPin] = useState(settings.controllerPin || '1111');
  const [warehousePin, setWarehousePin] = useState(settings.warehousePin || '2222');
  const [masterKey, setMasterKey] = useState(settings.masterKey || '9999');
  const [showMasterKey, setShowMasterKey] = useState(false);
  const [welcomeTitle, setWelcomeTitle] = useState(settings.welcomeTitle || 'teploros');
  const [welcomeSubtitle, setWelcomeSubtitle] = useState(settings.welcomeSubtitle || 'надежная техника');
  const [welcomeLabel, setWelcomeLabel] = useState(settings.welcomeLabel || 'Производственный учёт · НТ');
  const [editPins, setEditPins] = useState({});

  const savePins = useCallback(async () => {
    if (!masterPin.trim() || masterPin.trim().length < 4) { addToast('PIN мастера: минимум 4 цифры', 'error'); return; }
    if (!controllerPin.trim() || controllerPin.trim().length < 4) { addToast('PIN контролёра: минимум 4 цифры', 'error'); return; }
    if (!masterKey.trim() || masterKey.trim().length < 4) { addToast('Мастер-ключ: минимум 4 символа', 'error'); return; }
    const conflictM = data.workers.find(w => pinMatch(masterPin.trim(), w.pin));
    if (conflictM) { addToast(`PIN мастера совпадает с PIN сотрудника ${conflictM.name}`, 'error'); return; }
    const conflictC = data.workers.find(w => pinMatch(controllerPin.trim(), w.pin));
    if (conflictC) { addToast(`PIN контролёра совпадает с PIN сотрудника ${conflictC.name}`, 'error'); return; }
    if (masterPin.trim() === controllerPin.trim()) { addToast('PIN мастера и контролёра должны отличаться', 'error'); return; }
    const d = { ...data, settings: { ...settings, masterPin: hashPin(masterPin.trim()), controllerPin: hashPin(controllerPin.trim()), warehousePin: hashPin(warehousePin.trim()), masterKey: masterKey.trim() } };
    await DB.save(d); onUpdate(d); addToast('PIN-коды обновлены', 'success');
  }, [data, settings, masterPin, controllerPin, warehousePin, masterKey, onUpdate, addToast]);

  const saveWelcome = useCallback(async () => {

  }, [data, settings, welcomeTitle, welcomeSubtitle, welcomeLabel, onUpdate, addToast]);

    const safePins = [settings.masterPin, settings.controllerPin, settings.masterKey, ...data.workers.filter(w => w.id !== workerId).map(w => w.pin)];
    let pin;
    do { pin = String(Math.floor(1000 + Math.random() * 9000)); } while (safePins.includes(pin));
    const d = { ...data, workers: data.workers.map(w => w.id === workerId ? { ...w, pin: hashPin(pin) } : w) };
    await DB.save(d); onUpdate(d); addToast(`Новый PIN: ${pin}`, 'success');

    if (!newPin.trim() || newPin.trim().length < 4) { addToast('Минимум 4 цифры', 'error'); return; }

    if (conflict) { addToast(`PIN уже занят (${conflict.name})`, 'error'); return; }
    const d = { ...data, workers: data.workers.map(w => w.id === workerId ? { ...w, pin: hashPin(newPin.trim()) } : w) };
    await DB.save(d); onUpdate(d);

// ==================== GanttChart ====================
const GanttChart = memo(({ data }) => {
  const [startDate, setStartDate] = useState(() => { const d = new Date(); d.setDate(d.getDate() - 7); return d; });
  const [daysCount, setDaysCount] = useState(14);
  const operations = useMemo(() => data.ops.filter(op => op.plannedStartDate && !op.archived && op.status !== 'done' && op.status !== 'defect'), [data.ops]);
  const timeline = useMemo(() => {
    const start = startDate.getTime(); const end = start + daysCount*86400000;
    const days = [];
    for (let i=0; i<daysCount; i++) { const date = new Date(start + i*86400000); days.push({ date, day:date.getDate(), month:date.getMonth()+1, dayOfWeek:date.toLocaleDateString('ru',{weekday:'short'}) }); }
    return { days, start, end };
  }, [startDate, daysCount]);
  const bars = useMemo(() => operations.map(op => {
    const start = op.plannedStartDate; const end = start + (op.plannedHours ? op.plannedHours*3600000 : 4*3600000);
    if (end < timeline.start || start > timeline.end) return null;
    const left = ((start - timeline.start) / (timeline.end - timeline.start))*100;
    const width = ((end - start) / (timeline.end - timeline.start))*100;
    const order = data.orders.find(o => o.id === op.orderId);
    return { ...op, orderNumber: order?.number, left, width };
  }).filter(b => b), [operations, timeline, data.orders]);
  const changeDate = (delta) => { const newStart = new Date(startDate); newStart.setDate(newStart.getDate() + delta); setStartDate(newStart); };
  return h('div', { style: S.card },
    h('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 } },
      h('div', { style: { display:'flex', gap:8 } }, h('button', { style: gbtn(), onClick: () => changeDate(-7) }, '-7д'), h('button', { style: gbtn(), onClick: () => changeDate(-1) }, '-1д'), h('button', { style: gbtn(), onClick: () => changeDate(1) }, '+1д'), h('button', { style: gbtn(), onClick: () => changeDate(7) }, '+7д')),
      h('div', { style: { display:'flex', gap:8 } }, h('button', { style: gbtn(), onClick: () => setDaysCount(7) }, '7 дней'), h('button', { style: gbtn(), onClick: () => setDaysCount(14) }, '14 дней'))
    ),
    h('div', { className:'gantt-container' },
      h('div', { style: { display:'flex', flexDirection:'column' } },
        h('div', { className:'gantt-row' }, h('div', { className:'gantt-label' }, 'Операции'), h('div', { className:'gantt-timeline' }, timeline.days.map((day,idx) => h('div', { key:idx, className:'gantt-cell', style:{flex:1} }, `${day.day}.${day.month} ${day.dayOfWeek}`)))),
        bars.map(bar => h('div', { key:bar.id, className:'gantt-row', style:{ position:'relative', height:'40px' } },
          h('div', { className:'gantt-label', style:{ display:'flex', alignItems:'center', gap:4 } }, h('span', { style:{ fontWeight:500 } }, bar.orderNumber), h('span', { style:{ fontSize:10, color:'#888' } }, bar.name)),
          h('div', { className:'gantt-timeline', style:{ position:'relative' } }, h('div', { className:'gantt-bar', style:{ left:`${bar.left}%`, width:`${bar.width}%`, position:'absolute', top:4, height:'32px', background: bar.status === 'in_progress' ? AM : BL } }, `${bar.name} (${bar.orderNumber})`))
        ))
      )
    )
  );
});

// ==================== MasterKanban (с WIP-лимитами) ====================
const MasterKanban = memo(({ data, onUpdate, addToast }) => {
  const stagesList = useMemo(() => (data.productionStages || []).map(s => s.name), [data.productionStages]);
  const wipLimits = data.settings?.wipLimits || {};
  const [editingWip, setEditingWip] = useState(null);
  const [wipValue, setWipValue] = useState('');

  const saveWipLimit = useCallback(async (stage, limit) => {
    const val = Number(limit);
    if (isNaN(val) || val < 0) return;
    const newLimits = { ...wipLimits, [stage]: val || undefined };
    if (!val) delete newLimits[stage];
    const d = { ...data, settings: { ...data.settings, wipLimits: newLimits } };
    await DB.save(d); onUpdate(d); setEditingWip(null); setWipValue('');
    addToast(val ? `WIP-лимит: ${stage} = ${val}` : `WIP-лимит снят: ${stage}`, 'success');
  }, [data, wipLimits, onUpdate, addToast]);

  const columns = useMemo(() => stagesList.map(stage => {
    const opsAtStage = data.ops.filter(op => op.name === stage && !op.archived);
    const active = opsAtStage.filter(op => op.status === 'in_progress' || op.status === 'pending' || op.status === 'on_check');
    const wip = wipLimits[stage] || 0;
    const overWip = wip > 0 && active.length > wip;
    return { stage, pending: opsAtStage.filter(op => op.status === 'pending'), in_progress: opsAtStage.filter(op => op.status === 'in_progress'), on_check: opsAtStage.filter(op => op.status === 'on_check'), done: opsAtStage.filter(op => op.status === 'done'), defect: opsAtStage.filter(op => op.status === 'defect' || op.status === 'rework'), total: opsAtStage.length, activeCount: active.length, wipLimit: wip, overWip };
  }), [stagesList, data.ops, wipLimits]);

  const overWipStages = columns.filter(c => c.overWip);

  return h('div', { style: { overflowX:'auto', paddingBottom:16 } },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 } },
      h('div', { style: S.sec }, 'Канбан-доска производства'),
      h('div', { style: { fontSize: 10, color: '#888' } }, 'Нажмите на лимит для изменения')
    ),
    // Алерт превышения WIP
    overWipStages.length > 0 && h('div', { role: 'alert', style: { padding: '8px 12px', background: RD3, border: `0.5px solid ${RD}`, borderRadius: 8, marginBottom: 10, fontSize: 11 } },
      h('span', { style: { fontWeight: 500, color: RD } }, '⚠ Превышен WIP-лимит: '),
      h('span', { style: { color: RD2 } }, overWipStages.map(c => `${c.stage} (${c.activeCount}/${c.wipLimit})`).join(', '))
    ),
    h('div', { style: { display:'flex', gap:8, minWidth: columns.length*160 } },
      columns.map(col => h('div', { key: col.stage, className: 'kanban-col', style: { flex:'0 0 150px', background: col.overWip ? '#FFF0F0' : '#fff', border: col.overWip ? `1px solid ${RD}` : '0.5px solid rgba(0,0,0,0.1)', borderRadius:10, padding:10, fontSize:11 } },
        h('div', { style: { fontSize:10, fontWeight:500, color:AM4, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:4 } }, col.stage),
        // WIP-лимит
        h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 } },
          editingWip === col.stage
            ? h('div', { style: { display: 'flex', gap: 4 } },
                h('input', { type: 'number', style: { ...S.inp, width: 40, padding: '2px 4px', fontSize: 11 }, value: wipValue, onChange: e => setWipValue(e.target.value), onKeyDown: e => e.key === 'Enter' && saveWipLimit(col.stage, wipValue), autoFocus: true }),
                h('button', { style: { background: 'none', border: 'none', cursor: 'pointer', fontSize: 10, color: GN }, onClick: () => saveWipLimit(col.stage, wipValue) }, '✓'),
                h('button', { style: { background: 'none', border: 'none', cursor: 'pointer', fontSize: 10, color: '#888' }, onClick: () => setEditingWip(null) }, '✕')
              )
            : h('button', { style: { background: 'none', border: 'none', cursor: 'pointer', fontSize: 10, color: col.overWip ? RD : col.wipLimit ? AM : '#bbb', padding: 0 }, onClick: () => { setEditingWip(col.stage); setWipValue(col.wipLimit || ''); } },
                col.wipLimit ? `WIP: ${col.activeCount}/${col.wipLimit}` : 'Лимит: ∞'
              )
        ),
        h('div', { style: { display:'flex', gap:4, flexWrap:'wrap', marginBottom:8 } },
          col.pending.length>0 && h('span', { style:{ padding:'2px 6px', fontSize:10, borderRadius:6, background:'#f0ede8', color:'#666' } }, `⏳ ${col.pending.length}`),

// ==================== KPI-отчёт для премирования ====================
const KPIReport = memo(({ data }) => {
  const [period, setPeriod] = useState(30);
  const periodStart = useMemo(() => now() - period * 86400000, [period]);

  const workerKPIs = useMemo(() => {
    return data.workers.map(w => {
      const wid = w.id;
      const allOps = data.ops.filter(op => op.workerIds?.includes(wid));
      const doneInPeriod = allOps.filter(op => op.status === 'done' && op.finishedAt >= periodStart);
      const defectInPeriod = allOps.filter(op => op.status === 'defect' && op.finishedAt >= periodStart);
      const totalInPeriod = doneInPeriod.length + defectInPeriod.length;
      const allDone = allOps.filter(op => op.status === 'done').length;
      const level = getWorkerLevel(allDone);
      const levelTitle = getLevelTitle(level);

      // Производительность: факт/план
      const withPlan = doneInPeriod.filter(op => op.plannedHours && op.startedAt && op.finishedAt);
      const productivity = withPlan.length > 0 ? Math.round(withPlan.reduce((s, op) => s + op.plannedHours * 3600000, 0) / withPlan.reduce((s, op) => s + (op.finishedAt - op.startedAt), 0) * 100) : null;

      // Качество: % без брака
      const quality = totalInPeriod > 0 ? Math.round(doneInPeriod.length / totalInPeriod * 100) : 100;

      // Дисциплина: простои по вине рабочего
      const downtimes = data.events.filter(e => e.workerId === wid && e.type === 'downtime' && e.ts >= periodStart);
      const downtimeHrs = Math.round(downtimes.reduce((s, e) => s + (e.duration || 0), 0) / 3600000 * 10) / 10;

      // Универсальность: количество разных типов операций
      const uniqueOps = new Set(doneInPeriod.map(op => op.name)).size;

      // Достижения за период
      const achievements = (w.achievements || []).length;

      // Итоговый KPI-балл (0-100)
      const kpiScore = Math.min(100, Math.round(
        (doneInPeriod.length > 0 ? 20 : 0) + // есть выработка
        Math.min((productivity || 0) / 5, 25) + // производительность до 25
        Math.min(quality / 4, 25) + // качество до 25
        Math.min(uniqueOps * 3, 15) + // универсальность до 15
        Math.min(level, 10) + // уровень до 10
        (downtimeHrs === 0 ? 5 : 0) // без простоев +5
      ));

      // Рекомендация по премированию
      const bonusLevel = kpiScore >= 85 ? 'A' : kpiScore >= 70 ? 'B' : kpiScore >= 50 ? 'C' : 'D';
      const bonusPct = bonusLevel === 'A' ? 30 : bonusLevel === 'B' ? 15 : bonusLevel === 'C' ? 0 : -10;

      return { ...w, level, levelTitle, doneCount: doneInPeriod.length, defectCount: defectInPeriod.length, productivity, quality, downtimeHrs, uniqueOps, achievements, kpiScore, bonusLevel, bonusPct };
    }).filter(w => (w.status || 'working') === 'working' || w.doneCount > 0).sort((a, b) => b.kpiScore - a.kpiScore);
  }, [data, periodStart]);

  const exportKPI = useCallback(() => {
    const ws = XLSX.utils.json_to_sheet(workerKPIs.map(w => ({
      'Сотрудник': w.name, 'Должность': w.position || '', 'Уровень': `${w.level} (${w.levelTitle})`,
      'Операций': w.doneCount, 'Брак': w.defectCount, 'Качество %': w.quality,
      'Производит. %': w.productivity || '', 'Универсальность': w.uniqueOps,
      'Простои (ч)': w.downtimeHrs, 'KPI': w.kpiScore, 'Грейд': w.bonusLevel, 'Премия %': w.bonusPct
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'KPI');
    XLSX.writeFile(wb, `kpi_report_${period}d_${new Date().toISOString().slice(0, 10)}.xlsx`);
  }, [workerKPIs, period]);

  const bonusColors = { A: GN, B: AM, C: '#888', D: RD };

  return h('div', null,
    h('div', { style: { display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap', alignItems: 'center' } },
      h('span', { style: { fontSize: 12, fontWeight: 500 } }, 'Период:'),
      [7, 14, 30, 60, 90].map(d => h('button', { key: d, style: period === d ? abtn({ fontSize: 11 }) : gbtn({ fontSize: 11 }), onClick: () => setPeriod(d) }, `${d} дней`)),
      h('button', { style: gbtn({ marginLeft: 'auto' }), onClick: exportKPI }, '📥 Экспорт KPI в Excel')
    ),
    // Легенда грейдов
    h('div', { style: { ...S.card, marginBottom: 12, padding: 10, display: 'flex', gap: 16, flexWrap: 'wrap', fontSize: 11 } },
      h('span', { style: { fontWeight: 500 } }, 'Грейды:'),
      h('span', { style: { color: GN } }, 'A (85+) = +30% премия'),
      h('span', { style: { color: AM } }, 'B (70-84) = +15%'),
      h('span', { style: { color: '#888' } }, 'C (50-69) = 0%'),
      h('span', { style: { color: RD } }, 'D (<50) = −10%')
    ),
    workerKPIs.length === 0 ? h('div', { style: { ...S.card, textAlign: 'center', color: '#888' } }, 'Нет данных за период') :
      h('div', { style: { ...S.card, padding: 0 } }, h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
        h('thead', null, h('tr', null, ['Сотрудник', 'Ур.', 'Операций', 'Качество', 'Произв.', 'Универс.', 'Простои', 'KPI', 'Грейд'].map((t, i) => h('th', { key: i, style: S.th }, t)))),
        h('tbody', null, workerKPIs.map((w, i) => h('tr', { key: w.id, style: { background: i === 0 ? '#FFFDE7' : 'transparent' } },
          h('td', { style: { ...S.td, fontWeight: 500 } }, w.name, i === 0 && h('span', { style: { marginLeft: 4 } }, '🏆')),
          h('td', { style: { ...S.td, textAlign: 'center' } }, h('span', { style: { padding: '2px 6px', fontSize: 10, borderRadius: 6, background: AM3, color: AM2 } }, `${w.level}`)),
          h('td', { style: { ...S.td, textAlign: 'center' } }, w.doneCount, w.defectCount > 0 && h('span', { style: { color: RD, marginLeft: 4, fontSize: 10 } }, `−${w.defectCount}`)),
          h('td', { style: { ...S.td, textAlign: 'center', color: w.quality >= 95 ? GN : w.quality >= 80 ? AM : RD, fontWeight: 500 } }, `${w.quality}%`),
          h('td', { style: { ...S.td, textAlign: 'center', color: w.productivity ? (w.productivity >= 100 ? GN : w.productivity >= 80 ? AM : RD) : '#888' } }, w.productivity ? `${w.productivity}%` : '—'),
          h('td', { style: { ...S.td, textAlign: 'center' } }, w.uniqueOps),
          h('td', { style: { ...S.td, textAlign: 'center', color: w.downtimeHrs > 0 ? RD : GN } }, w.downtimeHrs > 0 ? `${w.downtimeHrs}ч` : '✓'),
          h('td', { style: { ...S.td, textAlign: 'center', fontSize: 16, fontWeight: 500, color: bonusColors[w.bonusLevel] || '#888' } }, w.kpiScore),
          h('td', { style: { ...S.td, textAlign: 'center' } },
            h('span', { style: { display: 'inline-block', width: 28, height: 28, lineHeight: '28px', textAlign: 'center', borderRadius: '50%', fontWeight: 700, fontSize: 13, color: '#fff', background: bonusColors[w.bonusLevel] || '#888' } }, w.bonusLevel),
            h('div', { style: { fontSize: 9, color: bonusColors[w.bonusLevel], marginTop: 2 } }, `${w.bonusPct > 0 ? '+' : ''}${w.bonusPct}%`)
          )
        )))
      )))
  );
});

  const D8_LABELS = ['D1 Команда', 'D2 Проблема', 'D3 Сдерживание', 'D4 Коренная причина', 'D5 Действия', 'D6 Проверка', 'D7 Предупреждение', 'D8 Закрытие'];

  const addReclamation = useCallback(async () => {
    if (!form.orderId || !form.description.trim()) { addToast('Укажите заказ и описание', 'error'); return; }
    // Автоматически формируем команду: мастер + исполнители связанной операции
    const relatedOps = data.ops.filter(op => op.orderId === form.orderId && op.name === form.operationName && !op.archived);
    const teamWorkers = relatedOps.flatMap(op => op.workerIds || []);
    const autoTeam = ['master', ...new Set(teamWorkers)];

    let d = { ...data, reclamations: [...(data.reclamations || []), rec] };
