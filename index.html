<div id="root"></div>
<script>
const { useState, useEffect, useRef, useMemo, useCallback, memo, createElement: h } = React;

// ==================== Константы ====================
const AM = '#EF9F27', AM2 = '#412402', AM3 = '#FAEEDA', AM4 = '#BA7517';
const GN = '#1D9E75', GN2 = '#04342C', GN3 = '#E1F5EE';
const RD = '#E24B4A', RD2 = '#501313', RD3 = '#FCEBEB';
const BL = '#378ADD';

const PRIORITY = {
  low: { label: 'Низкий', color: '#888' },
  medium: { label: 'Средний', color: BL },
  high: { label: 'Высокий', color: AM },
  critical: { label: 'Критический', color: RD }
};

const STATUS = {
  pending: { label: 'Ожидает', bg: '#f0ede8', cl: '#666', br: '#ccc' },
  in_progress: { label: 'В работе', bg: '#FAEEDA', cl: AM2, br: AM4 },
  on_check: { label: 'На контроле', bg: '#E1F5FE', cl: '#0277BD', br: '#4FC3F7' },
  done: { label: 'Выполнено', bg: GN3, cl: GN2, br: GN },
  defect: { label: 'Брак', bg: RD3, cl: RD2, br: RD },
  rework: { label: 'Переделка', bg: '#FAEEDA', cl: AM2, br: AM4 },
};

const OPERATION_STAGES = [
  'Снабжение комплектующими','Раскрой','Сварка крышек','Заполнение крышек',
  'Вальцовка обечайки','Раскрой жаровых труб','Сборка/сварки топки',
  'Сборка/сварка котла','Установка/сварка жаровых труб','Опресовка',
  'Предварительный окрас','Установка кожуха','Установка крышек','Финишный окрас'
];

const WORKER_STATUS = {
  working: { label: 'На смене', bg: GN3, cl: GN2, br: GN },
  absent: { label: 'Отсутствует', bg: '#f0ede8', cl: '#666', br: '#ccc' },
  sick: { label: 'Больничный', bg: RD3, cl: RD2, br: RD },
  vacation: { label: 'Отпуск', bg: '#E6F1FB', cl: '#042C53', br: BL }
};

// ==================== Достижения ====================
const ACHIEVEMENTS = {
  first_op: { icon: '⭐', title: 'Первая операция', desc: 'Выполнена первая операция', condition: (s) => s.doneCount >= 1 },
  ops_10: { icon: '🔧', title: 'Десятка', desc: 'Выполнено 10 операций', condition: (s) => s.doneCount >= 10 },
  ops_50: { icon: '⚙️', title: 'Профессионал', desc: 'Выполнено 50 операций', condition: (s) => s.doneCount >= 50 },
  ops_100: { icon: '🏆', title: 'Стахановец', desc: 'Выполнено 100 операций', condition: (s) => s.doneCount >= 100 },
  ops_500: { icon: '👑', title: 'Ветеран', desc: 'Выполнено 500 операций', condition: (s) => s.doneCount >= 500 },
  quality_star: { icon: '💎', title: 'Безупречное качество', desc: 'Более 50 операций, брак менее 1%', condition: (s) => s.doneCount >= 50 && s.defectRate < 1 },
  weld_master: { icon: '🔥', title: 'Мастер сварки', desc: '50 сварочных операций', condition: (s) => s.weldCount >= 50 },
  speed_demon: { icon: '⚡', title: 'Скоростной монтаж', desc: 'Среднее время на 20% быстрее плана (мин. 10 операций)', condition: (s) => s.doneWithPlan >= 10 && s.avgRatio < 0.8 },
  no_downtime: { icon: '🛡️', title: 'Нет простоям', desc: '0 простоев за последние 30 дней', condition: (s) => s.downtimes30d === 0 && s.doneCount >= 5 },
  streak_5: { icon: '🎯', title: 'Серия 5', desc: '5 операций подряд без брака', condition: (s) => s.currentStreak >= 5 },
  streak_20: { icon: '🎪', title: 'Серия 20', desc: '20 операций подряд без брака', condition: (s) => s.currentStreak >= 20 },
  multi_skill: { icon: '🌟', title: 'Универсал', desc: 'Выполнял 5+ разных типов операций', condition: (s) => s.uniqueOpTypes >= 5 },
  detective_10: { icon: '🔍', title: 'Бдительный', desc: 'Обнаружил 10 браков на предыдущих этапах', condition: (s) => s.detectedDefects >= 10 },
  thanks_5: { icon: '🤝', title: 'Спасибо, коллега!', desc: 'Получил 5 благодарностей', condition: (s) => s.thanksReceived >= 5 },
  golden_hands_100: { icon: '🪙', title: 'Золотые руки', desc: '100 операций без брака', condition: (s) => s.doneCount >= 100 && s.defectCount === 0 },
  universal_2_3: { icon: '🔄', title: 'Универсал 2.0', desc: 'Работал на 3+ разных участках', condition: (s) => s.uniqueSections >= 3 },
  weekend_5: { icon: '🌙', title: 'Трудоголик', desc: '5 операций в выходные дни', condition: (s) => s.weekendOps >= 5 },
  virtuoso_10: { icon: '🎻', title: 'Виртуоз', desc: '10 операций быстрее 50% плана', condition: (s) => s.fastOps >= 10 },
  no_downtime_7: { icon: '🛡️', title: 'Антипростой', desc: '7 дней без простоев', condition: (s) => s.downtimes7d === 0 },
  speed_streak_5: { icon: '🚀', title: 'Скоростной рывок', desc: '5 операций подряд быстрее плана на 20%', condition: (s) => s.bestSpeedStreak >= 5 }
};

const getWorkerLevel = (doneCount) => Math.floor(doneCount / 10) + 1;
const getLevelProgress = (doneCount) => (doneCount % 10) / 10;
const getLevelTitle = (level) => {
  if (level >= 50) return 'Легенда';
  if (level >= 30) return 'Мастер';
  if (level >= 20) return 'Эксперт';
  if (level >= 10) return 'Профессионал';
  if (level >= 5) return 'Опытный';
  if (level >= 3) return 'Работник';
  return 'Новичок';
};

const calcWorkerStats = (workerId, data, nowTime) => {
  const t = nowTime || Date.now();
  const allOps = data.ops.filter(op => op.workerIds?.includes(workerId));
  const doneOps = allOps.filter(op => op.status === 'done');
  const defectOps = allOps.filter(op => op.status === 'defect');
  const doneCount = doneOps.length;
  const defectCount = defectOps.length;
  const total = doneCount + defectCount;
  const defectRate = total > 0 ? (defectCount / total * 100) : 0;
  const weldCount = doneOps.filter(op => op.name && op.name.toLowerCase().includes('свар')).length;
  const withPlan = doneOps.filter(op => op.plannedHours && op.startedAt && op.finishedAt);
  const doneWithPlan = withPlan.length;
  const avgRatio = doneWithPlan > 0 ? withPlan.reduce((s, op) => s + ((op.finishedAt - op.startedAt) / (op.plannedHours * 3600000)), 0) / doneWithPlan : 1;
  const d30 = t - 30 * 86400000;
  const d7 = t - 7 * 86400000;
  const downtimes30d = data.events.filter(e => e.workerId === workerId && e.type === 'downtime' && e.ts >= d30).length;
  const downtimes7d = data.events.filter(e => e.workerId === workerId && e.type === 'downtime' && e.ts >= d7).length;
  const sorted = [...doneOps, ...defectOps].sort((a, b) => (b.finishedAt || 0) - (a.finishedAt || 0));
  let currentStreak = 0;
  for (const op of sorted) { if (op.status === 'done') currentStreak++; else break; }
  const uniqueOpTypes = new Set(doneOps.map(op => op.name)).size;
  const detectedDefects = allOps.filter(op => op.defectSource === 'previous_stage').length;
  const thanksReceived = data.events.filter(e => e.type === 'thanks' && e.toWorkerId === workerId).length;
  const uniqueSections = new Set(doneOps.map(op => op.sectionId).filter(id => id)).size;
  const weekendOps = doneOps.filter(op => { if (!op.finishedAt) return false; const d = new Date(op.finishedAt); const day = d.getDay(); return day === 0 || day === 6; }).length;
  const fastOps = withPlan.filter(op => { const actual = op.finishedAt - op.startedAt; const planned = op.plannedHours * 3600000; return actual < planned * 0.5; }).length;
  const withPlanSorted = [...withPlan].sort((a, b) => a.finishedAt - b.finishedAt);
  let bestSpeedStreak = 0, currentSpeedStreak = 0;
  for (const op of withPlanSorted) {
    const actual = op.finishedAt - op.startedAt;
    const planned = op.plannedHours * 3600000;
    if (actual < planned * 0.8) { currentSpeedStreak++; if (currentSpeedStreak > bestSpeedStreak) bestSpeedStreak = currentSpeedStreak; }
    else currentSpeedStreak = 0;
  }
  return { doneCount, defectCount, defectRate, weldCount, doneWithPlan, avgRatio, downtimes30d, downtimes7d, currentStreak, uniqueOpTypes, detectedDefects, thanksReceived, uniqueSections, weekendOps, fastOps, bestSpeedStreak };
};

const checkAchievements = (workerId, data) => {
  const worker = data.workers.find(w => w.id === workerId);
  if (!worker) return data;
  const nowTime = Date.now();
  const stats = calcWorkerStats(workerId, data, nowTime);
  const current = worker.achievements || [];
  const newAch = [...current];
  let changed = false;
  for (const [id, ach] of Object.entries(ACHIEVEMENTS)) {
    if (!newAch.includes(id) && ach.condition(stats)) { newAch.push(id); changed = true; }
  }
  if (changed) return { ...data, workers: data.workers.map(w => w.id === workerId ? { ...w, achievements: newAch } : w) };
  return data;
};

// ==================== Автоподбор исполнителя ====================
// ==================== Автоподбор исполнителя (с учётом уровня, опыта, качества, загрузки) ====================
const scoreWorkerForOp = (worker, opName, data) => {
  const wid = worker.id;
  const allOps = data.ops.filter(op => op.workerIds?.includes(wid));
  const doneThisType = allOps.filter(op => op.name === opName && op.status === 'done');
  const defectThisType = allOps.filter(op => op.name === opName && op.status === 'defect');
  const activeCount = data.ops.filter(op => (op.status === 'in_progress' || op.status === 'pending') && op.workerIds?.includes(wid)).length;
  const allDone = allOps.filter(op => op.status === 'done').length;
  const level = getWorkerLevel(allDone);

  // Опыт по этому типу операции (0-30 баллов)
  const expScore = Math.min(doneThisType.length * 2, 30);
  // Качество по этому типу (0-25 баллов)
  const total = doneThisType.length + defectThisType.length;
  const qualityScore = total > 0 ? Math.round((doneThisType.length / total) * 25) : 12;
  // Скорость: средний факт/план (0-20 баллов)
  const withPlan = doneThisType.filter(op => op.plannedHours && op.startedAt && op.finishedAt);
  const avgRatio = withPlan.length > 0 ? withPlan.reduce((s, op) => s + (op.finishedAt - op.startedAt) / (op.plannedHours * 3600000), 0) / withPlan.length : 1;
  const speedScore = Math.max(0, Math.round((2 - avgRatio) * 10));
  // Уровень (0-15 баллов)
  const levelScore = Math.min(level, 15);
  // Загрузка (штраф: -10 за каждую активную задачу)
  const loadPenalty = activeCount * 10;

  return { workerId: wid, workerName: worker.name, level, expScore, qualityScore, speedScore, levelScore, loadPenalty,
    totalScore: expScore + qualityScore + speedScore + levelScore - loadPenalty,
    details: { experience: doneThisType.length, defects: defectThisType.length, avgRatio: Math.round(avgRatio * 100), activeOps: activeCount }
  };
};

const autoAssignWorker = (data, opName) => {
  const candidates = data.workers.filter(w =>
    (w.status || 'working') === 'working' &&
    (!w.competences?.length || w.competences.includes(opName)) &&
    !data.ops.some(op => op.status === 'in_progress' && op.workerIds?.includes(w.id))
  );
  if (candidates.length === 0) return null;
  const scored = candidates.map(w => scoreWorkerForOp(w, opName, data)).sort((a, b) => b.totalScore - a.totalScore);
  return scored[0]?.workerId || null;
};

// Рекомендации по всем ожидающим операциям
const getAssignmentRecommendations = (data) => {
  const pendingOps = data.ops.filter(op => op.status === 'pending' && !op.archived && (!op.workerIds || op.workerIds.length === 0));
  return pendingOps.map(op => {
    const order = data.orders.find(o => o.id === op.orderId);
    const candidates = data.workers.filter(w =>
      (w.status || 'working') === 'working' &&
      (!w.competences?.length || w.competences.includes(op.name))
    );
    const scored = candidates.map(w => scoreWorkerForOp(w, op.name, data)).sort((a, b) => b.totalScore - a.totalScore);
    return { opId: op.id, opName: op.name, orderNumber: order?.number || '—', orderPriority: order?.priority || 'medium', deadline: order?.deadline, candidates: scored.slice(0, 3) };
  }).sort((a, b) => {
    const prio = { critical: 0, high: 1, medium: 2, low: 3 };
    return (prio[a.orderPriority] || 4) - (prio[b.orderPriority] || 4);
  });
};

// ==================== Утилиты ====================
const uid = () => Math.random().toString(36).slice(2, 8).toUpperCase();
const now = () => Date.now();
// Вынесена общая функция смены
const getCurrentShift = () => {
  const d = new Date();
  return `${d.toISOString().slice(0,10)}-${Math.floor(d.getHours() / 8) + 1}`;
};
const fmtDur = (ms) => {
  if (!ms || ms <= 0) return '—';
  const hh = Math.floor(ms / 3600000);
  const mm = Math.floor((ms % 3600000) / 60000);
  const ss = Math.floor((ms % 60000) / 1000);
  return hh > 0 ? `${hh}ч ${mm}м` : mm > 0 ? `${mm}м ${ss}с` : `${ss}с`;
};
const isShipmentNear = (deadline) => {
  if (!deadline) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const deadlineDate = new Date(deadline);
  const diffTime = deadlineDate - today;
  const diffDays = Math.ceil(diffTime / (1000*60*60*24));
  return diffDays <= 2 && diffDays >= 0;
};

const DB = {
  async load() {
    try {
      const snap = await DOC_REF.get();
      if (snap.exists) {
        let parsed = typeof snap.data().payload === 'string' ? JSON.parse(snap.data().payload) : snap.data();
        if (parsed.ops) parsed.ops = parsed.ops.map(op => {
          if (op.workerId !== undefined && !op.workerIds) { op.workerIds = op.workerId ? [op.workerId] : []; delete op.workerId; }
          return op;
        });
        localStorage.setItem('prod_app_v14_cache', JSON.stringify(parsed));
        return { ...EMPTY_DATA, ...parsed };
      }
    } catch(e) { console.warn(e); }
    try {
      const cached = localStorage.getItem('prod_app_v14_cache');
      if (cached) return { ...EMPTY_DATA, ...JSON.parse(cached) };
    } catch(e) {}
    return EMPTY_DATA;
  },
  async save(data) {
    try {
      const toSave = data.events.length > 2000
        ? { ...data, events: data.events.slice(-2000) }
        : data;
      // Локально — мгновенно
      localStorage.setItem('prod_app_v14_cache', JSON.stringify(toSave));
      // Firebase — debounce 1с (fire-and-forget, не блокирует UI)
      if (DB._saveTimer) clearTimeout(DB._saveTimer);
      DB._saveTimer = setTimeout(() => {
        DOC_REF.set({ payload: JSON.stringify(toSave), updatedAt: firebase.firestore.FieldValue.serverTimestamp() }).catch(e => console.error('Firebase save error:', e));
      }, 1000);
    } catch(e) { console.error(e); }
  },
  _saveTimer: null,
  onSnapshot(callback) {
    return DOC_REF.onSnapshot(snap => {
      if (snap.exists) {
        let parsed = typeof snap.data().payload === 'string' ? JSON.parse(snap.data().payload) : snap.data();
        if (parsed.ops) parsed.ops = parsed.ops.map(op => {
          if (op.workerId !== undefined && !op.workerIds) { op.workerIds = op.workerId ? [op.workerId] : []; delete op.workerId; }
          return op;
        });
        callback({ ...EMPTY_DATA, ...parsed });
      }
    });
  }
};

// ==================== Себестоимость заказа ====================
const calcOrderCost = (order, data, hourlyRate = 500) => {
  const ops = data.ops.filter(op => op.orderId === order.id);
  const doneOps = ops.filter(op => op.status === 'done' && op.startedAt && op.finishedAt);
  const laborHours = doneOps.reduce((s, op) => s + (op.finishedAt - op.startedAt) / 3600000, 0);
  const laborCost = laborHours * hourlyRate;
  const materialCost = (data.materialConsumptions || [])
    .filter(mc => ops.some(op => op.id === mc.opId))
    .reduce((s, mc) => {
      const mat = data.materials.find(m => m.id === mc.materialId);
      return s + (mc.qty * (mat?.unitCost || 0));
    }, 0);
  return { laborHours: Math.round(laborHours * 10) / 10, laborCost: Math.round(laborCost), materialCost: Math.round(materialCost), totalCost: Math.round(laborCost + materialCost), opsTotal: ops.length, opsDone: doneOps.length };
};

// ==================== Прогноз загрузки на неделю ====================
const LoadForecastWidget = memo(({ data }) => {
  const forecast = useMemo(() => {
    const days = [];
    const today = new Date(); today.setHours(0, 0, 0, 0);
    for (let i = 0; i < 7; i++) {
      const day = new Date(today); day.setDate(day.getDate() + i);
      const dayEnd = new Date(day); dayEnd.setHours(23, 59, 59, 999);
      const dayStart = day.getTime(); const dayEndMs = dayEnd.getTime();
      // Операции запланированные на этот день
      const planned = data.ops.filter(op => op.plannedStartDate && op.plannedStartDate >= dayStart && op.plannedStartDate <= dayEndMs && !op.archived && op.status === 'pending');
      // Часы по типам операций
      const hoursByType = {};
      planned.forEach(op => {
        const type = op.name || 'Прочее';
        hoursByType[type] = (hoursByType[type] || 0) + (op.plannedHours || 2);
      });
      // Доступные рабочие
      const available = data.workers.filter(w => (w.status || 'working') === 'working');
      // Потенциальные проблемы
      const warnings = [];
      Object.entries(hoursByType).forEach(([type, hours]) => {
        const competent = available.filter(w => !w.competences?.length || w.competences.includes(type));
        const capacity = competent.length * 8; // 8 часов на рабочего
        if (hours > capacity) warnings.push({ type, hours, capacity, deficit: Math.round(hours - capacity) });
      });
      days.push({
        date: day, label: i === 0 ? 'Сегодня' : i === 1 ? 'Завтра' : day.toLocaleDateString('ru', { weekday: 'short', day: 'numeric' }),
        plannedCount: planned.length, totalHours: Math.round(planned.reduce((s, op) => s + (op.plannedHours || 2), 0)),
        warnings, isWeekend: day.getDay() === 0 || day.getDay() === 6
      });
    }
    return days;
  }, [data.ops, data.workers]);

  const hasWarnings = forecast.some(d => d.warnings.length > 0);
  return h('div', { style: { ...S.card, marginBottom: 12 } },
    h('div', { style: S.sec }, 'Прогноз загрузки на неделю'),
    h('div', { className: 'forecast-grid', style: { display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 6 } },
      forecast.map((d, i) => h('div', { key: i, style: { textAlign: 'center', padding: 8, borderRadius: 8, background: d.warnings.length > 0 ? RD3 : d.isWeekend ? '#f0ede8' : '#f8f8f5', border: d.warnings.length > 0 ? `0.5px solid ${RD}` : '0.5px solid rgba(0,0,0,0.06)' } },
        h('div', { style: { fontSize: 11, fontWeight: 500, color: d.warnings.length > 0 ? RD : '#666', marginBottom: 4 } }, d.label),
        h('div', { style: { fontSize: 18, fontWeight: 500, color: d.plannedCount > 0 ? AM2 : '#ccc' } }, d.plannedCount),
        h('div', { style: { fontSize: 9, color: '#888' } }, `${d.totalHours}ч`),
        d.warnings.length > 0 && h('div', { style: { fontSize: 9, color: RD, marginTop: 4 } }, `⚠ -${d.warnings.reduce((s, w) => s + w.deficit, 0)}ч`)
      ))
    ),
    hasWarnings && h('div', { style: { marginTop: 10, padding: '8px 10px', background: RD3, borderRadius: 8, fontSize: 11 } },
      h('div', { style: { fontWeight: 500, color: RD, marginBottom: 4 } }, '⚠ Обнаружен дефицит ресурсов:'),
      forecast.filter(d => d.warnings.length > 0).map((d, i) => h('div', { key: i, style: { color: RD2 } },
        `${d.label}: `, d.warnings.map(w => `${w.type} (нужно ${w.hours}ч, доступно ${w.capacity}ч)`).join(', ')
      ))
    )
  );
});

// ==================== Единый PIN-вход ====================
// Логика: все роли входят по PIN.
// Мастер-ключ (masterKey) сбрасывает PIN любого сотрудника прямо с экрана входа.
// Приоритет проверки PIN: мастер → контролёр → сотрудники → мастер-ключ (только для сброса)
const LoginScreen = ({ data, onLogin, onResetPin }) => {
  const [role, setRole] = useState('worker');
  const [pin, setPin] = useState('');
  const [loginError, setLoginError] = useState('');
  // Состояние для режима сброса PIN мастер-ключом
  const [resetMode, setResetMode] = useState(false);
  const [resetKey, setResetKey] = useState('');
  const [resetTarget, setResetTarget] = useState(''); // id сотрудника
  const [resetNewPin, setResetNewPin] = useState('');
  const [resetError, setResetError] = useState('');
  const [resetSuccess, setResetSuccess] = useState('');

  const settings = data.settings || EMPTY_DATA.settings;

  // Карта PIN → роль и данные пользователя
  const resolvePin = (inputPin) => {
    const p = inputPin.trim();
    if (!p) return null;
    // Мастер
    if (p === (settings.masterPin || '0000')) return { role: 'master', workerId: null, sectionId: null, name: 'Мастер' };
    // Контролёр
    if (p === (settings.controllerPin || '1111')) return { role: 'controller', workerId: null, sectionId: null, name: 'Контролёр' };
    // Дашборд — без PIN, отдельная кнопка
    // Сотрудник
    const worker = data.workers.find(w => w.pin === p);
    if (worker) return { role: 'worker', workerId: worker.id, sectionId: worker.sectionId || null, name: worker.name };
    return null;
  };

  const handleLogin = () => {
    setLoginError('');
    if (role === 'dashboard') { onLogin('dashboard', null, null); return; }
    if (!pin.trim()) { setLoginError('Введите PIN-код'); return; }
    const resolved = resolvePin(pin);
    if (!resolved) { setLoginError('Неверный PIN-код'); return; }
    // Если выбрали роль «Чат» — входим с правами сотрудника, но открываем чат
    if (role === 'chat') {
      if (resolved.role === 'worker') { onLogin('chat', resolved.workerId, resolved.sectionId); return; }
      // Мастер и контролёр тоже могут зайти в чат
      onLogin('chat_' + resolved.role, null, null);
      return;
    }
    // Обычный вход — роль определяется PIN-ом, кнопка выбора роли — подсказка, не ограничение
    onLogin(resolved.role, resolved.workerId, resolved.sectionId);
  };

  const handleMasterKeyReset = () => {
    setResetError(''); setResetSuccess('');
    if (resetKey.trim() !== (settings.masterKey || '9999')) { setResetError('Неверный мастер-ключ'); return; }
    if (!resetTarget) { setResetError('Выберите сотрудника'); return; }
    if (!resetNewPin.trim() || resetNewPin.trim().length < 4) { setResetError('Новый PIN — минимум 4 цифры'); return; }
    // Проверяем что новый PIN не занят
    const conflict = data.workers.find(w => w.pin === resetNewPin.trim() && w.id !== resetTarget);
    if (conflict) { setResetError(`PIN уже занят (${conflict.name})`); return; }
    onResetPin(resetTarget, resetNewPin.trim());
    setResetSuccess(`PIN успешно сброшен`);
    setResetKey(''); setResetNewPin(''); setResetTarget('');
    setTimeout(() => { setResetMode(false); setResetSuccess(''); }, 2000);
  };

  const roleHints = {
    worker: 'PIN сотрудника',
    master: 'PIN мастера',
    controller: 'PIN контролёра',
    chat: 'Любой PIN для чата',
    dashboard: '',
  };

  if (resetMode) return h('div', { style: { minHeight: 480, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 24, gap: 12, maxWidth: 360, margin: '0 auto' } },
    h('div', { style: { textAlign: 'center', marginBottom: 8 } },
      h('div', { style: { fontSize: 22, fontWeight: 500 } }, '🔑 Сброс PIN'),
      h('div', { style: { fontSize: 12, color: '#888', marginTop: 4 } }, 'Введите мастер-ключ для сброса любого PIN')
    ),
    h('div', { style: { width: '100%', display: 'flex', flexDirection: 'column', gap: 10 } },
      h('div', null,
        h('label', { style: S.lbl }, 'Мастер-ключ'),
        h('input', { type: 'password', inputMode: 'numeric', style: { ...S.inp, width: '100%', textAlign: 'center', fontSize: 20, letterSpacing: '0.3em' }, placeholder: '• • • •', value: resetKey, maxLength: 8, onChange: e => setResetKey(e.target.value) })
      ),
      h('div', null,
        h('label', { style: S.lbl }, 'Сотрудник'),
        h('select', { style: { ...S.inp, width: '100%' }, value: resetTarget, onChange: e => setResetTarget(e.target.value) },
          h('option', { value: '' }, '— выберите сотрудника —'),
          data.workers.map(w => h('option', { key: w.id, value: w.id }, w.name))
        )
      ),
      h('div', null,
        h('label', { style: S.lbl }, 'Новый PIN (минимум 4 цифры)'),
        h('input', { type: 'password', inputMode: 'numeric', style: { ...S.inp, width: '100%', textAlign: 'center', fontSize: 20, letterSpacing: '0.3em' }, placeholder: '• • • •', value: resetNewPin, maxLength: 8, onChange: e => setResetNewPin(e.target.value), onKeyDown: e => e.key === 'Enter' && handleMasterKeyReset() })
      )
    ),
    resetError && h('div', { role: 'alert', style: { color: RD, fontSize: 12, fontWeight: 500, textAlign: 'center' } }, resetError),
    resetSuccess && h('div', { role: 'status', style: { color: GN, fontSize: 12, fontWeight: 500, textAlign: 'center' } }, resetSuccess),
    h('div', { style: { display: 'flex', gap: 8, marginTop: 8 } },
      h('button', { style: gbtn({ flex: 1 }), onClick: () => { setResetMode(false); setResetKey(''); setResetNewPin(''); setResetTarget(''); setResetError(''); } }, '← Назад'),
      h('button', { style: abtn({ flex: 1 }), onClick: handleMasterKeyReset }, 'Сбросить PIN')
    )
  );

  return h('div', { style: { minHeight: 480, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 24, gap: 12 } },
    h('div', { style: { textAlign: 'center', marginBottom: 16 } },
      h('div', { style: { fontSize: 32, fontWeight: 700, color: AM, lineHeight: 1.2 } }, settings.welcomeTitle || 'teploros'),
      h('div', { style: { fontSize: 14, color: '#888', letterSpacing: '0.15em', textTransform: 'uppercase' } }, settings.welcomeSubtitle || 'надежная техника')
    ),
    h('div', { style: { textAlign: 'center', marginBottom: 20 } },
      h('div', { style: { fontSize: 10, color: AM4, textTransform: 'uppercase', letterSpacing: '0.15em' } }, settings.welcomeLabel || 'Производственный учёт · НТ'),
      h('div', { style: { fontSize: 22, fontWeight: 500 } }, 'Вход в систему')
    ),
    // Кнопки выбора роли (подсказка, какой PIN нужен)
    h('div', { style: { display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap', justifyContent: 'center' } },
      [
        ['worker', '👷 Сотрудник'],
        ['master', '🔑 Мастер'],
        ['controller', '🔍 Контролёр'],
        ['dashboard', '📊 Дашборд'],
        ['chat', '💬 Чат'],
      ].map(([r, label]) => h('button', {
        key: r,
        style: role === r ? abtn({ minWidth: 110, fontSize: 12 }) : gbtn({ minWidth: 110, fontSize: 12 }),
        onClick: () => { setRole(r); setLoginError(''); setPin(''); }
      }, label))
    ),
    // PIN-поле — для всех кроме дашборда
    role !== 'dashboard'
      ? h('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 } },
          h('input', {
            type: 'password', inputMode: 'numeric', autoFocus: true,
            style: { ...S.inp, width: 220, textAlign: 'center', fontSize: 24, letterSpacing: '0.4em', padding: '10px' },
            placeholder: '• • • •', value: pin,
            onChange: e => setPin(e.target.value),
            onKeyDown: e => e.key === 'Enter' && handleLogin(),
            maxLength: 8
          }),
          h('div', { style: { fontSize: 11, color: '#888' } }, roleHints[role] || 'Введите PIN-код')
        )
      : h('div', { style: { fontSize: 11, color: '#888', padding: '8px 0' } }, 'Открытый просмотр без PIN'),
    loginError && h('div', { role: 'alert', style: { color: RD, fontSize: 12, fontWeight: 500 } }, loginError),
    h('button', { style: abtn({ marginTop: 8, padding: '10px 40px', fontSize: 14 }), onClick: handleLogin }, 'Войти'),

    h('button', { style: { background: 'none', border: 'none', fontSize: 11, color: '#aaa', cursor: 'pointer', marginTop: 12, padding: 0, textDecoration: 'underline' }, onClick: () => setResetMode(true) }, 'Сбросить PIN мастер-ключом')
  );
};

// ==================== WorkerScreen ====================
const WorkerScreen = memo(({ data, workerId, sectionId, onUpdate, initialOpId, addToast }) => {
  const worker = useMemo(() => data.workers.find(w => w.id === workerId), [data.workers, workerId]);

  const myOps = useMemo(() => data.ops.filter(o => {
    if (o.status === 'done' || o.status === 'defect' || o.archived) return false;
    // 1. Явно назначена на этого рабочего
    if (o.workerIds?.includes(workerId)) return true;
    // 2. Не назначена ни на кого + совпадает участок + есть компетенция
    if (!o.workerIds?.length && sectionId && o.sectionId === sectionId) {
      const w = data.workers.find(w => w.id === workerId);
      if (!w?.competences?.length) return true; // нет ограничений по компетенциям
      return w.competences.includes(o.name);
    }
    return false;
  }).sort((a,b) => {
    const orderA = data.orders.find(ord => ord.id === a.orderId);
    const orderB = data.orders.find(ord => ord.id === b.orderId);
    const getCR = (op, order) => {
      if (!order?.deadline) return 999;
      const deadlineMs = new Date(order.deadline).getTime();
      const remaining = (op.plannedHours || 2) * 3600000;
      const timeLeft = deadlineMs - now();
      if (timeLeft <= 0) return -1;
      return timeLeft / remaining;
    };
    const crA = getCR(a, orderA), crB = getCR(b, orderB);
    if (crA < 1 || crB < 1) return crA - crB;
    const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
    const pA = priorityOrder[orderA?.priority] ?? 4;
    const pB = priorityOrder[orderB?.priority] ?? 4;
    return pA !== pB ? pA - pB : crA - crB;
  }), [data.ops, data.orders, workerId, sectionId]);

  const doneToday = useMemo(() => data.ops.filter(o =>
    o.workerIds?.includes(workerId) && o.status === 'done' &&
    o.finishedAt && Date.now() - o.finishedAt < 86400000 && !o.archived
  ), [data.ops, workerId]);

  const allDone = useMemo(() =>
    data.ops.filter(op => op.workerIds?.includes(workerId) && op.status === 'done').length,
  [data.ops, workerId]);

  const [activeOp, setActiveOp] = useState(null);
  const [, setTick] = useState(0);
  const [defNote, setDefNote] = useState('');
  const [defectReasonId, setDefectReasonId] = useState('');
  const [showDefForm, setShowDefForm] = useState(false);
  const [showDowntimeModal, setShowDowntimeModal] = useState(false);
  const [selectedDowntimeType, setSelectedDowntimeType] = useState('');
  const [weldParams, setWeldParams] = useState({ seamNumber: '', electrode: '', result: 'ok' });
  const [showAchievements, setShowAchievements] = useState(false);
  const [downtimeStartedAt, setDowntimeStartedAt] = useState(null);
  const [downtimeEquipmentId, setDowntimeEquipmentId] = useState('');
  const [showQRScanner, setShowQRScanner] = useState(false);
  const [showMaterialModal, setShowMaterialModal] = useState(false);
  const [pendingFinishOp, setPendingFinishOp] = useState(null);

  // Таймер только когда есть активная операция
  useEffect(() => {
    if (!activeOp) return;
    const t = setInterval(() => setTick(n => n + 1), 1000);
    return () => clearInterval(t);
  }, [activeOp]);

  useEffect(() => {
    if (initialOpId && workerId) {
      const op = data.ops.find(o => o.id === initialOpId);
      if (op && op.status === 'pending' && !op.workerIds?.length && !op.archived) {
        if (worker?.competences && worker.competences.length > 0 && !worker.competences.includes(op.name)) {
          addToast('У вас нет компетенции для этой операции', 'error');
          return;
        }
        const updatedOps = data.ops.map(o => o.id === op.id ? { ...o, workerIds: [...(o.workerIds || []), workerId] } : o);
        const newData = { ...data, ops: updatedOps };
        DB.save(newData).then(() => onUpdate(newData));
      }
    }
  }, [initialOpId]);

  const doStart = useCallback(async (op) => {
    if (worker?.competences && worker.competences.length > 0 && !worker.competences.includes(op.name)) {
      addToast('У вас нет компетенции для этой операции', 'error');
      return;
    }
    const startedAt = now();
    const updatedOps = data.ops.map(o => o.id === op.id ? { ...o, status: 'in_progress', startedAt, workerIds: o.workerIds?.includes(workerId) ? o.workerIds : [...(o.workerIds || []), workerId] } : o);
    const shift = getCurrentShift();
    const updated = { ...data, ops: updatedOps, events: [...data.events, { id: uid(), type: 'start', opId: op.id, workerId, ts: startedAt, shift }] };
    await DB.save(updated); onUpdate(updated);
    setActiveOp({ ...op, status: 'in_progress', startedAt, workerIds: [...(op.workerIds || []), workerId] });

    let status = isDefect ? 'defect' : isRework ? 'rework' : 'done';
    let updatedOp = { ...op, status, finishedAt, defectNote: defNote || undefined };
    if (isDefect) { updatedOp.defectSource = 'previous_stage'; updatedOp.defectReasonId = defectReasonId; }
    if (isRework) updatedOp.defectSource = 'previous_stage';
    if (op.requiresQC && status === 'done') { status = 'on_check'; updatedOp.status = 'on_check'; }
    if (op.name.includes('свар') && weldParams.seamNumber && weldParams.electrode) {
      updatedOp.weldParams = { seamNumber: weldParams.seamNumber, electrode: weldParams.electrode, result: weldParams.result };
      if (weldParams.result === 'fail') { status = 'defect'; updatedOp.status = 'defect'; updatedOp.defectNote = 'Сварка забракована'; }
    }
    const shift = getCurrentShift();
    const updated = {
      ...data,
      ops: data.ops.map(o => o.id === op.id ? updatedOp : o),
      events: [...data.events, { id: uid(), type: status, opId: op.id, workerId, ts: finishedAt, note: defNote || undefined, shift, defectSource: (isDefect || isRework) ? 'previous_stage' : undefined, defectReasonId: isDefect ? defectReasonId : undefined }]
    };
    // Проверяем достижения и сохраняем ОДИН раз
    const withAch = checkAchievements(workerId, updated);
    const final = withAch !== updated ? withAch : updated;
    if (withAch !== updated) {
      const oldAch = (data.workers.find(w => w.id === workerId)?.achievements || []).length;
      const newAch = (withAch.workers.find(w => w.id === workerId)?.achievements || []);
      if (newAch.length > oldAch) {
        const latest = newAch[newAch.length - 1];
        const achInfo = ACHIEVEMENTS[latest];
        if (achInfo) { vibrateOnAchievement(); addToast(`${achInfo.icon} Достижение: ${achInfo.title}!`, 'success'); }
      }
    }
    await DB.save(final); onUpdate(final);
    setActiveOp(null); setShowDefForm(false); setDefNote(''); setDefectReasonId('');

// ==================== MasterTimeTracking ====================
const MasterTimeTracking = memo(({ data, onUpdate, addToast }) => {
  const recordEvent = useCallback((workerId, type) => {
    const shift = getCurrentShift();
    const newEvent = { id: uid(), type, workerId, ts: now(), source: 'master', shift };
    const updated = { ...data, events: [...data.events, newEvent] };
    DB.save(updated).then(() => {
      onUpdate(updated);
      addToast(`Событие ${type === 'checkin_manual' ? 'прихода' : 'ухода'} зафиксировано`, 'success');
    });
  }, [data, onUpdate, addToast]);

  const workersWithStatus = useMemo(() => {
    const today = new Date();
    const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
    const todayEnd = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 23, 59, 59, 999).getTime();
    return data.workers.map(w => {
      const todayEvents = data.events.filter(e => e.workerId === w.id && e.ts >= todayStart && e.ts <= todayEnd && (e.type === 'checkin_manual' || e.type === 'checkout_manual'));
      const lastEvent = todayEvents.sort((a,b) => b.ts - a.ts)[0];
      const lastEventType = lastEvent?.type === 'checkin_manual' ? 'Пришёл' : (lastEvent?.type === 'checkout_manual' ? 'Ушёл' : 'Нет');
      const lastEventTime = lastEvent ? new Date(lastEvent.ts).toLocaleTimeString() : '';
      return { ...w, lastEventType, lastEventTime, eventsCount: todayEvents.length };
    }).sort((a,b) => a.name.localeCompare(b.name));
  }, [data.workers, data.events]);

  return h('div', null,
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Учёт рабочего времени (сегодня)'),
      workersWithStatus.length === 0
        ? h('div', { style: { textAlign: 'center', padding: 32 } }, 'Нет сотрудников')
        : h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
            h('thead', null, h('tr', null, ['Сотрудник','Последнее событие','Время','Всего событий','Действия'].map((t,i) => h('th', { key: i, style: S.th, scope: 'col' }, t)))),
            h('tbody', null, workersWithStatus.map(w =>
              h('tr', { key: w.id },
                h('td', { style: S.td }, w.name),
                h('td', { style: S.td }, w.lastEventType),
                h('td', { style: S.td }, w.lastEventTime),
                h('td', { style: { ...S.td, textAlign: 'center' } }, w.eventsCount),
                h('td', { style: S.td }, h('div', { style: { display: 'flex', gap: 4 } },
                  h('button', { style: abtn({ fontSize: 11, padding: '4px 8px' }), 'aria-label': `Отметить приход ${w.name}`, onClick: () => recordEvent(w.id, 'checkin_manual') }, 'Пришёл'),
                  h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px' }), 'aria-label': `Отметить уход ${w.name}`, onClick: () => recordEvent(w.id, 'checkout_manual') }, 'Ушёл')
                ))
              )
            ))
          ))
    )
  );
});

    const eq = { id: uid(), name: form.name.trim(), type: form.type.trim() || 'станок', inventoryNo: form.inventoryNo.trim(), status: form.status, totalHours: 0 };
    if (editingId) {
      const d = { ...data, equipment: data.equipment.map(e => e.id === editingId ? { ...e, name: form.name.trim(), type: form.type.trim(), inventoryNo: form.inventoryNo.trim(), status: form.status } : e) };
      await DB.save(d); onUpdate(d); setEditingId(null); addToast('Оборудование обновлено', 'success');
    } else {
      const d = { ...data, equipment: [...data.equipment, eq] };
      await DB.save(d); onUpdate(d); addToast('Оборудование добавлено', 'success');
    }
    setForm({ name: '', type: '', inventoryNo: '', status: 'active' });
  }, [data, form, editingId, onUpdate, addToast]);
  const del = useCallback(async (id) => { if (!confirm('Удалить?')) return; const d = { ...data, equipment: data.equipment.filter(e => e.id !== id) }; await DB.save(d); onUpdate(d); addToast('Удалено', 'info'); }, [data, onUpdate, addToast]);
  const edit = useCallback((eq) => { setForm({ name: eq.name, type: eq.type || '', inventoryNo: eq.inventoryNo || '', status: eq.status || 'active' }); setEditingId(eq.id); }, []);

  // Подсчёт наработки
  const eqHours = useMemo(() => {
    const hours = {};
    data.ops.filter(op => op.equipmentId && op.status === 'done' && op.startedAt && op.finishedAt).forEach(op => {
      hours[op.equipmentId] = (hours[op.equipmentId] || 0) + (op.finishedAt - op.startedAt) / 3600000;

      h('div', { style: S.sec }, editingId ? 'Редактировать' : 'Добавить оборудование'),

        h('input', { style: { ...S.inp, flex: 2, minWidth: 150 }, placeholder: 'Наименование', value: form.name, onChange: e => setForm(p => ({ ...p, name: e.target.value })) }),
        h('input', { style: { ...S.inp, flex: 1, minWidth: 80 }, placeholder: 'Тип', value: form.type, onChange: e => setForm(p => ({ ...p, type: e.target.value })) }),
        h('input', { style: { ...S.inp, flex: 1, minWidth: 100 }, placeholder: 'Инв. №', value: form.inventoryNo, onChange: e => setForm(p => ({ ...p, inventoryNo: e.target.value })) }),
        h('select', { style: { ...S.inp, minWidth: 110 }, value: form.status, onChange: e => setForm(p => ({ ...p, status: e.target.value })) },
          Object.entries(EQ_STATUS).map(([k, v]) => h('option', { key: k, value: k }, v.label))
        ),
        h('button', { style: abtn(), onClick: add }, editingId ? '✓' : '+'),
        editingId && h('button', { style: gbtn(), onClick: () => { setEditingId(null); setForm({ name: '', type: '', inventoryNo: '', status: 'active' }); } }, '✕')
      )
    ),
    data.equipment.length === 0
      ? h('div', { style: { ...S.card, textAlign: 'center' } }, 'Нет оборудования')
      : h('div', { style: { ...S.card, padding: 0 } }, h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', null, h('tr', null, ['Наименование', 'Тип', 'Инв. №', 'Статус', 'Наработка', ''].map((t, i) => h('th', { key: i, style: S.th }, t)))),
          h('tbody', null, data.equipment.map(eq => {
            const st = EQ_STATUS[eq.status] || EQ_STATUS.active;
            const hrs = eqHours[eq.id] || 0;
            return h('tr', { key: eq.id },
              h('td', { style: S.td }, eq.name),
              h('td', { style: S.td }, eq.type),
              h('td', { style: { ...S.td, fontFamily: 'monospace' } }, eq.inventoryNo || '—'),
              h('td', { style: S.td }, h('span', { style: { padding: '2px 8px', fontSize: 10, borderRadius: 6, background: st.bg, color: st.cl } }, st.label)),
              h('td', { style: { ...S.td, fontFamily: 'monospace' } }, `${hrs.toFixed(1)} ч`),
              h('td', { style: S.td }, h('div', { style: { display: 'flex', gap: 4 } },
                h('button', { style: gbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => edit(eq) }, '✎'),
                h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => del(eq.id) }, '✕')

          }))

// ==================== MasterMaterials ====================
const MasterMaterials = memo(({ data, onUpdate, addToast }) => {
  const [form, setForm] = useState({ name: '', unit: '', quantity: '', batch: '', unitCost: '', minStock: '' });
  const [editingId, setEditingId] = useState(null);
  const [fieldErrors, setFieldErrors] = useState({});
  const [search, setSearch] = useState('');

  const validate = () => {
    const errors = {};
    if (!form.name.trim()) errors.name = 'Введите название';
    if (!form.unit.trim()) errors.unit = 'Ед. изм.';
    const qty = Number(form.quantity);
    if (form.quantity === '' || isNaN(qty) || qty < 0) errors.quantity = 'Кол-во ≥ 0';
    setFieldErrors(errors);
    return Object.keys(errors).length === 0;
  };
  const resetForm = () => { setForm({ name: '', unit: '', quantity: '', batch: '', unitCost: '', minStock: '' }); setFieldErrors({}); setEditingId(null); };
  const addOrUpdate = useCallback(async () => {
    if (!validate()) return;
    const mat = { name: form.name.trim(), unit: form.unit.trim(), quantity: Number(form.quantity), batch: form.batch.trim(), unitCost: form.unitCost ? Number(form.unitCost) : 0, minStock: form.minStock ? Number(form.minStock) : 0 };
    if (editingId) {
      const d = { ...data, materials: data.materials.map(m => m.id === editingId ? { ...m, ...mat } : m) };
      await DB.save(d); onUpdate(d); resetForm(); addToast('Материал обновлён', 'success');
    } else {
      const d = { ...data, materials: [...data.materials, { id: uid(), ...mat }] };
      await DB.save(d); onUpdate(d); resetForm(); addToast('Материал добавлен', 'success');
    }
  }, [form, editingId, data, onUpdate, addToast]);
  const del = useCallback(async (id) => { if (!confirm('Удалить материал?')) return; const d = { ...data, materials: data.materials.filter(m => m.id !== id) }; await DB.save(d); onUpdate(d); addToast('Удалён', 'info'); }, [data, onUpdate, addToast]);
  const edit = useCallback((m) => { setForm({ name: m.name, unit: m.unit, quantity: String(m.quantity), batch: m.batch || '', unitCost: m.unitCost ? String(m.unitCost) : '', minStock: m.minStock ? String(m.minStock) : '' }); setEditingId(m.id); }, []);

  // Импорт из Excel
  const importExcel = useCallback((event) => {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws);
        if (rows.length === 0) { addToast('Файл пустой', 'error'); return; }
        const imported = rows.map(r => {
          const name = r['Название'] || r['Наименование'] || r['name'] || r['Name'] || Object.values(r)[0] || '';
          const unit = r['Ед. изм.'] || r['Единица'] || r['unit'] || r['Unit'] || 'шт';
          const qty = Number(r['Количество'] || r['Кол-во'] || r['Остаток'] || r['quantity'] || r['Qty'] || 0);
          const cost = Number(r['Цена'] || r['Цена/ед.'] || r['unitCost'] || r['Price'] || 0);
          const batch = r['Партия'] || r['batch'] || r['Batch'] || '';
          const minStock = Number(r['Мин. остаток'] || r['minStock'] || 0);
          if (!name.toString().trim()) return null;
          // Обновляем существующий материал по имени, или создаём новый
          const existing = data.materials.find(m => m.name.toLowerCase() === name.toString().trim().toLowerCase());
          if (existing) return { ...existing, quantity: qty || existing.quantity, unitCost: cost || existing.unitCost, batch: batch || existing.batch, minStock: minStock || existing.minStock };
          return { id: uid(), name: name.toString().trim(), unit: unit.toString(), quantity: qty, unitCost: cost, batch: batch.toString(), minStock };
        }).filter(Boolean);
        const existingIds = imported.filter(m => data.materials.some(dm => dm.id === m.id)).map(m => m.id);
        const newMats = imported.filter(m => !existingIds.includes(m.id));
        const updatedMats = data.materials.map(m => { const upd = imported.find(im => im.id === m.id); return upd || m; });
        const d = { ...data, materials: [...updatedMats, ...newMats] };
        DB.save(d).then(() => { onUpdate(d); addToast(`Импортировано: ${imported.length} позиций`, 'success'); });
      } catch(ex) { addToast('Ошибка чтения Excel: ' + ex.message, 'error'); }
    };
    reader.readAsArrayBuffer(file);
    event.target.value = '';
  }, [data, onUpdate, addToast]);

  // Экспорт в Excel
  const exportExcel = useCallback(() => {
    const rows = data.materials.map(m => ({ 'Название': m.name, 'Ед. изм.': m.unit, 'Количество': m.quantity, 'Цена/ед.': m.unitCost || '', 'Партия': m.batch || '', 'Мин. остаток': m.minStock || '', 'Стоимость': (m.quantity * (m.unitCost || 0)) }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Материалы');
    XLSX.writeFile(wb, `materials_${new Date().toISOString().slice(0,10)}.xlsx`);
    addToast('Экспорт завершён', 'success');
  }, [data.materials, addToast]);

  const lowStock = data.materials.filter(m => m.minStock > 0 && m.quantity <= m.minStock);
  const filtered = search ? data.materials.filter(m => m.name.toLowerCase().includes(search.toLowerCase())) : data.materials;
  const totalValue = data.materials.reduce((s, m) => s + m.quantity * (m.unitCost || 0), 0);

  return h('div', null,
    // Предупреждение о критических остатках
    lowStock.length > 0 && h('div', { role: 'alert', style: { ...S.card, background: RD3, border: `0.5px solid ${RD}`, marginBottom: 12 } },
      h('div', { style: { fontSize: 10, color: RD, textTransform: 'uppercase', fontWeight: 500, marginBottom: 6 } }, `⚠ Критические остатки (${lowStock.length})`),
      lowStock.map(m => h('div', { key: m.id, style: { fontSize: 12, color: RD2 } }, `${m.name}: ${m.quantity} ${m.unit} (мин. ${m.minStock})`))
    ),
    // Сводка
    h('div', { className: 'metrics-grid', style: { display: 'grid', gap: 8, marginBottom: 12 } },
      h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 22, fontWeight: 500 } }, data.materials.length), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Позиций')),
      h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 22, fontWeight: 500, color: RD } }, lowStock.length), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Критично')),
      h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 18, fontWeight: 500, color: AM } }, `${Math.round(totalValue).toLocaleString()}₽`), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Стоимость склада'))
    ),
    // Импорт / Экспорт
    h('div', { style: { display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap' } },
      h('button', { style: abtn(), onClick: () => document.getElementById('mat-import-xlsx').click() }, '📤 Импорт Excel'),
      h('input', { type: 'file', id: 'mat-import-xlsx', style: { display: 'none' }, accept: '.xlsx,.xls,.csv', onChange: importExcel }),
      h('button', { style: gbtn(), onClick: exportExcel }, '📥 Экспорт Excel'),
      h('input', { style: { ...S.inp, flex: 1, minWidth: 150 }, placeholder: 'Поиск материала...', value: search, onChange: e => setSearch(e.target.value) })
    ),
    // Форма
    h('div', { style: S.card },
      h('div', { style: S.sec }, editingId ? 'Редактировать' : 'Добавить материал'),
      h('div', { className: 'form-row', style: { display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'flex-start' } },
        h('div', { style: { flex: 2, minWidth: 150 } }, h('input', { style: { ...S.inp }, placeholder: 'Название', value: form.name, onChange: e => setForm(p => ({ ...p, name: e.target.value })) }), fieldErrors.name && h('div', { className: 'error-message' }, fieldErrors.name)),
        h('div', { style: { flex: 1, minWidth: 60 } }, h('input', { style: { ...S.inp }, placeholder: 'Ед.', value: form.unit, onChange: e => setForm(p => ({ ...p, unit: e.target.value })) }), fieldErrors.unit && h('div', { className: 'error-message' }, fieldErrors.unit)),
        h('div', { style: { flex: 1, minWidth: 70 } }, h('input', { type: 'number', step: '0.01', style: { ...S.inp }, placeholder: 'Кол-во', value: form.quantity, onChange: e => setForm(p => ({ ...p, quantity: e.target.value })) }), fieldErrors.quantity && h('div', { className: 'error-message' }, fieldErrors.quantity)),
        h('div', { style: { flex: 1, minWidth: 70 } }, h('input', { type: 'number', style: { ...S.inp }, placeholder: 'Цена₽', value: form.unitCost, onChange: e => setForm(p => ({ ...p, unitCost: e.target.value })) })),
        h('div', { style: { flex: 1, minWidth: 70 } }, h('input', { type: 'number', style: { ...S.inp }, placeholder: 'Мин.ост.', value: form.minStock, onChange: e => setForm(p => ({ ...p, minStock: e.target.value })) })),
        h('div', { style: { flex: 1, minWidth: 80 } }, h('input', { style: { ...S.inp }, placeholder: 'Партия', value: form.batch, onChange: e => setForm(p => ({ ...p, batch: e.target.value })) })),
        h('button', { style: abtn(), onClick: addOrUpdate }, editingId ? '✓' : '+'),
        editingId && h('button', { style: gbtn(), onClick: resetForm }, '✕')
      ),

// ==================== MasterBOM ====================
const MasterBOM = memo(({ data, onUpdate, addToast }) => {
  const [form, setForm] = useState({ productName: '' });
  const [editingId, setEditingId] = useState(null);
  const [matForm, setMatForm] = useState({ bomId: '', materialId: '', qty: '' });

  const add = useCallback(async () => {
    if (!form.productName.trim()) { addToast('Введите название изделия', 'error'); return; }
    const bom = { id: uid(), productName: form.productName.trim(), materials: [] };
    const d = { ...data, bomTemplates: [...data.bomTemplates, bom] };
    await DB.save(d); onUpdate(d); setForm({ productName: '' }); addToast('Спецификация создана', 'success');
  }, [data, form, onUpdate, addToast]);

  const del = useCallback(async (id) => {
    if (!confirm('Удалить спецификацию?')) return;
    const d = { ...data, bomTemplates: data.bomTemplates.filter(b => b.id !== id) };
    await DB.save(d); onUpdate(d); addToast('Удалена', 'info');
  }, [data, onUpdate, addToast]);

  const addMaterial = useCallback(async () => {
    if (!matForm.bomId || !matForm.materialId || !matForm.qty || Number(matForm.qty) <= 0) { addToast('Заполните все поля', 'error'); return; }
    const d = { ...data, bomTemplates: data.bomTemplates.map(b => b.id === matForm.bomId ? { ...b, materials: [...(b.materials || []), { materialId: matForm.materialId, qty: Number(matForm.qty) }] } : b) };
    await DB.save(d); onUpdate(d); setMatForm(p => ({ ...p, materialId: '', qty: '' })); addToast('Материал добавлен в спецификацию', 'success');
  }, [data, matForm, onUpdate, addToast]);

  const removeMaterial = useCallback(async (bomId, idx) => {
    const d = { ...data, bomTemplates: data.bomTemplates.map(b => b.id === bomId ? { ...b, materials: b.materials.filter((_, i) => i !== idx) } : b) };
    await DB.save(d); onUpdate(d);
  }, [data, onUpdate]);

  // Импорт BOM из Excel
  const importBOM = useCallback((event) => {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws);
        if (rows.length === 0) { addToast('Файл пустой', 'error'); return; }
        // Группируем по изделию
        const grouped = {};
        rows.forEach(r => {
          const product = (r['Изделие'] || r['Продукт'] || r['Product'] || '').toString().trim();
          const matName = (r['Материал'] || r['Название'] || r['Material'] || '').toString().trim();
          const qty = Number(r['Количество'] || r['Кол-во'] || r['Qty'] || 0);
          if (!product || !matName) return;
          if (!grouped[product]) grouped[product] = [];
          // Найти materialId по имени
          const mat = data.materials.find(m => m.name.toLowerCase() === matName.toLowerCase());
          grouped[product].push({ materialId: mat?.id || null, materialName: matName, qty });
        });
        const newBoms = Object.entries(grouped).map(([productName, materials]) => {
          const existing = data.bomTemplates.find(b => b.productName.toLowerCase() === productName.toLowerCase());
          if (existing) return { ...existing, materials: materials.map(m => ({ materialId: m.materialId, qty: m.qty, _name: m.materialName })) };
          return { id: uid(), productName, materials: materials.map(m => ({ materialId: m.materialId, qty: m.qty, _name: m.materialName })) };
        });
        const existingIds = newBoms.filter(b => data.bomTemplates.some(db => db.id === b.id)).map(b => b.id);
        const updated = data.bomTemplates.map(b => { const upd = newBoms.find(nb => nb.id === b.id); return upd || b; });
        const brandNew = newBoms.filter(b => !existingIds.includes(b.id));
        const d = { ...data, bomTemplates: [...updated, ...brandNew] };
        DB.save(d).then(() => { onUpdate(d); addToast(`Импортировано: ${newBoms.length} спецификаций`, 'success'); });
      } catch(ex) { addToast('Ошибка чтения: ' + ex.message, 'error'); }
    };
    reader.readAsArrayBuffer(file); event.target.value = '';
  }, [data, onUpdate, addToast]);

  // Проверка остатков по BOM
  const checkStock = useCallback((bom, qty = 1) => {
    return (bom.materials || []).map(m => {
      const mat = data.materials.find(dm => dm.id === m.materialId);
      const need = m.qty * qty;
      const have = mat?.quantity || 0;
      return { name: mat?.name || m._name || '?', unit: mat?.unit || '', need, have, deficit: Math.max(0, need - have), ok: have >= need };
    });
  }, [data.materials]);

  return h('div', null,
    // Импорт
    h('div', { style: { display: 'flex', gap: 8, marginBottom: 12 } },
      h('button', { style: abtn(), onClick: () => document.getElementById('bom-import-xlsx').click() }, '📤 Импорт BOM из Excel'),
      h('input', { type: 'file', id: 'bom-import-xlsx', style: { display: 'none' }, accept: '.xlsx,.xls,.csv', onChange: importBOM }),
      h('div', { style: { fontSize: 10, color: '#888', alignSelf: 'center' } }, 'Excel: колонки «Изделие», «Материал», «Количество»')
    ),
    // Создать
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Создать спецификацию'),
      h('div', { style: { display: 'flex', gap: 8 } },
        h('input', { style: { ...S.inp, flex: 1 }, placeholder: 'Название изделия (Котёл КВ-100...)', value: form.productName, onChange: e => setForm(p => ({ ...p, productName: e.target.value })), onKeyDown: e => e.key === 'Enter' && add() }),
        h('button', { style: abtn(), onClick: add }, '+ Создать')
      )
    ),
    // Спецификации
    data.bomTemplates.length === 0 ? h('div', { style: { ...S.card, textAlign: 'center', color: '#888' } }, 'Нет спецификаций. Создайте или импортируйте из Excel.') :
      data.bomTemplates.map(bom => {
        const stock = checkStock(bom);
        const allOk = stock.every(s => s.ok);
        return h('div', { key: bom.id, style: { ...S.card, padding: 14 } },
          h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 } },
            h('div', null,
              h('span', { style: { fontSize: 15, fontWeight: 500 } }, bom.productName),
              h('span', { style: { marginLeft: 8, fontSize: 10, padding: '2px 8px', borderRadius: 6, background: allOk ? GN3 : RD3, color: allOk ? GN2 : RD2 } }, allOk ? '✓ В наличии' : '⚠ Дефицит')
            ),
            h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => del(bom.id) }, '✕')
          ),
          // Материалы спецификации
          (bom.materials || []).length > 0 ? h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
            h('thead', null, h('tr', null, ['Материал', 'Нужно', 'На складе', 'Статус', ''].map((t, i) => h('th', { key: i, style: S.th }, t)))),
            h('tbody', null, stock.map((s, i) => h('tr', { key: i, style: { background: s.ok ? 'transparent' : RD3 } },
              h('td', { style: S.td }, s.name),
              h('td', { style: S.td }, `${s.need} ${s.unit}`),
              h('td', { style: S.td }, `${s.have} ${s.unit}`),
              h('td', { style: { ...S.td, color: s.ok ? GN : RD, fontWeight: 500 } }, s.ok ? '✓' : `−${s.deficit}`),
              h('td', { style: S.td }, h('button', { style: { background: 'none', border: 'none', color: RD, cursor: 'pointer' }, onClick: () => removeMaterial(bom.id, i) }, '×'))
            )))
          )) : h('div', { style: { fontSize: 12, color: '#888', marginBottom: 8 } }, 'Нет материалов. Добавьте ниже.'),
          // Добавить материал
          h('div', { style: { display: 'flex', gap: 6, marginTop: 8 } },
            h('select', { style: { ...S.inp, flex: 2 }, value: matForm.bomId === bom.id ? matForm.materialId : '', onChange: e => setMatForm({ bomId: bom.id, materialId: e.target.value, qty: matForm.bomId === bom.id ? matForm.qty : '' }) },
              h('option', { value: '' }, '— материал —'),
              data.materials.map(m => h('option', { key: m.id, value: m.id }, `${m.name} (${m.quantity} ${m.unit})`))
            ),
            h('input', { type: 'number', step: '0.1', style: { ...S.inp, width: 80 }, placeholder: 'Кол-во', value: matForm.bomId === bom.id ? matForm.qty : '', onChange: e => setMatForm({ bomId: bom.id, materialId: matForm.bomId === bom.id ? matForm.materialId : '', qty: e.target.value }) }),
            h('button', { style: abtn({ fontSize: 11, padding: '4px 10px' }), onClick: () => { setMatForm(p => ({ ...p, bomId: bom.id })); addMaterial(); } }, '+')
          )
        );
      })
  );
});

// ==================== MasterTodayPlan (с автопересчётом и каскадными алертами) ====================
const MasterTodayPlan = memo(({ data }) => {
  const { plannedToday, nowTime, cascadeAlerts, delayedOrders } = useMemo(() => {
    const todayStart = new Date().setHours(0,0,0,0);
    const todayEnd = new Date().setHours(23,59,59,999);
    const nowTime = now();
    const plannedToday = data.ops
      .filter(op => op.plannedStartDate && op.plannedStartDate >= todayStart && op.plannedStartDate <= todayEnd && !op.archived)
      .sort((a,b) => a.plannedStartDate - b.plannedStartDate);

    // Каскадный анализ задержек
    const cascadeAlerts = [];
    const delayedOrders = new Set();
    // Для каждого заказа: если текущая операция задерживается → пересчитать последующие
    data.orders.filter(o => !o.archived).forEach(order => {
      const ops = data.ops.filter(op => op.orderId === order.id && !op.archived).sort((a, b) => (a.plannedStartDate || 0) - (b.plannedStartDate || 0));
      let accumulatedDelay = 0;
      ops.forEach((op, idx) => {
        if (op.status === 'in_progress' && op.plannedHours && op.startedAt) {
          const expectedEnd = op.startedAt + op.plannedHours * 3600000;
          if (nowTime > expectedEnd) {
            const delay = nowTime - expectedEnd;
            accumulatedDelay += delay;
          }
        }
        if (op.status === 'done' && op.finishedAt && op.plannedHours && op.startedAt) {
          const expectedEnd = op.startedAt + op.plannedHours * 3600000;
          if (op.finishedAt > expectedEnd) accumulatedDelay += (op.finishedAt - expectedEnd);
        }
      });
      if (accumulatedDelay > 1800000) { // > 30 минут
        delayedOrders.add(order.id);
        // Проверить дедлайн
        if (order.deadline) {
          const deadlineMs = new Date(order.deadline).getTime();
          const remainingOps = ops.filter(op => op.status !== 'done' && op.status !== 'defect');
          const remainingHours = remainingOps.reduce((s, op) => s + (op.plannedHours || 2), 0);
          const newExpectedEnd = nowTime + remainingHours * 3600000;
          if (newExpectedEnd > deadlineMs) {
            cascadeAlerts.push({
              orderId: order.id, orderNumber: order.number, delay: accumulatedDelay,
              deadline: order.deadline, expectedEnd: newExpectedEnd,
              overshoot: newExpectedEnd - deadlineMs,
              remainingOps: remainingOps.length
            });
          }
        }
      }
    });
    cascadeAlerts.sort((a, b) => a.overshoot - b.overshoot);
    return { plannedToday, nowTime, cascadeAlerts, delayedOrders };
  }, [data.ops, data.orders]);

  return h('div', null,
    // Каскадные алерты
    cascadeAlerts.length > 0 && h('div', { role: 'alert', style: { ...S.card, background: RD3, border: `0.5px solid ${RD}`, marginBottom: 12 } },
      h('div', { style: { fontSize: 10, color: RD, textTransform: 'uppercase', fontWeight: 500, marginBottom: 8 } }, `⚠ Прогноз срыва дедлайна (${cascadeAlerts.length} заказов)`),
      cascadeAlerts.map(a => h('div', { key: a.orderId, style: { padding: '6px 0', borderBottom: '0.5px solid rgba(0,0,0,0.05)', fontSize: 12 } },
        h('div', { style: { fontWeight: 500, color: RD2 } }, `Заказ ${a.orderNumber}`),
        h('div', { style: { color: '#666', fontSize: 11 } },
          `Накопленная задержка: ${fmtDur(a.delay)} · Дедлайн: ${a.deadline} · `,
          h('span', { style: { fontWeight: 500, color: RD } }, `Опоздание: ~${fmtDur(a.overshoot)}`),
          ` · Осталось операций: ${a.remainingOps}`
        )
      ))
    ),

    // План на сегодня
    h('div', { style: { ...S.card, overflowX: 'auto' } },
      h('div', { style: S.sec }, `План на сегодня (${plannedToday.length})`),
      plannedToday.length === 0
        ? h('div', { style: { padding: 16, textAlign: 'center', color: '#888' } }, 'Нет запланированных операций на сегодня')
        : h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
            h('thead', null, h('tr', null, ['Заказ','Операция','Исполнитель','Плановое начало','Статус','Задержка'].map((t,i) => h('th', { key: i, style: S.th, scope: 'col' }, t)))),
            h('tbody', null, plannedToday.map(op => {
              const order = data.orders.find(o => o.id === op.orderId);
              const workerNames = op.workerIds?.map(id => data.workers.find(w => w.id === id)?.name).filter(Boolean).join(', ') || '—';
              const overdue = !op.startedAt && op.plannedStartDate < nowTime;
              const delay = overdue ? nowTime - op.plannedStartDate : 0;
              const isDelayedOrder = delayedOrders.has(op.orderId);
              return h('tr', { key: op.id, style: { background: overdue ? RD3 : isDelayedOrder ? '#FFF8E1' : 'transparent' } },
                h('td', { style: { ...S.td, color: AM, fontWeight: 500 } }, order?.number || '—'),
                h('td', { style: S.td }, op.name),
                h('td', { style: S.td }, workerNames),
                h('td', { style: S.td }, new Date(op.plannedStartDate).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })),
                h('td', { style: S.td }, h(Badge, { st: op.status })),
                h('td', { style: { ...S.td, color: delay > 0 ? RD : GN, fontWeight: delay > 0 ? 500 : 400 } }, delay > 0 ? `+${fmtDur(delay)}` : '✓')
              );
            }))
          ))
    )
  );
});

// ==================== MasterNotifications ====================
const MasterNotifications = memo(({ data }) => {
  const notifications = useMemo(() => {
    const list = [];
    const nowTime = now();
    data.ops.forEach(op => {
      if (op.status === 'pending' && op.plannedStartDate && op.plannedStartDate < nowTime - 3600000) {
        const order = data.orders.find(o => o.id === op.orderId);
        list.push({ id: `overdue-${op.id}`, type: 'overdue', message: `Операция "${op.name}" (заказ ${order?.number}) не начата более часа` });
      }
    });
    const recentDowntimes = data.events.filter(e => e.type === 'downtime' && e.ts > nowTime - 1800000);
    recentDowntimes.forEach(e => {
      const worker = data.workers.find(w => w.id === e.workerId);
      const reason = data.downtimeTypes.find(d => d.id === e.downtimeTypeId)?.name;
      list.push({ id: `downtime-${e.id}`, type: 'downtime', message: `Простой: ${worker?.name} — ${reason}` });
    });
    data.orders.forEach(order => {
      if (isShipmentNear(order.deadline) && !order.archived) list.push({ id: `deadline-${order.id}`, type: 'deadline', message: `Заказ ${order.number} близок к дате отгрузки` });
    });
    return list.slice(0, 10);
  }, [data]);
  return h('div', { style: { ...S.card, marginBottom: 12 } },
    h('div', { style: { ...S.sec, display: 'flex', alignItems: 'center' } },
      'Уведомления',
      notifications.length > 0 && h('span', { className: 'notification-badge', 'aria-label': `${notifications.length} уведомлений` }, notifications.length)
    ),
    notifications.length === 0
      ? h('div', { style: { padding: 8, color: '#888' } }, 'Нет новых уведомлений')
      : notifications.map(n => h('div', { key: n.id, style: { padding: '6px 0', borderBottom: '0.5px solid #eee', fontSize: 12, color: n.type === 'overdue' ? RD : (n.type === 'deadline' ? AM : '#333') } }, n.message))
  );
});

// ==================== MasterProductionStages ====================
const MasterProductionStages = memo(({ data, onUpdate, addToast }) => {
  const [newName, setNewName] = useState('');
  const addStage = async () => {
    if (!newName.trim()) return;
    const newStage = { id: uid(), name: newName.trim() };
    const d = { ...data, productionStages: [...(data.productionStages || []), newStage] };
    await DB.save(d); onUpdate(d); setNewName(''); addToast('Этап добавлен', 'success');
  };
  const deleteStage = async (id) => {
    if (!confirm('Удалить этап?')) return;
    const d = { ...data, productionStages: (data.productionStages || []).filter(s => s.id !== id) };
    await DB.save(d); onUpdate(d); addToast('Этап удалён', 'info');
  };
  const moveUp = (index) => {
    if (index === 0) return;
    const newStages = [...(data.productionStages || [])];
    [newStages[index-1], newStages[index]] = [newStages[index], newStages[index-1]];
    const d = { ...data, productionStages: newStages };
    DB.save(d).then(() => onUpdate(d));
  };
  const moveDown = (index) => {
    const stages = data.productionStages || [];
    if (index === stages.length-1) return;
    const newStages = [...stages];
    [newStages[index], newStages[index+1]] = [newStages[index+1], newStages[index]];
    const d = { ...data, productionStages: newStages };
    DB.save(d).then(() => onUpdate(d));
  };
  return h('div', null,
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Добавить этап производства'),
      h('div', { style: { display: 'flex', gap: 8 } },
        h('input', { style: { ...S.inp, flex: 1 }, placeholder: 'Название этапа', value: newName, onChange: e => setNewName(e.target.value), onKeyDown: e => e.key === 'Enter' && addStage() }),
        h('button', { style: abtn(), onClick: addStage }, '+ Добавить')
      )
    ),
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Список этапов'),
      (data.productionStages || []).length === 0
        ? h('div', { style: { padding: 16, textAlign: 'center' } }, 'Нет этапов. Добавьте первый этап.')
        : (data.productionStages || []).map((stage, index) =>
            h('div', { key: stage.id, style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 0', borderBottom: '0.5px solid #eee' } },
              h('span', { style: { fontSize: 13 } }, stage.name),
              h('div', { style: { display: 'flex', gap: 4 } },
                h('button', { style: gbtn({ fontSize: 11, padding: '4px 6px' }), 'aria-label': 'Переместить вверх', onClick: () => moveUp(index), disabled: index === 0 }, '↑'),
                h('button', { style: gbtn({ fontSize: 11, padding: '4px 6px' }), 'aria-label': 'Переместить вниз', onClick: () => moveDown(index), disabled: index === (data.productionStages || []).length-1 }, '↓'),
                h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px' }), 'aria-label': `Удалить этап ${stage.name}`, onClick: () => deleteStage(stage.id) }, 'Удалить')
              )
            )
          )
    )
  );
});

// ==================== MasterDefectReasons ====================
const MasterDefectReasons = memo(({ data, onUpdate, addToast }) => {
  const [newName, setNewName] = useState('');
  const add = useCallback(async () => {
    if (!newName.trim()) return;
    if (data.defectReasons.some(r => r.name.toLowerCase() === newName.trim().toLowerCase())) { addToast('Такая причина уже существует', 'error'); return; }
    const newReason = { id: uid(), name: newName.trim() };
    const d = { ...data, defectReasons: [...(data.defectReasons || []), newReason] };
    await DB.save(d); onUpdate(d); setNewName(''); addToast('Причина брака добавлена', 'success');
  }, [data, newName, onUpdate, addToast]);
  const del = useCallback(async (id) => {
    if (!confirm('Удалить причину брака?')) return;
    if (data.ops.some(op => op.defectReasonId === id)) { addToast('Нельзя удалить причину, уже использованную', 'error'); return; }
    const d = { ...data, defectReasons: (data.defectReasons || []).filter(r => r.id !== id) };
    await DB.save(d); onUpdate(d); addToast('Причина удалена', 'info');
  }, [data, onUpdate, addToast]);

// ==================== GanttChart ====================
const GanttChart = memo(({ data }) => {
  const [startDate, setStartDate] = useState(() => { const d = new Date(); d.setDate(d.getDate() - 7); return d; });
  const [daysCount, setDaysCount] = useState(14);
  const operations = useMemo(() => data.ops.filter(op => op.plannedStartDate && !op.archived && op.status !== 'done' && op.status !== 'defect'), [data.ops]);
  const timeline = useMemo(() => {
    const start = startDate.getTime(); const end = start + daysCount*86400000;
    const days = [];
    for (let i=0; i<daysCount; i++) { const date = new Date(start + i*86400000); days.push({ date, day:date.getDate(), month:date.getMonth()+1, dayOfWeek:date.toLocaleDateString('ru',{weekday:'short'}) }); }
    return { days, start, end };
  }, [startDate, daysCount]);
  const bars = useMemo(() => operations.map(op => {
    const start = op.plannedStartDate; const end = start + (op.plannedHours ? op.plannedHours*3600000 : 4*3600000);
    if (end < timeline.start || start > timeline.end) return null;
    const left = ((start - timeline.start) / (timeline.end - timeline.start))*100;
    const width = ((end - start) / (timeline.end - timeline.start))*100;
    const order = data.orders.find(o => o.id === op.orderId);
    return { ...op, orderNumber: order?.number, left, width };
  }).filter(b => b), [operations, timeline, data.orders]);
  const changeDate = (delta) => { const newStart = new Date(startDate); newStart.setDate(newStart.getDate() + delta); setStartDate(newStart); };
  return h('div', { style: S.card },
    h('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 } },
      h('div', { style: { display:'flex', gap:8 } }, h('button', { style: gbtn(), onClick: () => changeDate(-7) }, '-7д'), h('button', { style: gbtn(), onClick: () => changeDate(-1) }, '-1д'), h('button', { style: gbtn(), onClick: () => changeDate(1) }, '+1д'), h('button', { style: gbtn(), onClick: () => changeDate(7) }, '+7д')),
      h('div', { style: { display:'flex', gap:8 } }, h('button', { style: gbtn(), onClick: () => setDaysCount(7) }, '7 дней'), h('button', { style: gbtn(), onClick: () => setDaysCount(14) }, '14 дней'))
    ),
    h('div', { className:'gantt-container' },
      h('div', { style: { display:'flex', flexDirection:'column' } },
        h('div', { className:'gantt-row' }, h('div', { className:'gantt-label' }, 'Операции'), h('div', { className:'gantt-timeline' }, timeline.days.map((day,idx) => h('div', { key:idx, className:'gantt-cell', style:{flex:1} }, `${day.day}.${day.month} ${day.dayOfWeek}`)))),
        bars.map(bar => h('div', { key:bar.id, className:'gantt-row', style:{ position:'relative', height:'40px' } },
          h('div', { className:'gantt-label', style:{ display:'flex', alignItems:'center', gap:4 } }, h('span', { style:{ fontWeight:500 } }, bar.orderNumber), h('span', { style:{ fontSize:10, color:'#888' } }, bar.name)),
          h('div', { className:'gantt-timeline', style:{ position:'relative' } }, h('div', { className:'gantt-bar', style:{ left:`${bar.left}%`, width:`${bar.width}%`, position:'absolute', top:4, height:'32px', background: bar.status === 'in_progress' ? AM : BL } }, `${bar.name} (${bar.orderNumber})`))
        ))
      )
    )
  );
});

      h('tbody', null, data.workers.map(w => {
        const availabilities = (data.workerAvailabilities || []).filter(a => a.workerId === w.id);

            h('div', { style: { fontSize:10, color:'#888' } }, availabilities.map(a => `${a.type === 'vacation' ? 'Отпуск' : 'Больничный'} ${new Date(a.startDate).toLocaleDateString()}–${new Date(a.endDate).toLocaleDateString()}`).join(', ')),

const MasterKanban = memo(({ data, onUpdate, addToast }) => {
  const stagesList = useMemo(() => { if (data.productionStages && data.productionStages.length > 0) return data.productionStages.map(s => s.name); return OPERATION_STAGES; }, [data.productionStages]);
  const wipLimits = data.settings?.wipLimits || {};
  const [editingWip, setEditingWip] = useState(null);
  const [wipValue, setWipValue] = useState('');

  const saveWipLimit = useCallback(async (stage, limit) => {
    const val = Number(limit);
    if (isNaN(val) || val < 0) return;
    const newLimits = { ...wipLimits, [stage]: val || undefined };
    if (!val) delete newLimits[stage];
    const d = { ...data, settings: { ...data.settings, wipLimits: newLimits } };
    await DB.save(d); onUpdate(d); setEditingWip(null); setWipValue('');
    addToast(val ? `WIP-лимит: ${stage} = ${val}` : `WIP-лимит снят: ${stage}`, 'success');
  }, [data, wipLimits, onUpdate, addToast]);

  const columns = useMemo(() => stagesList.map(stage => {
    const opsAtStage = data.ops.filter(op => op.name === stage && !op.archived);
    const active = opsAtStage.filter(op => op.status === 'in_progress' || op.status === 'pending' || op.status === 'on_check');
    const wip = wipLimits[stage] || 0;
    const overWip = wip > 0 && active.length > wip;
    return { stage, pending: opsAtStage.filter(op => op.status === 'pending'), in_progress: opsAtStage.filter(op => op.status === 'in_progress'), on_check: opsAtStage.filter(op => op.status === 'on_check'), done: opsAtStage.filter(op => op.status === 'done'), defect: opsAtStage.filter(op => op.status === 'defect' || op.status === 'rework'), total: opsAtStage.length, activeCount: active.length, wipLimit: wip, overWip };
  }), [stagesList, data.ops, wipLimits]);

  const overWipStages = columns.filter(c => c.overWip);

  return h('div', { style: { overflowX:'auto', paddingBottom:16 } },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 } },
      h('div', { style: S.sec }, 'Канбан-доска производства'),
      h('div', { style: { fontSize: 10, color: '#888' } }, 'Нажмите на лимит для изменения')
    ),
    // Алерт превышения WIP
    overWipStages.length > 0 && h('div', { role: 'alert', style: { padding: '8px 12px', background: RD3, border: `0.5px solid ${RD}`, borderRadius: 8, marginBottom: 10, fontSize: 11 } },
      h('span', { style: { fontWeight: 500, color: RD } }, '⚠ Превышен WIP-лимит: '),
      h('span', { style: { color: RD2 } }, overWipStages.map(c => `${c.stage} (${c.activeCount}/${c.wipLimit})`).join(', '))
    ),
    h('div', { style: { display:'flex', gap:8, minWidth: columns.length*160 } },
      columns.map(col => h('div', { key: col.stage, className: 'kanban-col', style: { flex:'0 0 150px', background: col.overWip ? '#FFF0F0' : '#fff', border: col.overWip ? `1px solid ${RD}` : '0.5px solid rgba(0,0,0,0.1)', borderRadius:10, padding:10, fontSize:11 } },
        h('div', { style: { fontSize:10, fontWeight:500, color:AM4, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:4 } }, col.stage),
        // WIP-лимит
        h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 } },
          editingWip === col.stage
            ? h('div', { style: { display: 'flex', gap: 4 } },
                h('input', { type: 'number', style: { ...S.inp, width: 40, padding: '2px 4px', fontSize: 11 }, value: wipValue, onChange: e => setWipValue(e.target.value), onKeyDown: e => e.key === 'Enter' && saveWipLimit(col.stage, wipValue), autoFocus: true }),
                h('button', { style: { background: 'none', border: 'none', cursor: 'pointer', fontSize: 10, color: GN }, onClick: () => saveWipLimit(col.stage, wipValue) }, '✓'),
                h('button', { style: { background: 'none', border: 'none', cursor: 'pointer', fontSize: 10, color: '#888' }, onClick: () => setEditingWip(null) }, '✕')
              )
            : h('button', { style: { background: 'none', border: 'none', cursor: 'pointer', fontSize: 10, color: col.overWip ? RD : col.wipLimit ? AM : '#bbb', padding: 0 }, onClick: () => { setEditingWip(col.stage); setWipValue(col.wipLimit || ''); } },

          col.in_progress.length>0 && h('span', { style:{ padding:'2px 6px', fontSize:10, borderRadius:6, background:AM3, color:AM2 } }, `▶ ${col.in_progress.length}`),
