                ),
                h('div', { style: { display: 'flex', gap: 6, alignItems: 'center' } },
                  h('span', { style: { display: 'inline-block', padding: '3px 10px', fontSize: 10, borderRadius: 8, fontWeight: 500, background: ws.bg, color: ws.cl, border: '0.5px solid ' + ws.br } }, ws.label),
                  w.checkinTime && h('span', { style: { fontSize: 11, color: '#888' } }, `с ${w.checkinTime}`)
                )
              ),

              h('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 } },
                h('div', { style: { fontSize: 11, color: '#888', whiteSpace: 'nowrap' } }, `${w.allTimeDone} оп.`),
                h('div', { style: { flex: 1, height: 5, background: '#eee', borderRadius: 3, overflow: 'hidden' } },
                  h('div', { style: { width: `${w.levelProgress * 100}%`, height: 5, background: AM, borderRadius: 3, transition: 'width 0.3s' } })
                ),
                h('div', { style: { fontSize: 10, color: '#888', whiteSpace: 'nowrap' } }, `→ Ур. ${w.level + 1}`)
              ),

              h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, marginBottom: 10 } },
                h('div', { style: { textAlign: 'center', padding: '6px 4px', background: '#f8f8f5', borderRadius: 8 } },
                  h('div', { style: { fontSize: 16, fontWeight: 500, color: GN } }, w.opsDone),
                  h('div', { style: { fontSize: 10, color: '#888' } }, 'выполн.')
                ),
                h('div', { style: { textAlign: 'center', padding: '6px 4px', background: '#f8f8f5', borderRadius: 8 } },
                  h('div', { style: { fontSize: 16, fontWeight: 500, color: AM } }, w.avgTime ? fmtDur(w.avgTime) : '—'),
                  h('div', { style: { fontSize: 10, color: '#888' } }, 'ср. время')
                ),
                h('div', { style: { textAlign: 'center', padding: '6px 4px', background: '#f8f8f5', borderRadius: 8 } },
                  h('div', { style: { fontSize: 16, fontWeight: 500, color: w.defectRate > 5 ? RD : GN } }, `${w.defectRate.toFixed(1)}%`),
                  h('div', { style: { fontSize: 10, color: '#888' } }, 'брак')
                ),
                h('div', { style: { textAlign: 'center', padding: '6px 4px', background: '#f8f8f5', borderRadius: 8 } },
                  h('div', { style: { fontSize: 16, fontWeight: 500, color: BL } }, w.opsActive),
                  h('div', { style: { fontSize: 10, color: '#888' } }, 'в работе')
                )
              ),

              (w.achievements && w.achievements.length > 0) && h('div', { style: { marginBottom: 8 } },
                h('div', { style: { fontSize: 10, color: '#888', marginBottom: 4 } }, `Достижения (${w.achievements.length})`),
                h('div', { style: { display: 'flex', gap: 4, flexWrap: 'wrap' } },
                  w.achievements.slice(0, 6).map(achId => {
                    const a = ACHIEVEMENTS[achId];
                    return a ? h('span', { key: achId, title: `${a.title}: ${a.desc}`, style: { padding: '2px 8px', fontSize: 11, background: '#f8f8f5', borderRadius: 8, cursor: 'default' } }, `${a.icon} ${a.title}`) : null;
                  }),
                  w.achievements.length > 6 && h('span', { style: { fontSize: 11, color: '#888', padding: '2px 4px' } }, `+${w.achievements.length - 6}`)
                )
              ),

              w.competences && w.competences.length > 0 && h('div', { style: { marginBottom: 8 } },
                h('div', { style: { fontSize: 10, color: '#888', marginBottom: 4 } }, 'Допуск к операциям'),
                h('div', { style: { display: 'flex', gap: 4, flexWrap: 'wrap' } },
                  w.competences.map(c => h('span', { key: c, style: { padding: '2px 8px', fontSize: 10, background: AM3, color: AM2, borderRadius: 8 } }, c))
                )
              ),

              h('div', { style: { display: 'flex', gap: 6, alignItems: 'center' } },
                h('button', { style: gbtn({ fontSize: 11, padding: '4px 10px' }), onClick: () => setCardWorker(w) }, '📊 Подробнее'),
                h('button', { style: gbtn({ fontSize: 11, padding: '4px 10px' }), onClick: () => edit(w) }, '✎ Редактировать'),
                h('select', { style: { ...S.inp, fontSize: 11, padding: '4px 6px' }, value: w.status || 'working', onChange: e => updateStatus(w.id, e.target.value) },
                  Object.entries(WORKER_STATUS).map(([k, v]) => h('option', { key: k, value: k }, v.label))
                ),
                h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px', marginLeft: 'auto' }), onClick: () => del(w.id) }, '✕')
              )
            )
          )
        );
      })
  );
});

// ==================== МАСТЕР — ПРОСТОИ ====================
const MasterDowntimes = memo(({ data, onUpdate, addToast }) => {
  const [newName, setNewName] = useState('');

  const add = useCallback(async () => {
    if (!newName.trim()) return;
    if (data.downtimeTypes.some(d => d.name.toLowerCase() === newName.trim().toLowerCase())) {
      addToast('Такая причина уже существует', 'error');
      return;
    }
    const newType = { id: uid(), name: newName.trim() };
    const d = { ...data, downtimeTypes: [...data.downtimeTypes, newType] };
    await DB.save(d);
    onUpdate(d);
    setNewName('');
    addToast('Причина простоя добавлена', 'success');
  }, [data, newName, onUpdate, addToast]);

  const del = useCallback(async (id) => {
    if (!confirm('Удалить причину простоя?')) return;
    if (data.events.some(e => e.downtimeTypeId === id)) {
      addToast('Нельзя удалить причину, уже использованную', 'error');
      return;
    }
    const d = { ...data, downtimeTypes: data.downtimeTypes.filter(dt => dt.id !== id) };
    await DB.save(d);
    onUpdate(d);
    addToast('Причина удалена', 'info');
  }, [data, onUpdate, addToast]);

  return h('div', null,
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Добавить причину простоя'),
      h('div', { style: { display: 'flex', gap: 8 } },
        h('input', { style: { ...S.inp, flex: 1 }, placeholder: 'Нет материала, поломка...', value: newName, onChange: e => setNewName(e.target.value), onKeyDown: e => e.key === 'Enter' && add() }),
        h('button', { type: 'button', style: abtn(), onClick: add }, '+ Добавить')
      )
    ),
    data.downtimeTypes.length === 0 ? h('div', { style: { ...S.card, textAlign: 'center', padding: 32 } }, 'Нет причин простоев') :
      h('div', { style: { ...S.card } },
        data.downtimeTypes.map(dt => h('div', { key: dt.id, style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: '0.5px solid rgba(0,0,0,0.05)' } },
          h('span', { style: { fontSize: 13 } }, dt.name),
          h('button', { type: 'button', style: rbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => del(dt.id) }, 'Удалить')
        ))
      )
  );
});

// ==================== МАСТЕР — УПРАВЛЕНИЕ ====================
const MasterAdmin = memo(({ data, onUpdate, addToast }) => {
  const settings = data.settings || EMPTY_DATA.settings;
  const [masterPwd, setMasterPwd] = useState(settings.masterPassword || 'master');
  const [controllerPwd, setControllerPwd] = useState(settings.controllerPassword || 'controller');
  const [welcomeTitle, setWelcomeTitle] = useState(settings.welcomeTitle || 'teploros');
  const [welcomeSubtitle, setWelcomeSubtitle] = useState(settings.welcomeSubtitle || 'надежная техника');
  const [welcomeLabel, setWelcomeLabel] = useState(settings.welcomeLabel || 'Производственный учёт · НТ');

  const savePasswords = useCallback(async () => {
    if (!masterPwd.trim() || masterPwd.trim().length < 3) { addToast('Пароль мастера: минимум 3 символа', 'error'); return; }
    if (!controllerPwd.trim() || controllerPwd.trim().length < 3) { addToast('Пароль контролёра: минимум 3 символа', 'error'); return; }
    const d = { ...data, settings: { ...settings, masterPassword: masterPwd.trim(), controllerPassword: controllerPwd.trim() } };
    await DB.save(d); onUpdate(d); addToast('Пароли обновлены', 'success');
  }, [data, settings, masterPwd, controllerPwd, onUpdate, addToast]);

  const saveWelcome = useCallback(async () => {
    const d = { ...data, settings: { ...settings, welcomeTitle: welcomeTitle.trim(), welcomeSubtitle: welcomeSubtitle.trim(), welcomeLabel: welcomeLabel.trim() } };
    await DB.save(d); onUpdate(d); addToast('Текст главной страницы обновлён', 'success');
  }, [data, settings, welcomeTitle, welcomeSubtitle, welcomeLabel, onUpdate, addToast]);

  const resetWorkerPin = useCallback(async (workerId) => {
    const newPin = String(Math.floor(1000 + Math.random() * 9000));

// ==================== МАСТЕР — НАСТРОЙКИ (экспорт/импорт) ====================
const MasterSettings = memo(({ data, onUpdate, addToast }) => {
  const exportData = () => {
    const jsonStr = JSON.stringify(data, null, 2);
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    addToast('Резервная копия создана', 'success');
  };

  const importData = (event) => {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (imported.orders && imported.ops && imported.workers) {
          DB.save(imported).then(() => {
            onUpdate(imported);
            addToast('Данные импортированы', 'success');
          });
        } else {
          addToast('Неверный формат файла', 'error');
        }
      } catch (ex) {
        addToast('Ошибка при чтении файла', 'error');
      }
    };
    reader.readAsText(file);
  };

  return h('div', null,
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Резервное копирование'),
      h('div', { style: { display: 'flex', gap: 8, marginBottom: 12 } },
        h('button', { style: abtn(), onClick: exportData }, '📥 Экспорт JSON'),
        h('button', { style: gbtn(), onClick: () => document.getElementById('import-file').click() }, '📤 Импорт JSON')
      ),
      h('input', { type: 'file', id: 'import-file', style: { display: 'none' }, accept: '.json', onChange: importData }),
      h('div', { style: { fontSize: 11, color: '#888' } }, 'Импорт заменит все текущие данные.')
    )
  );
});

// ==================== ЭКРАН QR-ОПЕРАЦИИ ====================
const QRScreen = memo(({ data, opId, onUpdate, addToast }) => {
  const op = data.ops.find(o => o.id === opId);
  const order = op ? data.orders.find(o => o.id === op.orderId) : null;
  const worker = op ? data.workers.find(w => w.id === op.workerId) : null;
  const [defNote, setDefNote] = useState('');
  const [showDefForm, setShowDefForm] = useState(false);
  const [showDowntimeModal, setShowDowntimeModal] = useState(false);
  const [selectedDowntimeType, setSelectedDowntimeType] = useState('');
  const [, setTick] = useState(0);
  const [weldParams, setWeldParams] = useState({ seamNumber: '', electrode: '', result: 'ok' });

  useEffect(() => { const t = setInterval(() => setTick(n => n + 1), 1000); return () => clearInterval(t); }, []);

  if (!op || op.archived) return h('div', { style: { ...S.card, textAlign: 'center' } }, 'Операция не найдена или архивирована');

  const elapsed = op.startedAt && !op.finishedAt ? now() - op.startedAt : 0;

  const handleStart = useCallback(async () => {
    if (op.status !== 'pending') return;
    if (worker?.competences && worker.competences.length > 0 && !worker.competences.includes(op.name)) {
      addToast('У вас нет компетенции для этой операции', 'error');
      return;
    }
    const startedAt = now();
    const shift = getCurrentShift();
    const updated = {
      ...data,
      ops: data.ops.map(o => o.id === op.id ? { ...o, status: 'in_progress', startedAt } : o),
      events: [...data.events, { id: uid(), type: 'start', opId: op.id, workerId: op.workerId, ts: startedAt, shift }]
    };
    await DB.save(updated); onUpdate(updated); addToast('Операция начата', 'success');
  }, [data, op, worker, onUpdate, addToast]);

  const handleFinish = useCallback(async (isDefect = false, isRework = false) => {
    if (op.status !== 'in_progress') return;
    const finishedAt = now();
    let status = isDefect ? 'defect' : isRework ? 'rework' : 'done';
    let updatedOp = { ...op, status, finishedAt, defectNote: defNote || undefined };
    if (isDefect) updatedOp.defectSource = 'previous_stage';
    if (isRework) updatedOp.defectSource = 'previous_stage';
    if (op.requiresQC && status === 'done') {
      status = 'on_check';
      updatedOp.status = 'on_check';
    }
    if (op.name.includes('свар') && weldParams.seamNumber && weldParams.electrode) {
      updatedOp.weldParams = { seamNumber: weldParams.seamNumber, electrode: weldParams.electrode, result: weldParams.result };
      if (weldParams.result === 'fail') {
        status = 'defect';
        updatedOp.status = 'defect';
        updatedOp.defectNote = 'Сварка забракована';
      }
    }
    const shift = getCurrentShift();
    const updated = {
      ...data,
      ops: data.ops.map(o => o.id === op.id ? updatedOp : o),
      events: [...data.events, { id: uid(), type: status, opId: op.id, workerId: op.workerId, ts: finishedAt, note: defNote || undefined, shift, defectSource: (isDefect || isRework) ? 'previous_stage' : undefined }]
    };
    await DB.save(updated); onUpdate(updated);
    if (op.workerId) {
      const withAch = checkAchievements(op.workerId, updated);
      if (withAch !== updated) {
        const newAchList = withAch.workers.find(w => w.id === op.workerId)?.achievements || [];
        const oldAchList = updated.workers.find(w => w.id === op.workerId)?.achievements || [];
        if (newAchList.length > oldAchList.length) {
          const latest = newAchList[newAchList.length - 1];
          const achInfo = ACHIEVEMENTS[latest];
          if (achInfo) addToast(`${achInfo.icon} Достижение: ${achInfo.title}!`, 'success');
        }
        await DB.save(withAch); onUpdate(withAch);
      }
    }
    setShowDefForm(false); setDefNote(''); setWeldParams({ seamNumber: '', electrode: '', result: 'ok' }); addToast('Операция завершена', 'info');
  }, [data, op, onUpdate, defNote, weldParams, addToast]);

  const recordDowntime = useCallback(async () => {
    if (!selectedDowntimeType) return addToast('Выберите причину', 'error');
    const shift = getCurrentShift();
    const newEvent = { id: uid(), type: 'downtime', workerId: op.workerId, opId: op.id, ts: now(), downtimeTypeId: selectedDowntimeType, shift };
    const updated = { ...data, events: [...data.events, newEvent] };
    await DB.save(updated); onUpdate(updated); setShowDowntimeModal(false); setSelectedDowntimeType(''); addToast('Простой зафиксирован', 'success');
  }, [data, op, selectedDowntimeType, onUpdate, addToast]);

  const getCurrentShift = () => {
    const d = new Date();
    return `${d.toISOString().slice(0,10)}-${Math.floor(d.getHours() / 8) + 1}`;
  };

  return h('div', { style: { maxWidth: 420, margin: '0 auto', padding: '16px 12px' } },
    h('div', { style: { ...S.card, border: `1px solid ${AM}`, background: AM3 } },
      h('div', { style: { fontSize: 10, color: AM, textTransform: 'uppercase', marginBottom: 6 } }, 'Операция по QR-коду'),
      h('div', { style: { fontSize: 18, fontWeight: 500, color: AM2 } }, op.name),
      h('div', { style: { fontSize: 14, color: AM, marginBottom: 8 } }, order?.number || '—'),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16, background: '#fff', borderRadius: 8, padding: 8 } },
        h('div', { style: { width: 32, height: 32, borderRadius: '50%', background: AM3, display: 'flex', alignItems: 'center', justifyContent: 'center' } }, worker?.name?.charAt(0) || '?'),
        h('div', null,
          h('div', { style: { fontSize: 13, fontWeight: 500 } }, worker?.name || 'Не назначен'),
          h('div', { style: { fontSize: 10, color: '#888' } }, 'Плановый исполнитель')
        )
      ),
      h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 } },
        h(Badge, { st: op.status }),
        op.status === 'in_progress' && h('div', { style: { fontSize: 24, fontWeight: 500, color: AM } }, fmtDur(elapsed))
      ),
      !showDefForm ? (
        op.name.includes('свар') ? (
          h('div', null,
            h('div', { style: { display: 'flex', gap: 8, marginBottom: 8 } },
              h('input', { style: { ...S.inp, flex: 1 }, placeholder: 'Номер шва', value: weldParams.seamNumber, onChange: e => setWeldParams(p => ({ ...p, seamNumber: e.target.value })) }),
              h('input', { style: { ...S.inp, flex: 1 }, placeholder: 'Тип электрода', value: weldParams.electrode, onChange: e => setWeldParams(p => ({ ...p, electrode: e.target.value })) })
            ),
            h('div', { style: { display: 'flex', gap: 8, marginBottom: 8 } },
              h('label', { style: { display: 'flex', alignItems: 'center', gap: 4 } },
                h('input', { type: 'radio', name: 'weldResult', value: 'ok', checked: weldParams.result === 'ok', onChange: e => setWeldParams(p => ({ ...p, result: e.target.value })) }), 'Принято'),
              h('label', { style: { display: 'flex', alignItems: 'center', gap: 4 } },
                h('input', { type: 'radio', name: 'weldResult', value: 'fail', checked: weldParams.result === 'fail', onChange: e => setWeldParams(p => ({ ...p, result: e.target.value })) }), 'Брак')
            ),
            h('div', { style: { display: 'flex', gap: 8 } },
              op.status === 'pending' && worker && h('button', { style: abtn({ flex: 1, padding: '12px' }), onClick: handleStart }, '▶ Старт'),
              op.status === 'in_progress' && h('button', { style: { ...abtn({ flex: 1 }), background: GN, color: GN2 }, onClick: () => handleFinish() }, '✓ Завершить'),
              op.status === 'in_progress' && h('button', { style: rbtn({ flex: 1 }), onClick: () => setShowDefForm(true) }, '⚠ Брак с пред. уч.'),
              (op.status === 'pending' || op.status === 'in_progress') && h('button', { style: gbtn({ flex: 1 }), onClick: () => { setShowDowntimeModal(true); setDowntimeStartedAt(now()); } }, '⏸ Простой')
            )
          )
        ) : (
          h('div', { style: { display: 'flex', gap: 8 } },
            op.status === 'pending' && worker && h('button', { style: abtn({ flex: 1, padding: '12px' }), onClick: handleStart }, '▶ Старт'),
            op.status === 'in_progress' && h('button', { style: { ...abtn({ flex: 1 }), background: GN, color: GN2 }, onClick: () => handleFinish() }, '✓ Завершить'),
            op.status === 'in_progress' && h('button', { style: rbtn({ flex: 1 }), onClick: () => setShowDefForm(true) }, '⚠ Брак с пред. уч.'),
            (op.status === 'pending' || op.status === 'in_progress') && h('button', { style: gbtn({ flex: 1 }), onClick: () => { setShowDowntimeModal(true); setDowntimeStartedAt(now()); } }, '⏸ Простой')
          )
        )
      ) : (
        h('div', null,
          h('textarea', { style: { ...S.inp, width: '100%', marginBottom: 8 }, rows: 2, placeholder: 'Причина...', value: defNote, onChange: e => setDefNote(e.target.value) }),
          h('div', { style: { display: 'flex', gap: 6 } },
            h('button', { style: rbtn({ flex: 1 }), onClick: () => handleFinish(true, false) }, 'Брак'),
            h('button', { style: { ...gbtn({ flex: 1 }), color: AM2, borderColor: AM4 }, onClick: () => handleFinish(false, true) }, 'Переделка'),
            h('button', { style: gbtn({ flex: 1 }), onClick: () => setShowDefForm(false) }, 'Отмена')
          )
        )
      ),
      showDowntimeModal && h('div', { style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 60 } },
        h('div', { style: { background: '#fff', borderRadius: 12, padding: 24, width: 300 } },
          h('div', { style: { fontSize: 14, fontWeight: 500, marginBottom: 12 } }, 'Причина простоя'),
          h('select', { style: { ...S.inp, width: '100%', marginBottom: 16 }, value: selectedDowntimeType, onChange: e => setSelectedDowntimeType(e.target.value) },
            h('option', { value: '' }, '— выберите —'),
            data.downtimeTypes.map(dt => h('option', { key: dt.id, value: dt.id }, dt.name))
          ),
          h('div', { style: { display: 'flex', gap: 8, justifyContent: 'flex-end' } },
            h('button', { style: gbtn(), onClick: () => setShowDowntimeModal(false) }, 'Отмена'),
            h('button', { style: abtn(), onClick: recordDowntime }, 'Зафиксировать')
          )
        )
      )
    )
  );
});

// ==================== ДАШБОРД ====================
const Dashboard = memo(({ data, addToast }) => {
  const [period, setPeriod] = useState(() => {
    const end = new Date();
    const start = new Date();
    start.setDate(start.getDate() - 7);
    return { start: start.getTime(), end: end.getTime(), label: '7 дней' };
  });
  const [customStart, setCustomStart] = useState('');
  const [customEnd, setCustomEnd] = useState('');

  const setPeriodDays = (days) => {
    const end = new Date();
    const start = new Date();
    start.setDate(start.getDate() - days);
    setPeriod({ start: start.getTime(), end: end.getTime(), label: `${days} дней` });
    setCustomStart(''); setCustomEnd('');
  };

  const setCustomPeriod = () => {
    if (customStart && customEnd) {
      setPeriod({
        start: new Date(customStart).getTime(),
        end: new Date(customEnd).getTime() + 86400000 - 1,
        label: 'произвольный'
      });
    }
  };

  const doneOpsInPeriod = useMemo(() => {
    if (!period.start || !period.end) return data.ops.filter(o => o.status === 'done' && o.finishedAt);
    return data.ops.filter(o => o.status === 'done' && o.finishedAt && o.finishedAt >= period.start && o.finishedAt <= period.end);
  }, [data.ops, period]);

  const defectsInPeriod = useMemo(() => {
    if (!period.start || !period.end) return data.ops.filter(o => o.status === 'defect' && o.finishedAt);
    return data.ops.filter(o => o.status === 'defect' && o.finishedAt && o.finishedAt >= period.start && o.finishedAt <= period.end);
  }, [data.ops, period]);

  const inProgress = data.ops.filter(o => o.status === 'in_progress' && !o.archived);
  const pending = data.ops.filter(o => o.status === 'pending' && !o.archived);
  const pendingLong = pending.filter(o => o.createdAt && now() - o.createdAt > 3600000);
  const nearDeadlineOrders = data.orders.filter(o => isShipmentNear(o.deadline) && !o.archived && data.ops.some(op => op.orderId === o.id && op.status !== 'done'));

  const workersByStatus = useMemo(() => {
    const stats = { working: 0, absent: 0, sick: 0, vacation: 0 };
    data.workers.forEach(w => stats[w.status || 'working']++);
    return stats;
  }, [data.workers]);

  const workerPerformance = useMemo(() => {
    const result = [];
    for (const w of data.workers) {
      const workerOps = doneOpsInPeriod.filter(op => op.workerId === w.id && op.plannedHours && op.startedAt && op.finishedAt);
      if (workerOps.length === 0) continue;
      const totalPlanned = workerOps.reduce((sum, op) => sum + (op.plannedHours || 0), 0) * 3600000;
      const totalActual = workerOps.reduce((sum, op) => sum + (op.finishedAt - op.startedAt), 0);
      const performance = totalPlanned > 0 ? (totalActual / totalPlanned) * 100 : 0;
      const defectCount = defectsInPeriod.filter(op => op.workerId === w.id).length;
      const downtimeCount = data.events.filter(e => e.type === 'downtime' && e.workerId === w.id && e.ts >= period.start && e.ts <= period.end).length;
      result.push({
        workerId: w.id,
        workerName: w.name,
        opsCount: workerOps.length,
        totalPlanned,
        totalActual,
        performance,
        defectCount,
        downtimeCount
      });
    }
    return result.sort((a,b) => a.performance - b.performance);
  }, [data.workers, doneOpsInPeriod, defectsInPeriod, data.events, period]);

  const bottlenecks = useMemo(() => {
    const opStats = {};
    doneOpsInPeriod.forEach(op => {
      if (!op.plannedHours || !op.startedAt || !op.finishedAt) return;
      const actual = op.finishedAt - op.startedAt;
      if (!opStats[op.name]) opStats[op.name] = { totalActual: 0, count: 0, totalPlanned: 0 };
      opStats[op.name].totalActual += actual;
      opStats[op.name].count += 1;
      opStats[op.name].totalPlanned += op.plannedHours * 3600000;
    });
    return Object.entries(opStats).map(([name, stat]) => {
      const avgActual = stat.totalActual / stat.count;
      const avgPlanned = stat.totalPlanned / stat.count;
      const ratio = avgActual / avgPlanned;
      return { name, count: stat.count, avgActual: fmtDur(avgActual), avgPlanned: fmtDur(avgPlanned), ratio, isBottleneck: ratio > 1.2 };
    }).filter(b => b.isBottleneck);
  }, [doneOpsInPeriod]);

  const equipmentUtilization = useMemo(() => {
    const totalTime = period.end - period.start;
    return data.equipment.map(eq => {
      const opsOnEq = data.ops.filter(op => op.equipmentId === eq.id && op.status === 'done' && op.startedAt && op.finishedAt && op.finishedAt >= period.start && op.finishedAt <= period.end);
      const busyTime = opsOnEq.reduce((sum, op) => sum + (op.finishedAt - op.startedAt), 0);
      const utilization = totalTime > 0 ? (busyTime / totalTime) * 100 : 0;
      return { ...eq, busyTime, utilization };
    });
  }, [data.equipment, data.ops, period]);

  const exportToExcel = useCallback(() => {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data.orders.map(o => ({ Номер: o.number, Изделие: o.product, Количество: o.qty, 'Дата отгрузки': o.deadline, Приоритет: PRIORITY[o.priority]?.label }))), 'Заказы');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data.ops.map(op => ({ ID: op.id, Заказ: data.orders.find(o => o.id === op.orderId)?.number, Операция: op.name, Статус: op.status, 'План, ч': op.plannedHours, Длительность: op.finishedAt && op.startedAt ? (op.finishedAt - op.startedAt) : '' }))), 'Операции');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data.workers.map(w => ({ Имя: w.name, Должность: w.position || '', Разряд: w.grade || '', 'Таб. №': w.tabNumber || '', Участок: data.sections.find(s => s.id === w.sectionId)?.name || '', Статус: (WORKER_STATUS[w.status] || WORKER_STATUS.working).label, Компетенции: w.competences?.join(', ') || '' }))), 'Рабочие');
    const downtimeEvents = data.events.filter(e => e.type === 'downtime').map(e => ({ Время: new Date(e.ts).toLocaleString(), Рабочий: data.workers.find(w => w.id === e.workerId)?.name, Причина: data.downtimeTypes.find(dt => dt.id === e.downtimeTypeId)?.name, 'Длительность (мин)': e.duration ? Math.round(e.duration / 60000) : '', Смена: e.shift }));
    if (downtimeEvents.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(downtimeEvents), 'Простои');
    const timeEvents = data.events.filter(e => e.type === 'checkin_manual' || e.type === 'checkout_manual').map(e => ({
      Время: new Date(e.ts).toLocaleString(),
      Рабочий: data.workers.find(w => w.id === e.workerId)?.name,
      Тип: e.type === 'checkin_manual' ? 'Приход' : 'Уход',
      Смена: e.shift
    }));
    if (timeEvents.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(timeEvents), 'Учёт времени');
    XLSX.writeFile(wb, `production_${new Date().toISOString().slice(0,10)}.xlsx`);
    addToast('Экспорт завершён', 'success');
  }, [data, addToast]);

  const metrics = [
    [doneOpsInPeriod.length, 'Выполнено', GN],
    [inProgress.length, 'В работе', AM],
    [defectsInPeriod.length, 'Брак', RD],
    [pending.length, 'Ожидают', BL]
  ];

  return h('div', { style: { padding: '0 0 24px' } },
    h('div', { style: { ...S.card, display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center', marginBottom: 16 } },
      h('span', { style: { fontSize: 12, fontWeight: 500 } }, 'Период:'),
      h('button', { style: period.label === '7 дней' ? abtn() : gbtn(), onClick: () => setPeriodDays(7) }, '7 дней'),
      h('button', { style: period.label === '14 дней' ? abtn() : gbtn(), onClick: () => setPeriodDays(14) }, '14 дней'),
      h('button', { style: period.label === '30 дней' ? abtn() : gbtn(), onClick: () => setPeriodDays(30) }, '30 дней'),
      h('span', { style: { fontSize: 12 } }, 'или'),
      h('input', { type: 'date', style: { ...S.inp, width: 130 }, value: customStart, onChange: e => setCustomStart(e.target.value) }),
      h('input', { type: 'date', style: { ...S.inp, width: 130 }, value: customEnd, onChange: e => setCustomEnd(e.target.value) }),
      h('button', { style: gbtn(), onClick: setCustomPeriod }, 'Применить')
    ),

    h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 10, marginBottom: 16 } },
      h('div', { style: S.card }, h('div', { style: { fontSize: 12, color: '#888' } }, 'На смене'), h('div', { style: { fontSize: 24, fontWeight: 500 } }, workersByStatus.working)),
      h('div', { style: S.card }, h('div', { style: { fontSize: 12, color: '#888' } }, 'Отсутствует'), h('div', { style: { fontSize: 24, fontWeight: 500 } }, workersByStatus.absent)),
      h('div', { style: S.card }, h('div', { style: { fontSize: 12, color: '#888' } }, 'Больничный'), h('div', { style: { fontSize: 24, fontWeight: 500 } }, workersByStatus.sick)),
      h('div', { style: S.card }, h('div', { style: { fontSize: 12, color: '#888' } }, 'Отпуск'), h('div', { style: { fontSize: 24, fontWeight: 500 } }, workersByStatus.vacation))
    ),

    h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 10, marginBottom: 16 } },
      metrics.map(([v, l, c]) => h('div', { key: l, style: { ...S.card, textAlign: 'center' } }, h('div', { style: { fontSize: 32, fontWeight: 500, color: c } }, v), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, l)))
    ),

    nearDeadlineOrders.length > 0 && h('div', { style: { ...S.card, background: RD3, border: `0.5px solid ${RD}`, marginBottom: 12 } },
      h('div', { style: { fontSize: 10, color: RD, textTransform: 'uppercase', marginBottom: 8, fontWeight: 500 } }, '⚠ Заказы с близкой датой отгрузки'),
      nearDeadlineOrders.map(ord => h('div', { key: ord.id, style: { fontSize: 12, color: RD2 } }, `${ord.number} · отгрузка: ${ord.deadline}`))
    ),

    pendingLong.length > 0 && h('div', { style: { ...S.card, background: RD3, border: `0.5px solid ${RD}`, marginBottom: 12 } },
      h('div', { style: { fontSize: 10, color: RD, textTransform: 'uppercase', marginBottom: 8, fontWeight: 500 } }, '⚠ Операции, ожидающие >1 часа'),
      pendingLong.map(op => h('div', { key: op.id, style: { fontSize: 12, color: RD2 } }, `${op.name} · ${fmtDur(now() - op.createdAt)}`))
    ),

    bottlenecks.length > 0 && h('div', { style: { ...S.card, marginBottom: 12 } },
      h('div', { style: { ...S.sec, marginBottom: 6 } }, '⚠ Узкие места (факт > план на 20%)'),
      h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
        h('thead', null, h('tr', null, ['Операция', 'Кол-во', 'Ср. план', 'Ср. факт', 'Отклонение'].map((t,i) => h('th', { key: i, style: S.th }, t)))),
        h('tbody', null, bottlenecks.map(b => h('tr', { key: b.name },
          h('td', { style: S.td }, b.name),
          h('td', { style: S.td }, b.count),
          h('td', { style: S.td }, b.avgPlanned),
          h('td', { style: S.td }, b.avgActual),
          h('td', { style: { ...S.td, color: RD } }, `${Math.round((b.ratio - 1)*100)}%`)
        )))
      )
    ),

    equipmentUtilization.length > 0 && h('div', { style: { ...S.card, marginBottom: 12 } },
      h('div', { style: S.sec }, 'OEE — эффективность оборудования'),
      h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
        h('thead', null, h('tr', null, ['Оборудование', 'Доступность', 'Производит.', 'Качество', 'OEE'].map((t,i) => h('th', { key: i, style: S.th }, t)))),
        h('tbody', null, equipmentUtilization.map(eq => {
          const totalPeriodHrs = (period.end - period.start) / 3600000;
          const availability = totalPeriodHrs > 0 ? Math.min((eq.busyTime / 3600000) / totalPeriodHrs * 100, 100) : 0;
          const opsOnEq = data.ops.filter(op => op.equipmentId === eq.id && op.status === 'done' && op.plannedHours && op.startedAt && op.finishedAt && op.finishedAt >= period.start && op.finishedAt <= period.end);
          const totalPlanned = opsOnEq.reduce((s, op) => s + op.plannedHours * 3600000, 0);
          const totalActual = opsOnEq.reduce((s, op) => s + (op.finishedAt - op.startedAt), 0);
          const performance = totalActual > 0 ? Math.min((totalPlanned / totalActual) * 100, 100) : 0;
          const doneOnEq = data.ops.filter(op => op.equipmentId === eq.id && op.status === 'done' && op.finishedAt >= period.start && op.finishedAt <= period.end).length;
          const defOnEq = data.ops.filter(op => op.equipmentId === eq.id && op.status === 'defect' && op.finishedAt >= period.start && op.finishedAt <= period.end).length;
          const quality = (doneOnEq + defOnEq) > 0 ? (doneOnEq / (doneOnEq + defOnEq)) * 100 : 100;
          const oee = (availability / 100) * (performance / 100) * (quality / 100) * 100;
          const oeeColor = oee >= 85 ? GN : oee >= 60 ? AM : RD;
          return h('tr', { key: eq.id },
            h('td', { style: S.td }, `${eq.name} (${eq.type})`),
            h('td', { style: { ...S.td, textAlign: 'center' } }, `${availability.toFixed(0)}%`),
            h('td', { style: { ...S.td, textAlign: 'center' } }, opsOnEq.length > 0 ? `${performance.toFixed(0)}%` : '—'),
            h('td', { style: { ...S.td, textAlign: 'center' } }, (doneOnEq + defOnEq) > 0 ? `${quality.toFixed(0)}%` : '—'),
            h('td', { style: { ...S.td, textAlign: 'center', fontWeight: 500, color: oeeColor, fontSize: 14 } }, `${oee.toFixed(0)}%`)
          );
        }))
      ),
      h('div', { style: { fontSize: 10, color: '#888', marginTop: 8, padding: '0 10px' } }, 'OEE = Доступность × Производительность × Качество. Мировой стандарт: 85%+')
    ),

    workerPerformance.length > 0 && h('div', { style: { ...S.card, marginBottom: 12 } },
      h('div', { style: S.sec }, 'KPI рабочих'),
      h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
        h('thead', null, h('tr', null, ['Рабочий', 'Операций', 'План (ч)', 'Факт (ч)', 'Выполн.', 'Брак', 'Простои'].map((t,i) => h('th', { key: i, style: S.th }, t)))),
        h('tbody', null, workerPerformance.map(w => h('tr', { key: w.workerId },
          h('td', { style: S.td }, w.workerName),
          h('td', { style: S.td }, w.opsCount),
          h('td', { style: S.td }, (w.totalPlanned / 3600000).toFixed(1)),
          h('td', { style: S.td }, (w.totalActual / 3600000).toFixed(1)),
          h('td', { style: { ...S.td, color: w.performance <= 100 ? GN : RD } }, `${w.performance.toFixed(1)}%`),
          h('td', { style: S.td }, w.defectCount),
          h('td', { style: S.td }, w.downtimeCount)
        )))
      )
    ),

    data.workers.length > 0 && h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 16 } },
      h('div', { style: S.card },
        h('div', { style: S.sec }, 'Топ по выполнению'),
        (() => {
          const top = data.workers.map(w => ({ name: w.name, count: doneOpsInPeriod.filter(op => op.workerId === w.id).length, level: getWorkerLevel(data.ops.filter(op => op.workerId === w.id && op.status === 'done').length) })).filter(w => w.count > 0).sort((a,b) => b.count - a.count).slice(0, 5);
          return top.length === 0 ? h('div', { style: { fontSize: 12, color: '#888' } }, 'Нет данных') : top.map((w, i) => h('div', { key: i, style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '4px 0', borderBottom: i < top.length - 1 ? '0.5px solid rgba(0,0,0,0.06)' : 'none' } },
            h('div', { style: { display: 'flex', alignItems: 'center', gap: 6 } },
              h('span', { style: { fontSize: 14, fontWeight: 500, color: i === 0 ? AM : '#888', width: 20 } }, `${i+1}.`),
              h('span', { style: { fontSize: 12 } }, w.name),
              h('span', { style: { fontSize: 10, color: AM, background: AM3, padding: '1px 6px', borderRadius: 6 } }, `Ур.${w.level}`)
            ),
            h('span', { style: { fontSize: 14, fontWeight: 500, color: GN } }, w.count)
          ));
        })()
      ),
      h('div', { style: S.card },
        h('div', { style: S.sec }, 'Топ по качеству'),
        (() => {
          const top = data.workers.map(w => {
            const done = doneOpsInPeriod.filter(op => op.workerId === w.id).length;
            const def = defectsInPeriod.filter(op => op.workerId === w.id).length;
            const total = done + def;
            return { name: w.name, rate: total > 0 ? (done / total * 100) : 0, total };
          }).filter(w => w.total >= 3).sort((a,b) => b.rate - a.rate).slice(0, 5);
          return top.length === 0 ? h('div', { style: { fontSize: 12, color: '#888' } }, 'Нет данных') : top.map((w, i) => h('div', { key: i, style: { display: 'flex', justifyContent: 'space-between', padding: '4px 0', borderBottom: i < top.length - 1 ? '0.5px solid rgba(0,0,0,0.06)' : 'none' } },
            h('div', { style: { display: 'flex', alignItems: 'center', gap: 6 } },
              h('span', { style: { fontSize: 14, fontWeight: 500, color: i === 0 ? AM : '#888', width: 20 } }, `${i+1}.`),
              h('span', { style: { fontSize: 12 } }, w.name)
            ),
            h('span', { style: { fontSize: 14, fontWeight: 500, color: w.rate >= 95 ? GN : AM } }, `${w.rate.toFixed(0)}%`)
          ));
        })()
      ),
      h('div', { style: S.card },
        h('div', { style: S.sec }, 'Топ по скорости'),
        (() => {
          const top = data.workers.map(w => {
            const ops = doneOpsInPeriod.filter(op => op.workerId === w.id && op.plannedHours && op.startedAt && op.finishedAt);
            if (ops.length < 3) return null;
            const ratio = ops.reduce((s, op) => s + ((op.finishedAt - op.startedAt) / (op.plannedHours * 3600000)), 0) / ops.length;
            return { name: w.name, ratio, count: ops.length };
          }).filter(Boolean).sort((a,b) => a.ratio - b.ratio).slice(0, 5);
          return top.length === 0 ? h('div', { style: { fontSize: 12, color: '#888' } }, 'Нет данных') : top.map((w, i) => h('div', { key: i, style: { display: 'flex', justifyContent: 'space-between', padding: '4px 0', borderBottom: i < top.length - 1 ? '0.5px solid rgba(0,0,0,0.06)' : 'none' } },
            h('div', { style: { display: 'flex', alignItems: 'center', gap: 6 } },
              h('span', { style: { fontSize: 14, fontWeight: 500, color: i === 0 ? AM : '#888', width: 20 } }, `${i+1}.`),
              h('span', { style: { fontSize: 12 } }, w.name)
            ),
            h('span', { style: { fontSize: 14, fontWeight: 500, color: w.ratio <= 1 ? GN : RD } }, `${Math.round(w.ratio * 100)}%`)
          ));
        })()
      )
    ),

    h('div', { style: { marginTop: 16, textAlign: 'right' } },
      h('button', { style: abtn({ padding: '10px 20px' }), onClick: exportToExcel }, '📥 Экспорт в Excel')
    )
  );
});

// ==================== ROOT APP ====================
function App() {
  const [data, setData] = useState(EMPTY_DATA);
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(true);
  const [synced, setSynced] = useState(false);
  const [role, setRole] = useState(null);
  const [workerId, setWorkerId] = useState(null);
  const [userName, setUserName] = useState('');
  const [sectionId, setSectionId] = useState(null);
  const [initialOpId, setInitialOpId] = useState(null);
  const [toasts, setToasts] = useState([]);
  const savingRef = useRef(false);

  useEffect(() => {
    DB.load().then(d => { setData(d); setLoading(false); setSynced(true); });
    const unsub = DB.onSnapshot(newData => {
      if (!savingRef.current) {
        setData(newData);
      }
    });
    const params = new URLSearchParams(window.location.search);
    const opId = params.get('opId');
    if (opId) setInitialOpId(opId);
    return () => unsub();
  }, []);

  // Подписка на сообщения (только за последние 7 дней)
  useEffect(() => {
    const cutoff = now() - 7 * 24 * 3600 * 1000;
    const messagesUnsub = MESSAGES_COLLECTION
      .where('ts', '>=', cutoff)
      .orderBy('ts', 'desc')
      .onSnapshot(snap => {
        const msgs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => a.ts - b.ts);
        setMessages(msgs);
      });
    return () => messagesUnsub();
  }, []);

  // Функция для удаления старых сообщений (можно вызывать при загрузке)
  useEffect(() => {
    const cutoff = now() - 7 * 24 * 3600 * 1000;
    MESSAGES_COLLECTION.where('ts', '<', cutoff).get().then(snapshot => {
      const batch = firestore.batch();
      snapshot.forEach(doc => batch.delete(doc.ref));
      return batch.commit();
    }).catch(err => console.error('Error cleaning old messages:', err));
  }, []);

  const save = (d) => {
    savingRef.current = true;
    setData(d);
    DB.save(d).finally(() => { setTimeout(() => { savingRef.current = false; }, 1500); });
  };
  const goBack = () => { setRole(null); setWorkerId(null); setUserName(''); setSectionId(null); setInitialOpId(null); window.history.replaceState({}, '', window.location.pathname); };

  const addToast = useCallback((message, type = 'info') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
  }, []);
  const removeToast = useCallback(id => setToasts(prev => prev.filter(t => t.id !== id)), []);

  // Отправка сообщения
  const sendMessage = useCallback((text) => {
    if (!userName) return;
    const msg = {
      fromUserId: role === 'worker' ? workerId : role,
      fromName: userName,
      text,
      ts: now(),
      likes: []
    };
    MESSAGES_COLLECTION.add(msg).catch(err => {
      console.error('Error sending message:', err);
      addToast('Ошибка отправки сообщения', 'error');
    });
  }, [role, workerId, userName, addToast]);

  // Удаление сообщения
  const deleteMessage = useCallback(async (messageId, authorId) => {
    if (role !== 'master' && authorId !== (role === 'worker' ? workerId : role)) {
      addToast('Недостаточно прав', 'error');
      return;
    }
    try {
      await MESSAGES_COLLECTION.doc(messageId).delete();
      addToast('Сообщение удалено', 'success');
    } catch (err) {
      console.error('Error deleting message:', err);
      addToast('Ошибка удаления', 'error');
    }
  }, [role, workerId, addToast]);

  // Лайк / дизлайк
  const likeMessage = useCallback(async (messageId, authorId, currentlyLiked) => {
    const userId = role === 'worker' ? workerId : role;
    const messageRef = MESSAGES_COLLECTION.doc(messageId);
    try {
      await firestore.runTransaction(async (transaction) => {
        const msgDoc = await transaction.get(messageRef);
        if (!msgDoc.exists) return;
        const msg = msgDoc.data();
        let likes = msg.likes || [];
        if (currentlyLiked) {
          likes = likes.filter(id => id !== userId);
        } else {
          likes.push(userId);
        }
        transaction.update(messageRef, { likes });

        // Если автор – рабочий, обновляем totalLikes в основном документе (data.workers)
        if (authorId && typeof authorId === 'string' && authorId.length === 6) {
          // Получаем текущие данные
          const currentData = data;
          const workerIndex = currentData.workers.findIndex(w => w.id === authorId);
          if (workerIndex >= 0) {
            const newTotalLikes = (currentData.workers[workerIndex].totalLikes || 0) + (currentlyLiked ? -1 : 1);
            const updatedWorkers = [...currentData.workers];
            updatedWorkers[workerIndex] = { ...updatedWorkers[workerIndex], totalLikes: newTotalLikes };
            const newData = { ...currentData, workers: updatedWorkers };
            setData(newData);
            await DB.save(newData);
          }
        }
      });
    } catch (err) {
      console.error('Error liking message:', err);
      addToast('Ошибка', 'error');
    }
  }, [role, workerId, data]);

  if (loading) return h('div', { style: { padding: 48, textAlign: 'center' } },
    h('div', { style: { fontSize: 16, marginBottom: 8 } }, 'Загрузка...'),
    h('div', { style: { fontSize: 12, color: '#888' } }, 'Подключение к Firebase')
  );

  if (initialOpId) {
    return h('div', null,
      h('div', { style: { display: 'flex', gap: 12, padding: '10px 0', borderBottom: '0.5px solid rgba(0,0,0,0.08)' } },
        h('button', { style: gbtn({ fontSize: 11 }), onClick: goBack }, '← На главную'),
        h('div', { style: { fontSize: 12, color: '#888' } }, 'QR-операция')
      ),
      h(QRScreen, { data, opId: initialOpId, onUpdate: save, addToast }),
      h('div', null, toasts.map(t => h(Toast, { key: t.id, message: t.message, onClose: () => removeToast(t.id) })))
    );
  }

  if (!role) {
    return h(LoginScreen, { data, onLogin: (r, wid, name, sid) => { setRole(r); setWorkerId(wid); setUserName(name); setSectionId(sid); } });
  }

  const commonProps = {
    data, onUpdate: save, addToast,
    messages, onSendMessage: sendMessage,
    onDeleteMessage: deleteMessage,
    onLikeMessage: likeMessage,
    userId: role === 'worker' ? workerId : role,
    userName
  };

  return h('div', null,
    role && h('div', { style: { display: 'flex', gap: 12, padding: '10px 0', borderBottom: '0.5px solid rgba(0,0,0,0.08)', alignItems: 'center' } },
      h('button', { style: gbtn({ fontSize: 11 }), onClick: goBack }, '← Выход'),
      h('div', { style: { fontSize: 12, color: '#888' } }, 
        role === 'master' ? 'Мастер' : 
        role === 'controller' ? 'Контролёр' :
        role === 'dashboard' ? 'Дашборд' : 
        userName
      ),
      h('div', { style: { marginLeft: 'auto', fontSize: 10, color: synced ? GN : '#888', display: 'flex', alignItems: 'center', gap: 4 } },
        h('span', { style: { width: 6, height: 6, borderRadius: '50%', background: synced ? GN : '#ccc', display: 'inline-block' } }),
        synced ? 'Firebase' : 'Оффлайн'
      )
    ),
    role === 'master' && h(MasterScreen, { ...commonProps, sectionId }),
    role === 'controller' && h(ControllerScreen, commonProps),
    role === 'worker' && workerId && h(WorkerScreen, { ...commonProps, workerId, sectionId, initialOpId: null }),
    role === 'dashboard' && h(Dashboard, { data, addToast }),
    h('div', null, toasts.map(t => h(Toast, { key: t.id, message: t.message, onClose: () => removeToast(t.id) })))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
