  <style>
    *{box-sizing:border-box}
    :root{
      --fs-xs:11px;--fs-sm:12px;--fs-base:14px;--fs-md:15px;--fs-lg:17px;
      --fw-normal:400;--fw-medium:500;
      --r-sm:8px;--r-md:10px;--r-lg:12px;--r-xl:14px;
      --bg:#f5f5f2;--fg:#1a1a18;--card:#fff;--border:rgba(0,0,0,.25);--border-soft:rgba(0,0,0,.08);--muted:#888;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#1a1a18;--fg:#e8e6e0;--card:#26262c;--border:rgba(255,255,255,.2);--border-soft:rgba(255,255,255,.08);--muted:#999;
      }
    }
    body{margin:0;padding:16px;font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);-webkit-text-size-adjust:100%}
    input,select,textarea,button{font-family:inherit}
    input,select,textarea{font-size:16px;background:var(--card);color:var(--fg);border:.5px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;outline:none;width:100%}
    button{cursor:pointer;border-radius:var(--r-sm);font-size:14px;font-weight:500;padding:10px 16px;background:transparent;border:.5px solid var(--border);color:var(--fg);min-height:44px}
    button:disabled{opacity:.4;cursor:not-allowed}
    button:active:not(:disabled){opacity:.85;transform:scale(0.98)}
    #root{max-width:1200px;margin:0 auto}
    .deadline-warning{color:#E24B4A;font-weight:500;margin-left:4px}
    .priority-critical{color:#E24B4A;font-weight:700}
    .priority-high{color:#EF9F27;font-weight:600}
    .priority-medium{color:#378ADD}
    .toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));right:20px;left:20px;background:#333;color:#fff;padding:12px 20px;border-radius:var(--r-md);z-index:1000;animation:slideIn .3s;font-size:14px}
    @keyframes slideIn{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    .error-message{color:#E24B4A;font-size:11px;margin-top:2px}
    .pagination{display:flex;gap:8px;justify-content:center;margin-top:12px;align-items:center;flex-wrap:wrap}
    .notification-badge{background:#E24B4A;color:#fff;border-radius:50%;padding:2px 6px;font-size:10px;margin-left:4px}
    .gantt-container{overflow-x:auto;background:#fff;border-radius:var(--r-sm);padding:12px;-webkit-overflow-scrolling:touch}
    .gantt-row{display:flex;border-bottom:1px solid #eee}
    .gantt-label{width:150px;flex-shrink:0;padding:8px;font-weight:500;background:#f8f8f5;border-right:1px solid #eee}
    .gantt-timeline{display:flex;flex:1;position:relative;min-height:50px}
    .gantt-cell{flex:1;border-left:1px solid #f0f0f0;text-align:center;font-size:10px;color:#888;padding-top:4px}
    .gantt-bar{position:absolute;background:#EF9F27;border-radius:4px;padding:2px 4px;font-size:10px;color:#412402;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
    .worker-calendar-table{border-collapse:collapse;width:100%;font-size:12px}
    .worker-calendar-table th,.worker-calendar-table td{border:1px solid #ddd;padding:6px 4px;text-align:center}
    .worker-calendar-table th{background:#f8f8f5;font-weight:500}
    .worker-cell{background:#fff}
    .worker-cell.overload{background:#fcebeb;color:#e24b4a;font-weight:500}
    .worker-cell.vacation{background:#e6f1fb;color:#042c53}
    .worker-cell.sick{background:#fcebeb;color:#e24b4a}
    .checkbox-group{display:flex;flex-wrap:wrap;gap:8px;max-height:120px;overflow-y:auto;border:.5px solid rgba(0,0,0,.15);border-radius:var(--r-sm);padding:8px;background:#fff}
    .checkbox-group label{display:flex;align-items:center;gap:4px;font-size:13px;min-height:36px}
    .report-builder{background:#fff;border-radius:var(--r-lg);padding:16px;margin-bottom:16px}
    .chart-container{background:#fff;border-radius:var(--r-lg);padding:16px;margin-bottom:16px}
    canvas{max-height:300px;width:100%}
    .table-responsive{overflow-x:auto;-webkit-overflow-scrolling:touch}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
    .empty-state{text-align:center;padding:32px 16px;color:#888;font-size:14px}
    .tabs-scroll{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
    .tabs-scroll::-webkit-scrollbar{display:none}
    .tabs-scroll button{flex-shrink:0;white-space:nowrap}
    .modal-content{background:#fff;border-radius:var(--r-lg);padding:24px;width:min(680px, calc(100vw - 32px));max-height:85vh;overflow-y:auto}
    .metrics-grid{display:grid;gap:10px;margin-bottom:16px}
    /* Кнопки рабочего — сверхкрупные */
    .worker-btn{display:block;width:100%;border:none;border-radius:var(--r-xl);cursor:pointer;font-weight:500;font-family:inherit;transition:opacity .12s,transform .1s}
    .worker-btn:active{opacity:.87;transform:scale(0.985)}
    .worker-btn-start{padding:22px 16px;font-size:18px;background:#EF9F27;color:#412402;min-height:68px}
    .worker-btn-stop{padding:22px 16px;font-size:18px;background:#E24B4A;color:#fff;min-height:68px}
    .worker-btn-defect{padding:18px 12px;font-size:15px;background:#FCEBEB;color:#791F1F;border:0.5px solid #F09595;border-radius:var(--r-lg);min-height:58px;cursor:pointer;font-family:inherit;font-weight:500;flex:1}
    .worker-btn-pause{padding:16px;font-size:14px;background:#fff;color:#666;border:0.5px solid rgba(0,0,0,0.18);border-radius:var(--r-lg);min-height:52px;cursor:pointer;font-family:inherit;font-weight:500;width:100%}
    @media(max-width:600px){
      body{padding:8px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px))}
      .metrics-grid{grid-template-columns:repeat(2,1fr)!important}
      .m-card{padding:12px!important;margin-bottom:8px!important}
      .modal-content{width:100vw!important;max-height:100vh!important;border-radius:0!important;padding:16px!important;margin:0!important}
      table{font-size:11px}
      th,td{padding:6px 4px!important}
      .form-row{flex-direction:column!important}
      .form-row>div{min-width:0!important;width:100%!important}
      .header-bar{padding:6px 0!important;gap:8px!important}
      .header-bar button{font-size:12px!important;padding:6px 10px!important;min-height:40px!important}
      .action-btns{flex-direction:column!important}
      .action-btns button{width:100%!important}
      .tab-groups{gap:4px!important}
      .tab-groups button{font-size:11px!important;padding:6px 10px!important;min-height:40px}
      .forecast-grid{grid-template-columns:repeat(4,1fr)!important}
      .kanban-col{flex:0 0 120px!important}
      .toast{left:8px;right:8px;bottom:calc(8px + env(safe-area-inset-bottom,0px))}
    }
    @media(min-width:601px) and (max-width:900px){
      body{padding:12px}
      .metrics-grid{grid-template-columns:repeat(3,1fr)!important}
      .forecast-grid{grid-template-columns:repeat(7,1fr)!important}
    }
    @media(min-width:901px){
      .metrics-grid{grid-template-columns:repeat(5,1fr)!important}
      .forecast-grid{grid-template-columns:repeat(7,1fr)!important}
    }
    
    /* ══════ MOBILE & DARK THEME IMPROVEMENTS ══════ */
    /* Typography hierarchy */
    h1, .h1{font-size:20px;font-weight:700;line-height:1.3;margin:0}
    h2, .h2{font-size:16px;font-weight:600;line-height:1.3;margin:0}
    h3, .h3{font-size:14px;font-weight:600;line-height:1.4;margin:0}
    h4, .h4{font-size:12px;font-weight:500;line-height:1.4;text-transform:uppercase;color:var(--muted);margin:0}
    
    /* Safe area for notches (iPhone, Android) */
    @supports(padding-top:max(0px)){
      body{padding-top:max(16px, env(safe-area-inset-top, 0px))}
      .header-safe{padding-left:max(16px, env(safe-area-inset-left, 0px));padding-right:max(16px, env(safe-area-inset-right, 0px))}
    }
    
    /* Input min-size for touch */
    input[type="checkbox"], input[type="radio"]{min-height:24px;min-width:24px}
    
    /* Better dark mode for interactive elements */
    @media(prefers-color-scheme:dark){
      input,select,textarea{background:var(--card);border-color:var(--border)}
      button{background:transparent;color:var(--fg);border-color:var(--border)}
      .modal-content{background:var(--card)}
      .gantt-container{background:var(--card)}
      .checkbox-group{background:var(--card);border-color:var(--border)}
      .worker-btn-pause{background:var(--card);color:var(--fg);border-color:var(--border)}
    }
    
    /* Responsive header */
    @media(max-width:600px){
      h1, .h1{font-size:18px}
      h2, .h2{font-size:14px}
      h3, .h3{font-size:12px}
    }
  </style>
</head>
