// ==================== KPI-отчёт для премирования ====================
const KPIReport = memo(({ data }) => {
  const [period, setPeriod] = useState(30);
  const periodStart = useMemo(() => now() - period * 86400000, [period]);

  const workerKPIs = useMemo(() => {
    return data.workers.map(w => {
      const wid = w.id;
      const allOps = data.ops.filter(op => op.workerIds?.includes(wid));
      const doneInPeriod = allOps.filter(op => op.status === 'done' && op.finishedAt >= periodStart);
      const defectInPeriod = allOps.filter(op => op.status === 'defect' && op.finishedAt >= periodStart);
      const totalInPeriod = doneInPeriod.length + defectInPeriod.length;
      const allDone = allOps.filter(op => op.status === 'done').length;
      const level = getWorkerLevel(allDone);
      const levelTitle = getLevelTitle(level);

      // Производительность: факт/план
      const withPlan = doneInPeriod.filter(op => op.plannedHours && op.startedAt && op.finishedAt);
      const productivity = withPlan.length > 0 ? Math.round(withPlan.reduce((s, op) => s + op.plannedHours * 3600000, 0) / withPlan.reduce((s, op) => s + (op.finishedAt - op.startedAt), 0) * 100) : null;

      // Качество: % без брака
      const quality = totalInPeriod > 0 ? Math.round(doneInPeriod.length / totalInPeriod * 100) : 100;

      // Дисциплина: простои по вине рабочего
      const downtimes = data.events.filter(e => e.workerId === wid && e.type === 'downtime' && e.ts >= periodStart);
      const downtimeHrs = Math.round(downtimes.reduce((s, e) => s + (e.duration || 0), 0) / 3600000 * 10) / 10;

      // Универсальность: количество разных типов операций
      const uniqueOps = new Set(doneInPeriod.map(op => op.name)).size;

      // Достижения за период
      const achievements = (w.achievements || []).length;

      // Итоговый KPI-балл (0-100)
      const kpiScore = Math.min(100, Math.round(
        (doneInPeriod.length > 0 ? 20 : 0) + // есть выработка
        Math.min((productivity || 0) / 5, 25) + // производительность до 25
        Math.min(quality / 4, 25) + // качество до 25
        Math.min(uniqueOps * 3, 15) + // универсальность до 15
        Math.min(level, 10) + // уровень до 10
        (downtimeHrs === 0 ? 5 : 0) // без простоев +5
      ));

      // Рекомендация по премированию
      const bonusLevel = kpiScore >= 85 ? 'A' : kpiScore >= 70 ? 'B' : kpiScore >= 50 ? 'C' : 'D';
      const bonusPct = bonusLevel === 'A' ? 30 : bonusLevel === 'B' ? 15 : bonusLevel === 'C' ? 0 : -10;

      return { ...w, level, levelTitle, doneCount: doneInPeriod.length, defectCount: defectInPeriod.length, productivity, quality, downtimeHrs, uniqueOps, achievements, kpiScore, bonusLevel, bonusPct };
    }).filter(w => (w.status || 'working') === 'working' || w.doneCount > 0).sort((a, b) => b.kpiScore - a.kpiScore);
  }, [data, periodStart]);

  const exportKPI = useCallback(() => {
    const ws = XLSX.utils.json_to_sheet(workerKPIs.map(w => ({
      'Сотрудник': w.name, 'Должность': w.position || '', 'Уровень': `${w.level} (${w.levelTitle})`,
      'Операций': w.doneCount, 'Брак': w.defectCount, 'Качество %': w.quality,
      'Производит. %': w.productivity || '', 'Универсальность': w.uniqueOps,
      'Простои (ч)': w.downtimeHrs, 'KPI': w.kpiScore, 'Грейд': w.bonusLevel, 'Премия %': w.bonusPct
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'KPI');
    XLSX.writeFile(wb, `kpi_report_${period}d_${new Date().toISOString().slice(0, 10)}.xlsx`);
  }, [workerKPIs, period]);

  const bonusColors = { A: GN, B: AM, C: '#888', D: RD };

  return h('div', null,
    h('div', { style: { display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap', alignItems: 'center' } },
      h('span', { style: { fontSize: 12, fontWeight: 500 } }, 'Период:'),
      [7, 14, 30, 60, 90].map(d => h('button', { key: d, style: period === d ? abtn({ fontSize: 11 }) : gbtn({ fontSize: 11 }), onClick: () => setPeriod(d) }, `${d} дней`)),
      h('button', { style: gbtn({ marginLeft: 'auto' }), onClick: exportKPI }, '📥 Экспорт KPI в Excel')
    ),
    // Легенда грейдов
    h('div', { style: { ...S.card, marginBottom: 12, padding: 10, display: 'flex', gap: 16, flexWrap: 'wrap', fontSize: 11 } },
      h('span', { style: { fontWeight: 500 } }, 'Грейды:'),
      h('span', { style: { color: GN } }, 'A (85+) = +30% премия'),
      h('span', { style: { color: AM } }, 'B (70-84) = +15%'),
      h('span', { style: { color: '#888' } }, 'C (50-69) = 0%'),
      h('span', { style: { color: RD } }, 'D (<50) = −10%')
    ),
    workerKPIs.length === 0 ? h('div', { style: { ...S.card, textAlign: 'center', color: '#888' } }, 'Нет данных за период') :
      h('div', { style: { ...S.card, padding: 0 } }, h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
        h('thead', null, h('tr', null, ['Сотрудник', 'Ур.', 'Операций', 'Качество', 'Произв.', 'Универс.', 'Простои', 'KPI', 'Грейд'].map((t, i) => h('th', { key: i, style: S.th }, t)))),
        h('tbody', null, workerKPIs.map((w, i) => h('tr', { key: w.id, style: { background: i === 0 ? '#FFFDE7' : 'transparent' } },
          h('td', { style: { ...S.td, fontWeight: 500 } }, w.name, i === 0 && h('span', { style: { marginLeft: 4 } }, '🏆')),
          h('td', { style: { ...S.td, textAlign: 'center' } }, h('span', { style: { padding: '2px 6px', fontSize: 10, borderRadius: 6, background: AM3, color: AM2 } }, `${w.level}`)),
          h('td', { style: { ...S.td, textAlign: 'center' } }, w.doneCount, w.defectCount > 0 && h('span', { style: { color: RD, marginLeft: 4, fontSize: 10 } }, `−${w.defectCount}`)),
          h('td', { style: { ...S.td, textAlign: 'center', color: w.quality >= 95 ? GN : w.quality >= 80 ? AM : RD, fontWeight: 500 } }, `${w.quality}%`),
          h('td', { style: { ...S.td, textAlign: 'center', color: w.productivity ? (w.productivity >= 100 ? GN : w.productivity >= 80 ? AM : RD) : '#888' } }, w.productivity ? `${w.productivity}%` : '—'),
          h('td', { style: { ...S.td, textAlign: 'center' } }, w.uniqueOps),
          h('td', { style: { ...S.td, textAlign: 'center', color: w.downtimeHrs > 0 ? RD : GN } }, w.downtimeHrs > 0 ? `${w.downtimeHrs}ч` : '✓'),
          h('td', { style: { ...S.td, textAlign: 'center', fontSize: 16, fontWeight: 500, color: bonusColors[w.bonusLevel] || '#888' } }, w.kpiScore),
          h('td', { style: { ...S.td, textAlign: 'center' } },
            h('span', { style: { display: 'inline-block', width: 28, height: 28, lineHeight: '28px', textAlign: 'center', borderRadius: '50%', fontWeight: 700, fontSize: 13, color: '#fff', background: bonusColors[w.bonusLevel] || '#888' } }, w.bonusLevel),
            h('div', { style: { fontSize: 9, color: bonusColors[w.bonusLevel], marginTop: 2 } }, `${w.bonusPct > 0 ? '+' : ''}${w.bonusPct}%`)
          )
        )))
      )))
  );
});

// ==================== Рекомендации по назначениям ====================
const AssignmentRecommendations = memo(({ data, onUpdate, addToast }) => {
  const recommendations = useMemo(() => getAssignmentRecommendations(data), [data]);

  const assignWorker = useCallback(async (opId, workerId) => {
    const op = data.ops.find(o => o.id === opId);
    if (!op) return;
    const d = { ...data, ops: data.ops.map(o => o.id === opId ? { ...o, workerIds: [...new Set([...(o.workerIds || []), workerId])] } : o) };
    const worker = data.workers.find(w => w.id === workerId);
    await DB.save(d); onUpdate(d);
    addToast(`${worker?.name} назначен на "${op.name}"`, 'success');
  }, [data, onUpdate, addToast]);

  const assignAll = useCallback(async () => {
    if (!confirm(`Назначить лучших кандидатов на ${recommendations.length} операций?`)) return;
    let updated = { ...data };
    let count = 0;
    recommendations.forEach(rec => {
      if (rec.candidates.length > 0) {
        const bestId = rec.candidates[0].workerId;
        updated = { ...updated, ops: updated.ops.map(o => o.id === rec.opId ? { ...o, workerIds: [...new Set([...(o.workerIds || []), bestId])] } : o) };
        count++;
      }
    });
    if (count > 0) {
      await DB.save(updated); onUpdate(updated);
      addToast(`Назначено: ${count} операций`, 'success');
    }
  }, [data, recommendations, onUpdate, addToast]);

  return h('div', null,
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 } },
      h('div', { style: S.sec }, `Рекомендации по назначениям (${recommendations.length} без исполнителя)`),
      recommendations.length > 0 && h('button', { style: abtn(), onClick: assignAll }, `🤖 Назначить всех (${recommendations.length})`)
    ),
    recommendations.length === 0
      ? h('div', { style: { ...S.card, textAlign: 'center', color: '#888', padding: 20 } }, 'Все операции имеют исполнителей')
      : recommendations.slice(0, 20).map(rec => h('div', { key: rec.opId, style: { ...S.card, padding: 12, marginBottom: 8, borderLeft: `4px solid ${PRIORITY[rec.orderPriority]?.color || '#888'}` } },
          h('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: 8 } },

              h('span', { style: { fontSize: 13, fontWeight: 500 } }, rec.opName),
              h('span', { style: { marginLeft: 8, fontSize: 11, color: AM } }, rec.orderNumber),
              rec.deadline && h('span', { style: { marginLeft: 8, fontSize: 10, color: '#888' } }, `до ${rec.deadline}`)
            ),
            h('span', { style: { fontSize: 10, color: PRIORITY[rec.orderPriority]?.color } }, PRIORITY[rec.orderPriority]?.label)
          ),
          rec.candidates.length === 0
            ? h('div', { style: { fontSize: 11, color: RD } }, 'Нет подходящих кандидатов (проверьте компетенции и статусы)')
            : h('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap' } },
                rec.candidates.map((c, i) => h('div', { key: c.workerId, style: { display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px', borderRadius: 8, background: i === 0 ? GN3 : '#f8f8f5', border: i === 0 ? `0.5px solid ${GN}` : '0.5px solid rgba(0,0,0,0.08)', cursor: 'pointer' }, onClick: () => assignWorker(rec.opId, c.workerId) },
                  h('div', null,
                    h('div', { style: { fontSize: 12, fontWeight: i === 0 ? 500 : 400 } }, c.workerName, i === 0 && h('span', { style: { marginLeft: 4, fontSize: 10, color: GN } }, '★ лучший')),

// ==================== MasterReclamations (рекламации от заказчиков) ====================
const MasterReclamations = memo(({ data, onUpdate, addToast }) => {
  const [form, setForm] = useState({ orderId: '', description: '', severity: 'minor', detectedDate: '', operationName: '' });
  const [showForm, setShowForm] = useState(false);

  const addReclamation = useCallback(async () => {

    const rec = { id: uid(), orderId: form.orderId, description: form.description.trim(), severity: form.severity, detectedDate: form.detectedDate || new Date().toISOString().slice(0, 10), operationName: form.operationName, status: 'open', createdAt: now() };
    let d = { ...data, reclamations: [...(data.reclamations || []), rec] };
    d = logAction(d, 'reclamation_add', { orderId: form.orderId, orderNumber: data.orders.find(o => o.id === form.orderId)?.number });
    await DB.save(d); onUpdate(d);
    setForm({ orderId: '', description: '', severity: 'minor', detectedDate: '', operationName: '' }); setShowForm(false);

  }, [data, onUpdate, addToast]);

  const delRec = useCallback(async (id) => {
    if (!confirm('Удалить рекламацию?')) return;

  const statusStyle = { open: { bg: RD3, cl: RD, label: 'Открыта' }, in_work: { bg: AM3, cl: AM2, label: 'В работе' }, closed: { bg: GN3, cl: GN2, label: 'Закрыта' } };

  // Статистика: какие операции чаще порождают рекламации

    const counts = {};

// ==================== AnalyticsDashboard (Волна 1: Lead Time, Такт, Нормы, Парето, Тренды) ====================
const AnalyticsDashboard = memo(({ data }) => {
  const [period, setPeriod] = useState(30);
  const periodStart = useMemo(() => now() - period * 86400000, [period]);
  const chartRef1 = useRef(null); const canvasRef1 = useRef(null);
  const chartRef2 = useRef(null); const canvasRef2 = useRef(null);

  // ===== 1. Lead Time по заказам =====
  const leadTimeData = useMemo(() => {
    return data.orders.filter(o => !o.archived).map(order => {
      const ops = data.ops.filter(op => op.orderId === order.id);
      const doneOps = ops.filter(op => op.status === 'done' && op.startedAt && op.finishedAt);
      if (doneOps.length === 0) return null;
      const firstStart = Math.min(...doneOps.map(op => op.startedAt));
      const lastFinish = Math.max(...doneOps.map(op => op.finishedAt));
      const totalElapsed = lastFinish - firstStart; // общее время от начала до конца
      const workingTime = doneOps.reduce((s, op) => s + (op.finishedAt - op.startedAt), 0); // время в работе
      const waitingTime = totalElapsed - workingTime; // время ожидания между этапами
      const allDone = ops.every(op => op.status === 'done' || op.status === 'defect');
      return { id: order.id, number: order.number, product: order.product, totalElapsed, workingTime, waitingTime, waitingPct: totalElapsed > 0 ? Math.round(waitingTime / totalElapsed * 100) : 0, opsDone: doneOps.length, opsTotal: ops.length, completed: allDone, firstStart, lastFinish };
    }).filter(Boolean).sort((a, b) => b.lastFinish - a.lastFinish);
  }, [data.orders, data.ops]);

  const avgLeadTime = leadTimeData.length > 0 ? leadTimeData.reduce((s, d) => s + d.totalElapsed, 0) / leadTimeData.length : 0;
  const avgWaitingPct = leadTimeData.length > 0 ? Math.round(leadTimeData.reduce((s, d) => s + d.waitingPct, 0) / leadTimeData.length) : 0;

  // ===== 2. Автонормирование =====
  const normSuggestions = useMemo(() => {
    const byName = {};
    data.ops.filter(op => op.status === 'done' && op.startedAt && op.finishedAt && op.finishedAt >= periodStart).forEach(op => {
      if (!byName[op.name]) byName[op.name] = { times: [], currentNorm: null };
      byName[op.name].times.push((op.finishedAt - op.startedAt) / 3600000);
      if (op.plannedHours) byName[op.name].currentNorm = op.plannedHours;
    });
    return Object.entries(byName).map(([name, stats]) => {
      const sorted = stats.times.sort((a, b) => a - b);
      const median = sorted[Math.floor(sorted.length / 2)];
      const avg = stats.times.reduce((s, t) => s + t, 0) / stats.times.length;
      const suggested = Math.round(median * 10) / 10;
      const current = stats.currentNorm;
      const deviation = current ? Math.round((avg / current - 1) * 100) : null;
      return { name, count: stats.times.length, avg: Math.round(avg * 10) / 10, median: suggested, min: Math.round(Math.min(...stats.times) * 10) / 10, max: Math.round(Math.max(...stats.times) * 10) / 10, current, suggested, deviation };
    }).filter(s => s.count >= 3).sort((a, b) => Math.abs(b.deviation || 0) - Math.abs(a.deviation || 0));
  }, [data.ops, periodStart]);

  // ===== 3. Расчёт такта =====
  const taktData = useMemo(() => {
    const completedOrders = data.orders.filter(o => {
      const ops = data.ops.filter(op => op.orderId === o.id);
      return ops.length > 0 && ops.every(op => op.status === 'done' || op.status === 'defect');
    });
    const completedInPeriod = completedOrders.filter(o => {
      const lastOp = data.ops.filter(op => op.orderId === o.id && op.finishedAt).sort((a, b) => b.finishedAt - a.finishedAt)[0];
      return lastOp && lastOp.finishedAt >= periodStart;
    });
    const pendingOrders = data.orders.filter(o => !o.archived && data.ops.some(op => op.orderId === o.id && op.status !== 'done' && op.status !== 'defect'));
    const daysInPeriod = period;
    const actualRate = completedInPeriod.length / daysInPeriod; // заказов в день
    // Требуемый такт: незавершённые заказы / оставшееся время до ближайшего дедлайна
    const withDeadline = pendingOrders.filter(o => o.deadline);
    const avgDaysToDeadline = withDeadline.length > 0 ? withDeadline.reduce((s, o) => s + Math.max(1, (new Date(o.deadline).getTime() - now()) / 86400000), 0) / withDeadline.length : 30;
    const requiredRate = pendingOrders.length > 0 ? pendingOrders.length / avgDaysToDeadline : 0;
    const taktOk = actualRate >= requiredRate || requiredRate === 0;
    return { completedInPeriod: completedInPeriod.length, pendingOrders: pendingOrders.length, actualRate: Math.round(actualRate * 100) / 100, requiredRate: Math.round(requiredRate * 100) / 100, taktOk, avgDaysToDeadline: Math.round(avgDaysToDeadline) };
  }, [data.orders, data.ops, period, periodStart]);

  // ===== 4. Парето-анализ простоев =====
  const paretoData = useMemo(() => {
    const downtimes = data.events.filter(e => e.type === 'downtime' && e.ts >= periodStart);
    const byReason = {};
    downtimes.forEach(e => {
      const reason = data.downtimeTypes.find(dt => dt.id === e.downtimeTypeId)?.name || 'Неизвестно';
      if (!byReason[reason]) byReason[reason] = { count: 0, totalMs: 0 };
      byReason[reason].count++;
      byReason[reason].totalMs += (e.duration || 0);
    });
    const sorted = Object.entries(byReason).sort((a, b) => b[1].totalMs - a[1].totalMs);
    const totalMs = sorted.reduce((s, [, v]) => s + v.totalMs, 0);
    let cumulative = 0;
    return sorted.map(([reason, stat]) => {
      cumulative += stat.totalMs;
      return { reason, count: stat.count, totalHrs: Math.round(stat.totalMs / 3600000 * 10) / 10, pct: totalMs > 0 ? Math.round(stat.totalMs / totalMs * 100) : 0, cumPct: totalMs > 0 ? Math.round(cumulative / totalMs * 100) : 0 };
    });

      const done = data.ops.filter(op => op.status === 'done' && op.finishedAt >= weekStart && op.finishedAt < weekEnd).length;
      const defect = data.ops.filter(op => op.status === 'defect' && op.finishedAt >= weekStart && op.finishedAt < weekEnd).length;
      const total = done + defect;
      const rate = total > 0 ? Math.round(defect / total * 1000) / 10 : 0;
      weeks.push({ weekNum: i, label: i === 0 ? 'Тек.' : `-${i}нед`, done, defect, total, rate });
    }
    weeks.reverse();
    // Тренд: растёт ли брак последние 3 недели
    const recent = weeks.slice(-3);
    const trending = recent.length >= 3 && recent[2].rate > recent[1].rate && recent[1].rate > recent[0].rate && recent[2].rate > 2;
    return { weeks, trending };
  }, [data.ops, period]);

  // Chart.js для Парето
  useEffect(() => {

      data: { labels: paretoData.map(d => d.reason.length > 15 ? d.reason.slice(0, 15) + '…' : d.reason), datasets: [
        { label: 'Часы простоя', data: paretoData.map(d => d.totalHrs), backgroundColor: RD, borderRadius: 4, yAxisID: 'y' },
        { label: 'Накопительный %', data: paretoData.map(d => d.cumPct), type: 'line', borderColor: AM, pointBackgroundColor: AM, yAxisID: 'y1', tension: 0.3 }
      ]},
      options: { responsive: true, plugins: { legend: { display: true, position: 'bottom', labels: { font: { size: 10 } } } }, scales: { y: { beginAtZero: true, title: { display: true, text: 'Часы' } }, y1: { position: 'right', min: 0, max: 100, title: { display: true, text: '%' }, grid: { display: false } } } }
    });
    return () => { if (chartRef1.current) chartRef1.current.destroy(); };
  }, [paretoData]);

  useEffect(() => {
    if (!canvasRef2.current || !window.Chart || qualityTrends.weeks.length === 0) return;
    if (chartRef2.current) chartRef2.current.destroy();
    chartRef2.current = new Chart(canvasRef2.current, {
      type: 'bar',
      data: { labels: qualityTrends.weeks.map(w => w.label), datasets: [
        { label: 'Выполнено', data: qualityTrends.weeks.map(w => w.done), backgroundColor: GN, borderRadius: 4, stack: 'a' },
        { label: 'Брак', data: qualityTrends.weeks.map(w => w.defect), backgroundColor: RD, borderRadius: 4, stack: 'a' },
        { label: 'Брак %', data: qualityTrends.weeks.map(w => w.rate), type: 'line', borderColor: AM, pointBackgroundColor: AM, yAxisID: 'y1', tension: 0.3 }
      ]},
      options: { responsive: true, plugins: { legend: { display: true, position: 'bottom', labels: { font: { size: 10 } } } }, scales: { y: { beginAtZero: true, stacked: true, title: { display: true, text: 'Операций' } }, y1: { position: 'right', min: 0, title: { display: true, text: 'Брак %' }, grid: { display: false } } } }
    });
    return () => { if (chartRef2.current) chartRef2.current.destroy(); };
  }, [qualityTrends]);

  return h('div', null,
    // Период
    h('div', { style: { display: 'flex', gap: 6, marginBottom: 16, flexWrap: 'wrap' } },
      [7, 14, 30, 60, 90].map(d => h('button', { key: d, style: period === d ? abtn({ fontSize: 11 }) : gbtn({ fontSize: 11 }), onClick: () => setPeriod(d) }, `${d} дней`))
    ),

    // Алерт: тренд качества
    qualityTrends.trending && h('div', { role: 'alert', style: { ...S.card, background: RD3, border: `0.5px solid ${RD}`, marginBottom: 12, padding: 12 } },
      h('div', { style: { fontSize: 12, color: RD, fontWeight: 500 } }, '⚠ Брак растёт 3 недели подряд! Возможна системная проблема — проверьте оборудование и материалы.')

        h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 28, fontWeight: 500, color: GN } }, taktData.completedInPeriod), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, `Завершено за ${period}д`)),
        h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 28, fontWeight: 500, color: AM } }, taktData.pendingOrders), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'В очереди')),

        h('div', { style: { ...S.card, textAlign: 'center', padding: 10, marginBottom: 0 } }, h('div', { style: { fontSize: 28, fontWeight: 500, color: taktData.taktOk ? GN : RD } }, `${taktData.requiredRate}`), h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Нужно (заказов/день)'))

const QRScreen = memo(({ data, opId, onUpdate, addToast }) => {
  const op = data.ops.find(o => o.id === opId);
  const order = op ? data.orders.find(o => o.id === op.orderId) : null;
  const workerNames = op ? op.workerIds?.map(id => data.workers.find(w => w.id === id)?.name).filter(Boolean).join(', ') : '';
  const [defNote, setDefNote] = useState('');
  const [defectReasonId, setDefectReasonId] = useState('');
  const [showDefForm, setShowDefForm] = useState(false);
  const [showDowntimeModal, setShowDowntimeModal] = useState(false);
  const [selectedDowntimeType, setSelectedDowntimeType] = useState('');
  const [, setTick] = useState(0);
  const [weldParams, setWeldParams] = useState({ seamNumber:'', electrode:'', result:'ok' });
  const [downtimeStartedAt, setDowntimeStartedAt] = useState(null);

  useEffect(() => {
    if (!op || op.status !== 'in_progress') return;
    const t = setInterval(() => setTick(n => n+1), 1000);
    return () => clearInterval(t);
  }, [op?.status]);

  if (!op || op.archived) return h('div', { style: { ...S.card, textAlign:'center', padding: 24 } },
    h('div', { style: { fontSize: 16, marginBottom: 8 } }, '⏳ Поиск операции...'),
    h('div', { style: { fontSize: 12, color: '#888', marginBottom: 16 } }, `ID: ${opId}`),
    h('div', { style: { fontSize: 12, color: '#888' } }, 'Если операция не появится — данные ещё не синхронизированы. Обновите страницу.'),
    h('button', { style: abtn({ marginTop: 12 }), onClick: () => window.location.reload() }, '🔄 Обновить')
  );
  const elapsed = op.startedAt && !op.finishedAt ? now() - op.startedAt : 0;

  const handleStart = useCallback(async () => {
    if (op.status !== 'pending') return;
    const workerId = op.workerIds?.[0];
    const worker = data.workers.find(w => w.id === workerId);
    if (worker && worker.competences && worker.competences.length > 0 && !worker.competences.includes(op.name)) { addToast('У сотрудника нет компетенции', 'error'); return; }
    const startedAt = now(); const shift = getCurrentShift();
    const updated = { ...data, ops: data.ops.map(o => o.id === op.id ? { ...o, status:'in_progress', startedAt } : o), events: [...data.events, { id: uid(), type:'start', opId: op.id, workerId: op.workerIds?.[0], ts: startedAt, shift }] };
    await DB.save(updated); onUpdate(updated); addToast('Операция начата', 'success');
  }, [data, op, onUpdate, addToast]);

  const handleFinish = useCallback(async (isDefect=false, isRework=false) => {
    if (op.status !== 'in_progress') return;
    const finishedAt = now();
    let status = isDefect ? 'defect' : isRework ? 'rework' : 'done';
    let updatedOp = { ...op, status, finishedAt, defectNote: defNote || undefined };
    if (isDefect) { updatedOp.defectSource = 'previous_stage'; updatedOp.defectReasonId = defectReasonId; }
    if (isRework) updatedOp.defectSource = 'previous_stage';
    if (op.requiresQC && status === 'done') { status = 'on_check'; updatedOp.status = 'on_check'; }
    if (op.name.includes('свар') && weldParams.seamNumber && weldParams.electrode) {
      updatedOp.weldParams = { seamNumber: weldParams.seamNumber, electrode: weldParams.electrode, result: weldParams.result };
      if (weldParams.result === 'fail') { status = 'defect'; updatedOp.status = 'defect'; updatedOp.defectNote = 'Сварка забракована'; }
    }
    const shift = getCurrentShift();
    const updated = { ...data, ops: data.ops.map(o => o.id === op.id ? updatedOp : o), events: [...data.events, { id: uid(), type: status, opId: op.id, workerId: op.workerIds?.[0], ts: finishedAt, note: defNote || undefined, shift, defectSource: (isDefect || isRework) ? 'previous_stage' : undefined, defectReasonId: isDefect ? defectReasonId : undefined }] };
    // Достижения — один save
    const allAchUpdated = (op.workerIds || []).reduce((acc, wid) => { const r = checkAchievements(wid, acc); return r; }, updated);
    const final = allAchUpdated !== updated ? allAchUpdated : updated;
    await DB.save(final); onUpdate(final);
    setShowDefForm(false); setDefNote(''); setDefectReasonId(''); setWeldParams({ seamNumber:'', electrode:'', result:'ok' });
    addToast('Операция завершена', 'info');
  }, [data, op, onUpdate, defNote, defectReasonId, weldParams, addToast]);

  const recordDowntime = useCallback(async () => {
    if (!selectedDowntimeType) return addToast('Выберите причину', 'error');
    const shift = getCurrentShift(); const duration = downtimeStartedAt ? now() - downtimeStartedAt : 0;
    const newEvent = { id: uid(), type:'downtime', workerId: op.workerIds?.[0], opId: op.id, ts: now(), downtimeTypeId: selectedDowntimeType, shift, startedAt: downtimeStartedAt || now(), duration };
    const updated = { ...data, events: [...data.events, newEvent] };
    await DB.save(updated); onUpdate(updated); setShowDowntimeModal(false); setSelectedDowntimeType(''); setDowntimeStartedAt(null); setDowntimeEquipmentId(''); addToast('Простой зафиксирован', 'success');
  }, [data, op, selectedDowntimeType, downtimeStartedAt, onUpdate, addToast]);

  const renderQRActions = () => {
    if (showDefForm) return h('div', null,
      h('select', { style: { ...S.inp, width:'100%', marginBottom:8 }, value: defectReasonId, onChange: e => setDefectReasonId(e.target.value) }, h('option', { value:'' }, '— выберите причину —'), (data.defectReasons || []).map(r => h('option', { key: r.id, value: r.id }, r.name))),
      h('textarea', { style: { ...S.inp, width:'100%', marginBottom:8 }, rows:2, placeholder:'Причина...', value: defNote, onChange: e => setDefNote(e.target.value) }),
      h('div', { style: { display:'flex', gap:6 } }, h('button', { style: rbtn({ flex:1 }), onClick: () => handleFinish(true,false) }, 'Брак'), h('button', { style: { ...gbtn({ flex:1 }), color:AM2, borderColor:AM4 }, onClick: () => handleFinish(false,true) }, 'Переделка'), h('button', { style: gbtn({ flex:1 }), onClick: () => setShowDefForm(false) }, 'Отмена'))
    );
    if (op.name.includes('свар')) return h('div', null,
      h('div', { style: { display:'flex', gap:8, marginBottom:8 } }, h('input', { style: { ...S.inp, flex:1 }, placeholder:'Номер шва', value: weldParams.seamNumber, onChange: e => setWeldParams(p => ({ ...p, seamNumber: e.target.value })) }), h('input', { style: { ...S.inp, flex:1 }, placeholder:'Тип электрода', value: weldParams.electrode, onChange: e => setWeldParams(p => ({ ...p, electrode: e.target.value })) })),
      h('div', { style: { display:'flex', gap:8, marginBottom:8 } },
        h('label', { style: { display:'flex', alignItems:'center', gap:4 } }, h('input', { type:'radio', name:`weldResult_qr_${op.id}`, value:'ok', checked: weldParams.result === 'ok', onChange: e => setWeldParams(p => ({ ...p, result: e.target.value })) }), 'Принято'),
        h('label', { style: { display:'flex', alignItems:'center', gap:4 } }, h('input', { type:'radio', name:`weldResult_qr_${op.id}`, value:'fail', checked: weldParams.result === 'fail', onChange: e => setWeldParams(p => ({ ...p, result: e.target.value })) }), 'Брак')
      ),
      h('div', { className: 'action-btns', style: { display:'flex', gap:8 } },
        op.status === 'pending' && workerNames && h('button', { style: abtn({ flex:1, padding:'12px' }), onClick: handleStart }, '▶ Старт'),
        op.status === 'in_progress' && h('button', { style: { ...abtn({ flex:1 }), background:GN, color:GN2 }, onClick: () => handleFinish() }, '✓ Завершить'),
        op.status === 'in_progress' && h('button', { style: rbtn({ flex:1 }), onClick: () => setShowDefForm(true) }, '⚠ Брак с пред. уч.'),
        (op.status === 'pending' || op.status === 'in_progress') && h('button', { style: gbtn({ flex:1 }), onClick: () => { setShowDowntimeModal(true); setDowntimeStartedAt(now()); } }, '⏸ Простой')
      )
    );
    return h('div', { className: 'action-btns', style: { display:'flex', gap:8 } },
      op.status === 'pending' && workerNames && h('button', { style: abtn({ flex:1, padding:'12px' }), onClick: handleStart }, '▶ Старт'),
      op.status === 'in_progress' && h('button', { style: { ...abtn({ flex:1 }), background:GN, color:GN2 }, onClick: () => handleFinish() }, '✓ Завершить'),
      op.status === 'in_progress' && h('button', { style: rbtn({ flex:1 }), onClick: () => setShowDefForm(true) }, '⚠ Брак с пред. уч.'),
      (op.status === 'pending' || op.status === 'in_progress') && h('button', { style: gbtn({ flex:1 }), onClick: () => { setShowDowntimeModal(true); setDowntimeStartedAt(now()); } }, '⏸ Простой')
    );
  };

  return h('div', { style: { maxWidth:420, margin:'0 auto', padding:'16px 12px' } },
    h('div', { style: { ...S.card, border: `1px solid ${AM}`, background:AM3 } },
      h('div', { style: { fontSize:10, color:AM, textTransform:'uppercase', marginBottom:6 } }, 'Операция по QR-коду'),
      h('div', { style: { fontSize:18, fontWeight:500, color:AM2 } }, op.name),
      h('div', { style: { fontSize:14, color:AM, marginBottom:8 } }, order?.number || '—'),
      h('div', { style: { display:'flex', alignItems:'center', gap:8, marginBottom:16, background:'#fff', borderRadius:8, padding:8 } },
        h('div', { style: { width:32, height:32, borderRadius:'50%', background:AM3, display:'flex', alignItems:'center', justifyContent:'center' } }, workerNames?.[0] || '?'),
        h('div', null, h('div', { style: { fontSize:13, fontWeight:500 } }, workerNames || 'Не назначен'), h('div', { style: { fontSize:10, color:'#888' } }, 'Плановый исполнитель'))
      ),

      renderQRActions()
    ),
    showDowntimeModal && h('div', { role:'dialog','aria-modal':'true','aria-label':'Фиксация простоя', style: { position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:60 } },

  const setCustomPeriod = () => { if (customStart && customEnd) setPeriod({ start: new Date(customStart).getTime(), end: new Date(customEnd).getTime() + 86400000 - 1, label: 'произвольный' }); };

  const doneOpsInPeriod = useMemo(() => data.ops.filter(o => o.status === 'done' && o.finishedAt && o.finishedAt >= period.start && o.finishedAt <= period.end), [data.ops, period]);
  const defectsInPeriod = useMemo(() => data.ops.filter(o => o.status === 'defect' && o.finishedAt && o.finishedAt >= period.start && o.finishedAt <= period.end), [data.ops, period]);
  const inProgress = useMemo(() => data.ops.filter(o => o.status === 'in_progress' && !o.archived), [data.ops]);
  const pending = useMemo(() => data.ops.filter(o => o.status === 'pending' && !o.archived), [data.ops]);
  const pendingLong = useMemo(() => pending.filter(o => o.createdAt && now() - o.createdAt > 3600000), [pending]);

  const workersByStatus = useMemo(() => { const stats = { working:0, absent:0, sick:0, vacation:0 }; data.workers.forEach(w => { const k = w.status || 'working'; if(stats[k]!==undefined) stats[k]++; }); return stats; }, [data.workers]);

  const workerPerformance = useMemo(() => data.workers.map(w => {
    const workerOps = doneOpsInPeriod.filter(op => op.workerIds?.includes(w.id) && op.plannedHours && op.startedAt && op.finishedAt);
    if (workerOps.length === 0) return null;
    const totalPlanned = workerOps.reduce((sum,op) => sum + (op.plannedHours||0),0)*3600000;
    const totalActual = workerOps.reduce((sum,op) => sum + (op.finishedAt - op.startedAt),0);
    const performance = totalPlanned > 0 ? (totalActual / totalPlanned)*100 : 0;
    const defectCount = defectsInPeriod.filter(op => op.workerIds?.includes(w.id)).length;
    const downtimeCount = data.events.filter(e => e.type === 'downtime' && e.workerId === w.id && e.ts >= period.start && e.ts <= period.end).length;
    return { workerId: w.id, workerName: w.name, opsCount: workerOps.length, totalPlanned, totalActual, performance, defectCount, downtimeCount };

  const bottlenecks = useMemo(() => {

    const downtimeEvents = data.events.filter(e => e.type === 'downtime').map(e => ({ Время: new Date(e.ts).toLocaleString(), Сотрудник: data.workers.find(w => w.id === e.workerId)?.name, Причина: data.downtimeTypes.find(dt => dt.id === e.downtimeTypeId)?.name, 'Длительность (мин)': e.duration ? Math.round(e.duration/60000) : '', Смена: e.shift }));

  const metrics = [[doneOpsInPeriod.length,'Выполнено',GN],[inProgress.length,'В работе',AM],[defectsInPeriod.length,'Брак',RD],[pending.length,'Ожидают',BL],[wipOrders.length,'НЗП',AM4]];

      h('input', { type:'date', style: { ...S.inp, width:130 }, value: customEnd, onChange: e => setCustomEnd(e.target.value) }),

    ),

      h('div', { style: S.card }, h('div', { style: { fontSize:12, color:'#888' } }, 'На смене'), h('div', { style: { fontSize:24, fontWeight:500, color:GN } }, workersByStatus.working)),

    ),

    ),

// ==================== Error Boundary ====================
// Перехватывает ошибки React-дерева и показывает читаемое сообщение
// вместо белого экрана
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error('App error:', error, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {
        style: { minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 32, textAlign: 'center', gap: 16 }
      },
        React.createElement('div', { style: { fontSize: 48 } }, '⚠️'),
        React.createElement('div', { style: { fontSize: 20, fontWeight: 500, color: '#1a1a18' } }, 'Что-то пошло не так'),
        React.createElement('div', { style: { fontSize: 14, color: '#888', maxWidth: 400 } }, 'Произошла ошибка в приложении. Данные в Firebase не затронуты — обновите страницу для восстановления работы.'),
        React.createElement('div', { style: { fontFamily: 'monospace', fontSize: 11, color: '#E24B4A', background: '#FCEBEB', border: '0.5px solid #E24B4A', borderRadius: 8, padding: '8px 16px', maxWidth: 500, wordBreak: 'break-all' } },
          this.state.error?.message || 'Неизвестная ошибка'
        ),
        React.createElement('button', {
          style: { padding: '10px 28px', background: '#EF9F27', color: '#412402', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 14, fontWeight: 500 },
          onClick: () => { this.setState({ hasError: false, error: null }); window.location.reload(); }
        }, '🔄 Перезагрузить страницу'),
        React.createElement('button', {
          style: { padding: '8px 20px', background: 'transparent', color: '#888', border: '0.5px solid rgba(0,0,0,0.2)', borderRadius: 8, cursor: 'pointer', fontSize: 13 },
          onClick: () => this.setState({ hasError: false, error: null })
        }, 'Попробовать продолжить без перезагрузки')
      );
    }
    return this.props.children;
  }
}

// ==================== App ====================
function App() {
  const [data, setData] = useState(EMPTY_DATA);
  const [loading, setLoading] = useState(true);
  const [synced, setSynced] = useState(false);
  const [isSaving, setIsSaving] = useState(false);
  const [role, setRole] = useState(null);
  const [workerId, setWorkerId] = useState(null);
  const [sectionId, setSectionId] = useState(null);
  const [initialOpId, setInitialOpId] = useState(null);
  const [showChat, setShowChat] = useState(false);
  const [toasts, setToasts] = useState([]);
  const savingRef = useRef(false);

  useEffect(() => {
    DB.load().then(d => {
      // П.9: Автоархивация — заказы, все операции которых завершены более 30 дней назад
      const threshold = now() - 30 * 86400000;
      let archiveCount = 0;
      const updated = { ...d, orders: d.orders.map(order => {
        if (order.archived) return order;
        const orderOps = d.ops.filter(op => op.orderId === order.id);
        if (orderOps.length === 0) return order;
        const allDone = orderOps.every(op => op.status === 'done' || op.status === 'defect');
        const lastFinished = Math.max(...orderOps.map(op => op.finishedAt || 0));
        if (allDone && lastFinished > 0 && lastFinished < threshold) { archiveCount++; return { ...order, archived: true, autoArchived: true }; }
        return order;
      })};
      if (archiveCount > 0) { DB.save(updated); console.log(`Автоархивация: ${archiveCount} заказов`); }
      setData(archiveCount > 0 ? updated : d);
      setLoading(false); setSynced(true);
    });
    const unsub = DB.onSnapshot(newData => { if (!savingRef.current) setData(newData); });
    const params = new URLSearchParams(window.location.search);
    const opId = params.get('opId');
    if (opId) setInitialOpId(opId);
    if ("Notification" in window && Notification.permission !== "denied") { Notification.requestPermission().catch(() => {}); }

    // Защита от двух вкладок: при открытии второй вкладки — предупреждение
    let bc;
    try {
      bc = new BroadcastChannel('prod_app_tab');
      bc.postMessage({ type: 'tab_open', ts: Date.now() });
      bc.onmessage = (e) => {
        if (e.data?.type === 'tab_open') {
          // Другая вкладка открылась — показываем предупреждение
          addToast('⚠ Приложение открыто в другой вкладке. Работа в двух вкладках может привести к конфликту данных.', 'error');
        }
      };
    } catch(e) { /* BroadcastChannel не поддерживается */ }

    return () => {
      unsub();
      if (bc) bc.close();
    };
  }, []);

  const save = useCallback((d) => {
    savingRef.current = true;
    setData(d);
    DB.save(d);
    // Разблокировать входящие данные через 1.5с (после debounce Firebase)
    setTimeout(() => { savingRef.current = false; }, 1500);
  }, []);

  const goBack = () => { setRole(null); setWorkerId(null); setSectionId(null); setInitialOpId(null); setShowChat(false); window.history.replaceState({}, '', window.location.pathname); };
  const addToast = useCallback((message, type = 'info') => { const id = Date.now() + Math.random(); setToasts(prev => [...prev, { id, message, type }]); }, []);
  const removeToast = useCallback(id => setToasts(prev => prev.filter(t => t.id !== id)), []);

  // Сброс PIN через мастер-ключ (вызывается из LoginScreen)
  const handleResetPin = useCallback(async (targetWorkerId, newPin) => {
    const d = { ...data, workers: data.workers.map(w => w.id === targetWorkerId ? { ...w, pin: newPin } : w) };
    await DB.save(d);
    setData(d);
  }, [data]);

  // Определяем «настоящую» роль для рендера — chat_master и chat_controller рендерятся как чат
  const effectiveRole = role === 'chat_master' || role === 'chat_controller' ? 'chat' : role;

  // Текущий пользователь для чата
  const currentUser = useMemo(() => {
    if (role === 'worker' || role === 'chat') { const w = data.workers.find(w => w.id === workerId); return { id: workerId, name: w?.name || 'Сотрудник', role: 'worker' }; }
    if (role === 'master' || role === 'chat_master') return { id: 'master', name: 'Мастер', role: 'master' };
    if (role === 'controller' || role === 'chat_controller') return { id: 'controller', name: 'Контролёр', role: 'controller' };
    return { id: 'system', name: 'Система', role: 'system' };
  }, [role, workerId, data.workers]);

  if (loading) return h('div', { style: { padding:48, textAlign:'center' } },
    h('div', { style: { fontSize:16, marginBottom:8 } }, 'Загрузка...'),
    h('div', { style: { fontSize:12, color:'#888' } }, 'Подключение к Firebase')
  );

  // QR-режим
  if (initialOpId && !role) return h('div', null,
    h('div', { style: { display:'flex', gap:12, padding:'10px 0', borderBottom:'0.5px solid rgba(0,0,0,0.08)' } },
      h('button', { style: gbtn({ fontSize:11 }), onClick: goBack }, '← На главную'),
      h('div', { style: { fontSize:12, color:'#888' } }, 'QR-операция')
    ),
    h(QRScreen, { data, opId: initialOpId, onUpdate: save, addToast }),
    h('div', null, toasts.map(t => h(Toast, { key: t.id, message: t.message, onClose: () => removeToast(t.id) })))
  );

  // Экран входа
  if (!role) return h('div', null,
    h(LoginScreen, {
      data,
      onLogin: (r, wid, sid) => {
        setRole(r);
        setWorkerId(wid);
        setSectionId(sid);
        // chat, chat_master, chat_controller — всё это режим чата
        if (r === 'chat' || r === 'chat_master' || r === 'chat_controller') setShowChat(true);
      },
      onResetPin: handleResetPin
    }),
    h('div', null, toasts.map(t => h(Toast, { key: t.id, message: t.message, onClose: () => removeToast(t.id) })))
  );

  // Режим "только чат"
  if (effectiveRole === 'chat') return h('div', null,
    h('div', { style: { display:'flex', gap:12, padding:'10px 0', borderBottom:'0.5px solid rgba(0,0,0,0.08)', alignItems:'center' } },
      h('button', { style: gbtn({ fontSize:11 }), onClick: goBack }, '← Выход'),
      h('div', { style: { fontSize:12, color:'#888' } }, `Чат · ${currentUser.name}`)
    ),
    h(ChatScreen, { data, onUpdate: save, addToast, currentUser }),
    h('div', null, toasts.map(t => h(Toast, { key: t.id, message: t.message, onClose: () => removeToast(t.id) })))
  );

  return h('div', null,
    h('div', { style: { display:'flex', gap:12, padding:'10px 0', borderBottom:'0.5px solid rgba(0,0,0,0.08)', alignItems:'center', flexWrap:'wrap' } },
      h('button', { style: gbtn({ fontSize:11 }), onClick: goBack }, '← Выход'),
      h('div', { style: { fontSize:12, color:'#888' } }, effectiveRole === 'master' ? 'Мастер' : effectiveRole === 'controller' ? 'Контролёр' : effectiveRole === 'dashboard' ? 'Дашборд' : currentUser.name),
      effectiveRole !== 'dashboard' && h('button', { style: showChat ? abtn({ fontSize:11 }) : gbtn({ fontSize:11 }), onClick: () => setShowChat(!showChat) }, showChat ? '💬 Чат (скрыть)' : '💬 Чат'),
      h('div', { style: { marginLeft:'auto', fontSize:10, display:'flex', alignItems:'center', gap:8 } },
        isSaving && h('div', { style: { display:'flex', alignItems:'center', gap:4, color: AM4, fontWeight:500 } },
          h('span', { style: {
            width: 8, height: 8, borderRadius: '50%', background: AM,
            display: 'inline-block', animation: 'pulse 1s ease-in-out infinite'
          }}),
          'Сохранение...'
        ),
        h('div', { style: { display:'flex', alignItems:'center', gap:4, color: synced ? GN : '#888' } },
          h('span', { style: { width:6, height:6, borderRadius:'50%', background: synced ? GN : '#ccc', display:'inline-block' } }),
          synced ? 'Firebase' : 'Оффлайн'
        )
      )
    ),
    showChat
      ? h(ChatScreen, { data, onUpdate: save, addToast, currentUser })
      : h('div', null,
          effectiveRole === 'master' && h(MasterScreen, { data, onUpdate: save, addToast, sectionId }),
          effectiveRole === 'controller' && h(ControllerScreen, { data, onUpdate: save, addToast }),
          effectiveRole === 'worker' && workerId && h(WorkerScreen, { data, workerId, sectionId, onUpdate: save, initialOpId: null, addToast }),
          effectiveRole === 'dashboard' && h(Dashboard, { data, addToast })
        ),
    h('div', { 'aria-live': 'polite' }, toasts.map(t => h(Toast, { key: t.id, message: t.message, onClose: () => removeToast(t.id) })))
  );
}

// Регистрация Service Worker для PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);

// PWA: Service Worker registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      console.log('SW registered:', reg.scope);
    }).catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
