<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teploros MES</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#EF9F27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Шрифты и иконки -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Сторонние библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.css"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            /* Palette */
            --primary: #EF9F27;
            --primary-hover: #d68b1f;
            --success: #1D9E75;
            --danger: #E24B4A;
            --info: #378ADD;
            --warning: #F5C542;
            
            /* Light Theme */
            --bg-body: #f0f2f5;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --text-main: #1a1a18;
            --text-secondary: #666;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --shadow-hover: 0 12px 40px 0 rgba(31, 38, 135, 0.15);
            --backdrop: blur(12px);
            
            /* Fonts */
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            /* Spacing & Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #0f0f10;
                --bg-gradient: linear-gradient(135deg, #1a1a1d 0%, #0d0d10 100%);
                --bg-card: rgba(30, 30, 35, 0.7);
                --bg-card-hover: rgba(40, 40, 45, 0.8);
                --text-main: #e8e6e0;
                --text-secondary: #999;
                --border: rgba(255, 255, 255, 0.1);
                --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            }
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            transition: color 0.3s ease;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: var(--bg-card);
            backdrop-filter: var(--backdrop);
            -webkit-backdrop-filter: var(--backdrop);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            border-radius: var(--radius-md);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass:hover {
            background: var(--bg-card-hover);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        /* Layout */
        #app { display: flex; flex-direction: column; height: 100vh; }
        
        header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 2px 10px rgba(239, 159, 39, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Typography & Elements */
        h1, h2, h3 { margin-top: 0; font-weight: 600; letter-spacing: -0.02em; }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(239, 159, 39, 0.3);
        }
        
        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(239, 159, 39, 0.4);
        }
        
        .btn:active { transform: translateY(1px); }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            box-shadow: none;
        }
        .btn-outline:hover { background: rgba(0,0,0,0.05); }

        /* Cards & Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
            opacity: 0.5;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: var(--font-mono);
            margin: 0.5rem 0;
            background: linear-gradient(45deg, var(--text-main), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Lists & Items */
        .list-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background: rgba(0,0,0,0.02); }

        /* Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-success { background: rgba(29, 158, 117, 0.15); color: var(--success); }
        .badge-danger { background: rgba(226, 75, 74, 0.15); color: var(--danger); }
        .badge-info { background: rgba(55, 138, 221, 0.15); color: var(--info); }
        .badge-warning { background: rgba(245, 197, 66, 0.15); color: #b58a1e; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Loader */
        .loader {
            border: 3px solid rgba(0,0,0,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Mobile Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            z-index: 1000;
            display: none; /* Enabled via JS if mobile */
        }
        .nav-item {
            color: var(--text-secondary);
            text-align: center;
            font-size: 0.75rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 4px; }

        @media (max-width: 768px) {
            .bottom-nav { display: flex; }
            main { padding-bottom: 80px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="glass">
            <div class="brand">
                <i class="fa-solid fa-fire-flame-curved"></i>
                TEPLOROS
            </div>
            <div id="user-info" style="font-size: 0.9rem; font-weight: 500;">
                <span class="loader" id="auth-loader"></span>
            </div>
        </header>

        <main id="main-content">
            <!-- Content injected by app.js -->
            <div style="text-align: center; margin-top: 50px; opacity: 0.5;">
                <div class="loader" style="width: 40px; height: 40px; margin: 0 auto 20px;"></div>
                <p>Загрузка системы...</p>
            </div>
        </main>

        <nav class="bottom-nav glass" id="bottom-nav">
            <div class="nav-item active" data-view="dashboard">
                <i class="fa-solid fa-chart-pie"></i> Обзор
            </div>
            <div class="nav-item" data-view="orders">
                <i class="fa-solid fa-list-check"></i> Заказы
            </div>
            <div class="nav-item" data-view="warehouse">
                <i class="fa-solid fa-boxes-stacked"></i> Склад
            </div>
            <div class="nav-item" data-view="profile">
                <i class="fa-solid fa-user"></i> Профиль
            </div>
        </nav>
    </div>

    <!-- Core Logic -->
    <script src="js/core.js?v=20241027"></script>
    <script src="js/shared.js?v=20241027"></script>
    <script src="js/app.js?v=20241027"></script>
    
    <!-- Modules -->
    <script src="js/analytics.js?v=20241027"></script>
    <script src="js/timesheet.js?v=20241027"></script>
    <script src="js/auxops.js?v=20241027"></script>
    <script src="js/reference.js?v=20241027"></script>
    <script src="js/quality.js?v=20241027"></script>
    <script src="js/hr.js?v=20241027"></script>
    <script src="js/chat.js?v=20241027"></script>
    <script src="js/warehouse.js?v=20241027"></script>
    <script src="js/master.js?v=20241027"></script>
    <script src="js/worker.js?v=20241027"></script>

    <script>
        // Service Worker Registration with Cache Busting
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=' + Date.now())
                    .then(reg => console.log('SW registered:', reg))
                    .catch(err => console.log('SW failed:', err));
            });
        }
    </script>
</body>
</html>
