// Расширенная статистика для одного рабочего (добавлено totalLikes)
const calcWorkerStats = (workerId, data) => {
  const allOps = data.ops.filter(op => op.workerId === workerId);
  const doneOps = allOps.filter(op => op.status === 'done');
  const defectOps = allOps.filter(op => op.status === 'defect');
  const doneCount = doneOps.length;
  const defectCount = defectOps.length;
  const total = doneCount + defectCount;
  const defectRate = total > 0 ? (defectCount / total * 100) : 0;
  const weldCount = doneOps.filter(op => op.name && op.name.toLowerCase().includes('свар')).length;

  const withPlan = doneOps.filter(op => op.plannedHours && op.startedAt && op.finishedAt);
  const doneWithPlan = withPlan.length;
  const avgRatio = doneWithPlan > 0 ? withPlan.reduce((s, op) => s + ((op.finishedAt - op.startedAt) / (op.plannedHours * 3600000)), 0) / doneWithPlan : 1;

  const nowTime = now();
  const d30 = nowTime - 30 * 86400000;
  const d7 = nowTime - 7 * 86400000;
  const downtimes30d = data.events.filter(e => e.workerId === workerId && e.type === 'downtime' && e.ts >= d30).length;
  const downtimes7d = data.events.filter(e => e.workerId === workerId && e.type === 'downtime' && e.ts >= d7).length;

  const sorted = [...doneOps, ...defectOps].sort((a, b) => (b.finishedAt || 0) - (a.finishedAt || 0));
  let currentStreak = 0;
  for (const op of sorted) {
    if (op.status === 'done') currentStreak++;
    else break;
  }

  const uniqueOpTypes = new Set(doneOps.map(op => op.name)).size;
  const detectedDefects = allOps.filter(op => op.defectSource === 'previous_stage').length;
  const thanksReceived = data.events.filter(e => e.type === 'thanks' && e.toWorkerId === workerId).length;
  const uniqueSections = new Set(doneOps.map(op => op.sectionId).filter(id => id)).size;
  const weekendOps = doneOps.filter(op => {
    if (!op.finishedAt) return false;
    const d = new Date(op.finishedAt);
    const day = d.getDay();
    return day === 0 || day === 6;
  }).length;
  const fastOps = withPlan.filter(op => {
    const actual = op.finishedAt - op.startedAt;
    const planned = op.plannedHours * 3600000;
    return actual < planned * 0.5;
  }).length;
  const withPlanSorted = [...withPlan].sort((a, b) => a.finishedAt - b.finishedAt);
  let bestSpeedStreak = 0, currentSpeedStreak = 0;
  for (const op of withPlanSorted) {
    const actual = op.finishedAt - op.startedAt;
    const planned = op.plannedHours * 3600000;
    if (actual < planned * 0.8) {
      currentSpeedStreak++;
      if (currentSpeedStreak > bestSpeedStreak) bestSpeedStreak = currentSpeedStreak;
    } else {
      currentSpeedStreak = 0;
    }
  }

  // Полученные лайки (хранятся в поле worker.totalLikes)
  const totalLikes = data.workers.find(w => w.id === workerId)?.totalLikes || 0;

  return {
    doneCount,
    defectCount,
    defectRate,
    weldCount,
    doneWithPlan,
    avgRatio,
    downtimes30d,
    downtimes7d,
    currentStreak,
    uniqueOpTypes,
    detectedDefects,
    thanksReceived,
    uniqueSections,
    weekendOps,
    fastOps,
    bestSpeedStreak,
    totalLikes
  };
};

const checkAchievements = (workerId, data) => {
  const worker = data.workers.find(w => w.id === workerId);
  if (!worker) return data;
  const stats = calcWorkerStats(workerId, data);
  const current = worker.achievements || [];
  const newAch = [...current];
  let changed = false;

  for (const [id, ach] of Object.entries(ACHIEVEMENTS)) {
    if (!newAch.includes(id) && ach.condition(stats)) {
      newAch.push(id);
      changed = true;
    }
  }

  if (changed) {
    return {
      ...data,
      workers: data.workers.map(w => w.id === workerId ? { ...w, achievements: newAch } : w)
    };
  }
  return data;
};

  if (!ms || ms <= 0) return '—';
  const hh = Math.floor(ms / 3600000);
  const mm = Math.floor((ms % 3600000) / 60000);
  const ss = Math.floor((ms % 60000) / 1000);
  return hh > 0 ? `${hh}ч ${mm}м` : mm > 0 ? `${mm}м ${ss}с` : `${ss}с`;
};
const fmtDate = (ts) => new Date(ts).toLocaleString();
const isShipmentNear = (deadline) => {
  if (!deadline) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const deadlineDate = new Date(deadline);
  const diffTime = deadlineDate - today;
  const diffDays = Math.ceil(diffTime / (1000*60*60*24));
  return diffDays <= 2 && diffDays >= 0;
};

// ==================== Хранилище (Firebase + localStorage fallback) ====================
const DB = {
  async load() {
    try {
      const snap = await DOC_REF.get();
      if (snap.exists) {
        const d = snap.data();
        const parsed = typeof d.payload === 'string' ? JSON.parse(d.payload) : d;
        try { localStorage.setItem('prod_app_v12_cache', JSON.stringify(parsed)); } catch {}
        return { ...EMPTY_DATA, ...parsed };
      }
    } catch (e) {
      console.warn('Firebase load failed, trying localStorage cache:', e.message);
      try {
        const cached = localStorage.getItem('prod_app_v12_cache');
        if (cached) return { ...EMPTY_DATA, ...JSON.parse(cached) };
      } catch {}
    }
    try {
      const old = localStorage.getItem('prod_app_v12');
      if (old) {
        const parsed = JSON.parse(old);
        await DOC_REF.set({ payload: old, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        return { ...EMPTY_DATA, ...parsed };
      }
    } catch {}
    return { ...EMPTY_DATA };
  },
  async save(data) {
    try {
      const payload = JSON.stringify(data);
      await DOC_REF.set({ payload, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      try { localStorage.setItem('prod_app_v12_cache', payload); } catch {}
    } catch (e) {
      console.error('DB.save error:', e);
      alert('Ошибка сохранения в Firebase: ' + e.message);
    }
  },
  onSnapshot(callback) {
    return DOC_REF.onSnapshot(snap => {
      if (snap.exists) {
        try {
          const d = snap.data();
          const parsed = typeof d.payload === 'string' ? JSON.parse(d.payload) : d;
          callback({ ...EMPTY_DATA, ...parsed });
        } catch (e) { console.error('Snapshot parse error:', e); }
      }
    }, err => { console.error('Snapshot error:', err); });
  }
};

// ==================== QR МОДАЛ ====================
const QRModal = memo(({ ops, order, onClose }) => {
  const [index, setIndex] = useState(0);
  const op = ops[index];
  const ref = useRef(null);

  useEffect(() => {
    if (!op) return;
    const render = () => {
      if (!ref.current || !window.QRCode) return;
      ref.current.innerHTML = '';
      const url = new URL(window.location.href);
      url.searchParams.set('opId', op.id);
      new window.QRCode(ref.current, { text: url.toString(), width: 140, height: 140, colorDark: AM4, colorLight: '#ffffff' });
    };
    if (window.QRCode) { render(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload = render;
    s.onerror = () => { if (ref.current) ref.current.innerHTML = '<div style="color:#E24B4A;font-size:11px;padding:8px">Не удалось загрузить библиотеку QR-кода</div>'; };
    document.head.appendChild(s);
  }, [op, index]);

  if (!op) return null;

  return h('div', { style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 50 } },
    h('div', { style: { background: '#fff', border: '0.5px solid rgba(0,0,0,0.15)', borderRadius: 12, padding: 24, width: 320, textAlign: 'center', position: 'relative' } },
      h('button', { type: 'button', onClick: onClose, style: { position: 'absolute', top: 10, right: 12, background: 'transparent', border: 'none', color: '#888', cursor: 'pointer', fontSize: 18 } }, '×'),
      h('div', { style: { fontSize: 10, color: AM4, textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 12 } }, 'QR-код операции'),
      h('div', { style: { background: '#fff', borderRadius: 8, padding: 12, display: 'inline-block', marginBottom: 10, border: '0.5px solid rgba(0,0,0,0.08)' } }, h('div', { ref })),
      h('div', { style: { fontFamily: 'monospace', fontSize: 13, fontWeight: 500, color: AM, marginBottom: 4 } }, op.id),
      h('div', { style: { fontSize: 11, color: '#888', marginBottom: 4 } }, op.name),

// ==================== КОМПОНЕНТ ЧАТА ====================
const Chat = memo(({ messages, userId, userName, onSend, onDelete, onLike, isMaster }) => {
  const [newMessage, setNewMessage] = useState('');
  const messagesEndRef = useRef(null);

  const scrollToBottom = () => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  };

  useEffect(() => {
    scrollToBottom();
  }, [messages]);

  const handleSend = () => {
    if (!newMessage.trim()) return;
    onSend(newMessage.trim());
    setNewMessage('');
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  };

  // Группировка по дням
  const grouped = useMemo(() => {
    const groups = {};
    messages.forEach(msg => {
      const date = new Date(msg.ts).toLocaleDateString();
      if (!groups[date]) groups[date] = [];
      groups[date].push(msg);
    });
    return groups;
  }, [messages]);

  return h('div', { style: { ...S.card, display: 'flex', flexDirection: 'column', height: '60vh', maxHeight: 500, overflow: 'hidden', padding: 0 } },
    h('div', { style: { flex: 1, overflowY: 'auto', padding: 16 } },
      Object.entries(grouped).map(([date, msgs]) => [
        h('div', { key: date, style: { textAlign: 'center', fontSize: 10, color: '#888', margin: '12px 0 8px' } }, date),
        ...msgs.map(msg => {
          const isOwn = msg.fromUserId === userId;
          const likedByMe = msg.likes?.includes(userId);
          return h('div', { key: msg.id, className: `chat-message ${isOwn ? 'chat-message-own' : ''}` },
            !isOwn && h('div', { className: 'chat-avatar' }, msg.fromName.charAt(0)),
            h('div', { className: `chat-bubble ${isOwn ? 'chat-bubble-own' : ''}` },
              !isOwn && h('div', { className: 'chat-name' }, msg.fromName),
              h('div', { className: 'chat-text' }, msg.text),
              h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 4 } },
                h('div', { className: 'chat-time' }, new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })),
                h('div', { style: { display: 'flex', gap: 8 } },
                  // Лайки
                  h('span', {
                    className: `chat-like ${likedByMe ? 'active' : ''}`,
                    onClick: () => onLike(msg.id, msg.fromUserId, likedByMe)
                  }, `❤️ ${msg.likes?.length || 0}`),
                  // Удаление (если своё или мастер)
                  (isOwn || isMaster) && h('span', {
                    className: 'chat-delete',
                    onClick: () => onDelete(msg.id, msg.fromUserId)
                  }, '🗑️')
                )
              )
            )
          );
        })
      ]),
      h('div', { ref: messagesEndRef })
    ),
    h('div', { className: 'chat-input' },
      h('input', {
        style: { ...S.inp, flex: 1 },
        placeholder: 'Написать сообщение...',
        value: newMessage,
        onChange: e => setNewMessage(e.target.value),
        onKeyDown: handleKeyDown
      }),
      h('button', { style: abtn(), onClick: handleSend, disabled: !newMessage.trim() }, '→')
    )
  );
});

// ==================== ЭКРАН РАБОЧЕГО (с вкладкой чата) ====================
const WorkerScreen = memo(({ data, workerId, sectionId, onUpdate, initialOpId, addToast, messages, onSendMessage, onDeleteMessage, onLikeMessage, userId, userName }) => {
  const [tab, setTab] = useState('tasks');
  const worker = data.workers.find(w => w.id === workerId);
  const myOps = data.ops.filter(o => 
    (o.workerId === workerId || (!o.workerId && o.sectionId === sectionId)) && 
    o.status !== 'done' && o.status !== 'defect' && !o.archived
  ).sort((a,b) => {
    const orderA = data.orders.find(ord => ord.id === a.orderId);
    const orderB = data.orders.find(ord => ord.id === b.orderId);
    const getCR = (op, order) => {
      if (!order?.deadline) return 999;
      const deadlineMs = new Date(order.deadline).getTime();
      const remaining = (op.plannedHours || 2) * 3600000;
      const timeLeft = deadlineMs - now();
      if (timeLeft <= 0) return -1;
      return timeLeft / remaining;
    };
    const crA = getCR(a, orderA);
    const crB = getCR(b, orderB);
    if (crA < 1 || crB < 1) return crA - crB;
    const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
    const pA = priorityOrder[orderA?.priority] ?? 4;
    const pB = priorityOrder[orderB?.priority] ?? 4;
    return pA !== pB ? pA - pB : crA - crB;
  });
  const doneToday = data.ops.filter(o => o.workerId === workerId && o.status === 'done' && o.finishedAt && Date.now() - o.finishedAt < 86400000 && !o.archived);
  const [activeOp, setActiveOp] = useState(null);
  const [, setTick] = useState(0);
  const [defNote, setDefNote] = useState('');
  const [showDefForm, setShowDefForm] = useState(false);
  const [showDowntimeModal, setShowDowntimeModal] = useState(false);
  const [selectedDowntimeType, setSelectedDowntimeType] = useState('');
  const [weldParams, setWeldParams] = useState({ seamNumber: '', electrode: '', result: 'ok' });
  const [showAchievements, setShowAchievements] = useState(false);
  const [downtimeStartedAt, setDowntimeStartedAt] = useState(null);

  useEffect(() => {
    if (initialOpId && workerId) {
      const op = data.ops.find(o => o.id === initialOpId);
      if (op && op.status === 'pending' && !op.workerId && !op.archived) {
        if (worker?.competences && worker.competences.length > 0 && !worker.competences.includes(op.name)) {
          addToast('У вас нет компетенции для этой операции', 'error');
          return;
        }
        const updatedOps = data.ops.map(o => o.id === op.id ? { ...o, workerId } : o);
        const newData = { ...data, ops: updatedOps };
        DB.save(newData).then(() => onUpdate(newData));
      }
    }
  }, [initialOpId, workerId, worker, data, onUpdate, addToast]);

  useEffect(() => { const t = setInterval(() => setTick(n => n + 1), 1000); return () => clearInterval(t); }, []);

  const doStart = useCallback(async (op) => {
    if (worker?.competences && worker.competences.length > 0 && !worker.competences.includes(op.name)) {
      addToast('У вас нет компетенции для этой операции', 'error');
      return;
    }
    const startedAt = now();
    const updatedOps = data.ops.map(o => o.id === op.id ? { ...o, status: 'in_progress', startedAt, workerId: o.workerId || workerId } : o);
    const shift = getCurrentShift();
    const updated = {
      ...data,
      ops: updatedOps,
      events: [...data.events, { id: uid(), type: 'start', opId: op.id, workerId, ts: startedAt, shift }]
    };
    await DB.save(updated);
    onUpdate(updated);
    setActiveOp({ ...op, status: 'in_progress', startedAt, workerId: op.workerId || workerId });
    addToast(`Операция "${op.name}" начата`, 'success');
  }, [data, workerId, worker, onUpdate, addToast]);

  const doFinish = useCallback(async (op, isDefect = false, isRework = false) => {
    if (op.status !== 'in_progress') return;
    const finishedAt = now();
    let status = isDefect ? 'defect' : isRework ? 'rework' : 'done';
    let updatedOp = { ...op, status, finishedAt, defectNote: defNote || undefined };
    if (isDefect) updatedOp.defectSource = 'previous_stage';
    if (isRework) updatedOp.defectSource = 'previous_stage';
    if (op.requiresQC && status === 'done') {
      status = 'on_check';
      updatedOp.status = 'on_check';
    }
    if (op.name.includes('свар') && weldParams.seamNumber && weldParams.electrode) {
      updatedOp.weldParams = { seamNumber: weldParams.seamNumber, electrode: weldParams.electrode, result: weldParams.result };
      if (weldParams.result === 'fail') {
        status = 'defect';
        updatedOp.status = 'defect';
        updatedOp.defectNote = 'Сварка забракована';
      }
    }
    const shift = getCurrentShift();
    const updated = {
      ...data,
      ops: data.ops.map(o => o.id === op.id ? updatedOp : o),
      events: [...data.events, { id: uid(), type: status, opId: op.id, workerId, ts: finishedAt, note: defNote || undefined, shift, defectSource: (isDefect || isRework) ? 'previous_stage' : undefined }]
    };
    await DB.save(updated);
    onUpdate(updated);
    // Проверка достижений
    const withAch = checkAchievements(workerId, updated);
    if (withAch !== updated) {
      const oldAch = (data.workers.find(w => w.id === workerId)?.achievements || []).length;
      const newAch = (withAch.workers.find(w => w.id === workerId)?.achievements || []);
      if (newAch.length > oldAch) {
        const latest = newAch[newAch.length - 1];
        const achInfo = ACHIEVEMENTS[latest];
        if (achInfo) addToast(`${achInfo.icon} Достижение: ${achInfo.title}!`, 'success');
      }
      await DB.save(withAch);
      onUpdate(withAch);
    }
    setActiveOp(null);
    setShowDefForm(false);
    setDefNote('');
    setWeldParams({ seamNumber: '', electrode: '', result: 'ok' });
    addToast(`Операция "${op.name}" завершена (${STATUS[status].label})`, 'info');
  }, [data, workerId, onUpdate, defNote, weldParams, addToast]);

  const recordDowntime = useCallback(async () => {
    if (!selectedDowntimeType) {
      addToast('Выберите причину простоя', 'error');
      return;
    }
    const ts = now();
    const shift = getCurrentShift();
    const duration = downtimeStartedAt ? ts - downtimeStartedAt : 0;
    const newEvent = {
      id: uid(),
      type: 'downtime',
      workerId,
      opId: activeOp?.id || null,
      ts,
      downtimeTypeId: selectedDowntimeType,
      shift,
      startedAt: downtimeStartedAt || ts,
      duration
    };
    const updated = { ...data, events: [...data.events, newEvent] };
    await DB.save(updated);
    onUpdate(updated);
    setShowDowntimeModal(false);
    setSelectedDowntimeType('');
    setDowntimeStartedAt(null);
    addToast(`Простой зафиксирован (${fmtDur(duration)})`, 'success');
  }, [data, workerId, activeOp, selectedDowntimeType, downtimeStartedAt, onUpdate, addToast]);

  const getCurrentShift = () => {
    const d = new Date();
    return `${d.toISOString().slice(0,10)}-${Math.floor(d.getHours() / 8) + 1}`;
  };

  const active = activeOp ? data.ops.find(o => o.id === activeOp.id) : null;
  const elapsed = active?.startedAt ? now() - active.startedAt : 0;
  const qrOp = initialOpId ? data.ops.find(o => o.id === initialOpId) : null;
  const canStartQr = qrOp && qrOp.status === 'pending' && !qrOp.workerId && !qrOp.archived;

  return h('div', { style: { maxWidth: 420, margin: '0 auto', padding: '16px 12px' } },
    h('div', { style: { display: 'flex', gap: 8, marginBottom: 16, borderBottom: '0.5px solid rgba(0,0,0,0.1)' } },
      h('button', { style: { padding: '8px 16px', background: 'transparent', border: 'none', borderBottom: tab === 'tasks' ? `2px solid ${AM}` : 'none', color: tab === 'tasks' ? AM : '#888', cursor: 'pointer' }, onClick: () => setTab('tasks') }, 'Задания'),
      h('button', { style: { padding: '8px 16px', background: 'transparent', border: 'none', borderBottom: tab === 'chat' ? `2px solid ${AM}` : 'none', color: tab === 'chat' ? AM : '#888', cursor: 'pointer' }, onClick: () => setTab('chat') }, 'Чат')
    ),
    tab === 'tasks' ? h('div', null,
      // Профиль с уровнем (сокращён для экономии места, но в оригинале он тут)
      (() => {
        const allDone = data.ops.filter(op => op.workerId === workerId && op.status === 'done').length;
        const lvl = getWorkerLevel(allDone);
        const prog = getLevelProgress(allDone);
        const ach = worker?.achievements || [];
        const nextAch = Object.entries(ACHIEVEMENTS).find(([id, a]) => !ach.includes(id));
        return h('div', null,
          h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 } },
            h('div', { style: { width: 48, height: 48, borderRadius: '50%', background: AM3, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, fontWeight: 500, color: AM2, position: 'relative' } },
              worker?.name?.charAt(0) || '?',
              h('div', { style: { position: 'absolute', bottom: -4, right: -4, background: AM, color: '#fff', fontSize: 10, fontWeight: 500, borderRadius: '50%', width: 20, height: 20, display: 'flex', alignItems: 'center', justifyContent: 'center' } }, lvl)
            ),
            h('div', { style: { flex: 1 } },
              h('div', { style: { display: 'flex', alignItems: 'center', gap: 6 } },
                h('div', { style: { fontSize: 15, fontWeight: 500 } }, worker?.name || 'Рабочий'),
                h('span', { style: { fontSize: 10, padding: '1px 8px', background: AM3, color: AM2, borderRadius: 8, fontWeight: 500 } }, getLevelTitle(lvl))
              ),
              h('div', { style: { fontSize: 11, color: '#888', marginBottom: 4 } }, `${doneToday.length} выполнено сегодня · ${allDone} всего`),
              h('div', { style: { display: 'flex', alignItems: 'center', gap: 6 } },
                h('div', { style: { flex: 1, height: 6, background: '#eee', borderRadius: 3, overflow: 'hidden' } },
                  h('div', { style: { width: `${prog * 100}%`, height: 6, background: AM, borderRadius: 3, transition: 'width 0.3s' } })
                ),
                h('div', { style: { fontSize: 10, color: '#888' } }, `→ Ур.${lvl + 1}`)
              )
            )
          ),
          h('div', { style: { ...S.card, marginBottom: 16, padding: 12 } },
            h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 } },
              h('div', { style: { fontSize: 10, color: AM4, textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 500 } }, `Достижения · ${ach.length}/${Object.keys(ACHIEVEMENTS).length}`),
              h('button', { type: 'button', style: { background: 'none', border: 'none', fontSize: 11, color: AM, cursor: 'pointer', padding: 0 }, onClick: () => setShowAchievements(prev => !prev) }, showAchievements ? 'Свернуть' : 'Все')
            ),
            ach.length > 0 ? h('div', { style: { display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: nextAch ? 8 : 0 } },
              ach.map(achId => {
                const a = ACHIEVEMENTS[achId];
                return a ? h('span', { key: achId, title: a.desc, style: { fontSize: 18, cursor: 'default' } }, a.icon) : null;
              })
            ) : h('div', { style: { fontSize: 12, color: '#888' } }, 'Завершите первую операцию!'),
            nextAch && h('div', { style: { display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px', background: '#f8f8f5', borderRadius: 8 } },
              h('span', { style: { fontSize: 16, opacity: 0.4 } }, ACHIEVEMENTS[nextAch[0]].icon),
              h('div', null,
                h('div', { style: { fontSize: 11, fontWeight: 500, color: '#888' } }, `Следующее: ${ACHIEVEMENTS[nextAch[0]].title}`),
                h('div', { style: { fontSize: 10, color: '#aaa' } }, ACHIEVEMENTS[nextAch[0]].desc)
              )
            ),
            showAchievements && h('div', { style: { marginTop: 10, display: 'flex', flexDirection: 'column', gap: 6 } },
              Object.entries(ACHIEVEMENTS).map(([id, a]) => {
                const earned = ach.includes(id);
                return h('div', { key: id, style: { display: 'flex', alignItems: 'center', gap: 8, padding: '6px 8px', borderRadius: 8, background: earned ? AM3 : '#f8f8f5', opacity: earned ? 1 : 0.5 } },
                  h('span', { style: { fontSize: 16 } }, a.icon),
                  h('div', { style: { flex: 1 } },
                    h('div', { style: { fontSize: 12, fontWeight: 500, color: earned ? AM2 : '#888' } }, a.title),
                    h('div', { style: { fontSize: 10, color: '#aaa' } }, a.desc)
                  ),
                  earned && h('span', { style: { fontSize: 10, color: GN, fontWeight: 500 } }, '✓')
                );
              })
            )
          )
        );
      })(),

      !active && canStartQr && h('div', { style: { ...S.card, border: `1px solid ${AM}`, background: AM3, marginBottom: 16 } },
        h('div', { style: { fontSize: 10, color: AM, textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 6 } }, 'Назначено по QR-коду'),
        h('div', { style: { fontSize: 16, fontWeight: 500, color: AM2, marginBottom: 4 } }, qrOp.name),
        h('div', { style: { fontSize: 10, color: AM, marginBottom: 12 } }, data.orders.find(o => o.id === qrOp.orderId)?.number || ''),
        h('button', { type: 'button', style: abtn({ width: '100%', padding: '12px' }), onClick: () => doStart(qrOp) }, '▶ Начать операцию')
      ),

      active && h('div', { style: { ...S.card, border: `1px solid ${AM}`, background: AM3, marginBottom: 16 } },
        h('div', { style: { fontSize: 10, color: AM, textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 6 } }, 'Текущая операция'),
        h('div', { style: { fontSize: 16, fontWeight: 500, color: AM2, marginBottom: 4 } }, active.name),
        h('div', { style: { fontSize: 10, color: AM, marginBottom: 12 } }, data.orders.find(o => o.id === active.orderId)?.number || ''),
        h('div', { style: { fontSize: 40, fontWeight: 500, color: AM, textAlign: 'center', margin: '8px 0 16px' } }, fmtDur(elapsed)),
        showDefForm ? (
          h('div', null,
            h('div', { style: { fontSize: 11, color: RD, fontWeight: 500, marginBottom: 8, textTransform: 'uppercase' } }, 'Обнаружен брак с предыдущего участка'),
            h('textarea', { style: { ...S.inp, width: '100%', marginBottom: 8 }, rows: 2, placeholder: 'Опишите обнаруженный дефект...', value: defNote, onChange: e => setDefNote(e.target.value) }),
            h('div', { style: { display: 'flex', gap: 6 } },
              h('button', { type: 'button', style: rbtn({ flex: 1 }), onClick: () => doFinish(active, true, false) }, 'Зафиксировать брак'),
              h('button', { type: 'button', style: { ...gbtn({ flex: 1 }), color: AM2, borderColor: AM4 }, onClick: () => doFinish(active, false, true) }, 'На переделку'),
              h('button', { type: 'button', style: gbtn({ flex: 1 }), onClick: () => setShowDefForm(false) }, 'Отмена')
            )
          )
        ) : active.name.includes('свар') ? (
          h('div', null,
            h('div', { style: { display: 'flex', gap: 8, marginBottom: 8 } },
              h('input', { style: { ...S.inp, flex: 1 }, placeholder: 'Номер шва', value: weldParams.seamNumber, onChange: e => setWeldParams(p => ({ ...p, seamNumber: e.target.value })) }),
              h('input', { style: { ...S.inp, flex: 1 }, placeholder: 'Тип электрода', value: weldParams.electrode, onChange: e => setWeldParams(p => ({ ...p, electrode: e.target.value })) })
            ),
            h('div', { style: { display: 'flex', gap: 8, marginBottom: 8 } },
              h('label', { style: { display: 'flex', alignItems: 'center', gap: 4 } },
                h('input', { type: 'radio', name: 'weldResult', value: 'ok', checked: weldParams.result === 'ok', onChange: e => setWeldParams(p => ({ ...p, result: e.target.value })) }), 'Принято'),
              h('label', { style: { display: 'flex', alignItems: 'center', gap: 4 } },
                h('input', { type: 'radio', name: 'weldResult', value: 'fail', checked: weldParams.result === 'fail', onChange: e => setWeldParams(p => ({ ...p, result: e.target.value })) }), 'Брак')
            ),
            h('div', { style: { display: 'flex', gap: 8 } },
              h('button', { type: 'button', style: { ...abtn({ flex: 2, padding: '12px', fontSize: 14 }), background: GN, color: GN2 }, onClick: () => doFinish(active, weldParams.result === 'fail', false) }, '✓ Завершить'),
              h('button', { type: 'button', style: rbtn({ flex: 1, padding: '12px' }), onClick: () => setShowDefForm(true) }, '⚠ Брак с пред. уч.'),
              h('button', { type: 'button', style: gbtn({ flex: 1, padding: '12px' }), onClick: () => { setShowDowntimeModal(true); setDowntimeStartedAt(now()); } }, '⏸ Простой')
            )
          )
        ) : (
          h('div', { style: { display: 'flex', gap: 8 } },
            h('button', { type: 'button', style: { ...abtn({ flex: 2, padding: '12px', fontSize: 14 }), background: GN, color: GN2 }, onClick: () => doFinish(active) }, '✓ Завершено'),
            h('button', { type: 'button', style: rbtn({ flex: 1, padding: '12px' }), onClick: () => setShowDefForm(true) }, '⚠ Брак с пред. уч.'),
            h('button', { type: 'button', style: gbtn({ flex: 1, padding: '12px' }), onClick: () => { setShowDowntimeModal(true); setDowntimeStartedAt(now()); } }, '⏸ Простой')
          )
        )
      ),

      showDowntimeModal && h('div', { style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 60 } },
        h('div', { style: { background: '#fff', borderRadius: 12, padding: 24, width: 320 } },
          h('div', { style: { fontSize: 14, fontWeight: 500, marginBottom: 4 } }, 'Фиксация простоя'),
          h('div', { style: { fontSize: 28, fontWeight: 500, color: RD, textAlign: 'center', margin: '12px 0' } }, downtimeStartedAt ? fmtDur(now() - downtimeStartedAt) : '—'),
          h('div', { style: { fontSize: 11, color: '#888', textAlign: 'center', marginBottom: 12 } }, 'Время простоя идёт'),
          h('select', { style: { ...S.inp, width: '100%', marginBottom: 16 }, value: selectedDowntimeType, onChange: e => setSelectedDowntimeType(e.target.value) },
            h('option', { value: '' }, '— причина простоя —'),
            data.downtimeTypes.map(dt => h('option', { key: dt.id, value: dt.id }, dt.name))
          ),
          h('div', { style: { display: 'flex', gap: 8 } },
            h('button', { type: 'button', style: gbtn({ flex: 1 }), onClick: () => { setShowDowntimeModal(false); setSelectedDowntimeType(''); setDowntimeStartedAt(null); } }, 'Отмена'),
            h('button', { type: 'button', style: rbtn({ flex: 1, fontWeight: 500 }), onClick: recordDowntime }, 'Завершить простой')
          )
        )
      ),

      !active && myOps.length > 0 && h('div', null,
        h('div', { style: S.sec }, 'Задания'),
        myOps.map(op => {
          const order = data.orders.find(o => o.id === op.orderId);
          const deadlineMs = order?.deadline ? new Date(order.deadline).getTime() : null;
          const timeLeft = deadlineMs ? deadlineMs - now() : null;
          const daysLeft = timeLeft ? Math.ceil(timeLeft / 86400000) : null;
          const isUrgent = daysLeft !== null && daysLeft <= 2;
          const isOverdue = daysLeft !== null && daysLeft < 0;
          return h('div', { key: op.id, style: { ...S.card, marginBottom: 8, borderLeft: isOverdue ? `4px solid ${RD}` : isUrgent ? `4px solid ${AM}` : order?.priority === 'critical' ? `4px solid ${RD}` : 'none' } },
            h('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: 8 } },
              h('div', null,
                h('div', { style: { fontSize: 14, fontWeight: 500 } }, op.name),
                h('div', { style: { fontSize: 11, color: AM } }, order?.number || '—'),
                h('div', { style: { display: 'flex', gap: 6, alignItems: 'center', marginTop: 2 } },
                  order?.priority && h('span', { style: { fontSize: 10, color: PRIORITY[order.priority]?.color } }, PRIORITY[order.priority].label),
                  daysLeft !== null && h('span', { style: { fontSize: 10, color: isOverdue ? RD : isUrgent ? AM : '#888', fontWeight: isUrgent ? 500 : 400 } },
                    isOverdue ? `просрочено ${Math.abs(daysLeft)}д` : daysLeft === 0 ? 'сегодня!' : `${daysLeft}д до отгрузки`
                  )
                )
              ),
              h(Badge, { st: op.status })
            ),
            op.status === 'pending' && h('button', { type: 'button', style: abtn({ width: '100%' }), onClick: () => doStart(op) }, '▶ Начать')
          );
        })
      )
    ) : h(Chat, { messages, userId, userName, onSend: onSendMessage, onDelete: onDeleteMessage, onLike: onLikeMessage, isMaster: false })
  );
});

// ==================== ЭКРАН КОНТРОЛЁРА (с вкладкой чата) ====================
const ControllerScreen = memo(({ data, onUpdate, addToast, messages, onSendMessage, onDeleteMessage, onLikeMessage, userId, userName }) => {
  const [tab, setTab] = useState('qc');
  const pendingQC = data.ops.filter(o => o.status === 'on_check' && !o.archived);

  const acceptOp = useCallback(async (op) => {
    const updated = {
      ...data,
      ops: data.ops.map(o => o.id === op.id ? { ...o, status: 'done' } : o),
      events: [...data.events, { id: uid(), type: 'qc_pass', opId: op.id, ts: now() }]
    };
    await DB.save(updated);
    onUpdate(updated);
    addToast('Операция принята', 'success');
  }, [data, onUpdate, addToast]);

  const rejectOp = useCallback(async (op, note) => {
    const updated = {
      ...data,
      ops: data.ops.map(o => o.id === op.id ? { ...o, status: 'defect', defectNote: note } : o),
      events: [...data.events, { id: uid(), type: 'qc_reject', opId: op.id, ts: now(), note }]
    };
    await DB.save(updated);
    onUpdate(updated);
    addToast('Операция забракована', 'info');
  }, [data, onUpdate, addToast]);

  return h('div', null,
    h('div', { style: { display: 'flex', gap: 8, marginBottom: 16, borderBottom: '0.5px solid rgba(0,0,0,0.1)' } },
      h('button', { style: { padding: '8px 16px', background: 'transparent', border: 'none', borderBottom: tab === 'qc' ? `2px solid ${AM}` : 'none', color: tab === 'qc' ? AM : '#888', cursor: 'pointer' }, onClick: () => setTab('qc') }, 'Контроль'),
      h('button', { style: { padding: '8px 16px', background: 'transparent', border: 'none', borderBottom: tab === 'chat' ? `2px solid ${AM}` : 'none', color: tab === 'chat' ? AM : '#888', cursor: 'pointer' }, onClick: () => setTab('chat') }, 'Чат')
    ),
    tab === 'qc' ? h('div', { style: S.card },
      h('div', { style: S.sec }, 'Операции, ожидающие контроля'),
      pendingQC.length === 0 ? h('div', { style: { padding: 16, textAlign: 'center' } }, 'Нет операций на контроле') :
        h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', null, h('tr', null,
            h('th', { style: S.th }, 'Заказ'),
            h('th', { style: S.th }, 'Операция'),
            h('th', { style: S.th }, 'Рабочий'),
            h('th', { style: S.th }, 'Параметры'),
            h('th', { style: S.th }, 'Действия')
          )),
          h('tbody', null, pendingQC.map(op => {
            const order = data.orders.find(o => o.id === op.orderId);
            const worker = data.workers.find(w => w.id === op.workerId);
            return h('tr', { key: op.id },
              h('td', { style: S.td }, order?.number || '—'),
              h('td', { style: S.td }, op.name),
              h('td', { style: S.td }, worker?.name || '—'),
              h('td', { style: S.td }, op.weldParams ? `Шов: ${op.weldParams.seamNumber}, Электрод: ${op.weldParams.electrode}` : '—'),
              h('td', { style: S.td }, h('div', { style: { display: 'flex', gap: 4 } },
                h('button', { style: abtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => acceptOp(op) }, 'Принять'),
                h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => rejectOp(op, prompt('Причина брака')) }, 'Брак')
              ))
            );
          }))
        )
    ) : h(Chat, { messages, userId, userName, onSend: onSendMessage, onDelete: onDeleteMessage, onLike: onLikeMessage, isMaster: false })
  );
});

// ==================== МАСТЕР — УЧЁТ ВРЕМЕНИ ====================
const MasterTimeTracking = memo(({ data, onUpdate, addToast }) => {
  const recordEvent = useCallback((workerId, type) => {
    const shift = getCurrentShift();
    const newEvent = {
      id: uid(),
      type: type,
      workerId,
      ts: now(),
      source: 'master',
      shift
    };
    const updated = { ...data, events: [...data.events, newEvent] };
    DB.save(updated).then(() => {
      onUpdate(updated);
      addToast(`Событие ${type === 'checkin_manual' ? 'прихода' : 'ухода'} зафиксировано`, 'success');
    });
  }, [data, onUpdate, addToast]);

  const getCurrentShift = () => {
    const d = new Date();
    return `${d.toISOString().slice(0,10)}-${Math.floor(d.getHours() / 8) + 1}`;
  };

  const workersWithStatus = useMemo(() => {
    const today = new Date();
    const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
    const todayEnd = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 23, 59, 59, 999).getTime();

    return data.workers.map(w => {
      const todayEvents = data.events.filter(e => e.workerId === w.id && e.ts >= todayStart && e.ts <= todayEnd && (e.type === 'checkin_manual' || e.type === 'checkout_manual'));
      const lastEvent = todayEvents.sort((a,b) => b.ts - a.ts)[0];
      const lastEventType = lastEvent?.type === 'checkin_manual' ? 'Пришёл' : (lastEvent?.type === 'checkout_manual' ? 'Ушёл' : 'Нет');
      const lastEventTime = lastEvent ? new Date(lastEvent.ts).toLocaleTimeString() : '';
      return {
        ...w,
        lastEventType,
        lastEventTime,
        eventsCount: todayEvents.length
      };
    }).sort((a,b) => a.name.localeCompare(b.name));
  }, [data.workers, data.events]);

  return h('div', null,
    h('div', { style: S.card },
      h('div', { style: S.sec }, 'Учёт рабочего времени (сегодня)'),
      workersWithStatus.length === 0 ? h('div', { style: { textAlign: 'center', padding: 32 } }, 'Нет рабочих') :
        h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', null, h('tr', null,
            h('th', { style: S.th }, 'Рабочий'),
            h('th', { style: S.th }, 'Последнее событие'),
            h('th', { style: S.th }, 'Время'),
            h('th', { style: S.th }, 'Всего событий'),
            h('th', { style: S.th }, 'Действия')
          )),
          h('tbody', null, workersWithStatus.map(w => h('tr', { key: w.id },
            h('td', { style: S.td }, w.name),
            h('td', { style: S.td }, w.lastEventType),
            h('td', { style: S.td }, w.lastEventTime),
            h('td', { style: S.td, textAlign: 'center' }, w.eventsCount),
            h('td', { style: S.td }, h('div', { style: { display: 'flex', gap: 4 } },
              h('button', { style: abtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => recordEvent(w.id, 'checkin_manual') }, 'Пришёл'),
              h('button', { style: rbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => recordEvent(w.id, 'checkout_manual') }, 'Ушёл')
            ))
          )))
        )
    )
  );
});

    if (form.quantity === '' || isNaN(qty) || qty < 0) errors.quantity = 'Количество должно быть неотрицательным числом';
    setFieldErrors(errors);
    return Object.keys(errors).length === 0;
  };

  const addOrUpdate = useCallback(async () => {
    if (!validate()) return;
    if (editingId) {
      const updated = data.materials.map(m => m.id === editingId ? { ...m, name: form.name.trim(), unit: form.unit.trim(), quantity: Number(form.quantity), batch: form.batch.trim() } : m);

    setFieldErrors({});
  }, [form, editingId, data, onUpdate, addToast]);

  const del = useCallback(async (id) => {
    if (!confirm('Удалить материал?')) return;
    const d = { ...data, materials: data.materials.filter(m => m.id !== id) };

          fieldErrors.name && h('div', { className: 'error-message' }, fieldErrors.name)
        ),
        h('div', { style: { flex: 1, minWidth: 80 } },

          fieldErrors.unit && h('div', { className: 'error-message' }, fieldErrors.unit)
        ),
        h('div', { style: { flex: 1, minWidth: 80 } },
          h('input', { type: 'number', step: '0.01', style: { ...S.inp, width: '100%' }, placeholder: 'Кол-во', value: form.quantity, onChange: e => setForm(p => ({ ...p, quantity: e.target.value })) }),
          fieldErrors.quantity && h('div', { className: 'error-message' }, fieldErrors.quantity)
        ),
        h('div', { style: { flex: 1, minWidth: 100 } },
          h('input', { style: { ...S.inp, width: '100%' }, placeholder: 'Партия', value: form.batch, onChange: e => setForm(p => ({ ...p, batch: e.target.value })) })

// ==================== МАСТЕР — УВЕДОМЛЕНИЯ ====================
const MasterNotifications = memo(({ data }) => {
  const notifications = useMemo(() => {
    const list = [];
    const nowTime = now();
    data.ops.forEach(op => {
      if (op.status === 'pending' && op.plannedStartDate && op.plannedStartDate < nowTime - 3600000) {
        const order = data.orders.find(o => o.id === op.orderId);
        list.push({ id: `overdue-${op.id}`, type: 'overdue', message: `Операция "${op.name}" (заказ ${order?.number}) не начата более часа` });
      }
    });
    const recentDowntimes = data.events.filter(e => e.type === 'downtime' && e.ts > nowTime - 1800000);
    recentDowntimes.forEach(e => {
      const worker = data.workers.find(w => w.id === e.workerId);
      const reason = data.downtimeTypes.find(d => d.id === e.downtimeTypeId)?.name;
      list.push({ id: `downtime-${e.id}`, type: 'downtime', message: `Простой: ${worker?.name} — ${reason}` });
    });
    data.orders.forEach(order => {
      if (isShipmentNear(order.deadline) && !order.archived) {
        list.push({ id: `deadline-${order.id}`, type: 'deadline', message: `Заказ ${order.number} близок к дате отгрузки` });
      }
    });
    return list.slice(0, 10);
  }, [data]);

  return h('div', { style: { ...S.card, marginBottom: 12 } },
    h('div', { style: { ...S.sec, display: 'flex', alignItems: 'center' } }, 'Уведомления', notifications.length > 0 && h('span', { className: 'notification-badge' }, notifications.length)),
    notifications.length === 0 ? h('div', { style: { padding: 8, color: '#888' } }, 'Нет новых уведомлений') :
      notifications.map(n => h('div', { key: n.id, style: { padding: '6px 0', borderBottom: '0.5px solid #eee', fontSize: 12, color: n.type === 'overdue' ? RD : (n.type === 'deadline' ? AM : '#333') } }, n.message))
  );
});

// ==================== МАСТЕР — ОПЕРАЦИИ (с фильтром по компетенциям) ====================
const MasterOps = memo(({ data, onUpdate, onShowQR, addToast }) => {
  const [form, setForm] = useState({ orderId: '', name: '', workerId: '', plannedHours: '', sectionId: '', equipmentId: '', plannedStartDate: '' });
  const [filt, setFilt] = useState('all');
  const [editingId, setEditingId] = useState(null);
  const [showArchived, setShowArchived] = useState(false);
  const [page, setPage] = useState(1);
  const pageSize = 20;
  const [fieldErrors, setFieldErrors] = useState({});

  const validate = () => {
    const errors = {};
    if (!form.orderId) errors.orderId = 'Выберите заказ';
    if (!form.name.trim()) errors.name = 'Введите название операции';
    if (form.plannedHours && (isNaN(form.plannedHours) || Number(form.plannedHours) <= 0)) errors.plannedHours = 'Плановое время должно быть положительным числом';
    setFieldErrors(errors);
    return Object.keys(errors).length === 0;
  };

  const addOrUpdate = useCallback(async () => {
    if (!validate()) return;
    if (editingId) {
      const updatedOps = data.ops.map(o => o.id === editingId ? { ...o, orderId: form.orderId, name: form.name.trim(), workerId: form.workerId, plannedHours: form.plannedHours ? Number(form.plannedHours) : undefined, sectionId: form.sectionId || null, equipmentId: form.equipmentId || null, plannedStartDate: form.plannedStartDate ? new Date(form.plannedStartDate).getTime() : undefined } : o);
      const d = { ...data, ops: updatedOps };
      await DB.save(d); onUpdate(d); setEditingId(null); addToast('Операция обновлена', 'success');
    } else {
      const op = { id: uid(), orderId: form.orderId, name: form.name.trim(), workerId: form.workerId, status: 'pending', createdAt: now(), plannedHours: form.plannedHours ? Number(form.plannedHours) : undefined, archived: false, sectionId: form.sectionId || null, equipmentId: form.equipmentId || null, plannedStartDate: form.plannedStartDate ? new Date(form.plannedStartDate).getTime() : undefined, requiresQC: form.name.includes('свар') || form.name.includes('Опресовка') };
      const d = { ...data, ops: [...data.ops, op] };
      await DB.save(d); onUpdate(d); addToast('Операция добавлена', 'success');
    }
    setForm({ orderId: '', name: '', workerId: '', plannedHours: '', sectionId: '', equipmentId: '', plannedStartDate: '' });
    setFieldErrors({});
  }, [form, editingId, data, onUpdate, addToast]);

  const del = useCallback(async (id) => {
    if (!confirm('Переместить операцию в архив?')) return;
    const d = { ...data, ops: data.ops.map(o => o.id === id ? { ...o, archived: true } : o) };
    await DB.save(d); onUpdate(d); addToast('Операция архивирована', 'info');
  }, [data, onUpdate, addToast]);

  const restore = useCallback(async (id) => {
    const d = { ...data, ops: data.ops.map(o => o.id === id ? { ...o, archived: false } : o) };
    await DB.save(d); onUpdate(d); addToast('Операция восстановлена', 'success');
  }, [data, onUpdate, addToast]);

  const reassign = useCallback(async (opId, workerId) => {
    const worker = data.workers.find(w => w.id === workerId);
    const op = data.ops.find(o => o.id === opId);
    if (worker && worker.competences && worker.competences.length > 0 && !worker.competences.includes(op.name)) {
      addToast('У рабочего нет компетенции для этой операции', 'error');
      return;
    }
    const d = { ...data, ops: data.ops.map(o => o.id === opId ? { ...o, workerId } : o) };
    await DB.save(d); onUpdate(d); addToast('Исполнитель изменён', 'info');
  }, [data, onUpdate, addToast]);

  const edit = useCallback(op => {
    setForm({
      orderId: op.orderId,
      name: op.name,
      workerId: op.workerId || '',
      plannedHours: op.plannedHours || '',
      sectionId: op.sectionId || '',
      equipmentId: op.equipmentId || '',
      plannedStartDate: op.plannedStartDate ? new Date(op.plannedStartDate).toISOString().slice(0,16) : ''
    });
    setEditingId(op.id);
  }, []);

  const opsToShow = useMemo(() => {
    let filtered = data.ops.filter(o => showArchived ? true : !o.archived);
    if (filt === 'active') filtered = filtered.filter(o => o.status === 'in_progress');
    else if (filt === 'pending') filtered = filtered.filter(o => o.status === 'pending');
    else if (filt === 'issues') filtered = filtered.filter(o => o.status === 'defect' || o.status === 'rework');
    else if (filt === 'on_check') filtered = filtered.filter(o => o.status === 'on_check');
    else if (filt !== 'all') filtered = filtered.filter(o => o.orderId === filt);
    return filtered;
  }, [data.ops, filt, showArchived]);

  const paginated = useMemo(() => {
    const start = (page - 1) * pageSize;
    return opsToShow.slice(start, start + pageSize);
  }, [opsToShow, page]);

  useEffect(() => { setPage(1); }, [filt, showArchived]);

  return h('div', null,
    h('div', { style: S.card },
      h('div', { style: S.sec }, editingId ? 'Редактировать' : 'Создать операцию'),
      h('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'flex-start' } },
        h('div', { style: { minWidth: 150 } },
          h('select', { style: { ...S.inp, width: '100%' }, value: form.orderId, onChange: e => setForm(p => ({ ...p, orderId: e.target.value })) },
            h('option', { value: '' }, '— заказ —'), data.orders.map(o => h('option', { key: o.id, value: o.id }, o.number))),
          fieldErrors.orderId && h('div', { className: 'error-message' }, fieldErrors.orderId)
        ),
        h('div', { style: { flex: 1, minWidth: 160 } },
          h('input', { style: { ...S.inp, width: '100%' }, placeholder: 'Операция', value: form.name, onChange: e => setForm(p => ({ ...p, name: e.target.value })) }),
          fieldErrors.name && h('div', { className: 'error-message' }, fieldErrors.name)
        ),
        h('div', { style: { minWidth: 120 } },

      data.orders.map(o => h('button', { key: o.id, style: filt === o.id ? abtn({ fontSize: 10 }) : gbtn({ fontSize: 10 }), onClick: () => setFilt(o.id) }, o.number)),
      h('label', { style: { marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 4, fontSize: 12 } },

        'Показать архивные'

    ),
    paginated.length === 0 ? h('div', { style: { ...S.card, textAlign: 'center' } }, 'Нет операций') :
      h('div', { style: { ...S.card, padding: 0 } },
        h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', null, h('tr', null, ['ID', 'Операция', 'Заказ', 'Исполнитель', 'Участок', 'Оборуд.', 'План, ч', 'План. старт', 'Статус', 'Время', ''].map((t, i) => h('th', { key: i, style: S.th }, t)))),
          h('tbody', null, paginated.map(op => {
            const ord = data.orders.find(o => o.id === op.orderId);
            const worker = data.workers.find(w => w.id === op.workerId);
            const section = data.sections.find(s => s.id === op.sectionId);

              !w.competences || w.competences.length === 0 || w.competences.includes(op.name)

// ==================== МАСТЕР — ЗАКАЗЫ ====================
const MasterOrders = memo(({ data, onUpdate, addToast }) => {
  const [form, setForm] = useState({ number: '', product: '', qty: '', deadline: '', priority: 'medium', bomId: '' });
  const [qrOps, setQrOps] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [showArchived, setShowArchived] = useState(false);
  const [page, setPage] = useState(1);
  const pageSize = 20;
  const [fieldErrors, setFieldErrors] = useState({});

  const validate = () => {
    const errors = {};
    if (!form.number.trim()) errors.number = 'Введите номер заказа';
    else {
      const exists = data.orders.some(o => o.number === form.number && o.id !== editingId && !o.archived);
      if (exists) errors.number = 'Такой номер уже существует';
    }
    if (!form.product.trim()) errors.product = 'Введите название изделия';
    const qtyNum = Number(form.qty);
    if (!form.qty || isNaN(qtyNum) || qtyNum <= 0) errors.qty = 'Количество должно быть положительным числом';
    if (form.deadline) {
      const today = new Date(); today.setHours(0,0,0,0);
      const shipDate = new Date(form.deadline);
      if (shipDate < today) errors.deadline = 'Дата отгрузки не может быть раньше сегодняшнего дня';
    }
    setFieldErrors(errors);
    return Object.keys(errors).length === 0;
  };

  const createDefaultOps = useCallback((orderId, bomId) => {
    return OPERATION_STAGES.map(name => ({
      id: uid(),
      orderId,
      name,
      workerId: '',
      status: 'pending',
      createdAt: now(),
      plannedHours: undefined,
      archived: false,
      sectionId: null,
      equipmentId: null,
      plannedStartDate: undefined,
      requiresQC: name.includes('свар') || name.includes('Опресовка')
    }));
  }, []);

  const addOrUpdate = useCallback(async () => {
    if (!validate()) return;
    if (editingId) {
      const updatedOrders = data.orders.map(o => o.id === editingId ? { ...o, ...form, qty: Number(form.qty), priority: form.priority } : o);
      const d = { ...data, orders: updatedOrders };
      await DB.save(d); onUpdate(d); setEditingId(null); addToast('Заказ обновлён', 'success');
    } else {
      const newOrder = { id: uid(), ...form, qty: Number(form.qty), createdAt: now(), archived: false };
      const newOps = createDefaultOps(newOrder.id, form.bomId);
      const d = { ...data, orders: [...data.orders, newOrder], ops: [...data.ops, ...newOps] };
      await DB.save(d); onUpdate(d);
      setQrOps(newOps);
      addToast('Заказ создан', 'success');
    }
    setForm({ number: '', product: '', qty: '', deadline: '', priority: 'medium', bomId: '' });
    setFieldErrors({});
  }, [form, editingId, data, onUpdate, createDefaultOps, addToast]);

  const del = useCallback(async id => {
    if (!confirm('Переместить заказ в архив?')) return;
    const d = { ...data, orders: data.orders.map(o => o.id === id ? { ...o, archived: true } : o) };
    await DB.save(d); onUpdate(d); addToast('Заказ архивирован', 'info');
  }, [data, onUpdate, addToast]);

  const restore = useCallback(async id => {
    const d = { ...data, orders: data.orders.map(o => o.id === id ? { ...o, archived: false } : o) };
    await DB.save(d); onUpdate(d); addToast('Заказ восстановлен', 'success');
  }, [data, onUpdate, addToast]);

  const edit = useCallback(ord => {
    setForm({ number: ord.number, product: ord.product, qty: String(ord.qty), deadline: ord.deadline || '', priority: ord.priority || 'medium', bomId: '' });
    setEditingId(ord.id);
  }, []);

  const generatePassport = useCallback((order) => {
    const orderOps = data.ops.filter(op => op.orderId === order.id && !op.archived);
    const docDefinition = {
      content: [
        { text: 'Паспорт изделия', style: 'header' },
        { text: `Заказ №: ${order.number}`, style: 'subheader' },
        { text: `Изделие: ${order.product}`, margin: [0, 0, 0, 10] },
        { text: `Количество: ${order.qty}`, margin: [0, 0, 0, 10] },
        { text: `Дата отгрузки: ${order.deadline || 'не указана'}`, margin: [0, 0, 0, 20] },
        { text: 'Операции:', style: 'subheader' },
        {
          table: {
            headerRows: 1,
            widths: ['auto', 'auto', 'auto', 'auto', 'auto'],
            body: [
              ['Операция', 'Исполнитель', 'Начало', 'Окончание', 'Статус'],
              ...orderOps.map(op => [
                op.name,
                data.workers.find(w => w.id === op.workerId)?.name || '—',
                op.startedAt ? new Date(op.startedAt).toLocaleString() : '—',
                op.finishedAt ? new Date(op.finishedAt).toLocaleString() : '—',
                STATUS[op.status]?.label || op.status,
              ])
            ]
          }
        }
      ],
      styles: {
        header: { fontSize: 18, bold: true, margin: [0, 0, 0, 10] },
        subheader: { fontSize: 14, bold: true, margin: [0, 10, 0, 5] }
      }
    };
    pdfMake.createPdf(docDefinition).download(`passport_${order.number}.pdf`);
  }, [data.workers, data.ops]);

  const generateRouteSheet = useCallback((order) => {
    const orderOps = data.ops.filter(op => op.orderId === order.id && !op.archived);
    const docDefinition = {
      content: [
        { text: 'Маршрутный лист', style: 'header' },
        { text: `Заказ №: ${order.number}`, style: 'subheader' },
        { text: `Изделие: ${order.product}`, margin: [0, 0, 0, 10] },
        { text: `Количество: ${order.qty}`, margin: [0, 0, 0, 20] },
        {
          table: {
            headerRows: 1,
            widths: ['auto', 'auto', 'auto', 'auto'],
            body: [
              ['Операция', 'Исполнитель', 'План. время', 'Отметка'],
              ...orderOps.map(op => [
                op.name,
                data.workers.find(w => w.id === op.workerId)?.name || '—',
                op.plannedHours ? `${op.plannedHours} ч` : '—',
                { text: '', border: [true, true, true, true] }
              ])
            ]
          }
        }
      ],
      styles: {
        header: { fontSize: 18, bold: true, margin: [0, 0, 0, 10] },
        subheader: { fontSize: 14, bold: true, margin: [0, 10, 0, 5] }
      }
    };
    pdfMake.createPdf(docDefinition).download(`route_${order.number}.pdf`);
  }, [data.workers, data.ops]);

  const ordersToShow = useMemo(() => {
    return data.orders.filter(o => showArchived ? true : !o.archived).sort((a,b) => {
      const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
      return (priorityOrder[a.priority] || 4) - (priorityOrder[b.priority] || 4) || (b.createdAt||0) - (a.createdAt||0);
    });
  }, [data.orders, showArchived]);

  const paginated = useMemo(() => {
    const start = (page - 1) * pageSize;
    return ordersToShow.slice(start, start + pageSize);
  }, [ordersToShow, page]);

  useEffect(() => { setPage(1); }, [showArchived]);

  return h('div', null,
    qrOps && h(QRModal, { ops: qrOps, order: data.orders.find(o => o.id === qrOps[0]?.orderId), onClose: () => setQrOps(null) }),
    h('div', { style: S.card },
      h('div', { style: S.sec }, editingId ? 'Редактировать' : 'Новый заказ'),
      h('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'flex-start' } },
        h('div', { style: { minWidth: 120 } },
          h('input', { style: S.inp, placeholder: 'Номер', value: form.number, onChange: e => setForm(p => ({ ...p, number: e.target.value })) }),
          fieldErrors.number && h('div', { className: 'error-message' }, fieldErrors.number)
        ),
        h('div', { style: { flex: 1, minWidth: 160 } },
          h('input', { style: { ...S.inp, width: '100%' }, placeholder: 'Изделие', value: form.product, onChange: e => setForm(p => ({ ...p, product: e.target.value })) }),
          fieldErrors.product && h('div', { className: 'error-message' }, fieldErrors.product)
        ),
        h('div', { style: { minWidth: 70 } },
          h('input', { type: 'number', style: { ...S.inp, width: '100%' }, placeholder: 'Кол-во', value: form.qty, onChange: e => setForm(p => ({ ...p, qty: e.target.value })) }),
          fieldErrors.qty && h('div', { className: 'error-message' }, fieldErrors.qty)
        ),
        h('div', { style: { minWidth: 140 } },
          h('input', { type: 'date', style: { ...S.inp, width: '100%' }, placeholder: 'Дата отгрузки', value: form.deadline, onChange: e => setForm(p => ({ ...p, deadline: e.target.value })) }),
          fieldErrors.deadline && h('div', { className: 'error-message' }, fieldErrors.deadline)
        ),
        h('div', { style: { minWidth: 120 } },
          h('select', { style: { ...S.inp, width: '100%' }, value: form.priority, onChange: e => setForm(p => ({ ...p, priority: e.target.value })) },
            h('option', { value: 'low' }, 'Низкий'),
            h('option', { value: 'medium' }, 'Средний'),
            h('option', { value: 'high' }, 'Высокий'),
            h('option', { value: 'critical' }, 'Критический')
          )
        ),
        h('div', { style: { minWidth: 140 } },
          h('select', { style: { ...S.inp, width: '100%' }, value: form.bomId, onChange: e => setForm(p => ({ ...p, bomId: e.target.value })) },
            h('option', { value: '' }, '— без BOM —'),
            data.bomTemplates.map(b => h('option', { key: b.id, value: b.id }, b.productName))
          )
        ),
        h('button', { type: 'button', style: abtn(), onClick: addOrUpdate }, editingId ? '✓' : '+'),
        editingId && h('button', { type: 'button', style: gbtn(), onClick: () => { setEditingId(null); setForm({ number: '', product: '', qty: '', deadline: '', priority: 'medium', bomId: '' }); setFieldErrors({}); } }, 'Отмена')
      )
    ),
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 } },
      h('label', { style: { display: 'flex', alignItems: 'center', gap: 4, fontSize: 12 } },
        h('input', { type: 'checkbox', checked: showArchived, onChange: e => setShowArchived(e.target.checked) }),
        'Показать архивные'
      )
    ),
    paginated.length === 0 ? h('div', { style: { ...S.card, textAlign: 'center' } }, 'Заказов нет') :
      h('div', { style: { ...S.card, padding: 0 } },
        h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', null, h('tr', null, ['Номер', 'Изделие', 'Кол-во', 'Дата отгрузки', 'Приоритет', 'Операций', 'Статус', ''].map((t, i) => h('th', { key: i, style: S.th }, t)))),
          h('tbody', null, paginated.map(ord => {
            const ops = data.ops.filter(o => o.orderId === ord.id);
            const done = ops.filter(o => o.status === 'done').length;
            const def = ops.filter(o => o.status === 'defect').length;
            const st = ops.length === 0 ? 'pending' : done === ops.length ? 'done' : ops.some(o => o.status === 'in_progress') ? 'in_progress' : 'pending';
            const nearDeadline = isShipmentNear(ord.deadline) && st !== 'done';
            return h('tr', { key: ord.id, style: { background: ord.archived ? '#eee' : 'transparent' } },
              h('td', { style: { ...S.td, color: AM, fontWeight: 500 } },
                ord.number, nearDeadline && h('span', { style: { marginLeft: 6, color: RD } }, '⏳')
              ),
              h('td', { style: S.td }, ord.product),
              h('td', { style: S.td }, ord.qty),
              h('td', { style: { ...S.td, color: nearDeadline ? RD : '#888' } }, ord.deadline || '—'),
              h('td', { style: { ...S.td, color: PRIORITY[ord.priority]?.color || '#888' } }, PRIORITY[ord.priority]?.label || '—'),
              h('td', { style: S.td }, `${done}/${ops.length}`, def > 0 && h('span', { style: { marginLeft: 4, color: RD } }, `⚠ ${def}`)),
              h('td', { style: S.td }, h(Badge, { st })),
              h('td', { style: S.td }, h('div', { style: { display: 'flex', gap: 4 } },
                !ord.archived ? [
                  h('button', { key: 'edit', style: gbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => edit(ord) }, '✎'),
                  h('button', { key: 'del', style: rbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => del(ord.id) }, '✕'),
                  h('button', { key: 'passport', style: gbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => generatePassport(ord) }, '📄'),
                  h('button', { key: 'route', style: gbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => generateRouteSheet(ord) }, '📋 Маршрут')
                ] : h('button', { style: gbtn({ fontSize: 11, padding: '4px 8px' }), onClick: () => restore(ord.id) }, '↩ Восстановить')
              ))
            );
          }))
        ),
        h('div', { className: 'pagination' },
          h('button', { style: gbtn({ opacity: page === 1 ? 0.4 : 1 }), disabled: page === 1, onClick: () => setPage(p => Math.max(1, p-1)) }, '← Пред'),
          h('span', { style: { fontSize: 12 } }, `${page} / ${Math.ceil(ordersToShow.length / pageSize) || 1}`),
          h('button', { style: gbtn({ opacity: page >= Math.ceil(ordersToShow.length / pageSize) ? 0.4 : 1 }), disabled: page >= Math.ceil(ordersToShow.length / pageSize), onClick: () => setPage(p => p+1) }, 'След →')
        )
      )
  );
});

// ==================== МАСТЕР — РАБОЧИЕ (карточный интерфейс с метриками и кнопкой благодарности) ====================
const MasterWorkers = memo(({ data, onUpdate, addToast }) => {
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [showAddForm, setShowAddForm] = useState(false);
  const [editingWorker, setEditingWorker] = useState(null);
  const [cardWorker, setCardWorker] = useState(null);
  const [thanksModal, setThanksModal] = useState(null);
  const [thanksNote, setThanksNote] = useState('');
  const [form, setForm] = useState({ name: '', position: '', grade: '', tabNumber: '', pin: '', sectionId: '', competences: [], status: 'working' });

  const resetForm = () => { setForm({ name: '', position: '', grade: '', tabNumber: '', pin: '', sectionId: '', competences: [], status: 'working' }); setEditingWorker(null); setShowAddForm(false); };

  const addOrUpdate = useCallback(async () => {
    if (!form.name.trim()) { addToast('Введите имя рабочего', 'error'); return; }
    if (!form.pin.trim()) { addToast('Введите PIN-код', 'error'); return; }
    const pinExists = data.workers.some(w => w.pin === form.pin.trim() && w.id !== editingWorker);
    if (pinExists) { addToast('Такой PIN-код уже занят', 'error'); return; }
    if (editingWorker) {
      const d = { ...data, workers: data.workers.map(w => w.id === editingWorker ? { ...w, name: form.name.trim(), position: form.position.trim(), grade: form.grade.trim(), tabNumber: form.tabNumber.trim(), pin: form.pin.trim(), sectionId: form.sectionId || null, competences: form.competences, status: form.status } : w) };
      await DB.save(d); onUpdate(d); addToast('Рабочий обновлён', 'success');
    } else {
      const w = { id: uid(), name: form.name.trim(), position: form.position.trim(), grade: form.grade.trim(), tabNumber: form.tabNumber.trim(), pin: form.pin.trim(), sectionId: form.sectionId || null, competences: form.competences, status: form.status, totalLikes: 0 };
      const d = { ...data, workers: [...data.workers, w] };
      await DB.save(d); onUpdate(d); addToast('Рабочий добавлен', 'success');
    }
    resetForm();
  }, [form, editingWorker, data, onUpdate, addToast]);

  const del = useCallback(async id => {
    if (!confirm('Удалить рабочего?')) return;
    const d = { ...data, workers: data.workers.filter(w => w.id !== id) };
    await DB.save(d); onUpdate(d); addToast('Рабочий удалён', 'info');
  }, [data, onUpdate, addToast]);

  const edit = useCallback(w => {
    setForm({ name: w.name, position: w.position || '', grade: w.grade || '', tabNumber: w.tabNumber || '', pin: w.pin || '', sectionId: w.sectionId || '', competences: w.competences || [], status: w.status || 'working' });
    setEditingWorker(w.id);
    setShowAddForm(false);
  }, []);

  const updateStatus = useCallback(async (id, status) => {
    const d = { ...data, workers: data.workers.map(w => w.id === id ? { ...w, status } : w) };
    await DB.save(d); onUpdate(d);
  }, [data, onUpdate]);

  // Отправка благодарности
  const sendThanks = useCallback(async (toWorkerId, note) => {
    const newEvent = {
      id: uid(),
      type: 'thanks',
      toWorkerId,
      fromWorkerId: null,
      ts: now(),
      note: note || ''
    };
    const updated = { ...data, events: [...data.events, newEvent] };
    await DB.save(updated);
    onUpdate(updated);
    const withAch = checkAchievements(toWorkerId, updated);
    if (withAch !== updated) {
      await DB.save(withAch);
      onUpdate(withAch);
    }
    setThanksModal(null);
    setThanksNote('');
    addToast('Благодарность отправлена', 'success');
  }, [data, onUpdate, addToast]);

  const period30 = now() - 30 * 86400000;

  const workersEnriched = useMemo(() => {
    return data.workers.map(w => {
      const opsDone = data.ops.filter(op => op.workerId === w.id && op.status === 'done' && op.finishedAt >= period30);
      const opsDefect = data.ops.filter(op => op.workerId === w.id && op.status === 'defect' && op.finishedAt >= period30);
      const opsActive = data.ops.filter(op => op.workerId === w.id && op.status === 'in_progress');
      const avgTime = opsDone.length > 0 ? opsDone.reduce((s, op) => s + (op.finishedAt - op.startedAt), 0) / opsDone.length : 0;
      const total = opsDone.length + opsDefect.length;
      const defectRate = total > 0 ? (opsDefect.length / total * 100) : 0;
      const downtimes = data.events.filter(e => e.workerId === w.id && e.type === 'downtime' && e.ts >= period30).length;
      const section = data.sections.find(s => s.id === w.sectionId);
      const todayStart = new Date().setHours(0,0,0,0);
      const checkin = data.events.find(e => e.workerId === w.id && e.type === 'checkin_manual' && e.ts >= todayStart);
      return { 
        ...w, 
        opsDone: opsDone.length, 
        opsDefect: opsDefect.length, 
        opsActive: opsActive.length, 
        avgTime, 
        defectRate, 
        downtimes, 
        sectionName: section?.name || '', 
        checkinTime: checkin ? new Date(checkin.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : null, 
        allTimeDone: data.ops.filter(op => op.workerId === w.id && op.status === 'done').length,
        level: getWorkerLevel(data.ops.filter(op => op.workerId === w.id && op.status === 'done').length),
        levelProgress: getLevelProgress(data.ops.filter(op => op.workerId === w.id && op.status === 'done').length)
      };
    });
  }, [data.workers, data.ops, data.events, data.sections, period30]);

  const filtered = useMemo(() => {
    let list = workersEnriched;
    if (search) list = list.filter(w => w.name.toLowerCase().includes(search.toLowerCase()));
    if (statusFilter !== 'all') list = list.filter(w => (w.status || 'working') === statusFilter);
    return list.sort((a,b) => a.name.localeCompare(b.name));
  }, [workersEnriched, search, statusFilter]);

  const summary = useMemo(() => {
    const s = { total: data.workers.length, working: 0, absent: 0, sick: 0, vacation: 0 };
    data.workers.forEach(w => s[w.status || 'working']++);
    const avgLoad = workersEnriched.length > 0 ? Math.round(workersEnriched.reduce((sum, w) => sum + w.opsActive, 0) / workersEnriched.filter(w => (w.status || 'working') === 'working').length * 100) || 0 : 0;
    return { ...s, avgLoad };
  }, [data.workers, workersEnriched]);

  const toggleCompetence = (comp) => {
    setForm(p => ({ ...p, competences: p.competences.includes(comp) ? p.competences.filter(c => c !== comp) : [...p.competences, comp] }));
  };

  return h('div', null,
    cardWorker && h(WorkerCardModal, { worker: cardWorker, data, onClose: () => setCardWorker(null) }),
    thanksModal && h('div', { style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200 } },
      h('div', { style: { background: '#fff', borderRadius: 12, padding: 24, width: 320 } },
        h('div', { style: { fontSize: 16, fontWeight: 500, marginBottom: 16 } }, `Благодарность для ${thanksModal.name}`),
        h('textarea', { style: { ...S.inp, width: '100%', marginBottom: 16 }, rows: 3, placeholder: 'Комментарий (необязательно)', value: thanksNote, onChange: e => setThanksNote(e.target.value) }),
        h('div', { style: { display: 'flex', gap: 8, justifyContent: 'flex-end' } },
          h('button', { style: gbtn(), onClick: () => { setThanksModal(null); setThanksNote(''); } }, 'Отмена'),
          h('button', { style: abtn(), onClick: () => sendThanks(thanksModal.id, thanksNote) }, 'Отправить')
        )
      )
    ),

    h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10, marginBottom: 16 } },
      h('div', { style: { ...S.card, textAlign: 'center' } }, h('div', { style: { fontSize: 24, fontWeight: 500 } }, summary.total), h('div', { style: { fontSize: 10, color: '#888', textTransform: 'uppercase' } }, 'Всего')),
      h('div', { style: { ...S.card, textAlign: 'center' } }, h('div', { style: { fontSize: 24, fontWeight: 500, color: GN } }, summary.working), h('div', { style: { fontSize: 10, color: '#888', textTransform: 'uppercase' } }, 'На смене')),
      h('div', { style: { ...S.card, textAlign: 'center' } }, h('div', { style: { fontSize: 24, fontWeight: 500, color: RD } }, summary.absent + summary.sick + summary.vacation), h('div', { style: { fontSize: 10, color: '#888', textTransform: 'uppercase' } }, 'Отсутствуют')),
      h('div', { style: { ...S.card, textAlign: 'center' } }, h('div', { style: { fontSize: 24, fontWeight: 500, color: AM } }, `${summary.avgLoad}%`), h('div', { style: { fontSize: 10, color: '#888', textTransform: 'uppercase' } }, 'Загрузка, ср.'))
    ),

    h('div', { style: { display: 'flex', gap: 8, marginBottom: 16, alignItems: 'center', flexWrap: 'wrap' } },
      h('input', { style: { ...S.inp, flex: 1, minWidth: 180 }, placeholder: 'Поиск по имени...', value: search, onChange: e => setSearch(e.target.value) }),
      h('div', { style: { display: 'flex', gap: 4 } },
        [['all', 'Все'], ['working', 'На смене'], ['absent', 'Отсутствуют'], ['sick', 'Больничный'], ['vacation', 'Отпуск']].map(([id, label]) =>
          h('button', { key: id, style: statusFilter === id ? abtn({ fontSize: 11, padding: '5px 10px' }) : gbtn({ fontSize: 11, padding: '5px 10px' }), onClick: () => setStatusFilter(id) }, label)

      h('button', { style: abtn({ marginLeft: 'auto' }), onClick: () => { resetForm(); setShowAddForm(true); } }, '+ Добавить')
    ),

    showAddForm && h('div', { style: { ...S.card, border: `1px solid ${AM}`, marginBottom: 16 } },
      h('div', { style: S.sec }, editingWorker ? 'Редактировать рабочего' : 'Новый рабочий'),
      h('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 12 } },
        h('input', { style: { ...S.inp, flex: 2, minWidth: 150 }, placeholder: 'ФИО', value: form.name, onChange: e => setForm(p => ({ ...p, name: e.target.value })) }),

        h('input', { style: { ...S.inp, width: 80 }, placeholder: 'Таб. №', value: form.tabNumber, onChange: e => setForm(p => ({ ...p, tabNumber: e.target.value })) }),

        h('select', { style: { ...S.inp, minWidth: 120 }, value: form.sectionId, onChange: e => setForm(p => ({ ...p, sectionId: e.target.value })) },
          h('option', { value: '' }, '— участок —'),
          data.sections.map(s => h('option', { key: s.id, value: s.id }, s.name))

        h('select', { style: { ...S.inp, minWidth: 120 }, value: form.status, onChange: e => setForm(p => ({ ...p, status: e.target.value })) },
          Object.entries(WORKER_STATUS).map(([k, v]) => h('option', { key: k, value: k }, v.label))

      h('div', { style: { marginBottom: 12 } },
        h('div', { style: { fontSize: 11, color: '#888', marginBottom: 6 } }, 'Допуск к операциям (нажмите для выбора)'),
        h('div', { style: { display: 'flex', gap: 4, flexWrap: 'wrap' } },

      h('div', { style: { display: 'flex', gap: 8 } },

      filtered.map(w => {

        if (editingWorker === w.id) {

            h('div', { style: { ...S.sec, marginBottom: 8 } }, 'Редактирование'),
            h('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 10 } },
              h('input', { style: { ...S.inp, flex: 2, minWidth: 150 }, placeholder: 'ФИО', value: form.name, onChange: e => setForm(p => ({ ...p, name: e.target.value })) }),

              h('input', { style: { ...S.inp, width: 70 }, placeholder: 'Разряд', value: form.grade, onChange: e => setForm(p => ({ ...p, grade: e.target.value })) }),
              h('input', { style: { ...S.inp, width: 70 }, placeholder: 'Таб. №', value: form.tabNumber, onChange: e => setForm(p => ({ ...p, tabNumber: e.target.value })) }),

              h('select', { style: { ...S.inp, minWidth: 110 }, value: form.status, onChange: e => setForm(p => ({ ...p, status: e.target.value })) },

            h('div', { style: { marginBottom: 10 } },

              h('div', { style: { display: 'flex', gap: 4, flexWrap: 'wrap' } },
                OPERATION_STAGES.map(op => h('button', { key: op, type: 'button', style: { padding: '3px 8px', fontSize: 10, borderRadius: 8, border: '0.5px solid ' + (form.competences.includes(op) ? AM : 'rgba(0,0,0,0.15)'), background: form.competences.includes(op) ? AM3 : '#fff', color: form.competences.includes(op) ? AM2 : '#888', cursor: 'pointer' }, onClick: () => toggleCompetence(op) }, op))

              h('button', { style: gbtn(), onClick: resetForm }, 'Отмена')

            h('div', { style: { flex: 1, minWidth: 0 } },
              h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 } },

                  h('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },
                    h('div', { style: { fontSize: 15, fontWeight: 500 } }, w.name),
                    h('span', { style: { display: 'inline-block', padding: '1px 8px', fontSize: 10, borderRadius: 8, background: AM3, color: AM2, fontWeight: 500 } }, `Ур. ${w.level} · ${getLevelTitle(w.level)}`),
                    h('button', { style: gbtn({ fontSize: 11, padding: '2px 6px' }), onClick: () => setThanksModal({ id: w.id, name: w.name }) }, '👏')
                  ),
                  h('div', { style: { fontSize: 12, color: '#888' } },
                    [w.position, w.grade ? `${w.grade} разр.` : null, w.tabNumber ? `Таб. ${w.tabNumber}` : null, w.sectionName].filter(Boolean).join(' · ') || '—'
