  <style>
    /* ════════════════════════════════════════════════════════════════════════
       teploros · НТ — Apple-inspired skin
       Бренд: orange #EF9F27 (Action Color), brown #412402 (Ink dark accent).
       Типографика, ритм, тени — по правилам Apple-inspired Design System.
       Все имена утилитарных классов сохранены — JS-рендер работает без правок.
       ════════════════════════════════════════════════════════════════════════ */
    * { box-sizing: border-box; }
    :root {
      /* — Type scale — */
      --fs-xs: 11px; --fs-sm: 12px; --fs-base: 14px; --fs-md: 15px; --fs-lg: 17px;
      --fw-normal: 400; --fw-medium: 500;

      /* — Radii (Apple ladder: 0 / 5 / 8 / 11 / 18 / pill) — */
      --r-sm: 8px; --r-md: 11px; --r-lg: 18px; --r-xl: 18px;

      /* — Brand — */
      --brand:        #EF9F27;   /* Action Color (replaces Apple blue) */
      --brand-press:  #d88a17;
      --brand-ink:    #412402;
      --brand-soft:   #fdf3e0;

      /* — Status (calibrated to feel Apple-quiet, not bright) — */
      --status-danger:  #d6342f;
      --status-warning: #c97a05;
      --status-info:    #0066cc;
      --status-success: #1d8a3a;

      /* — Surfaces / theme tokens (light by default) — */
      --bg:          #f5f5f7;          /* parchment */
      --fg:          #1d1d1f;          /* ink */
      --fg-muted:    #6e6e73;
      --card:        #ffffff;          /* canvas */
      --card-2:      #fafafc;          /* pearl */
      --border:      rgba(0,0,0,0.10);
      --border-soft: rgba(0,0,0,0.06);
      --hairline:    #e0e0e0;
      --muted:       #7a7a7a;

      /* — Frosted chrome — */
      --chrome-bg:     rgba(245,245,247,0.80);
      --chrome-blur:   saturate(180%) blur(20px);

      /* — Motion — */
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* — System dark — */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg:          #1a1a18;
        --fg:          #ffffff;
        --fg-muted:    #cccccc;
        --card:        #272729;
        --card-2:      #2a2a2c;
        --border:      rgba(255,255,255,0.14);
        --border-soft: rgba(255,255,255,0.08);
        --hairline:    rgba(255,255,255,0.10);
        --muted:       #98989d;
        --chrome-bg:   rgba(39,39,41,0.78);
      }
    }
    /* — Forced themes — */
    [data-theme="dark"] {
      --bg: #1a1a18; --fg: #ffffff; --fg-muted: #cccccc;
      --card: #272729; --card-2: #2a2a2c;
      --border: rgba(255,255,255,0.14); --border-soft: rgba(255,255,255,0.08);
      --hairline: rgba(255,255,255,0.10); --muted: #98989d;
      --chrome-bg: rgba(39,39,41,0.78);
    }
    [data-theme="light"] {
      --bg: #f5f5f7; --fg: #1d1d1f; --fg-muted: #6e6e73;
      --card: #ffffff; --card-2: #fafafc;
      --border: rgba(0,0,0,0.10); --border-soft: rgba(0,0,0,0.06);
      --hairline: #e0e0e0; --muted: #7a7a7a;
      --chrome-bg: rgba(245,245,247,0.80);
    }

    /* ─── Base ──────────────────────────────────────────────────────────── */
    html, body { background: var(--bg); }
    body {
      margin: 0; padding: 16px;
      font-family: "SF Pro Text", "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 17px; line-height: 1.44; letter-spacing: -0.374px;
      color: var(--fg);
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { max-width: 1200px; margin: 0 auto; }

    /* ─── Typography (semantic) ─────────────────────────────────────────── */
    h1, .h1 { font-family: "SF Pro Display", "Inter", system-ui, sans-serif;
              font-size: 28px; font-weight: 600; line-height: 1.14; letter-spacing: -0.5px; margin: 0; }
    h2, .h2 { font-family: "SF Pro Display", "Inter", system-ui, sans-serif;
              font-size: 21px; font-weight: 600; line-height: 1.19; letter-spacing: -0.3px; margin: 0; }
    h3, .h3 { font-size: 17px; font-weight: 600; line-height: 1.24; letter-spacing: -0.374px; margin: 0; }
    h4, .h4 { font-size: 12px; font-weight: 600; line-height: 1.4; letter-spacing: 0.04em;
              text-transform: uppercase; color: var(--muted); margin: 0; }
    @media (max-width: 600px) {
      h1, .h1 { font-size: 22px; letter-spacing: -0.4px; }
      h2, .h2 { font-size: 17px; }
      h3, .h3 { font-size: 14px; }
    }

    /* ─── Inputs ────────────────────────────────────────────────────────── */
    input, select, textarea, button { font-family: inherit; }
    input, select, textarea {
      font-size: 16px;
      background: var(--card); color: var(--fg);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 12px;
      outline: none; width: 100%;
      transition: border-color 120ms var(--ease), box-shadow 120ms var(--ease);
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(239,159,39,0.18);
    }
    input[type="checkbox"], input[type="radio"] { min-height: 24px; min-width: 24px; width: auto; }

    /* ─── Buttons (default: utility, secondary) ─────────────────────────── */
    button {
      cursor: pointer;
      border-radius: var(--r-sm);
      font-size: 14px; font-weight: 500; letter-spacing: -0.224px;
      padding: 10px 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      min-height: 44px;
      transition: transform 120ms var(--ease), background-color 120ms var(--ease), border-color 120ms var(--ease);
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:active:not(:disabled) { transform: scale(0.95); }
    button:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

    /* ─── Status text helpers ───────────────────────────────────────────── */
    .deadline-warning   { color: var(--status-danger); font-weight: 500; margin-left: 4px; }
    .priority-critical  { color: var(--status-danger); font-weight: 700; }
    .priority-high      { color: var(--brand);        font-weight: 600; }
    .priority-medium    { color: var(--status-info); }

    /* ─── Toast ─────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      right: 20px; left: 20px;
      background: rgba(29,29,31,0.92); color: #fff;
      backdrop-filter: var(--chrome-blur);
      -webkit-backdrop-filter: var(--chrome-blur);
      padding: 14px 20px;
      border-radius: var(--r-md);
      z-index: 1000;
      animation: slideIn 0.3s var(--ease);
      font-size: 15px; letter-spacing: -0.224px;
    }
    @keyframes slideIn { from { transform: translateY(120%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .error-message { color: var(--status-danger); font-size: 12px; margin-top: 4px; letter-spacing: -0.12px; }

    /* ─── Pagination ────────────────────────────────────────────────────── */
    .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 16px; align-items: center; flex-wrap: wrap; }
    .notification-badge {
      background: var(--status-danger); color: #fff;
      border-radius: 9999px; padding: 2px 7px;
      font-size: 11px; font-weight: 600; margin-left: 6px;
      letter-spacing: -0.12px;
    }

    /* ─── Gantt ─────────────────────────────────────────────────────────── */
    .gantt-container {
      overflow-x: auto;
      background: var(--card);
      border: 1px solid var(--border-soft);
      border-radius: var(--r-lg);
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .gantt-row { display: flex; border-bottom: 1px solid var(--hairline); }
    .gantt-row:last-child { border-bottom: 0; }
    .gantt-label {
      width: 150px; flex-shrink: 0; padding: 12px;
      font-weight: 500; font-size: 14px; letter-spacing: -0.224px;
      background: var(--card-2);
      border-right: 1px solid var(--hairline);
    }
    .gantt-timeline { display: flex; flex: 1; position: relative; min-height: 50px; }
    .gantt-cell { flex: 1; border-left: 1px solid var(--hairline); text-align: center; font-size: 11px; color: var(--muted); padding-top: 4px; }
    .gantt-bar {
      position: absolute;
      background: var(--brand); color: var(--brand-ink);
      border-radius: var(--r-sm);
      padding: 4px 8px;
      font-size: 11px; font-weight: 500; letter-spacing: -0.12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
    }

    /* ─── Worker calendar / timesheet ───────────────────────────────────── */
    .worker-calendar-table { border-collapse: collapse; width: 100%; font-size: 12px; }
    .worker-calendar-table th, .worker-calendar-table td {
      border: 1px solid var(--hairline);
      padding: 8px 6px; text-align: center;
    }
    .worker-calendar-table th { background: var(--card-2); font-weight: 600; letter-spacing: -0.12px; }
    .worker-cell { background: var(--card); }
    .worker-cell.overload { background: rgba(214,52,47,0.10);  color: var(--status-danger); font-weight: 600; }
    .worker-cell.vacation { background: rgba(0,102,204,0.10);  color: var(--status-info); }
    .worker-cell.sick     { background: rgba(214,52,47,0.10);  color: var(--status-danger); }

    /* ─── Checkbox group ────────────────────────────────────────────────── */
    .checkbox-group {
      display: flex; flex-wrap: wrap; gap: 8px;
      max-height: 120px; overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px;
      background: var(--card);
    }
    .checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; min-height: 36px; letter-spacing: -0.224px; }

    /* ─── Cards ─────────────────────────────────────────────────────────── */
    .report-builder, .chart-container {
      background: var(--card);
      border: 1px solid var(--border-soft);
      border-radius: var(--r-lg);
      padding: 20px;
      margin-bottom: 16px;
    }
    canvas { max-height: 300px; width: 100%; }
    .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }
    .empty-state { text-align: center; padding: 48px 16px; color: var(--muted); font-size: 15px; letter-spacing: -0.224px; }

    /* ─── Tabs (horizontal scroll) ──────────────────────────────────────── */
    .tabs-scroll {
      display: flex; gap: 0;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .tabs-scroll::-webkit-scrollbar { display: none; }
    .tabs-scroll button { flex-shrink: 0; white-space: nowrap; }

    /* ─── Modals ────────────────────────────────────────────────────────── */
    .modal-content {
      background: var(--card);
      border: 1px solid var(--border-soft);
      border-radius: var(--r-lg);
      padding: 28px;
      width: min(680px, calc(100vw - 32px));
      max-height: 85vh;
      overflow-y: auto;
    }

    .metrics-grid { display: grid; gap: 12px; margin-bottom: 20px; }

    /* ─── Worker buttons (oversize touch targets, kept verbatim names) ──── */
    .worker-btn {
      display: block; width: 100%;
      border: none; border-radius: var(--r-lg);
      cursor: pointer; font-weight: 600; font-family: inherit;
      transition: transform 120ms var(--ease), opacity 120ms var(--ease);
      letter-spacing: -0.224px;
    }
    .worker-btn:active { transform: scale(0.97); opacity: 0.9; }
    .worker-btn-start  { padding: 22px 16px; font-size: 18px; background: var(--brand);        color: var(--brand-ink); min-height: 68px; }
    .worker-btn-stop   { padding: 22px 16px; font-size: 18px; background: var(--status-danger); color: #fff;             min-height: 68px; }
    .worker-btn-defect { padding: 18px 12px; font-size: 15px; background: var(--card);
                         color: var(--status-danger); border: 1px solid var(--status-danger);
                         border-radius: var(--r-md); min-height: 58px; cursor: pointer; font-family: inherit; font-weight: 500; flex: 1; }
    .worker-btn-pause  { padding: 16px; font-size: 14px; background: var(--card); color: var(--fg-muted);
                         border: 1px solid var(--border); border-radius: var(--r-md);
                         min-height: 52px; cursor: pointer; font-family: inherit; font-weight: 500; width: 100%; }

    /* ═══════════ NEW: Apple-inspired chrome — landing & global nav ═══════════ */

    /* Frosted top bar (used by Login/Dashboard if they render .app-topbar) */
    .app-topbar {
      position: sticky; top: 0; z-index: 50;
      height: 52px;
      display: flex; align-items: center; gap: 18px;
      padding: 0 22px;
      background: var(--chrome-bg);
      backdrop-filter: var(--chrome-blur);
      -webkit-backdrop-filter: var(--chrome-blur);
      border-bottom: 1px solid var(--border-soft);
      font-size: 14px; letter-spacing: -0.224px;
    }
    .app-topbar .brand-mark {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--brand);
      color: var(--brand-ink);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
    }
    .app-topbar .brand-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }

    /* Pill primary button (Apple grammar) — opt-in via class */
    .btn-primary-pill {
      background: var(--brand); color: var(--brand-ink);
      border: 0;
      border-radius: 9999px;
      padding: 11px 22px;
      font-size: 17px; font-weight: 600; letter-spacing: -0.374px;
      min-height: 44px;
    }
    .btn-primary-pill:active:not(:disabled) { transform: scale(0.95); }

    .btn-secondary-pill {
      background: transparent; color: var(--brand);
      border: 1px solid var(--brand);
      border-radius: 9999px;
      padding: 10px 21px;
      font-size: 17px; font-weight: 500; letter-spacing: -0.374px;
      min-height: 44px;
    }

    /* ─── Update banner (frosted, no emoji) ─────────────────────────────── */
    #update-banner {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--chrome-bg);
      backdrop-filter: var(--chrome-blur);
      -webkit-backdrop-filter: var(--chrome-blur);
      border-top: 1px solid var(--border-soft);
      color: var(--fg);
      padding: 14px 22px;
      z-index: 9999;
      align-items: center; gap: 14px;
      font-size: 15px; letter-spacing: -0.224px;
      box-shadow: 0 -1px 0 rgba(0,0,0,0.04);
    }
    #update-banner span.label { flex: 1; font-weight: 500; }
    #update-banner button { min-height: 36px; padding: 8px 16px; font-size: 14px; }

    /* ─── Cards in JS-rendered code (.dark-card already used) ───────────── */
    .dark-card {
      background: var(--card) !important;
      border: 1px solid var(--border-soft) !important;
      border-radius: var(--r-lg);
    }

    /* ─── Selected ops panel (already used) ─────────────────────────────── */
    .selected-ops-panel {
      background: var(--brand-soft) !important;
      border: 1px solid var(--brand) !important;
      border-radius: var(--r-lg);
    }

    /* ─── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      body { padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px)); }
      .metrics-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .m-card { padding: 14px !important; margin-bottom: 10px !important; }
      .modal-content { width: 100vw !important; max-height: 100vh !important; border-radius: 0 !important; padding: 18px !important; margin: 0 !important; }
      table { font-size: 12px; }
      th, td { padding: 8px 6px !important; }
      .form-row { flex-direction: column !important; }
      .form-row > div { min-width: 0 !important; width: 100% !important; }
      .header-bar { padding: 6px 0 !important; gap: 8px !important; }
      .header-bar button { font-size: 13px !important; padding: 8px 12px !important; min-height: 40px !important; }
      .action-btns { flex-direction: column !important; }
      .action-btns button { width: 100% !important; }
      .tab-groups { gap: 4px !important; }
      .tab-groups button { font-size: 12px !important; padding: 8px 12px !important; min-height: 40px; }
      .forecast-grid { grid-template-columns: repeat(4, 1fr) !important; }
      .kanban-col { flex: 0 0 130px !important; }
      .toast { left: 8px; right: 8px; bottom: calc(8px + env(safe-area-inset-bottom, 0px)); }
      .app-topbar { padding: 0 14px; gap: 12px; }
    }
    @media (min-width: 601px) and (max-width: 900px) {
      body { padding: 12px; }
      .metrics-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .forecast-grid { grid-template-columns: repeat(7, 1fr) !important; }
    }
    @media (min-width: 901px) {
      .metrics-grid { grid-template-columns: repeat(5, 1fr) !important; }
      .forecast-grid { grid-template-columns: repeat(7, 1fr) !important; }
    }

    @supports (padding-top: max(0px)) {
      body { padding-top: max(16px, env(safe-area-inset-top, 0px)); }
      .header-safe { padding-left: max(16px, env(safe-area-inset-left, 0px));
                     padding-right: max(16px, env(safe-area-inset-right, 0px)); }
    }

    /* ─── Tables: per-row hairlines, tabular nums ───────────────────────── */
    table { width: 100%; border-collapse: separate; border-spacing: 0; font-variant-numeric: tabular-nums; }
    table th { font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted);
               text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--hairline); background: var(--card-2); }
    table td { padding: 12px; border-bottom: 1px solid var(--hairline); color: var(--fg); }
    table tbody tr:hover { background: var(--card-2); }

    /* ─── Detail/summary used in operations rows ────────────────────────── */
    details summary { color: var(--brand); cursor: pointer; font-weight: 500; }
    details summary:hover { text-decoration: underline; }
    details > div > div { background: var(--card); color: var(--fg); border: 1px solid var(--border-soft); border-radius: var(--r-md); padding: 12px; }

    /* ─── Links ─────────────────────────────────────────────────────────── */
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ─── Dark-mode dial-ins ────────────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --gantt-bar-bg: var(--brand);
      }
      :root:not([data-theme="light"]) input,
      :root:not([data-theme="light"]) select,
      :root:not([data-theme="light"]) textarea { background: var(--card-2); }
      :root:not([data-theme="light"]) table tbody tr:hover { background: rgba(255,255,255,0.04); }
    }
    [data-theme="dark"] input, [data-theme="dark"] select, [data-theme="dark"] textarea { background: var(--card-2); }
    [data-theme="dark"] table tbody tr:hover { background: rgba(255,255,255,0.04); }

    /* ─── Loader (shows while React boots) ──────────────────────────────── */
    .boot-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 1; pointer-events: none;
      transition: opacity 250ms var(--ease);
    }
    .boot-screen.is-hidden { opacity: 0; }
    .boot-mark {
      width: 56px; height: 56px; border-radius: 14px;
      background: var(--brand); color: var(--brand-ink);
      display: flex; align-items: center; justify-content: center;
      font-family: "SF Pro Display", "Inter", system-ui, sans-serif;
      font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
      animation: boot-pulse 1.6s ease-in-out infinite;
    }
    @keyframes boot-pulse {
      0%,100% { transform: scale(1);    box-shadow: 0 0 0 0   rgba(239,159,39,0.45); }
      50%     { transform: scale(1.04); box-shadow: 0 0 0 14px rgba(239,159,39,0); }
    }
  </style>
</head>
<body>

<!-- Boot splash. Removed by app.js once #root renders. -->
<div id="boot-screen" class="boot-screen" aria-hidden="true">
  <div class="boot-mark">НТ</div>
</div>

<!-- Update banner — frosted, no emoji -->
<div id="update-banner" role="status" aria-live="polite">
  <span class="label">Доступна новая версия приложения.</span>
  <button class="btn-primary-pill"
          onclick="navigator.serviceWorker.getRegistration().then(r=>{if(r?.waiting){r.waiting.postMessage({type:'SKIP_WAITING'})}else{window.location.reload()}})">
    Обновить
  </button>
  <button onclick="document.getElementById('update-banner').style.display='none'">
    Позже
  </button>
</div>

<div id="root"></div>

<script>
  // Hide the boot splash once #root has any rendered content (React mounted)
  (function () {
    var root = document.getElementById('root');
    var splash = document.getElementById('boot-screen');
    if (!root || !splash) return;
    var dismiss = function () {
      splash.classList.add('is-hidden');
      setTimeout(function () { splash.parentNode && splash.parentNode.removeChild(splash); }, 320);
    };
    var obs = new MutationObserver(function () {
      if (root.firstChild) { obs.disconnect(); dismiss(); }
    });
    obs.observe(root, { childList: true });
    // Safety fallback: dismiss after 8s no matter what
    setTimeout(function () { obs.disconnect(); dismiss(); }, 8000);
  })();
</script>
