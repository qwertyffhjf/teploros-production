  <style>

<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef, useMemo, useCallback, memo, createElement: h } = React;

// ==================== Константы ====================
const AM = '#EF9F27', AM2 = '#412402', AM3 = '#FAEEDA', AM4 = '#BA7517';
const GN = '#1D9E75', GN2 = '#04342C', GN3 = '#E1F5EE';
const RD = '#E24B4A', RD2 = '#501313', RD3 = '#FCEBEB';
const BL = '#378ADD';

const PRIORITY = {
  low: { label: 'Низкий', color: '#888' },
  medium: { label: 'Средний', color: BL },
  high: { label: 'Высокий', color: AM },
  critical: { label: 'Критический', color: RD }
};

const STATUS = {
  pending: { label: 'Ожидает', bg: '#f0ede8', cl: '#666', br: '#ccc' },
  in_progress: { label: 'В работе', bg: '#FAEEDA', cl: AM2, br: AM4 },
  on_check: { label: 'На контроле', bg: '#E1F5FE', cl: '#0277BD', br: '#4FC3F7' },
  done: { label: 'Выполнено', bg: GN3, cl: GN2, br: GN },
  defect: { label: 'Брак', bg: RD3, cl: RD2, br: RD },
  rework: { label: 'Переделка', bg: '#FAEEDA', cl: AM2, br: AM4 },
};

const OPERATION_STAGES = [
  'Снабжение комплектующими','Раскрой','Сварка крышек','Заполнение крышек',
  'Вальцовка обечайки','Раскрой жаровых труб','Сборка/сварки топки',
  'Сборка/сварка котла','Установка/сварка жаровых труб','Опресовка',
  'Предварительный окрас','Установка кожуха','Установка крышек','Финишный окрас'
];

const WORKER_STATUS = {
  working: { label: 'На смене', bg: GN3, cl: GN2, br: GN },
  absent: { label: 'Отсутствует', bg: '#f0ede8', cl: '#666', br: '#ccc' },
  sick: { label: 'Больничный', bg: RD3, cl: RD2, br: RD },
  vacation: { label: 'Отпуск', bg: '#E6F1FB', cl: '#042C53', br: BL }
};

// ==================== Достижения ====================
const ACHIEVEMENTS = {
  first_op: { icon: '⭐', title: 'Первая операция', desc: 'Выполнена первая операция', condition: (s) => s.doneCount >= 1 },
  ops_10: { icon: '🔧', title: 'Десятка', desc: 'Выполнено 10 операций', condition: (s) => s.doneCount >= 10 },
  ops_50: { icon: '⚙️', title: 'Профессионал', desc: 'Выполнено 50 операций', condition: (s) => s.doneCount >= 50 },
  ops_100: { icon: '🏆', title: 'Стахановец', desc: 'Выполнено 100 операций', condition: (s) => s.doneCount >= 100 },
  ops_500: { icon: '👑', title: 'Ветеран', desc: 'Выполнено 500 операций', condition: (s) => s.doneCount >= 500 },
  quality_star: { icon: '💎', title: 'Безупречное качество', desc: 'Более 50 операций, брак менее 1%', condition: (s) => s.doneCount >= 50 && s.defectRate < 1 },
  weld_master: { icon: '🔥', title: 'Мастер сварки', desc: '50 сварочных операций', condition: (s) => s.weldCount >= 50 },
  speed_demon: { icon: '⚡', title: 'Скоростной монтаж', desc: 'Среднее время на 20% быстрее плана (мин. 10 операций)', condition: (s) => s.doneWithPlan >= 10 && s.avgRatio < 0.8 },
  no_downtime: { icon: '🛡️', title: 'Нет простоям', desc: '0 простоев за последние 30 дней', condition: (s) => s.downtimes30d === 0 && s.doneCount >= 5 },
  streak_5: { icon: '🎯', title: 'Серия 5', desc: '5 операций подряд без брака', condition: (s) => s.currentStreak >= 5 },
  streak_20: { icon: '🎪', title: 'Серия 20', desc: '20 операций подряд без брака', condition: (s) => s.currentStreak >= 20 },
  multi_skill: { icon: '🌟', title: 'Универсал', desc: 'Выполнял 5+ разных типов операций', condition: (s) => s.uniqueOpTypes >= 5 },
  detective_10: { icon: '🔍', title: 'Бдительный', desc: 'Обнаружил 10 браков на предыдущих этапах', condition: (s) => s.detectedDefects >= 10 },
  thanks_5: { icon: '🤝', title: 'Спасибо, коллега!', desc: 'Получил 5 благодарностей', condition: (s) => s.thanksReceived >= 5 },
  golden_hands_100: { icon: '🪙', title: 'Золотые руки', desc: '100 операций без брака', condition: (s) => s.doneCount >= 100 && s.defectCount === 0 },
  universal_2_3: { icon: '🔄', title: 'Универсал 2.0', desc: 'Работал на 3+ разных участках', condition: (s) => s.uniqueSections >= 3 },
  weekend_5: { icon: '🌙', title: 'Трудоголик', desc: '5 операций в выходные дни', condition: (s) => s.weekendOps >= 5 },
  virtuoso_10: { icon: '🎻', title: 'Виртуоз', desc: '10 операций быстрее 50% плана', condition: (s) => s.fastOps >= 10 },
  no_downtime_7: { icon: '🛡️', title: 'Антипростой', desc: '7 дней без простоев', condition: (s) => s.downtimes7d === 0 },
  speed_streak_5: { icon: '🚀', title: 'Скоростной рывок', desc: '5 операций подряд быстрее плана на 20%', condition: (s) => s.bestSpeedStreak >= 5 }
};

const getWorkerLevel = (doneCount) => Math.floor(doneCount / 10) + 1;
const getLevelProgress = (doneCount) => (doneCount % 10) / 10;
const getLevelTitle = (level) => {
  if (level >= 50) return 'Легенда';
  if (level >= 30) return 'Мастер';
  if (level >= 20) return 'Эксперт';
  if (level >= 10) return 'Профессионал';
  if (level >= 5) return 'Опытный';
  if (level >= 3) return 'Работник';
  return 'Новичок';
};

const calcWorkerStats = (workerId, data, nowTime) => {
  const t = nowTime || Date.now();
  const allOps = data.ops.filter(op => op.workerIds?.includes(workerId));
  const doneOps = allOps.filter(op => op.status === 'done');
  const defectOps = allOps.filter(op => op.status === 'defect');
  const doneCount = doneOps.length;
  const defectCount = defectOps.length;
  const total = doneCount + defectCount;
  const defectRate = total > 0 ? (defectCount / total * 100) : 0;
  const weldCount = doneOps.filter(op => op.name && op.name.toLowerCase().includes('свар')).length;
  const withPlan = doneOps.filter(op => op.plannedHours && op.startedAt && op.finishedAt);
  const doneWithPlan = withPlan.length;
  const avgRatio = doneWithPlan > 0 ? withPlan.reduce((s, op) => s + ((op.finishedAt - op.startedAt) / (op.plannedHours * 3600000)), 0) / doneWithPlan : 1;
  const d30 = t - 30 * 86400000;
  const d7 = t - 7 * 86400000;
  const downtimes30d = data.events.filter(e => e.workerId === workerId && e.type === 'downtime' && e.ts >= d30).length;
  const downtimes7d = data.events.filter(e => e.workerId === workerId && e.type === 'downtime' && e.ts >= d7).length;
  const sorted = [...doneOps, ...defectOps].sort((a, b) => (b.finishedAt || 0) - (a.finishedAt || 0));
  let currentStreak = 0;
  for (const op of sorted) { if (op.status === 'done') currentStreak++; else break; }
  const uniqueOpTypes = new Set(doneOps.map(op => op.name)).size;
  const detectedDefects = allOps.filter(op => op.defectSource === 'previous_stage').length;
  const thanksReceived = data.events.filter(e => e.type === 'thanks' && e.toWorkerId === workerId).length;
  const uniqueSections = new Set(doneOps.map(op => op.sectionId).filter(id => id)).size;
  const weekendOps = doneOps.filter(op => { if (!op.finishedAt) return false; const d = new Date(op.finishedAt); const day = d.getDay(); return day === 0 || day === 6; }).length;
  const fastOps = withPlan.filter(op => { const actual = op.finishedAt - op.startedAt; const planned = op.plannedHours * 3600000; return actual < planned * 0.5; }).length;
  const withPlanSorted = [...withPlan].sort((a, b) => a.finishedAt - b.finishedAt);
  let bestSpeedStreak = 0, currentSpeedStreak = 0;
  for (const op of withPlanSorted) {
    const actual = op.finishedAt - op.startedAt;
    const planned = op.plannedHours * 3600000;
    if (actual < planned * 0.8) { currentSpeedStreak++; if (currentSpeedStreak > bestSpeedStreak) bestSpeedStreak = currentSpeedStreak; }
    else currentSpeedStreak = 0;
  }
  return { doneCount, defectCount, defectRate, weldCount, doneWithPlan, avgRatio, downtimes30d, downtimes7d, currentStreak, uniqueOpTypes, detectedDefects, thanksReceived, uniqueSections, weekendOps, fastOps, bestSpeedStreak };
};

const checkAchievements = (workerId, data) => {
  const worker = data.workers.find(w => w.id === workerId);
  if (!worker) return data;
  const nowTime = Date.now();
  const stats = calcWorkerStats(workerId, data, nowTime);
  const current = worker.achievements || [];
  const newAch = [...current];
  const justEarned = [];
  for (const [id, ach] of Object.entries(ACHIEVEMENTS)) {
    if (!newAch.includes(id) && ach.condition(stats)) { newAch.push(id); justEarned.push(id); }
  }
  if (justEarned.length > 0) {
    let d = { ...data, workers: data.workers.map(w => w.id === workerId ? { ...w, achievements: newAch } : w) };
    // Публикация в чат
    const achMessages = justEarned.map(aid => ({
      id: uid(), senderId: 'system', senderName: 'Система', senderRole: 'system',
      text: `${ACHIEVEMENTS[aid].icon} ${worker.name} получил награду «${ACHIEVEMENTS[aid].title}»! ${ACHIEVEMENTS[aid].desc}`,
      type: 'achievement', timestamp: nowTime
    }));
    d.messages = [...(d.messages || []), ...achMessages].slice(-200);
    return d;
  }
  return data;
};

// ==================== Автоподбор исполнителя ====================
// ==================== Автоподбор исполнителя (с учётом уровня, опыта, качества, загрузки) ====================
const scoreWorkerForOp = (worker, opName, data) => {
  const wid = worker.id;
  const allOps = data.ops.filter(op => op.workerIds?.includes(wid));
  const doneThisType = allOps.filter(op => op.name === opName && op.status === 'done');
  const defectThisType = allOps.filter(op => op.name === opName && op.status === 'defect');
  const activeCount = data.ops.filter(op => (op.status === 'in_progress' || op.status === 'pending') && op.workerIds?.includes(wid)).length;
  const allDone = allOps.filter(op => op.status === 'done').length;
  const level = getWorkerLevel(allDone);

  // Опыт по этому типу операции (0-30 баллов)
  const expScore = Math.min(doneThisType.length * 2, 30);
  // Качество по этому типу (0-25 баллов)
  const total = doneThisType.length + defectThisType.length;
  const qualityScore = total > 0 ? Math.round((doneThisType.length / total) * 25) : 12;
  // Скорость: средний факт/план (0-20 баллов)
  const withPlan = doneThisType.filter(op => op.plannedHours && op.startedAt && op.finishedAt);
  const avgRatio = withPlan.length > 0 ? withPlan.reduce((s, op) => s + (op.finishedAt - op.startedAt) / (op.plannedHours * 3600000), 0) / withPlan.length : 1;
  const speedScore = Math.max(0, Math.round((2 - avgRatio) * 10));
  // Уровень (0-15 баллов)
  const levelScore = Math.min(level, 15);
  // Загрузка (штраф: -10 за каждую активную задачу)
  const loadPenalty = activeCount * 10;

  return { workerId: wid, workerName: worker.name, level, expScore, qualityScore, speedScore, levelScore, loadPenalty,
    totalScore: expScore + qualityScore + speedScore + levelScore - loadPenalty,
    details: { experience: doneThisType.length, defects: defectThisType.length, avgRatio: Math.round(avgRatio * 100), activeOps: activeCount }
  };
};

const autoAssignWorker = (data, opName) => {
  const candidates = data.workers.filter(w =>
    !w.archived &&
    (w.status || 'working') === 'working' &&
    (!w.competences?.length || w.competences.includes(opName)) &&
    !data.ops.some(op => op.status === 'in_progress' && op.workerIds?.includes(w.id))
  );
  if (candidates.length === 0) return null;
  const scored = candidates.map(w => scoreWorkerForOp(w, opName, data)).sort((a, b) => b.totalScore - a.totalScore);
  return scored[0]?.workerId || null;
};

// Рекомендации по всем ожидающим операциям
const getAssignmentRecommendations = (data) => {
  const pendingOps = data.ops.filter(op => op.status === 'pending' && !op.archived && (!op.workerIds || op.workerIds.length === 0));
  return pendingOps.map(op => {
    const order = data.orders.find(o => o.id === op.orderId);
    const candidates = data.workers.filter(w =>
      !w.archived &&
      (w.status || 'working') === 'working' &&
      (!w.competences?.length || w.competences.includes(op.name))
    );
    const scored = candidates.map(w => scoreWorkerForOp(w, op.name, data)).sort((a, b) => b.totalScore - a.totalScore);
    return { opId: op.id, opName: op.name, orderNumber: order?.number || '—', orderPriority: order?.priority || 'medium', deadline: order?.deadline, candidates: scored.slice(0, 3) };
  }).sort((a, b) => {
    const prio = { critical: 0, high: 1, medium: 2, low: 3 };
    return (prio[a.orderPriority] || 4) - (prio[b.orderPriority] || 4);
  });
};

// ==================== Утилиты ====================
const uid = () => Math.random().toString(36).slice(2, 8).toUpperCase();
const now = () => Date.now();
// Вынесена общая функция смены
const getCurrentShift = () => {
  const d = new Date();
  return `${d.toISOString().slice(0,10)}-${Math.floor(d.getHours() / 8) + 1}`;
};
const fmtDur = (ms) => {
  if (!ms || ms <= 0) return '—';
  const hh = Math.floor(ms / 3600000);
  const mm = Math.floor((ms % 3600000) / 60000);
  const ss = Math.floor((ms % 60000) / 1000);
  return hh > 0 ? `${hh}ч ${mm}м` : mm > 0 ? `${mm}м ${ss}с` : `${ss}с`;
};
const isShipmentNear = (deadline) => {
  if (!deadline) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const deadlineDate = new Date(deadline);
  const diffTime = deadlineDate - today;
  const diffDays = Math.ceil(diffTime / (1000*60*60*24));
  return diffDays <= 2 && diffDays >= 0;
};
// Хэширование PIN (DJB2 + salt)
const hashPin = (pin) => {
  if (!pin) return '';
  if (pin.startsWith('H_')) return pin;
  let h = 5381;
  const s = 'teploros_nt_' + pin;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h) + s.charCodeAt(i);
  return 'H_' + (h >>> 0).toString(36).toUpperCase();
};
const pinMatch = (input, stored) => {
  if (!stored || !input) return false;
  if (stored.startsWith('H_')) return hashPin(input) === stored;
  return input === stored; // обратная совместимость
};

const DB = {
  async load() {
    try {
      const snap = await DOC_REF.get();
      if (snap.exists) {
        let parsed = typeof snap.data().payload === 'string' ? JSON.parse(snap.data().payload) : snap.data();
        if (parsed.ops) parsed.ops = parsed.ops.map(op => {
          if (op.workerId !== undefined && !op.workerIds) { op.workerIds = op.workerId ? [op.workerId] : []; delete op.workerId; }
          return op;
        });
        localStorage.setItem('prod_app_v14_cache', JSON.stringify(parsed));
        return migrateData({ ...EMPTY_DATA, ...parsed });
      }
    } catch(e) { console.warn(e); }
    try {
      const cached = localStorage.getItem('prod_app_v14_cache');
      if (cached) return { ...EMPTY_DATA, ...JSON.parse(cached) };
    } catch(e) {}
    return EMPTY_DATA;
  },
  async save(data) {
    try {
      let toSave = { ...data };
      // Cap unbounded arrays
      if (toSave.events?.length > 2000) toSave.events = toSave.events.slice(-2000);
      if (toSave.materialConsumptions?.length > 2000) toSave.materialConsumptions = toSave.materialConsumptions.slice(-2000);
      if (toSave.reclamations?.length > 500) toSave.reclamations = toSave.reclamations.slice(-500);
      if (toSave.messages?.length > 200) toSave.messages = toSave.messages.slice(-200);
      if (toSave.duels?.length > 100) toSave.duels = toSave.duels.slice(-100);
      // Автоочистка: удалять архивные заказы и их операции старше 90 дней
      const cleanupThreshold = Date.now() - 90 * 86400000;
      const oldArchived = (toSave.orders || []).filter(o => o.archived && o.autoArchived && (o.archivedAt || o.createdAt || 0) < cleanupThreshold);
      if (oldArchived.length > 0) {
        const oldIds = new Set(oldArchived.map(o => o.id));
        toSave.orders = toSave.orders.filter(o => !oldIds.has(o.id));
        toSave.ops = (toSave.ops || []).filter(o => !oldIds.has(o.orderId));
        console.log(`Автоочистка: удалено ${oldArchived.length} архивных заказов старше 90 дней`);
      }
      // Проверка размера payload (лимит Firestore = 1 МБ на документ)
      const payload = JSON.stringify(toSave);
      const sizeKb = Math.round(payload.length / 1024);
      if (sizeKb > 900) {
        // Агрессивная очистка: уменьшаем лимиты вдвое
        toSave.events = (toSave.events || []).slice(-1000);
        toSave.materialConsumptions = (toSave.materialConsumptions || []).slice(-1000);
        DB._lastError = `⚠ Размер данных ${sizeKb} КБ — приближается к лимиту 1 МБ. Архивируйте старые заказы.`;
        console.warn(`Payload size: ${sizeKb} KB — near Firestore 1MB limit`);
      } else if (sizeKb > 700) {
        DB._sizeWarning = sizeKb;
      } else {
        DB._sizeWarning = null;
      }
      localStorage.setItem('prod_app_v14_cache', payload);
      if (DB._saveTimer) clearTimeout(DB._saveTimer);
      DB._saveTimer = setTimeout(() => {
        DOC_REF.set({ payload: JSON.stringify(toSave), updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
          .catch(e => { console.error('Firebase save error:', e); DB._lastError = e.message; });
      }, 1000);
    } catch(e) { console.error(e); DB._lastError = e.message; }
  },
  _saveTimer: null,
  _lastError: null,
  _sizeWarning: null,
  onSnapshot(callback) {
    return DOC_REF.onSnapshot(snap => {
      if (snap.exists) {
        let parsed = typeof snap.data().payload === 'string' ? JSON.parse(snap.data().payload) : snap.data();
        if (parsed.ops) parsed.ops = parsed.ops.map(op => {
          if (op.workerId !== undefined && !op.workerIds) { op.workerIds = op.workerId ? [op.workerId] : []; delete op.workerId; }
          return op;
        });
        callback(migrateData({ ...EMPTY_DATA, ...parsed }));
      }
    });
  }
};

// Строит обновление стейта для ЗАВЕРШЕНИЯ операции
// params: { defNote, defectReasonId, weldParams, isDefect, isRework, source }
const buildFinishUpdate = (data, op, workerId, params = {}) => {
  const { defNote = '', defectReasonId = '', weldParams = null, isDefect = false, isRework = false, source = 'current' } = params;
  const finishedAt = now();
  const shift = getCurrentShift(data?.settings?.shifts);
  let status = isDefect ? 'defect' : isRework ? 'rework' : 'done';
  let updatedOp = { ...op, finishedAt, defectNote: defNote || undefined };
  if (isDefect) { updatedOp.defectSource = source; updatedOp.defectReasonId = defectReasonId; }
  if (isRework) updatedOp.defectSource = source;
  if (op.requiresQC && status === 'done') { status = 'on_check'; }
  if (op.name.includes('свар') && weldParams?.seamNumber && weldParams?.electrode) {
    updatedOp.weldParams = { seamNumber: weldParams.seamNumber, electrode: weldParams.electrode, result: weldParams.result };
    if (weldParams.result === 'fail') { status = 'defect'; updatedOp.defectNote = 'Сварка забракована'; }
  }
  updatedOp.status = status;
  const eventEntry = { id: uid(), type: status, opId: op.id, workerId, workerIds: op.workerIds || [workerId], ts: finishedAt, note: defNote || undefined, shift, defectSource: (isDefect || isRework) ? source : undefined, defectReasonId: isDefect ? defectReasonId : undefined };
  // Если брак — создать запись рекламации
  let reclamations = data.reclamations || [];
  if (isDefect) {
    reclamations = [...reclamations, { id: uid(), opId: op.id, orderId: op.orderId, workerIds: op.workerIds || [workerId], defectReasonId, defectNote: defNote, defectSource: source, createdAt: finishedAt, status: 'open', d8: { team: ['master', ...(op.workerIds || [workerId])], containment: '', whys: ['', '', '', '', ''], rootCause: '', corrective: '', correctiveOwner: '', correctiveDeadline: '', validation: '', validationDate: '', preventive: '', preventiveDocs: '', closedNote: '', currentStep: 0 } }];
  }
  return {
    ops: data.ops.map(o => o.id === op.id ? updatedOp : o),
    events: [...data.events, eventEntry],
    reclamations,
    _status: status,
    _finishedAt: finishedAt,
    _updatedOp: updatedOp
  };
};

const QRScannerModal = memo(({ onScan, onClose }) => {
  const [error, setError] = useState(null);
  const [ready, setReady] = useState(false);
  const scannerInstance = useRef(null);
  // Стабилизируем onScan через ref — чтобы useEffect не перезапускался при каждом рендере
  const onScanRef = useRef(onScan);
  useEffect(() => { onScanRef.current = onScan; }, [onScan]);

  useEffect(() => {
    if (!window.Html5Qrcode) { setError('Библиотека QR не загружена'); return; }
    const timer = setTimeout(() => {
      const el = document.getElementById('qr-scanner-region');
      if (!el) { setError('Элемент не найден'); return; }
      try {
        const scanner = new window.Html5Qrcode('qr-scanner-region');
        scannerInstance.current = scanner;
        scanner.start(
          { facingMode: 'environment' },
          { fps: 15, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 },
          (decodedText) => {
            scanner.stop().catch(() => {});
            onScanRef.current(decodedText);
          },
          () => {}
        ).then(() => setReady(true)).catch(err => {
          // iOS Safari требует user gesture — пробуем без facingMode
          scanner.start(
            { facingMode: 'user' },
            { fps: 10, qrbox: { width: 200, height: 200 } },
            (decodedText) => { scanner.stop().catch(() => {}); onScanRef.current(decodedText); },
            () => {}
          ).then(() => setReady(true)).catch(err2 => {
            setError('Нет доступа к камере. Разрешите доступ в настройках браузера.\n' + err2.message);
          });
        });
      } catch(e) { setError('Ошибка запуска: ' + e.message); }
    }, 300);
    return () => {
      clearTimeout(timer);
      if (scannerInstance.current) {
        scannerInstance.current.stop().catch(() => {});
        scannerInstance.current = null;
      }
    };
  }, []); // пустой dep — запускается один раз

  return h('div', { style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', zIndex: 200, padding: 16 } },

    error && h('div', { style: { color: '#ff6b6b', fontSize: 13, marginBottom: 12, textAlign: 'center', maxWidth: 300, whiteSpace: 'pre-line', lineHeight: 1.5 } }, error),
    h('div', { id: 'qr-scanner-region', style: { width: 280, height: 280, borderRadius: 16, overflow: 'hidden', background: '#111', border: ready ? '2px solid #EF9F27' : '2px solid #333' } }),
    h('div', { style: { color: '#888', fontSize: 11, marginTop: 12, textAlign: 'center' } },
      ready ? 'Держите QR-код в рамке' : 'Убедитесь что разрешили доступ к камере'
    ),
    h('button', { style: { ...gbtn(), color: '#fff', borderColor: 'rgba(255,255,255,0.3)', marginTop: 20, padding: '14px 40px', fontSize: 15 }, onClick: onClose }, 'Закрыть')

// ==================== Себестоимость заказа ====================
const calcOrderCost = (order, data, hourlyRate = 500) => {
  const ops = data.ops.filter(op => op.orderId === order.id);
  const doneOps = ops.filter(op => op.status === 'done' && op.startedAt && op.finishedAt);
  const laborHours = doneOps.reduce((s, op) => s + (op.finishedAt - op.startedAt) / 3600000, 0);
  const laborCost = laborHours * hourlyRate;
  const materialCost = (data.materialConsumptions || [])
    .filter(mc => ops.some(op => op.id === mc.opId))
    .reduce((s, mc) => {
      const mat = data.materials.find(m => m.id === mc.materialId);
      return s + (mc.qty * (mat?.unitCost || 0));
    }, 0);
  return { laborHours: Math.round(laborHours * 10) / 10, laborCost: Math.round(laborCost), materialCost: Math.round(materialCost), totalCost: Math.round(laborCost + materialCost), opsTotal: ops.length, opsDone: doneOps.length };
};

// ==================== Прогноз загрузки на неделю ====================
const LoadForecastWidget = memo(({ data }) => {
  const forecast = useMemo(() => {
    const days = [];
    const today = new Date(); today.setHours(0, 0, 0, 0);
    for (let i = 0; i < 7; i++) {
      const day = new Date(today); day.setDate(day.getDate() + i);
      const dayEnd = new Date(day); dayEnd.setHours(23, 59, 59, 999);
      const dayStart = day.getTime(); const dayEndMs = dayEnd.getTime();
      // Операции запланированные на этот день
      const planned = data.ops.filter(op => op.plannedStartDate && op.plannedStartDate >= dayStart && op.plannedStartDate <= dayEndMs && !op.archived && op.status === 'pending');
      // Часы по типам операций
      const hoursByType = {};
      planned.forEach(op => {
        const type = op.name || 'Прочее';
        hoursByType[type] = (hoursByType[type] || 0) + (op.plannedHours || 2);
      });
      // Доступные рабочие
      const available = data.workers.filter(w => (w.status || 'working') === 'working');
      // Потенциальные проблемы
      const warnings = [];
      Object.entries(hoursByType).forEach(([type, hours]) => {
        const competent = available.filter(w => !w.competences?.length || w.competences.includes(type));
        const capacity = competent.length * 8; // 8 часов на рабочего
        if (hours > capacity) warnings.push({ type, hours, capacity, deficit: Math.round(hours - capacity) });
      });
      days.push({
        date: day, label: i === 0 ? 'Сегодня' : i === 1 ? 'Завтра' : day.toLocaleDateString('ru', { weekday: 'short', day: 'numeric' }),
        plannedCount: planned.length, totalHours: Math.round(planned.reduce((s, op) => s + (op.plannedHours || 2), 0)),
        warnings, isWeekend: day.getDay() === 0 || day.getDay() === 6
      });
    }
    return days;
  }, [data.ops, data.workers]);

  const hasWarnings = forecast.some(d => d.warnings.length > 0);
  return h('div', { style: { ...S.card, marginBottom: 12 } },
    h('div', { style: S.sec }, 'Прогноз загрузки на неделю'),
    h('div', { className: 'forecast-grid', style: { display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 6 } },
      forecast.map((d, i) => h('div', { key: i, style: { textAlign: 'center', padding: 8, borderRadius: 8, background: d.warnings.length > 0 ? RD3 : d.isWeekend ? '#f0ede8' : '#f8f8f5', border: d.warnings.length > 0 ? `0.5px solid ${RD}` : '0.5px solid rgba(0,0,0,0.06)' } },
        h('div', { style: { fontSize: 11, fontWeight: 500, color: d.warnings.length > 0 ? RD : '#666', marginBottom: 4 } }, d.label),
        h('div', { style: { fontSize: 18, fontWeight: 500, color: d.plannedCount > 0 ? AM2 : '#ccc' } }, d.plannedCount),
        h('div', { style: { fontSize: 9, color: '#888' } }, `${d.totalHours}ч`),
        d.warnings.length > 0 && h('div', { style: { fontSize: 9, color: RD, marginTop: 4 } }, `⚠ -${d.warnings.reduce((s, w) => s + w.deficit, 0)}ч`)
      ))
    ),
    hasWarnings && h('div', { style: { marginTop: 10, padding: '8px 10px', background: RD3, borderRadius: 8, fontSize: 11 } },
      h('div', { style: { fontWeight: 500, color: RD, marginBottom: 4 } }, '⚠ Обнаружен дефицит ресурсов:'),
      forecast.filter(d => d.warnings.length > 0).map((d, i) => h('div', { key: i, style: { color: RD2 } },
        `${d.label}: `, d.warnings.map(w => `${w.type} (нужно ${w.hours}ч, доступно ${w.capacity}ч)`).join(', ')
      ))
    )
  );
});

// ==================== QRModal ====================
const QRModal = memo(({ ops, order, worker, onClose }) => {
  const [index, setIndex] = useState(0);
  const [qrError, setQrError] = useState(false);
  const op = ops[index];
  const ref = useRef(null);
  useEffect(() => {
    if (!op) return;
    setQrError(false);
    const render = () => {
      if (!ref.current || !window.QRCode) return;
      while (ref.current.firstChild) ref.current.removeChild(ref.current.firstChild);
      const url = new URL(window.location.href);
      url.searchParams.set('opId', op.id);
      new window.QRCode(ref.current, { text: url.toString(), width: 140, height: 140, colorDark: AM4, colorLight: '#ffffff' });
    };
    if (window.QRCode) { render(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload = render;
    s.onerror = () => setQrError(true);
    document.head.appendChild(s);
  }, [op, index]);
  if (!op) return null;
  return h('div', {
    role: 'dialog', 'aria-modal': 'true', 'aria-label': 'QR-код операции',
    style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 50 },
    onKeyDown: (e) => e.key === 'Escape' && onClose()
  },
    h('div', { style: { background: '#fff', border: '0.5px solid rgba(0,0,0,0.15)', borderRadius: 12, padding: 24, width: 'min(320px, calc(100vw - 32px))', textAlign: 'center', position: 'relative' } },
      h('button', { type: 'button', onClick: onClose, 'aria-label': 'Закрыть', style: { position: 'absolute', top: 10, right: 12, background: 'transparent', border: 'none', color: '#888', cursor: 'pointer', fontSize: 18 } }, '×'),
      h('div', { style: { fontSize: 10, color: AM4, textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 12 } }, 'QR-код операции'),
      h('div', { style: { background: '#fff', borderRadius: 8, padding: 12, display: 'inline-block', marginBottom: 10, border: '0.5px solid rgba(0,0,0,0.08)' } },
        h('div', { ref }),
        qrError && h('div', { style: { color: RD, fontSize: 11, padding: 8 } }, 'Не удалось загрузить библиотеку QR-кода')
      ),
      worker && h('div', { style: { fontSize: 11, color: AM, marginTop: 8, fontWeight: 500 } }, `Исполнитель: ${worker.name}`),
      h('div', { style: { fontFamily: 'monospace', fontSize: 13, fontWeight: 500, color: AM, marginBottom: 4 } }, op.id),
      h('div', { style: { fontSize: 11, color: '#888', marginBottom: 4 } }, op.name),

      ops.length > 1 && h('div', { style: { display: 'flex', gap: 8, justifyContent: 'center', marginBottom: 12 } },
        h('button', { type: 'button', style: gbtn({ padding: '4px 10px' }), onClick: () => setIndex(i => (i - 1 + ops.length) % ops.length) }, '←'),
        h('span', { style: { fontSize: 11, color: '#888' } }, `${index + 1} / ${ops.length}`),
        h('button', { type: 'button', style: gbtn({ padding: '4px 10px' }), onClick: () => setIndex(i => (i + 1) % ops.length) }, '→')
      ),
      h('div', { style: { display: 'flex', gap: 8 } },
        h('button', { type: 'button', style: gbtn({ flex: 1 }), onClick: () => window.print() }, '🖨 Печать'),
        h('button', { type: 'button', style: abtn({ flex: 1 }), onClick: () => { window.open('?opId=' + op.id, '_blank'); } }, 'Открыть как рабочий')

// ==================== LoginScreen (с кнопкой Чат и PIN-защитой) ====================
// ==================== Единый PIN-вход ====================
// Логика: все роли входят по PIN.
// Мастер-ключ (masterKey) сбрасывает PIN любого сотрудника прямо с экрана входа.
// Приоритет проверки PIN: мастер → контролёр → сотрудники → мастер-ключ (только для сброса)
// ==================== Таблица лидеров ====================
const Leaderboard = memo(({ data }) => {
  const workers = useMemo(() => data.workers.filter(w => !w.archived && (w.status || 'working') === 'working'), [data.workers]);
  const boards = useMemo(() => {
    const stats = workers.map(w => {
      const s = calcWorkerStats(w.id, data, Date.now());
      const doneCount = s.doneCount;
      const quality = s.doneCount + s.defectCount > 0 ? Math.round(s.doneCount / (s.doneCount + s.defectCount) * 100) : 100;
      const thanks = s.thanksReceived;
      const lvl = getWorkerLevel(doneCount);
      return { id: w.id, name: w.name, doneCount, quality, thanks, lvl, achCount: (w.achievements || []).length };
    });
    return {
      xp: [...stats].sort((a, b) => b.doneCount - a.doneCount).slice(0, 5),
      quality: [...stats].filter(s => s.doneCount >= 5).sort((a, b) => b.quality - a.quality || b.doneCount - a.doneCount).slice(0, 5),
      thanks: [...stats].filter(s => s.thanks > 0).sort((a, b) => b.thanks - a.thanks).slice(0, 5),
    };
  }, [workers, data]);

  const medals = ['🥇', '🥈', '🥉', '4.', '5.'];
  const renderBoard = (title, list, valueKey, valueSuffix) => {
    if (list.length === 0) return null;
    return h('div', { style: { flex: 1, minWidth: 150 } },
      h('div', { style: { fontSize: 10, color: AM4, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6, fontWeight: 500 } }, title),
      list.map((s, i) => h('div', { key: s.id, style: { display: 'flex', alignItems: 'center', gap: 6, padding: '4px 0', fontSize: 12 } },
        h('span', { style: { fontSize: i < 3 ? 14 : 11, width: 22 } }, medals[i]),
        h('span', { style: { flex: 1, fontWeight: i === 0 ? 500 : 400 } }, s.name.split(' ')[0]),
        h('span', { style: { fontWeight: 500, color: AM } }, `${s[valueKey]}${valueSuffix}`)
      ))
    );
  };

  if (workers.length < 2) return null;
  return h('div', { style: { display: 'flex', gap: 16, flexWrap: 'wrap', padding: '12px 0' } },
    renderBoard('Опыт', boards.xp, 'doneCount', ' оп.'),
    renderBoard('Качество', boards.quality, 'quality', '%'),
    boards.thanks.length > 0 && renderBoard('Благодарности', boards.thanks, 'thanks', '')
  );
});

const LoginScreen = ({ data, onLogin, onResetPin }) => {
  const [role, setRole] = useState('worker');
  const [pin, setPin] = useState('');
  const [showPin, setShowPin] = useState(false);
  const [loginError, setLoginError] = useState('');
  // Состояние для режима сброса PIN мастер-ключом
  const [resetMode, setResetMode] = useState(false);
  const [resetKey, setResetKey] = useState('');
  const [resetTarget, setResetTarget] = useState(''); // id сотрудника
  const [resetNewPin, setResetNewPin] = useState('');
  const [resetError, setResetError] = useState('');
  const [resetSuccess, setResetSuccess] = useState('');

  const settings = data.settings || EMPTY_DATA.settings;

  // Карта PIN → роль и данные пользователя
  const resolvePin = (inputPin) => {
    const p = inputPin.trim();
    if (!p) return null;
    if (pinMatch(p, settings.masterPin || '0000')) return { role: 'master', workerId: null, sectionId: null, name: 'Мастер' };
    if (pinMatch(p, settings.controllerPin || '1111')) return { role: 'controller', workerId: null, sectionId: null, name: 'Контролёр' };
    if (pinMatch(p, settings.warehousePin || '2222')) return { role: 'warehouse', workerId: null, sectionId: null, name: 'Склад' };
    const worker = data.workers.find(w => pinMatch(p, w.pin));
    if (worker) return { role: 'worker', workerId: worker.id, sectionId: worker.sectionId || null, name: worker.name };
    return null;
  };

  const handleLogin = () => {
    setLoginError('');
    if (role === 'dashboard') { onLogin('dashboard', null, null); return; }
    if (!pin.trim()) { setLoginError('Введите PIN-код'); return; }
    const resolved = resolvePin(pin);
    if (!resolved) { setLoginError('Неверный PIN-код'); return; }
    // Если выбрали роль «Чат» — входим с правами сотрудника, но открываем чат
    if (role === 'chat') {
      if (resolved.role === 'worker') { onLogin('chat', resolved.workerId, resolved.sectionId); return; }
      // Мастер и контролёр тоже могут зайти в чат
      onLogin('chat_' + resolved.role, null, null);
      return;
    }
    // Обычный вход — роль определяется PIN-ом, кнопка выбора роли — подсказка, не ограничение
    onLogin(resolved.role, resolved.workerId, resolved.sectionId);
  };

  const handleMasterKeyReset = () => {
    setResetError(''); setResetSuccess('');
    if (resetKey.trim() !== (settings.masterKey || '9999')) { setResetError('Неверный мастер-ключ'); return; }
    if (!resetTarget) { setResetError('Выберите сотрудника'); return; }
    if (!resetNewPin.trim() || resetNewPin.trim().length < 4) { setResetError('Новый PIN — минимум 4 цифры'); return; }
    // Проверяем что новый PIN не занят
    const conflict = data.workers.find(w => w.id !== resetTarget && pinMatch(resetNewPin.trim(), w.pin));
    if (conflict) { setResetError(`PIN уже занят (${conflict.name})`); return; }
    onResetPin(resetTarget, resetNewPin.trim());
    setResetSuccess(`PIN успешно сброшен`);
    setResetKey(''); setResetNewPin(''); setResetTarget('');
    setTimeout(() => { setResetMode(false); setResetSuccess(''); }, 2000);
  };

  const roleHints = {
    worker: 'PIN сотрудника',
    master: 'PIN мастера',
    controller: 'PIN контролёра',
    warehouse: 'PIN кладовщика',
    chat: 'Любой PIN для чата',
    dashboard: '',
  };

  if (resetMode) return h('div', { style: { minHeight: 480, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 24, gap: 12, maxWidth: 360, margin: '0 auto' } },
    h('div', { style: { textAlign: 'center', marginBottom: 8 } },
      h('div', { style: { fontSize: 22, fontWeight: 500 } }, '🔑 Сброс PIN'),
      h('div', { style: { fontSize: 12, color: '#888', marginTop: 4 } }, 'Введите мастер-ключ для сброса любого PIN')
    ),
    h('div', { style: { width: '100%', display: 'flex', flexDirection: 'column', gap: 10 } },
      h('div', null,
        h('label', { style: S.lbl }, 'Мастер-ключ'),
        h('input', { type: 'password', inputMode: 'numeric', style: { ...S.inp, width: '100%', textAlign: 'center', fontSize: 20, letterSpacing: '0.3em' }, placeholder: '• • • •', value: resetKey, maxLength: 8, onChange: e => setResetKey(e.target.value) })
      ),
      h('div', null,
        h('label', { style: S.lbl }, 'Сотрудник'),
        h('select', { style: { ...S.inp, width: '100%' }, value: resetTarget, onChange: e => setResetTarget(e.target.value) },
          h('option', { value: '' }, '— выберите сотрудника —'),
          data.workers.map(w => h('option', { key: w.id, value: w.id }, w.name))
        )
      ),
      h('div', null,
        h('label', { style: S.lbl }, 'Новый PIN (минимум 4 цифры)'),
        h('input', { type: 'password', inputMode: 'numeric', style: { ...S.inp, width: '100%', textAlign: 'center', fontSize: 20, letterSpacing: '0.3em' }, placeholder: '• • • •', value: resetNewPin, maxLength: 8, onChange: e => setResetNewPin(e.target.value), onKeyDown: e => e.key === 'Enter' && handleMasterKeyReset() })
      )
    ),
    resetError && h('div', { role: 'alert', style: { color: RD, fontSize: 12, fontWeight: 500, textAlign: 'center' } }, resetError),
    resetSuccess && h('div', { role: 'status', style: { color: GN, fontSize: 12, fontWeight: 500, textAlign: 'center' } }, resetSuccess),
    h('div', { style: { display: 'flex', gap: 8, marginTop: 8 } },
      h('button', { style: gbtn({ flex: 1 }), onClick: () => { setResetMode(false); setResetKey(''); setResetNewPin(''); setResetTarget(''); setResetError(''); } }, '← Назад'),
      h('button', { style: abtn({ flex: 1 }), onClick: handleMasterKeyReset }, 'Сбросить PIN')
    )
  );

  return h('div', { style: { minHeight: 480, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 24, gap: 12 } },
    h('div', { style: { textAlign: 'center', marginBottom: 16 } },
      h('div', { style: { fontSize: 32, fontWeight: 700, color: AM, lineHeight: 1.2 } }, settings.welcomeTitle || 'teploros'),
      h('div', { style: { fontSize: 14, color: '#888', letterSpacing: '0.15em', textTransform: 'uppercase' } }, settings.welcomeSubtitle || 'надежная техника')
    ),
    h('div', { style: { textAlign: 'center', marginBottom: 20 } },
      h('div', { style: { fontSize: 10, color: AM4, textTransform: 'uppercase', letterSpacing: '0.15em' } }, settings.welcomeLabel || 'Производственный учёт · НТ'),
      h('div', { style: { fontSize: 22, fontWeight: 500 } }, 'Вход в систему')
    ),
    // Кнопки выбора роли (подсказка, какой PIN нужен)
    h('div', { style: { display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap', justifyContent: 'center' } },
      [
        ['worker', '👷 Сотрудник'],
        ['master', '🔑 Мастер'],
        ['controller', '🔍 Контролёр'],
        ['warehouse', '📦 Склад'],
        ['dashboard', '📊 Дашборд'],
        ['chat', '💬 Чат'],
      ].map(([r, label]) => h('button', {
        key: r,
        style: role === r ? abtn({ minWidth: 110, fontSize: 12 }) : gbtn({ minWidth: 110, fontSize: 12 }),
        onClick: () => { setRole(r); setLoginError(''); setPin(''); }
      }, label))
    ),
    // PIN-поле — для всех кроме дашборда
    role !== 'dashboard'
      ? h('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 } },
          h('div', { style: { position: 'relative', display: 'inline-block' } },
            h('input', {
              type: showPin ? 'text' : 'password', inputMode: 'numeric', autoFocus: true,
              style: { ...S.inp, width: 220, textAlign: 'center', fontSize: 24, letterSpacing: '0.4em', padding: '10px 40px 10px 10px' },
              placeholder: '• • • •', value: pin,
              onChange: e => setPin(e.target.value),
              onKeyDown: e => e.key === 'Enter' && handleLogin(),
              maxLength: 8
            }),
            h('button', { type: 'button', style: { position: 'absolute', right: 6, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: '#888', padding: 4, minHeight: 'auto' }, onClick: () => setShowPin(v => !v) }, showPin ? '🙈' : '👁')
          ),
          h('div', { style: { fontSize: 11, color: '#888' } }, roleHints[role] || 'Введите PIN-код')
        )
      : h('div', { style: { fontSize: 11, color: '#888', padding: '8px 0' } }, 'Открытый просмотр без PIN'),
    loginError && h('div', { role: 'alert', style: { color: RD, fontSize: 12, fontWeight: 500 } }, loginError),
    h('button', { style: abtn({ marginTop: 8, padding: '10px 40px', fontSize: 14 }), onClick: handleLogin }, 'Войти'),
    // Ссылка на сброс PIN мастер-ключом
    h('button', { style: { background: 'none', border: 'none', fontSize: 11, color: '#aaa', cursor: 'pointer', marginTop: 12, padding: 0, textDecoration: 'underline' }, onClick: () => setResetMode(true) }, 'Сбросить PIN мастер-ключом'),
    // Таблица лидеров
    h('div', { style: { width: '100%', maxWidth: 500, marginTop: 24, borderTop: '0.5px solid rgba(0,0,0,0.08)', paddingTop: 16 } },
      h(Leaderboard, { data })
    )
  );
};

// ==================== WorkerCardModal ====================
const WorkerCardModal = memo(({ worker, data, onClose }) => {
  const [period, setPeriod] = useState(30);
  const nowTime = useMemo(() => now(), []);
  const startDate = nowTime - period * 86400000;
  const opsDone = data.ops.filter(op => op.workerIds?.includes(worker.id) && op.status === 'done' && op.finishedAt >= startDate);
  const opsDefect = data.ops.filter(op => op.workerIds?.includes(worker.id) && op.status === 'defect' && op.finishedAt >= startDate);
  const opsInProgress = data.ops.filter(op => op.workerIds?.includes(worker.id) && op.status === 'in_progress');
  const opsPending = data.ops.filter(op => op.workerIds?.includes(worker.id) && op.status === 'pending');
  const totalOps = opsDone.length;
  const avgTime = totalOps > 0 ? opsDone.reduce((s, op) => s + (op.finishedAt - op.startedAt), 0) / totalOps : 0;
  const defectRate = (totalOps + opsDefect.length) > 0 ? (opsDefect.length / (totalOps + opsDefect.length) * 100).toFixed(1) : '0.0';
  const downtimeEvents = data.events.filter(e => e.workerId === worker.id && e.type === 'downtime' && e.ts >= startDate);
  const downtimeByReason = {};
  downtimeEvents.forEach(e => {
    const reason = data.downtimeTypes.find(dt => dt.id === e.downtimeTypeId)?.name || 'Неизвестно';
    if (!downtimeByReason[reason]) downtimeByReason[reason] = { count: 0, totalDuration: 0 };
    downtimeByReason[reason].count++;
    downtimeByReason[reason].totalDuration += (e.duration || 0);
  });
  const recentOps = [...opsDone, ...opsDefect].sort((a,b) => (b.finishedAt || 0) - (a.finishedAt || 0)).slice(0, 10);
  const section = data.sections.find(s => s.id === worker.sectionId);
  const avgByType = {};
  opsDone.forEach(op => {
    if (!avgByType[op.name]) avgByType[op.name] = { total: 0, count: 0 };
    avgByType[op.name].total += (op.finishedAt - op.startedAt);
    avgByType[op.name].count++;
  });
  const allDone = data.ops.filter(op => op.workerIds?.includes(worker.id) && op.status === 'done').length;
  const level = getWorkerLevel(allDone);

              (WORKER_STATUS[worker.status] || WORKER_STATUS.working).label
            )
          )
        )

      h('div', { style: { display: 'flex', gap: 8, marginBottom: 16, alignItems: 'center' } },
        h('span', { style: { fontSize: 12, color: '#888' } }, 'Период:'),
        [7,30,90].map(d => h('button', { key: d, style: period === d ? abtn({ fontSize: 11, padding: '4px 10px' }) : gbtn({ fontSize: 11, padding: '4px 10px' }), onClick: () => setPeriod(d) }, `${d} дней`))

        h('div', { style: { ...S.card, textAlign: 'center' } }, h('div', { style: { fontSize: 24, fontWeight: 500, color: AM } }, fmtDur(avgTime)), h('div', { style: { fontSize: 10, color: '#888' } }, 'Ср. время')),
        h('div', { style: { ...S.card, textAlign: 'center' } }, h('div', { style: { fontSize: 24, fontWeight: 500, color: Number(defectRate) > 5 ? RD : GN } }, `${defectRate}%`), h('div', { style: { fontSize: 10, color: '#888' } }, 'Брак')),
        h('div', { style: { ...S.card, textAlign: 'center' } }, h('div', { style: { fontSize: 24, fontWeight: 500, color: BL } }, `${opsInProgress.length}/${opsPending.length}`), h('div', { style: { fontSize: 10, color: '#888' } }, 'В работе / Ожидает'))
      ),
      h('div', { style: { ...S.card, marginBottom: 16 } },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8 } },

          h('div', null, h('div', { style: { fontSize: 14, fontWeight: 500 } }, getLevelTitle(level)), h('div', { style: { fontSize: 11, color: '#888' } }, `${allDone} операций всего`))
        ),
        h('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },
          h('div', { style: { flex: 1, height: 8, background: '#eee', borderRadius: 4, overflow: 'hidden' } }, h('div', { style: { width: `${progress * 100}%`, height: 8, background: AM, borderRadius: 4 } })),
          h('div', { style: { fontSize: 11, color: '#888' } }, `${Math.round(progress * 100)}% → Ур. ${level + 1}`)
        )
      ),
      h('div', { style: { marginBottom: 16 } },

        h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 } },
          Object.entries(ACHIEVEMENTS).map(([id, ach]) => {
            const earned = (worker.achievements || []).includes(id);
            return h('div', { key: id, style: { display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px', borderRadius: 8, background: earned ? AM3 : '#f5f5f2', opacity: earned ? 1 : 0.5 } },
              h('span', { style: { fontSize: 18 } }, ach.icon),
              h('div', null, h('div', { style: { fontSize: 12, fontWeight: 500, color: earned ? AM2 : '#888' } }, ach.title), h('div', { style: { fontSize: 10, color: '#aaa' } }, ach.desc))
            );
          })
        )
      ),
      worker.competences && worker.competences.length > 0 && h('div', { style: { marginBottom: 16 } },

      ),
      Object.keys(avgByType).length > 0 && h('div', { style: { marginBottom: 16 } },
        h('div', { style: S.sec }, 'Среднее время по типам операций'),
        h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', null, h('tr', null, ['Операция', 'Кол-во', 'Ср. время'].map((t,i) => h('th', { key: i, style: S.th }, t)))),
          h('tbody', null, Object.entries(avgByType).map(([name, stat]) =>
            h('tr', { key: name },
              h('td', { style: S.td }, name),
              h('td', { style: S.td }, stat.count),
              h('td', { style: { ...S.td, fontFamily: 'monospace' } }, fmtDur(stat.total / stat.count))
            )
          ))
        ))
      ),

          ? h('div', { style: { padding: 8, fontSize: 12, color: '#888' } }, 'Нет простоев за период')
          : h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },

              h('tbody', null, Object.entries(downtimeByReason).sort((a,b) => b[1].count - a[1].count).map(([reason, stat]) =>
                h('tr', { key: reason },
                  h('td', { style: S.td }, reason),
                  h('td', { style: { ...S.td, textAlign: 'center' } }, stat.count),
                  h('td', { style: { ...S.td, fontFamily: 'monospace', color: stat.totalDuration > 0 ? RD : '#888' } }, stat.totalDuration > 0 ? fmtDur(stat.totalDuration) : '—')

              ))
            ))

      recentOps.length > 0 && h('div', null,
        h('div', { style: S.sec }, 'Последние операции'),
        h('div', { className: 'table-responsive' }, h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', null, h('tr', null, ['Операция', 'Заказ', 'Статус', 'Время', 'Длительность'].map((t,i) => h('th', { key: i, style: S.th }, t)))),
          h('tbody', null, recentOps.map(op => {
            const order = data.orders.find(o => o.id === op.orderId);
            return h('tr', { key: op.id },
              h('td', { style: S.td }, op.name),
              h('td', { style: { ...S.td, color: AM } }, order?.number || '—'),
              h('td', { style: S.td }, h(Badge, { st: op.status })),
              h('td', { style: { ...S.td, fontSize: 11 } }, op.finishedAt ? new Date(op.finishedAt).toLocaleString() : '—'),
              h('td', { style: { ...S.td, fontFamily: 'monospace' } }, op.startedAt && op.finishedAt ? fmtDur(op.finishedAt - op.startedAt) : '—')
            );
          }))
        ))
      )
    )
  );
});

// ==================== WorkerScreen ====================
const WorkerScreen = memo(({ data, workerId, sectionId, onUpdate, initialOpId, addToast }) => {
  const worker = useMemo(() => data.workers.find(w => w.id === workerId), [data.workers, workerId]);

  const myOps = useMemo(() => data.ops.filter(o => {
    if (o.status === 'done' || o.status === 'defect' || o.archived) return false;
    // 1. Явно назначена на этого рабочего — всегда показываем
    if (o.workerIds?.includes(workerId)) return true;
    // 2. Не назначена ни на кого — показываем только если:
    //    - совпадает участок
    //    - у рабочего ЕСТЬ компетенции и они включают эту операцию
    if (!o.workerIds?.length && sectionId && o.sectionId === sectionId) {
      const w = data.workers.find(w => w.id === workerId);
      // Без компетенций — не показываем неназначенные (только явно назначенные)
      if (!w?.competences?.length) return false;
      return w.competences.includes(o.name);
    }
    return false;
  }).sort((a,b) => {
    const orderA = data.orders.find(ord => ord.id === a.orderId);
    const orderB = data.orders.find(ord => ord.id === b.orderId);
    const getCR = (op, order) => {
      if (!order?.deadline) return 999;
      const deadlineMs = new Date(order.deadline).getTime();
      const remaining = (op.plannedHours || 2) * 3600000;
      const timeLeft = deadlineMs - now();
      if (timeLeft <= 0) return -1;
      return timeLeft / remaining;
    };
    const crA = getCR(a, orderA), crB = getCR(b, orderB);
    if (crA < 1 || crB < 1) return crA - crB;
    const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
    const pA = priorityOrder[orderA?.priority] ?? 4;
    const pB = priorityOrder[orderB?.priority] ?? 4;
    return pA !== pB ? pA - pB : crA - crB;
  }), [data.ops, data.orders, workerId, sectionId]);

  const doneToday = useMemo(() => data.ops.filter(o =>
    o.workerIds?.includes(workerId) && o.status === 'done' &&
    o.finishedAt && Date.now() - o.finishedAt < 86400000 && !o.archived
  ), [data.ops, workerId]);

  const allDone = useMemo(() =>
    data.ops.filter(op => op.workerIds?.includes(workerId) && op.status === 'done').length,
  [data.ops, workerId]);

  const [activeOp, setActiveOp] = useState(null);
  const [, setTick] = useState(0);
  const [defNote, setDefNote] = useState('');
  const [defectReasonId, setDefectReasonId] = useState('');
  const [showDefForm, setShowDefForm] = useState(false);
  const [defectFromPrev, setDefectFromPrev] = useState(false); // true = с предыдущего участка, false = текущий
  const [showDowntimeModal, setShowDowntimeModal] = useState(false);
  const [selectedDowntimeType, setSelectedDowntimeType] = useState('');
  const [weldParams, setWeldParams] = useState({ seamNumber: '', electrode: '', result: 'ok' });
  const [showAchievements, setShowAchievements] = useState(false);
  const [downtimeStartedAt, setDowntimeStartedAt] = useState(null);
  const [downtimeEquipmentId, setDowntimeEquipmentId] = useState('');
  const [showQRScanner, setShowQRScanner] = useState(false);
  const [showMaterialModal, setShowMaterialModal] = useState(false);
  const [pendingFinishOp, setPendingFinishOp] = useState(null);
  const [showHistory, setShowHistory] = useState(false);
  const [historyOp, setHistoryOp] = useState(null);
  const [opComment, setOpComment] = useState('');

  // Сохранить комментарий к операции
  const saveComment = useCallback(async (opId) => {
    if (!opComment.trim()) return;
    const d = { ...data, ops: data.ops.map(o => o.id === opId ? { ...o, comment: (o.comment ? o.comment + '\n' : '') + `[${worker?.name || 'Рабочий'}]: ${opComment.trim()}` } : o) };
    await DB.save(d); onUpdate(d); setOpComment(''); addToast('Комментарий добавлен', 'success');
  }, [data, opComment, worker, onUpdate, addToast]);

  // Чек-лист: переключение пункта
  const toggleCheckItem = useCallback(async (opId, idx) => {
    const d = { ...data, ops: data.ops.map(o => {
      if (o.id !== opId || !o.checklist) return o;
      const cl = o.checklist.map((item, i) => i === idx ? { ...item, checked: !item.checked, checkedAt: !item.checked ? now() : undefined } : item);
      return { ...o, checklist: cl };
    })};
    await DB.save(d); onUpdate(d);
  }, [data, onUpdate]);

  // Таймер только когда есть активная операция
  useEffect(() => {
    if (!activeOp) return;
    const t = setInterval(() => setTick(n => n + 1), 1000);
    return () => clearInterval(t);
  }, [activeOp]);

  useEffect(() => {
    if (initialOpId && workerId) {
      const op = data.ops.find(o => o.id === initialOpId);
      if (op && op.status === 'pending' && !op.workerIds?.length && !op.archived) {
        if (worker?.competences && worker.competences.length > 0 && !worker.competences.includes(op.name)) {
          addToast('У вас нет компетенции для этой операции', 'error');
          return;
        }
        const updatedOps = data.ops.map(o => o.id === op.id ? { ...o, workerIds: [...(o.workerIds || []), workerId] } : o);
        const newData = { ...data, ops: updatedOps };
        DB.save(newData).then(() => onUpdate(newData));
      }
    }
  }, [initialOpId]);

  const doStart = useCallback(async (op) => {
    if (worker?.competences && worker.competences.length > 0 && !worker.competences.includes(op.name)) {
      addToast('У вас нет компетенции для этой операции', 'error');
      return;
    }
    // Блокировка двойного запуска: рабочий не может вести две операции одновременно
    const alreadyActive = data.ops.find(o => o.status === 'in_progress' && o.workerIds?.includes(workerId) && o.id !== op.id);
    if (alreadyActive) {
      addToast(`Сначала завершите "${alreadyActive.name}"`, 'error');
      return;
    }
    const result = buildStartUpdate(data, op, workerId);
    const updated = { ...data, ops: result.ops, events: result.events };
    await DB.save(updated); onUpdate(updated);
    setActiveOp({ ...op, status: 'in_progress', startedAt: result._startedAt, workerIds: [...(op.workerIds || []), workerId] });
    addToast(`Операция "${op.name}" начата` + (!result._hasCheckin ? ' · Рабочий день начат' : ''), 'success');
  }, [data, workerId, worker, onUpdate, addToast]);

  const doFinish = useCallback(async (op, isDefect = false, isRework = false, source = 'current') => {
    if (op.status !== 'in_progress') return;
    const result = buildFinishUpdate(data, op, workerId, { isDefect, isRework, source, defNote, defectReasonId, weldParams });
    const updated = { ...data, ops: result.ops, events: result.events, reclamations: result.reclamations };
    const status = result._status;
    // Проверяем достижения и сохраняем ОДИН раз
    const withAch = checkAchievements(workerId, updated);
    const final = withAch !== updated ? withAch : updated;
    if (withAch !== updated) {
      const oldAch = (data.workers.find(w => w.id === workerId)?.achievements || []).length;
      const newAch = (withAch.workers.find(w => w.id === workerId)?.achievements || []);
      if (newAch.length > oldAch) {
        const latest = newAch[newAch.length - 1];
        const achInfo = ACHIEVEMENTS[latest];
        if (achInfo) { vibrateOnAchievement(); addToast(`${achInfo.icon} Достижение: ${achInfo.title}!`, 'success'); }
      }
    }
    await DB.save(final); onUpdate(final);
    setActiveOp(null); setShowDefForm(false); setDefNote(''); setDefectReasonId('');
    setWeldParams({ seamNumber: '', electrode: '', result: 'ok' });
    addToast(`Операция "${op.name}" завершена (${STATUS[status]?.label || status})`, 'info');
    // Показать модал расхода материалов если операция завершена успешно
    if ((status === 'done' || status === 'on_check') && data.materials.length > 0) {
      setPendingFinishOp(op); setShowMaterialModal(true);
    }
  }, [data, workerId, onUpdate, defNote, defectReasonId, weldParams, addToast]);

  const saveMaterialConsumption = useCallback(async (consumptions) => {
    if (consumptions.length === 0) {
      // Записать факт пропуска как событие для аудита
      const skipEvent = { id: uid(), type: 'material_skip', opId: pendingFinishOp?.id, workerId, ts: now() };
      const d = { ...data, events: [...data.events, skipEvent] };
      await DB.save(d); onUpdate(d);
      setShowMaterialModal(false); setPendingFinishOp(null); return;
    }
    const updatedMaterials = data.materials.map(m => {
      const used = consumptions.filter(c => c.materialId === m.id).reduce((s, c) => s + c.qty, 0);
      return used > 0 ? { ...m, quantity: Math.max(0, m.quantity - used) } : m;
    });
    const d = { ...data, materials: updatedMaterials, materialConsumptions: [...(data.materialConsumptions || []), ...consumptions] };
    await DB.save(d); onUpdate(d);
    setShowMaterialModal(false); setPendingFinishOp(null);
    addToast('Расход материалов записан', 'success');
  }, [data, workerId, pendingFinishOp, onUpdate, addToast]);

  const recordDowntime = useCallback(async () => {
    if (!selectedDowntimeType) { addToast('Выберите причину простоя', 'error'); return; }
    const ts = now(); const shift = getCurrentShift(data?.settings?.shifts); const duration = downtimeStartedAt ? ts - downtimeStartedAt : 0;
    const newEvent = { id: uid(), type: 'downtime', workerId, opId: activeOp?.id || null, ts, downtimeTypeId: selectedDowntimeType, shift, startedAt: downtimeStartedAt || ts, duration, equipmentId: downtimeEquipmentId || undefined };
    const updated = { ...data, events: [...data.events, newEvent] };
    await DB.save(updated); onUpdate(updated);
    setShowDowntimeModal(false); setSelectedDowntimeType(''); setDowntimeStartedAt(null); setDowntimeEquipmentId('');
    addToast(`Простой зафиксирован (${fmtDur(duration)})`, 'success');
  }, [data, workerId, activeOp, selectedDowntimeType, downtimeStartedAt, onUpdate, addToast]);

  const active = activeOp ? data.ops.find(o => o.id === activeOp.id) : null;
  const elapsed = active?.startedAt ? now() - active.startedAt : 0;
  const qrOp = initialOpId ? data.ops.find(o => o.id === initialOpId) : null;
  const canStartQr = qrOp && qrOp.status === 'pending' && !qrOp.workerIds?.length && !qrOp.archived;

  // Кнопки действий — разделены по типу операции
  const renderActionButtons = (op) => {
    if (showDefForm) {
      const source = defectFromPrev ? 'previous_stage' : 'current';
      return h('div', null,
        h('div', { style: { fontSize: 11, color: RD, fontWeight: 500, marginBottom: 8, textTransform: 'uppercase' } },
          defectFromPrev ? '⚠ Брак с предыдущего участка' : '⚠ Брак текущего этапа'
        ),
        h('div', { style: { display: 'flex', gap: 6, marginBottom: 8 } },
          h('button', { type: 'button', style: defectFromPrev ? rbtn({ flex: 1, fontSize: 11 }) : gbtn({ flex: 1, fontSize: 11 }), onClick: () => setDefectFromPrev(true) }, 'С предыдущего участка'),
          h('button', { type: 'button', style: !defectFromPrev ? rbtn({ flex: 1, fontSize: 11 }) : gbtn({ flex: 1, fontSize: 11 }), onClick: () => setDefectFromPrev(false) }, 'Текущий этап')
        ),
        h('select', { style: { ...S.inp, width: '100%', marginBottom: 8 }, value: defectReasonId, onChange: e => setDefectReasonId(e.target.value) },
          h('option', { value: '' }, '— выберите причину —'),
          (data.defectReasons || []).map(r => h('option', { key: r.id, value: r.id }, r.name))
        ),
        h('textarea', { style: { ...S.inp, width: '100%', marginBottom: 8 }, rows: 2, placeholder: 'Опишите дефект...', value: defNote, onChange: e => setDefNote(e.target.value) }),
        h('div', { style: { display: 'flex', gap: 6 } },
          h('button', { type: 'button', style: rbtn({ flex: 1 }), onClick: () => doFinish(op, true, false, source) }, 'Зафиксировать брак'),
          h('button', { type: 'button', style: { ...gbtn({ flex: 1 }), color: AM2, borderColor: AM4 }, onClick: () => doFinish(op, false, true, source) }, 'На переделку'),
          h('button', { type: 'button', style: gbtn({ flex: 1 }), onClick: () => { setShowDefForm(false); setDefectFromPrev(false); } }, 'Отмена')
        )
      );
    }
    if (op.name.includes('свар')) {
      return h('div', null,
        h('div', { style: { display: 'flex', gap: 8, marginBottom: 8 } },
          h('input', { style: { ...S.inp, flex: 1 }, placeholder: 'Номер шва', value: weldParams.seamNumber, onChange: e => setWeldParams(p => ({ ...p, seamNumber: e.target.value })) }),
          h('input', { style: { ...S.inp, flex: 1 }, placeholder: 'Тип электрода', value: weldParams.electrode, onChange: e => setWeldParams(p => ({ ...p, electrode: e.target.value })) })
        ),
        h('div', { style: { display: 'flex', gap: 8, marginBottom: 8 } },
          h('label', { style: { display: 'flex', alignItems: 'center', gap: 4 } },
            h('input', { type: 'radio', name: `weldResult_worker_${op.id}`, value: 'ok', checked: weldParams.result === 'ok', onChange: e => setWeldParams(p => ({ ...p, result: e.target.value })) }), 'Принято'),
          h('label', { style: { display: 'flex', alignItems: 'center', gap: 4 } },
            h('input', { type: 'radio', name: `weldResult_worker_${op.id}`, value: 'fail', checked: weldParams.result === 'fail', onChange: e => setWeldParams(p => ({ ...p, result: e.target.value })) }), 'Брак')
        ),
        h('div', { className: 'action-btns', style: { display: 'flex', gap: 8 } },
          h('button', { style: { ...abtn({ flex: 1 }), background: GN, color: GN2 }, onClick: () => doFinish(op) }, '✓ Завершить'),
          h('button', { style: rbtn({ flex: 1 }), onClick: () => { setShowDefForm(true); setDefectFromPrev(true); } }, '⚠ Брак с пред. уч.'),
          h('button', { style: { ...rbtn({ flex: 1 }), background: '#FFF0F0', color: RD2, borderColor: '#F09595' }, onClick: () => { setShowDefForm(true); setDefectFromPrev(false); } }, '⚠ Мой брак'),
          h('button', { style: gbtn({ flex: 1 }), onClick: () => { setShowDowntimeModal(true); setDowntimeStartedAt(now()); } }, '⏸ Простой')

      h('button', { style: rbtn({ flex: 1 }), onClick: () => { setShowDefForm(true); setDefectFromPrev(true); } }, '⚠ Брак с пред. уч.'),

  const lvl = getWorkerLevel(allDone);

  const [levelUpMsg, setLevelUpMsg] = useState(null);
  // Обнаружение повышения уровня

  // Подсказка о ближайшем достижении
  const achHint = useMemo(() => {
    const s = calcWorkerStats(workerId, data, Date.now());

    if (!worker?.achievements?.includes('ops_10') && s.doneCount >= 7) remaining.push(`${10 - s.doneCount} оп. до «Десятка»`);

  }, [data, workerId, worker]);

  const nextAch = useMemo(() => Object.entries(ACHIEVEMENTS).find(([id]) => !ach.includes(id)), [ach]);

      weld_master: { cur: s.weldCount, target: 50 }, speed_demon: { cur: s.doneWithPlan, target: 10, extra: `${Math.round((1 - s.avgRatio) * 100)}% быстрее` },
      no_downtime: { cur: s.downtimes30d === 0 ? 1 : 0, target: 1 }, streak_5: { cur: s.currentStreak, target: 5 }, streak_20: { cur: s.currentStreak, target: 20 },
      multi_skill: { cur: s.uniqueOpTypes, target: 5 }, detective_10: { cur: s.detectedDefects, target: 10 }, thanks_5: { cur: s.thanksReceived, target: 5 },
      golden_hands_100: { cur: s.defectCount === 0 ? s.doneCount : 0, target: 100 }, universal_2_3: { cur: s.uniqueSections, target: 3 },
      weekend_5: { cur: s.weekendOps, target: 5 }, virtuoso_10: { cur: s.fastOps, target: 10 },
      no_downtime_7: { cur: s.downtimes7d === 0 ? 1 : 0, target: 1 }, speed_streak_5: { cur: s.bestSpeedStreak, target: 5 }
    };
  }, [workerStats]);

  // Пункт 4: Личные метрики рабочего
  const myStats = useMemo(() => {
    const todayStart = new Date().setHours(0, 0, 0, 0);
    const period30 = now() - 30 * 86400000;
    const myDone = data.ops.filter(op => op.workerIds?.includes(workerId) && op.status === 'done');
    const myDone30 = myDone.filter(op => op.finishedAt >= period30);
    const myDefect30 = data.ops.filter(op => op.workerIds?.includes(workerId) && op.status === 'defect' && op.finishedAt >= period30);
    const total30 = myDone30.length + myDefect30.length;
    const quality = total30 > 0 ? Math.round(myDone30.length / total30 * 100) : 100;
    const todayOps = myDone.filter(op => op.finishedAt >= todayStart && op.startedAt && op.finishedAt);
    const workedToday = todayOps.reduce((s, op) => s + (op.finishedAt - op.startedAt), 0);
    const activeTime = active?.startedAt ? now() - active.startedAt : 0;
    const withPlan = myDone30.filter(op => op.plannedHours && op.startedAt && op.finishedAt);
    const productivity = withPlan.length > 0 ? Math.round(withPlan.reduce((s, op) => s + op.plannedHours * 3600000, 0) / withPlan.reduce((s, op) => s + (op.finishedAt - op.startedAt), 0) * 100) : null;
    const downtimeHrs = Math.round(data.events.filter(e => e.workerId === workerId && e.type === 'downtime' && e.ts >= period30).reduce((s, e) => s + (e.duration || 0), 0) / 3600000 * 10) / 10;
    // Благодарности
    const allThanks = data.events.filter(e => e.type === 'thanks' && e.toWorkerId === workerId);
    const thanksCount = allThanks.length;
    const recentThanks = allThanks.sort((a, b) => b.ts - a.ts).slice(0, 5).map(t => {
      const from = t.fromWorkerId === 'master' ? 'Мастер' : data.workers.find(w => w.id === t.fromWorkerId)?.name || 'Коллега';
      return { from, note: t.note || '', ts: t.ts };

    // Новые благодарности (после последнего просмотра)
    const lastSeenKey = `thanks_seen_${workerId}`;
    const lastSeen = Number(localStorage.getItem(lastSeenKey)) || 0;
    const newThanks = allThanks.filter(t => t.ts > lastSeen);
    return { quality, workedToday: workedToday + activeTime, doneToday: doneToday.length, done30: myDone30.length, productivity, downtimeHrs, thanksCount, recentThanks, newThanks, lastSeenKey };
  }, [data.ops, data.events, workerId, doneToday, active]);

  // Отметить благодарности как просмотренные
  useEffect(() => {
    if (myStats.newThanks.length > 0) {

  const [showThanksHistory, setShowThanksHistory] = useState(false);

  return h('div', { style: { maxWidth: 420, margin: '0 auto', padding: '16px 12px' } },

      h('div', { style: { fontSize: 14, fontWeight: 500, color: '#2E7D32' } }, levelUpMsg)

    h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 } },
      h('div', { style: { width: 48, height: 48, borderRadius: '50%', background: AM3, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, fontWeight: 500, color: AM2, position: 'relative' } },
        worker?.name?.charAt(0) || '?',
        h('div', { style: { position: 'absolute', bottom: -4, right: -4, background: AM, color: '#fff', fontSize: 10, fontWeight: 500, borderRadius: '50%', width: 20, height: 20, display: 'flex', alignItems: 'center', justifyContent: 'center' } }, lvl)
      ),
      h('div', { style: { flex: 1 } },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: 6 } },

          myOps.length > 0 && h('span', { style: { background: RD, color: '#fff', borderRadius: '50%', padding: '2px 6px', fontSize: 10, fontWeight: 500, marginLeft: 4 } }, myOps.length)
        ),
        h('div', { style: { display: 'flex', alignItems: 'center', gap: 6 } },
          h('div', { style: { flex: 1, height: 6, background: '#eee', borderRadius: 3, overflow: 'hidden' } }, h('div', { style: { width: `${prog * 100}%`, height: 6, background: AM, borderRadius: 3 } })),
          h('div', { style: { fontSize: 10, color: '#888' } }, `→ Ур.${lvl + 1}`)
        )
      )
    ),
    // Личная панель метрик — 4 колонки
    h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6, marginBottom: 8 } },
      h('div', { style: { ...S.card, textAlign: 'center', padding: 8, marginBottom: 0 } },
        h('div', { style: { fontSize: 18, fontWeight: 500, color: AM } }, fmtDur(myStats.workedToday)),
        h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Отработано')
      ),
      h('div', { style: { ...S.card, textAlign: 'center', padding: 8, marginBottom: 0 } },
        h('div', { style: { fontSize: 18, fontWeight: 500, color: myStats.quality >= 95 ? GN : myStats.quality >= 80 ? AM : RD } }, `${myStats.quality}%`),
        h('div', { style: { fontSize: 9, color: '#888', textTransform: 'uppercase' } }, 'Качество')
      ),
      h('div', { style: { ...S.card, textAlign: 'center', padding: 8, marginBottom: 0 } },
        h('div', { style: { fontSize: 18, fontWeight: 500, color: myStats.productivity ? (myStats.productivity >= 100 ? GN : AM) : '#888' } }, myStats.productivity ? `${myStats.productivity}%` : '—'),

      myStats.recentThanks.map((t, i) => h('div', { key: i, style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderBottom: '0.5px solid rgba(0,0,0,0.05)', fontSize: 12 } },

    active && h('div', { style: { ...S.card, border: `1px solid ${AM}`, background: AM3, marginBottom: 16 } },

      h('div', { style: { fontSize: 16, fontWeight: 500, color: AM2, marginBottom: 4 } }, active.name),
      h('div', { style: { fontSize: 10, color: AM, marginBottom: 12 } }, data.orders.find(o => o.id === active.orderId)?.number || ''),

        opComment.trim() && h('button', { style: abtn({ padding: '6px 10px', fontSize: 11 }), onClick: () => saveComment(active.id) }, '💬')

      (active.checklist?.length > 0 && active.checklist.some(c => !c.checked))
        ? h('div', { style: { textAlign: 'center', padding: 8, color: '#888', fontSize: 12 } }, 'Выполните все пункты чек-листа для завершения')
        : renderActionButtons(active)

    // QR-операция
    !active && canStartQr && h('div', { style: { ...S.card, border: `1px solid ${AM}`, background: AM3, marginBottom: 16 } },
      h('div', { style: { fontSize: 10, color: AM, textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 6 } }, 'Назначено по QR-коду'),
      h('div', { style: { fontSize: 16, fontWeight: 500, color: AM2, marginBottom: 4 } }, qrOp.name),
      h('div', { style: { fontSize: 10, color: AM, marginBottom: 12 } }, data.orders.find(o => o.id === qrOp.orderId)?.number || ''),
      h('button', { type: 'button', style: abtn({ width: '100%', padding: '12px' }), onClick: () => doStart(qrOp) }, '▶ Начать операцию')
    ),
    // Модал простоя (П.16: привязка к оборудованию)
    showDowntimeModal && h('div', {
      role: 'dialog', 'aria-modal': 'true', 'aria-label': 'Фиксация простоя',
      style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 60 }
    },
      h('div', { className: 'modal-content', style: { background: '#fff', borderRadius: 12, padding: 20, width: 'min(360px, calc(100vw - 24px))', maxHeight: '85vh', overflowY: 'auto' } },
        h('div', { style: { fontSize: 14, fontWeight: 500, marginBottom: 4, textAlign: 'center' } }, 'Фиксация простоя'),
        h(ElapsedTimer, { startedAt: downtimeStartedAt, style: { fontSize: 32, fontWeight: 500, color: RD, textAlign: 'center', margin: '12px 0' } }),
        h('div', { style: { fontSize: 11, color: '#888', textAlign: 'center', marginBottom: 12 } }, 'Выберите причину:'),
        // Причины — крупные кнопки
        h('div', { style: { display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 12 } },
          data.downtimeTypes.map(dt => h('button', { key: dt.id, type: 'button',
            style: { padding: '14px 16px', fontSize: 14, fontWeight: selectedDowntimeType === dt.id ? 500 : 400, borderRadius: 10, border: selectedDowntimeType === dt.id ? `2px solid ${AM}` : '1px solid rgba(0,0,0,0.12)', background: selectedDowntimeType === dt.id ? AM3 : '#fff', color: selectedDowntimeType === dt.id ? AM2 : '#333', cursor: 'pointer', textAlign: 'left', minHeight: 48 },
            onClick: () => setSelectedDowntimeType(dt.id)
          }, dt.name))
        ),
        // Оборудование (если есть)
        data.equipment.length > 0 && h('div', { style: { marginBottom: 12 } },
          h('div', { style: { fontSize: 11, color: '#888', marginBottom: 6 } }, 'Оборудование (если связано):'),
          h('div', { style: { display: 'flex', gap: 6, flexWrap: 'wrap' } },
            h('button', { type: 'button', style: { padding: '8px 12px', fontSize: 12, borderRadius: 8, border: !downtimeEquipmentId ? `2px solid ${AM}` : '1px solid rgba(0,0,0,0.12)', background: !downtimeEquipmentId ? AM3 : '#fff', color: !downtimeEquipmentId ? AM2 : '#666', cursor: 'pointer' }, onClick: () => setDowntimeEquipmentId('') }, 'Не связано'),

          h('button', { style: gbtn({ flex: 1, padding: '12px', fontSize: 14 }), onClick: () => { setShowDowntimeModal(false); setSelectedDowntimeType(''); setDowntimeStartedAt(null); setDowntimeEquipmentId(''); } }, 'Отмена'),
          h('button', { style: rbtn({ flex: 1, padding: '12px', fontSize: 14, fontWeight: 500 }), onClick: recordDowntime, disabled: !selectedDowntimeType }, 'Завершить простой')
        )
      )
    ),
    // Список заданий (П.13: шаг «Принять», П.19: комментарий)
    !active && myOps.length > 0 && h('div', null,

      myOps.map(op => {

        const daysLeft = timeLeft ? Math.ceil(timeLeft / 86400000) : null;
        const isUrgent = daysLeft !== null && daysLeft <= 2;
        const isOverdue = daysLeft !== null && daysLeft < 0;
        // П.13: проверка зависимостей — можно ли начать
        const depsComplete = !op.dependsOn || op.dependsOn.length === 0 || op.dependsOn.every(depId => { const depOp = data.ops.find(d => d.id === depId); return depOp && depOp.status === 'done'; });
